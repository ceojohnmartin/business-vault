DATA.push({id:"acq",name:"Acquisition School",tag:"Buy the Machine",intro:"The fastest path from operator knowledge to owner wealth: buy a business that already works. Two levels — finding and pricing the deal, then financing, closing, and running your first hundred days. Deals involve lawyers, lenders, and CPAs for a reason: this school makes you dangerous in the room, not a substitute for the professionals in it.",levels:[
{id:"Q1",name:"Finding & Pricing Deals",tagline:"Level 1",desc:"Thesis, sourcing, screening, and valuation — the buy-side hunt",modules:[
{name:"The Hunt",lessons:[
{id:"aq1",t:"The Buy-Side Mindset & Your Thesis",q:"acquisition entrepreneurship buy a business search thesis",
learn:["Why buying beats starting for most operators","Writing a one-page acquisition thesis","Sizing the search to your capital and skills"],
why:"Startups hunt for a business model that works; buyers purchase one with years of proof. But without a written thesis, buyers drift for years or buy the wrong thing enthusiastically.",
p:["The core arithmetic of acquisition entrepreneurship: a startup spends years finding out IF customers exist; a bought business hands you customers, cash flow, staff, and proof on day one — priced, thanks to small-market inefficiency and retiring-owner supply, at 2.5-4× earnings, meaning the business itself pays for its own purchase in a handful of years, especially levered with the SBA structures this school covers. The trade: you pay for de-risking (that's what the multiple is), you inherit someone else's habits (staff, systems, reputation — good and bad), and the skills that matter shift from inventing to operating — exactly the skills the rest of this university taught. The boring-business insight from your Library (Buy Then Build; the searchers' playbooks): unsexy + recurring + fragmented is where the deals live, because competition to buy them is thin and the sellers are demographic certainty — retiring owners without heirs.",
"The thesis is one page, written before you look at a single listing, answering five questions: (1) Industry — what do you know, what recurring-revenue models do you believe in? (2) Size — target SDE/EBITDA range set by your capital (down payment ≈ 10-20% of price plus working capital reserve) and salary needs; (3) Geography — how far will you actually drive daily? (4) Your edge — what will YOU do to this business that its 68-year-old owner won't (the tracks you've studied here: memberships, routes, D2D, digital marketing)? (5) Disqualifiers — written in advance, because deal fever is real: e.g., no customer over 20% of revenue, no unlicensed liabilities, no landlord who can kill the business. The thesis converts 'looking for a business' (a mood) into a search (a funnel you can run like the sales school taught) — and it's also your first credibility document with brokers, who triage buyers into 'tourists' and 'closers' within one conversation."],
terms:[["Acquisition entrepreneurship","Buying an existing business as the entry to ownership instead of founding."],["SDE","Seller's Discretionary Earnings — profit plus owner salary/perks; small-deal pricing currency."],["Thesis","Your one-page spec: industry, size, geography, edge, disqualifiers."],["Deal fever","The bias that makes months of searching justify a bad purchase."],["Boring-business premium","Unsexy + recurring + fragmented = thin buyer competition and motivated sellers."]],
ex:"Two would-be buyers start 'looking.' Buyer A browses listing sites nightly for two years, falls in love thrice (a brewery, a gym, a drone startup), closes nothing. Buyer B writes a thesis — residential pest control, $150-250k SDE, 60 miles, edge = D2D team + digital (this university), disqualifiers include >15% commercial concentration — and works it like a pipeline. Eleven months later she owns a 480-account route business. The difference wasn't luck or capital; it was that only one of them could say no quickly.",
mistakes:["Searching without written disqualifiers and catching deal fever at month nine","Sizing the target to your dreams instead of your down payment and salary math","Ignoring your operator edge — buying a business you have no plan to improve"],
keys:["Buying trades startup risk for a priced, proven machine — then operating skill is the return","Unsexy, recurring, fragmented industries with retiring owners are the fishing hole","One page: industry, size, geography, edge, disqualifiers — written BEFORE looking","A thesis turns browsing into a funnel and makes brokers take you seriously"],
assign:"Write your one-page thesis now — all five sections, including at least four hard disqualifiers. Save it in the app's notes; every later lesson tests deals against it."},
{id:"aq2",t:"Deal Sourcing: Building the Funnel",q:"how to find businesses to buy off market deal sourcing",
learn:["The four sourcing channels and their real hit rates","Running outreach like the sales pipeline it is","Reading brokers, listings, and the language of 'motivated'"],
why:"Good deals are found by search systems, not stumbled upon. The buyer who sources 100 opportunities prices the one they buy; the buyer who sees three overpays for the third.",
p:["Four channels, in rising order of effort and reward. (1) Listing sites and marketplaces: infinite supply, heavy competition, listings often stale or overpriced — useful for calibrating multiples and spotting brokers who work your niche. (2) Broker relationships: brokers control small-business deal flow, and they ration their best files to buyers who've proven they close — your thesis, your financing pre-work (the SBA lesson), and prompt, honest feedback on files they send is how you become a first-call buyer. (3) Professional referrers — CPAs, attorneys, lenders, industry association heads — each knows five owners thinking about retiring years before any broker does; a short letter plus a coffee per month compounds. (4) Direct outreach: the searcher's weapon — a clean list (state license databases are gold for pest/trades; the route-density logic tells you which zips), a plain letter ('I'm an individual buyer looking to own and operate one company in [county]; if you've ever considered your exit…'), and the follow-up cadence from the sales school, because response rates are a funnel like everything else: hundreds of letters → dozens of conversations → a handful of real discussions → one deal. Off-market conversations have no auction, no broker fee pressure, and a seller who's talking because they LIKE you — the trifecta of good pricing.",
"Treat all four as one CRM pipeline (the sales school's machinery pointed at sellers): every owner contact gets a disposition and a next date; 'no' means 'not yet' — the owner who hangs up in March calls back in November after a health scare or a brutal season, and the buyer still politely in touch wins without competition. Read seller language for motivation, because motivation prices deals: 'retiring, wants the team taken care of' beats 'exploring strategic options' beats 'testing the market.' And qualify listings fast with three questions before any meeting: why selling, why now, and what does the owner do all day — the answers screen for the succession vacuum (good), the hidden disaster (bad), and the owner-is-the-business trap (the Library's trapped-founder case, priced accordingly)."],
terms:[["Deal flow","Your stream of acquisition opportunities — built, not awaited."],["Off-market deal","A seller conversation without a listing or auction — pricing's best friend."],["First-call buyer","The broker's trusted closer who sees files before the blast list."],["Motivated seller","Retirement, health, burnout — motivation, not desperation, is the sweet spot."],["Succession vacuum","No heir, no manager, no plan — the demographic engine of small-deal supply."]],
ex:"A searcher mails 400 letters to licensed pest operators in three counties (list cost: $80). Results: 31 calls, 9 real conversations, 2 owners 'maybe next year,' 1 deal — a 61-year-old with shoulder surgery scheduled and no listing anywhere. Purchase at 2.7× SDE with seller financing, versus the 3.4× average on the broker listings he'd been outbid on twice. The stamps were the highest-ROI marketing spend of his life; the November follow-up calls to the two 'maybes' are already scheduled.",
mistakes:["Browsing listings only and competing in every auction","Treating brokers as vending machines instead of relationships to earn","Sending one letter wave and calling direct outreach 'tried'"],
keys:["Four channels — listings calibrate, brokers ration, referrers whisper, letters win","Run sellers through a real CRM with dispositions and next dates","Motivation prices deals: retirement and burnout beat 'testing the market'","Three screening questions: why selling, why now, what does the owner do all day"],
assign:"Build a 25-owner direct-outreach list in your thesis niche (license databases, maps, associations) and draft your one-page letter. Send at least ten this week."},
{id:"aq3",t:"Reading a Deal: The CIM & First-Pass Analysis",q:"how to analyze business for sale CIM confidential information memorandum",
learn:["Decoding a broker's CIM (and its silences)","The 60-minute first-pass screen","Add-backs: which are real and which are fiction"],
why:"Every deal document is marketing. The skill is extracting the eight numbers that matter, testing the story for silence, and killing bad deals in an hour instead of a month.",
p:["The CIM (Confidential Information Memorandum) arrives after an NDA: business story, financial summaries, adjusted earnings, growth 'opportunities' (a list of everything the seller didn't bother doing), and an asking price rationale. Read it like an analyst, not a fan. The 60-minute screen: (1) revenue trend, three-to-five years — growing, flat, or declining, and WHY; (2) revenue mix — recurring versus one-time percentage (the multiple driver from your industry tracks); (3) customer concentration — any single customer over 10-15% is a discount, over 25% is a different deal; (4) gross margin trend (the accounting school's drift alarm); (5) SDE and the add-back schedule, line by line; (6) owner's role — hours, relationships held, licenses held personally (the trapped-founder discount); (7) staff — tenure, licenses, who leaves with the seller; (8) lease/assets — term remaining, assignability, deferred maintenance. Each answer either fits your thesis, adjusts your price, or triggers a disqualifier. Write the three biggest risks in the margin — diligence (next level) exists to test exactly those.",
"Add-backs deserve their own paranoia, because SDE is where sellers negotiate before negotiation starts. Legitimate: the owner's salary and payroll taxes, personal vehicle/phone/insurance run through the books, true one-time items (a lawsuit settled, a flood). Fictional: 'above-market rent' owed to the seller's own building LLC (you'll pay rent too), family members on payroll who do real work someone must replace, 'one-time' repairs that recur annually, and the beloved 'owner didn't really need to be there' (then why was he?). Rebuild SDE yourself from the tax returns — not the CIM's summary — and price on YOUR number. The general rule of first-pass work: you're not looking for reasons to love the deal (the CIM did that); you're looking for the fastest honest reason to say no, because your scarcest asset is diligence attention, and it goes only to survivors."],
terms:[["CIM","The broker's marketing book — useful data wrapped in advocacy."],["Customer concentration","Revenue share of top customers — over ~15% each starts discounting price."],["Add-back schedule","Adjustments turning book profit into 'owner earnings' — audit each line."],["Recast SDE","Your own rebuild of earnings from tax returns, not the broker's summary."],["Growth opportunities","CIM-speak for things the seller didn't do — you fund and execute them, so you don't pay for them"]],
ex:"A CIM shows $310k SDE for a $950k landscaping company. The buyer's recast: $60k of the add-backs are the seller's son (who runs all commercial estimates and is leaving), 'one-time equipment repair' appears three years running, and true SDE lands at $228k. Same business, honest number — the 3.1× ask is actually 4.2×. The buyer offers off his recast, attaches the schedule showing his math, and the broker — who has watched this movie — doesn't even argue. Deal closes at 2.9× of real.",
mistakes:["Analyzing the CIM's adjusted numbers instead of rebuilding from tax returns","Paying for 'growth opportunities' the seller never executed","Spending a month on a deal an hour's screen would have killed"],
keys:["Eight numbers in sixty minutes: trend, mix, concentration, margin, SDE, owner role, staff, lease","Audit add-backs line by line — SDE is pre-negotiation in disguise","Recast earnings yourself from tax returns and price on YOUR number","First-pass goal: the fastest honest no — diligence attention only goes to survivors"],
assign:"Take any live listing in your niche (or request a CIM) and run the full 60-minute screen. Produce your recast SDE and write the three margin risks diligence would test."},
{id:"aq4",t:"Valuing the Target: Multiples, DSCR & Your Walk Number",q:"small business valuation multiples SDE EBITDA explained",
learn:["How small businesses are actually priced (and by whom)","The three valuation lenses buyers cross-check","Setting your maximum price from debt math, not emotion"],
why:"You make your money when you buy. The seller has one number in mind; you need three — value, structure, and the walk-away — computed before the negotiation dinner, not during.",
p:["Small deals price on multiples of SDE (owner-operated) or EBITDA (manager-run): the bands you've met in the industry tracks — sub-$100k SDE service businesses at 1.8-2.5×, solid $150-350k SDE companies at 2.5-3.5×, real EBITDA platforms at 4-6×+ — with the multiple EARNED by quality: recurring revenue percentage, retention cohorts, clean books (the accounting school's 'provable numbers ARE enterprise value'), management depth, customer diversity, and equipment condition. Lens one is therefore market comps: what did similar businesses actually trade for (brokers, industry associations, and the DealSheet-style sources from your tracks). Lens two is the buyer's DCF-lite from the finance lessons: recast SDE, minus the manager salary you'd pay yourself or another to run it honestly, projected conservatively, discounted hard — an academic cross-check that mostly protects you from paying platform multiples for a job.",
"Lens three is the one that signs checks: financeability. Work the SBA Acquisition Analyzer backward — at 10-15% down, prevailing rates, ten-year term, the deal must produce DSCR ≥ 1.25 AFTER your real salary and a capex reserve, or no lender funds it and no honest spreadsheet should either. That constraint converts to a maximum price mechanically: recast SDE → subtract salary and reserve → divide by 1.25 → that's the annual debt service the business supports → that's the loan the payment supports → plus your down payment = your ceiling. Write down three numbers before any negotiation: the price you'd be delighted by, the price you'd accept, and the walk number — and the walk number is physics, not posture. Everything above it isn't 'stretching'; it's transferring your future salary to the seller. Structure (seller notes, earnouts — next level) can bridge honest gaps; it cannot make a too-expensive business cheap."],
terms:[["Multiple bands","Price ranges by earnings size and quality — small SDE deals 1.8-3.5×, platforms higher."],["Quality premium","Recurring %, retention, clean books, management depth — what earns the high band."],["Manager-adjusted SDE","Earnings after paying someone (maybe you) a real salary to run it."],["Financeability ceiling","The max price at which DSCR ≥1.25 survives after salary and reserves."],["Walk number","Your pre-computed maximum — physics, not negotiation posture."]],
ex:"A wash with $185k recast SDE lists at $740k (4.0×). Comps for non-membership sites say 2.75-3.25×. The buyer's Analyzer run: after a $60k salary and $15k capex reserve, 1.25 DSCR supports about $88k of debt service → roughly a $555k loan → with 15% down, a $650k ceiling — and that's IF the membership conversion is his upside, unpaid-for. He offers $585k, shows the lender math, and lets the seller argue with arithmetic instead of with him. Six weeks of silence, one competing buyer's financing collapse later: $610k, done. The spreadsheet negotiated.",
mistakes:["Paying platform multiples for an owner-operated job","Skipping the manager-salary adjustment and calling wages 'profit'","Letting months of search move the walk number ('we've come so far')"],
keys:["Three lenses: market comps, conservative DCF-lite, and the financeability ceiling","Multiples are earned by quality — recurring, retention, books, depth, diversity","DSCR ≥1.25 after real salary and reserves converts mechanically to a max price","Delight / accept / walk — written before negotiation; the walk number is physics"],
assign:"Run the SBA Acquisition Analyzer on a real or sample deal: compute the financeability ceiling, then write your delight/accept/walk numbers with one sentence of justification each."},
{id:"aq5",t:"The LOI: Structuring the Offer",q:"letter of intent LOI buying a business structure seller financing",
learn:["What an LOI does (and deliberately doesn't) commit","The structural levers: cash, seller note, earnout, asset vs. stock","Negotiating price via structure instead of arm-wrestling"],
why:"The LOI converts mutual interest into a private, structured runway to closing. Its terms — not the handshake price — decide who carries which risks, and most of its power is in paragraphs buyers skim.",
p:["The Letter of Intent is a short, mostly non-binding agreement: price and structure, what's included (assets, name, phone numbers, vehicles — and what's not), exclusivity (binding — the seller stops shopping for 60-90 days while you spend real money on diligence), confidentiality (binding), diligence scope and timeline, financing contingency, and target closing date. Non-binding on price doesn't mean casual: retrading (cutting price later without new facts) burns reputation in small broker markets, so offer what your aq4 math supports and reserve adjustments for genuine diligence discoveries. Almost always you'll buy ASSETS, not the company's stock — the asset purchase leaves the seller's unknown liabilities (that 2019 lawsuit, the payroll tax surprise) behind, resets depreciation for your taxes, and is what your attorney will insist on; sellers prefer stock sales for their own tax reasons, which becomes a pricing conversation, not a surrender.",
"Structure is where deals get creative and gaps get bridged. The seller note — seller finances 10-30% at modest interest, standby to the SBA loan — is the workhorse: it lowers your cash needs AND keeps the seller invested in a clean transition (they're your creditor now; they answer the phone in month four). Earnouts pay part of the price only if the business performs ('another $100k if revenue holds above $X for 24 months') — the honest bridge when the seller's optimism prices the future they won't be operating; tie them to REVENUE or account retention, never to profit a new owner's accounting can bend, or you're buying a lawsuit. Add the transition package to the LOI while goodwill is high: training period (60-90 days full-time, then on-call), a real non-compete (years + radius + scope), and key-relationship introductions scheduled by name. The negotiation meta-skill, courtesy of the sales school: trade, don't concede — every dollar of price the seller wants meets a request ('at that number, the note grows to 25% and the training runs six months'). Structure is the language in which buyers and sellers stop arguing and start solving."],
terms:[["LOI","Letter of Intent — the mostly non-binding deal blueprint that starts exclusivity and diligence."],["Exclusivity","The binding no-shop window protecting your diligence spend."],["Asset vs. stock purchase","Buying the business's assets (clean) versus its legal entity (its history included)."],["Seller note (standby)","Seller-financed portion, subordinate to the bank — cash bridge and behavior bond."],["Earnout","Contingent price paid on future performance — tie to revenue/retention, never profit."]],
ex:"Gap: seller wants $500k, buyer's ceiling is $440k. Instead of splitting differences, the LOI restructures: $400k at close (SBA + down payment), a $60k seller note at 6% over five years standby, and a $40k earnout paid if account retention holds 85%+ for two years. Sticker says $500k — the seller's dinner-party number survives. Risk-adjusted, the buyer paid ~$450k with the seller's own confidence bonding the transition. Both signed the same paper believing they won; structurally, both did.",
mistakes:["Treating the LOI as casual because it's 'non-binding' — exclusivity and reputation are real","Accepting a stock purchase without pricing the liability history you're adopting","Earnouts tied to profit a new owner's own spending redefines"],
keys:["LOI = price, structure, exclusivity, contingencies, timeline — the deal's blueprint","Buy assets, not history; let the seller's tax preference become pricing, not surrender","Seller notes bridge cash and bond behavior; earnouts bridge optimism — on revenue only","Trade, don't concede: every price move meets a structural request"],
assign:"Draft LOI terms for your aq4 deal: price, structure split (cash/note/earnout with triggers), exclusivity length, transition package, and the two contingencies you refuse to waive."}
]}
]},
{id:"Q2",name:"Closing & Operating",tagline:"Level 2",desc:"Diligence, financing, closing day, and the first hundred days of ownership",modules:[
{name:"From Signature to Owner",lessons:[
{id:"aq6",t:"Due Diligence: Trust, Then Verify Everything",q:"due diligence checklist buying small business",
learn:["The four diligence tracks and their deal-killing questions","Verifying revenue reality: bank deposits, cohorts, and customers","Deciding: close, reprice, or walk — with a framework"],
why:"Diligence is where you spend real money to test the three risks you wrote in the CIM margin — and where retrades, walk-aways, and great deals are all legitimately born.",
p:["Run four tracks in parallel across your 45-90 day window. FINANCIAL: match the P&Ls to tax returns (differences have explanations or consequences), match reported revenue to actual bank deposits month by month (the single most powerful test in small-business diligence — cash businesses 'with unreported income the buyer should consider' are simultaneously lying to the IRS or to you, and either way you price only what's provable), rebuild the add-back schedule with receipts, and age the receivables. OPERATIONAL: customer cohorts and churn by year (retention is the asset in recurring businesses — demand the raw customer list under NDA and compute it yourself), concentration, pricing history (when last raised — untouched pricing is upside; recently jacked is a sugar high), employee census with wages/tenure/licenses, and the condition audit on every truck and machine (your $150k refresh estimate from the car wash case belongs in the price). LEGAL (with your attorney): litigation history, licenses and their transferability, lease assignment — the landlord can kill service-location deals, so meet them early — liens (UCC search), and contracts that survive closing. THE HUMAN track: why is the seller REALLY selling — asked three ways on three days; industry gossip (suppliers and competitors know); and glass-door hours watching the actual operation, counting actual cars, meeting (carefully, late, with seller consent) the key employee whose departure would gut the thing.",
"Diligence produces one of three honest outcomes. CLOSE as agreed: the story held — most sellers are decent people whose books are merely disorganized. REPRICE with receipts: material, provable differences (recast SDE off 20%, a surprise $80k of deferred maintenance) justify reopening price via the earnout/note structures of aq5 — retrading on real findings is professional; retrading on cold feet is reputational arson. WALK: your written disqualifiers tripped, or the seller obstructed verification ('you don't need bank statements, the P&L is right there' is itself a finding). The psychology is the hard part: by week six you've spent five figures and imagined yourself at the counter — deal momentum is real, and the sunk-cost whisper ('we've come so far') has closed more bad deals than all the brokers alive. Your pre-written walk conditions from aq1 are the tripwire that saves you from yourself."],
terms:[["Proof of cash","Matching reported revenue to bank deposits — the lie detector of small-deal diligence."],["Cohort retention","Tracking each year's new customers over time — the true health of recurring revenue."],["UCC search","Public lien check — what creditors already claim of 'your' assets."],["Retrade","Reopening agreed price — professional with findings, poisonous without."],["Deal momentum","Sunk cost + imagination — the bias your written walk conditions exist to beat"]],
ex:"Week five of diligence on a $520k HVAC deal: deposits match, licenses transfer, but the customer list shows 40% of 'recurring' maintenance contracts lapsed two years ago and were never removed from the count, and the lead tech — who holds the master license — reveals he's retiring with the seller. Recast retention drops the SDE quality a full multiple band. The buyer reprices to $410k with a license-transition earnout; the seller rages, reflects, accepts. The $9k of diligence spend bought a $110k correction and a business that survives its own closing.",
mistakes:["Accepting P&Ls without tax returns and bank statements ('the CPA prepared them' is not verification)","Skipping the landlord until week eight and discovering the lease dies at transfer","Letting five figures of sunk diligence spend close a deal your checklist already killed"],
keys:["Four tracks: financial (deposits!), operational (cohorts!), legal (lease/liens/licenses), human (why, really?)","Price only provable earnings — unprovable cash is a seller's problem twice","Three honest exits: close, reprice with receipts, or walk on tripped disqualifiers","Diligence dollars buy corrections and courage; momentum is the enemy of both"],
assign:"Build your master diligence checklist from this lesson's four tracks — every item phrased as a question with a document that answers it. Save it; Level 2's remaining lessons assume it exists."},
{id:"aq7",t:"The Financing Stack: SBA, Sellers & Structure",q:"sba 7a loan buying business how it works financing",
learn:["How SBA 7(a) acquisition lending actually works end-to-end","Stacking bank debt, seller notes, and your equity injection","Lender shopping, personal guarantees, and approval psychology"],
why:"Leverage is why a $60k saver can buy a $500k cash machine. The SBA stack is America's small-buyer superpower — if you understand the machine, its paperwork, and its non-negotiables.",
p:["The SBA 7(a) program has the government guarantee most of a bank's loss if you default — which is why banks will fund 80-90% of a small business purchase for a first-time buyer at all. Typical acquisition shape: 10-year term (real estate included stretches longer), floating rate around Prime + 2-3%, 10-15% buyer equity injection (some of which may itself be a standby seller note, program rules permitting), and — the clause to read twice — a personal guarantee, usually with a lien on your home: you are betting the house, literally, which is why every DSCR and diligence lesson before this one exists. Banks vary WILDLY: an SBA 'Preferred Lender' (PLP) with in-house authority closes in 45-60 days while a dabbler takes four months to say no, so shop three lenders minimum with a clean package — your recast financials, the target's returns, your resume framed as operator credibility (this university IS that resume), and a sources-and-uses table — and treat lender questions as free diligence: what worries the bank should worry you.",
"The full stack on a $500k deal might read: $50-75k your cash (plus a working capital line — never spend your last dollar on the down payment; the accounting school's working-capital lessons apply violently in month one), $75k standby seller note, $360-375k SBA loan. Underwriting psychology: the lender approves three things — the BUSINESS's boring, provable cash flow (they love the same recurring revenue you do), the BUYER's credit (the 700+ score from the Money school, savings history, relevant competence), and the DEAL's math (price within appraisal, DSCR ≥1.25 after your real salary — they will model your household budget, so lowballing your salary needs fools no one). What kills approvals: unprovable cash income (again), thin post-close liquidity, key-person licenses that don't transfer, and buyer resumes with zero operating signal. Alternatives worth knowing — 100% seller financing (rare, golden, ask anyway), ROBS structures (401(k) funds, real rules, real CPA required), investor equity (the cap-table lessons apply) — but for most first buyers, the SBA stack is the door. Walk through it prepared and it opens surprisingly wide."],
terms:[["SBA 7(a)","Government-guaranteed acquisition lending — the first-time buyer's leverage engine."],["Equity injection","Your required 10-15% skin — partially fundable by standby seller note under program rules."],["Personal guarantee","You owe it regardless — often secured by your home. Read twice, sleep once."],["Preferred lender (PLP)","Banks with delegated SBA authority — weeks faster than dabblers."],["Sources and uses","The one-page table of where every closing dollar comes from and goes."]],
ex:"Same $450k pest deal, two buyers. Buyer A walks into his home bank ('we do SBA sometimes'), waits 11 weeks, dies in committee. Buyer B packages recast financials + three years of target returns + a resume noting his sales-team and route-economics coursework, sends it to three PLP lenders simultaneously, takes the one quoting Prime+2.25 with 55-day close, and structures 10% cash + 10% standby note + 80% SBA. Both had identical credit. One understood he was the product being underwritten.",
mistakes:["Draining every dollar into the down payment and starting ownership illiquid","Using a non-PLP lender because 'they know me' — committees don't","Underestimating your salary needs to inflate DSCR — underwriters model your life anyway"],
keys:["SBA 7(a): ~10-15% down, 10 years, Prime+2-3, personal guarantee — leverage with teeth","Shop 3+ preferred lenders with a professional package; speed and pricing vary wildly","The stack: your cash + standby seller note + SBA + working capital line untouched","Lenders underwrite business, buyer, and math — every lender worry is free diligence"],
assign:"Build the sources-and-uses table for your Analyzer deal from aq4, then draft your one-page buyer resume — credit, liquidity, and every operator credential this university has given you."},
{id:"aq8",t:"Closing Day & the Transition Playbook",q:"closing on business purchase transition plan first days",
learn:["The closing choreography: documents, escrows, and what can still explode","The announcement problem: employees, customers, suppliers","Running the seller's training period like the asset it is"],
why:"Deals die at 11:58, and businesses die in the ninety days after the wire clears. Closing is choreography; transition is the first real test of everything this school taught.",
p:["Closing week choreography: the asset purchase agreement (the LOI's binding grown-up — your attorney drives), schedules listing every included asset by serial number, the assigned lease countersigned by that landlord you wisely met in week two, licenses/permits transferred or reissued (in license trades, timed so coverage never gaps), insurance bound effective at funding, lien releases confirmed against the UCC search, the bill of sale, note documents, non-compete, and the flow of funds memo choreographing wires. Standard protections: a working capital adjustment (the business arrives with agreed levels of receivables and supplies, not stripped), an escrow holdback (5-10% held 6-12 months against surprises and, in recurring businesses, retention targets — the pest track's holdback lesson generalized), and prorations of everything mid-cycle (rent, prepaid contracts, payroll). Last 48 hours: re-verify nothing moved — a final deposits check, a truck count, insurance certificates in hand. Then the wire clears, and the easy part of your acquisition career ends.",
"Transition is a communications operation executed in a specific order. Employees first, same day, in person, with the seller beside you: their real questions are three — do I still have a job, does my pay change, who do I answer to — and your answers are yes, no, and me-with-nothing-else-changing-for-90-days. The 'no changes for 90 days' pledge (then keep it — the roll-up case's churn lesson was exactly the cost of breaking this) buys you observation time and buys them safety. Customers next: for the top accounts, joint visits with the seller ('I'm handing you to someone I trust' is the single highest-value sentence your purchase bought); for the base, a warm letter emphasizing continuity — same techs, same schedule, same phone number. Suppliers and referral sources get calls, not letters. Then run the seller's 60-90 training days like the depreciating asset they are: a written curriculum (week one: daily operations shadowing; week two: every pricing decision and its history; weeks three-four: joint customer visits; ongoing: the undocumented folklore — which customer pays late but always pays, which truck's transmission lies), captured into the SOP library the operations lessons taught you to build. The seller's memory is the last un-transferred asset; closing day started its expiration clock."],
terms:[["Asset purchase agreement","The binding contract with schedules — every asset, warranty, and promise enumerated."],["Working capital adjustment","Price trues up so the business arrives stocked, not stripped."],["Escrow holdback","5-10% held months against surprises or retention targets."],["Flow of funds","The closing memo choreographing every wire — read it line by line."],["The 90-day pledge","'Nothing changes' — employee and customer stability bought with patience."]],
ex:"Two buyers close route businesses the same month. Buyer A wires, changes the company name week one, reroutes schedules week two, and skips employee one-on-ones ('they'll adjust'); the senior tech quits, taking folklore and four commercial accounts — 19% churn by month four. Buyer B announces with the seller at 7 a.m. donuts, pledges 90 frozen days, runs joint top-20 customer visits, and interviews every employee about 'what should never change'; churn: 4%, plus two process improvements he'd never have found alone. Identical purchases; only one of them bought the actual business.",
mistakes:["Skipping the working capital adjustment and inheriting a stripped shell","Announcing by email — or worse, letting rumor announce for you","Wasting the seller's training days without a written curriculum"],
keys:["Closing is choreography: agreements, schedules, lease, licenses, liens, insurance, wires — verified twice","Holdbacks and adjustments are standard armor, not aggression","Communications order: employees (in person, day one), top customers (jointly), then everyone","The seller's memory is a depreciating asset — extract it into SOPs on a written schedule"],
assign:"Write your day-one announcement script (employees) and the continuity letter (customers), plus a two-week curriculum for the seller's training period. File all three with your diligence checklist."},
{id:"aq9",t:"The First 100 Days: Stabilize, Learn, Then Improve",q:"first 100 days new business owner after acquisition",
learn:["The stabilize→learn→improve sequence and why order matters","The handful of numbers to watch weekly from day one","Picking your first improvement for signal, not size"],
why:"New owners lose businesses by 'fixing' them too fast. The first hundred days decide whether you bought a compounding machine or started an expensive lesson.",
p:["The sequence is sacred: STABILIZE (days 1-30) — your only goals are that nothing breaks and everyone stays. Honor the 90-day pledge, run payroll flawlessly (the fastest trust-destroyer in acquisitions is a payroll hiccup), be visible everywhere (ride routes, work the counter, open with the crew), and keep a fat notebook labeled LATER for every brilliant idea — the discipline isn't having ideas, it's holstering them. Watch five numbers weekly like a pilot on instruments: cash (the 13-week habit starts NOW — working capital surprises kill more new owners than competition does), revenue vs. same week last year, churn/cancellations, payroll hours, and receivables aging. LEARN (days 30-60): now interrogate the machine you bought — every employee gets the two golden questions ('what should never change?' and 'what's broken that nobody fixes?'), every process gets watched where it happens (the Toyota lesson's go-and-see), the customer list gets the cohort treatment, and your LATER notebook gets sorted by effort-versus-impact with the operations school's eyes.",
"IMPROVE (days 60-100): pick ONE first improvement, optimized for signal not size — visible to staff and customers, quick to show results, low risk to the core: the review-generation system from the marketing lessons, the follow-up sequence from the sales school pointed at the dormant customer list, the price correction on the one service line whose margin math is indefensible (with the communication playbook, not a surprise invoice). The point of the first win is to teach the organization that change under you means things get BETTER — that lesson, delivered once, buys permission for the next ten changes. What you're actually doing in these hundred days is converting the seller's business into yours at the deliberate pace trust transfers: month one they're watching whether you wreck it, month two whether you understand it, month three whether you improve it. Pass all three audits and the compounding this entire university promised — the machine, bought with leverage, improved with skill — is finally, mathematically, yours."],
terms:[["Stabilize→learn→improve","The 100-day sequence — order is the discipline."],["The LATER notebook","Where day-one brilliance waits for month-two context."],["Instrument five","Cash, revenue vs. prior year, churn, payroll hours, receivables — weekly, from day one."],["Golden questions","'What should never change?' / 'What's broken that nobody fixes?' — every employee, month two."],["Signal win","The first improvement chosen to prove change means better — visible, fast, low-risk."]],
ex:"A new wash owner's LATER notebook holds 31 ideas by day 20 — new signage, memberships, staff restructure, price changes. He holsters all of it, rides every shift, runs the golden questions, and discovers the real gem himself in week six: the pay-station's card reader fails daily at peak, and everyone 'just knew.' The $3,100 fix lifts revenue 9% in a month — staff see the new guy fixed the thing everyone hated, and when memberships launch in month four, the crew sells them like owners. Idea #1 through #31 all eventually shipped; the sequence is why they worked.",
mistakes:["Rebranding, repricing, or restructuring inside the first month","Managing from the office while the business happens in trucks and tunnels","Choosing a first project too big to show results inside a quarter"],
keys:["Stabilize (nothing breaks, everyone stays) → learn (interrogate everything) → improve (one signal win)","Five instruments weekly from day one; cash is the one that kills quickly","The LATER notebook is the discipline separating buyers from wreckers","Your first win teaches the org what change under you means — choose it for signal"],
assign:"Draft your own 100-day plan: the five instruments and where their data comes from, ten LATER-notebook ideas pre-sorted by effort/impact, and your candidate signal win with a one-line justification."},
{id:"aq10",t:"Beyond the First Deal: Platforms, Roll-Ups & Your Exit",q:"business roll up strategy platform add on exit planning",
learn:["Platform versus add-on thinking after deal one","When (and whether) to roll up — the integration tax","Designing your own exit from the day you buy"],
why:"The first acquisition teaches you the game; this capstone shows the whole board — how single deals become platforms, platforms become exits, and today's buyer becomes the seller every lesson here warned about.",
p:["After deal one stabilizes and compounds, three honest roads. HOLD AND HARVEST: run the single machine well for decades — the holding-company lessons on distributions, managers, and the owner's widening margin; entirely legitimate, frequently optimal, chronically underrated in a culture that confuses motion with progress. PLATFORM AND ADD-ON: your business becomes the chassis (systems, brand, back office — the centralize-what-compounds architecture from the multi-branch lessons) and subsequent acquisitions bolt on at smaller multiples than the platform itself will command — the arbitrage that funds every roll-up: buy books of accounts at 1×-ish recurring, integrate them onto a platform that trades at 5-8× EBITDA, and the same customers are worth multiples more simply for being organized. But the roll-up case study's warning governs: the arbitrage is EARNED in integration — one system, one price book, one culture, churn watched like a vital sign — and every roll-up that skipped the boring part died of the same indigestion. Sequencing rule of thumb: no deal two until deal one runs a month without you; no deal three until integration of deal two is provably boring.",
"And the exit — which you design as a BUYER, on day one, because every quality lever this school taught you to demand is the lever you now build: recurring revenue percentage, retention cohorts on clean dashboards, provable books (the accounting school's three reconciled years), management that runs the P&L without you (the trapped-founder case, avoided on purpose), customer diversification, documented SOPs. Run the business permanently ready for diligence — an annual self-audit against your own aq6 checklist — and the exit options mature on their own schedule: sale to a consolidator (your industry tracks name them), sale to a searcher exactly like younger-you (poetic, common), management buyout funded by the same SBA machinery, or family succession with the estate-planning lessons' care. The multiple you'll command is just your own diligence checklist, graded by someone else's buyer. That's this school's closing symmetry: everything you learned to interrogate, you now build; everything you learned to discount, you now eliminate — and somewhere out there, a reader of these same lessons is drafting the thesis with your company's profile in it. Be the CIM you'd have paid full price for.",],
terms:[["Platform / add-on","The chassis company plus smaller bolt-on acquisitions at lower multiples."],["Multiple arbitrage","Buying small at low multiples, integrating, being valued big at high ones — earned in integration."],["Integration tax","The time, churn, and attention every bolt-on truly costs — budget it or pay double."],["Diligence-ready","Books, cohorts, SOPs, and management maintained as if a buyer arrives tomorrow."],["Exit symmetry","Every discount you learned to demand as a buyer is a premium you now build as an owner."]],
ex:"Six years after her first 480-account purchase, the aq1 buyer owns three integrated branches — deal two bought after fourteen boring months, deal three after nine — 4,100 accounts, 91% retention, dashboards a lender could read blind. A consolidator's LOI arrives unsolicited at 7.2× EBITDA. She runs their diligence against her own annual self-audit: nothing surprises anyone. At the closing dinner the buyer's analyst asks how the books got this clean. 'A course,' she says. 'Long story.'",
mistakes:["Buying deal two while deal one still needs you daily","Underwriting roll-up arbitrage without pricing the integration tax","Building enterprise value in your head instead of in dashboards a stranger can verify"],
keys:["Three roads after deal one: harvest, platform, or exit — all legitimate, sequence is everything","Multiple arbitrage is real and paid for in integration discipline","Run permanently diligence-ready: your buyer's checklist is your building code","The school's symmetry: build everything you learned to demand, eliminate everything you learned to discount"],
assign:"Write the two-paragraph 'CIM teaser' for the business you own or intend to own as it should read five years from now — recurring %, retention, management depth, books. That document is your operating north star; file it beside your thesis."}
]}
]}
]});
