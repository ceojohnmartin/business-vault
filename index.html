assign:"Read the Psychology of Human Misjudgment talk first, then one talk per week.",
ex:"List the last bad decision you made and identify which three biases from Munger's catalog were operating. Write the inversion: what would have guaranteed the disaster?"},
{id:"psych-money",title:"The Psychology of Money",author:"Morgan Housel",cat:"Money & Wealth",diff:"Beginner",
why:"Money outcomes are driven by behavior, not IQ — this is the behavior manual, and the perfect companion to the Money & Wealth school.",
teaches:"Nineteen short essays on how luck, ego, greed, and time actually shape wealth. Getting wealthy and staying wealthy are different skills; enough is a decision; compounding rewards temperament above talent.",
best:["Wealth is what you don't see — assets, not purchases.","Reasonable beats rational: the plan you can stick to wins.","Freedom — controlling your time — is the highest dividend money pays."],
rel:["mw13","mw8","mw1"],
assign:"One essay per evening for three weeks.",
ex:"Write your own 'money autobiography': what your family taught you about money and how it still drives your decisions today."},
{id:"fin-intel",title:"Financial Intelligence",author:"Karen Berman & Joe Knight",cat:"Finance & Accounting",diff:"Intermediate",
why:"The best bridge from 'I can read a P&L' to 'I can question one.' Written for operators, not accountants.",
teaches:"Financial statements are full of estimates and assumptions, not facts. Learn what the numbers really measure, where the soft spots hide (revenue recognition, depreciation, accruals), and how to compute the ratios that reveal health.",
best:["Profit is an opinion; cash is a fact.","Every financial statement embeds assumptions — find them before you trust it.","Ratios (margins, turns, returns) are the language of financial analysis."],
rel:["f5","f6","f7","a4"],
assign:"Read one part per week for five weeks, with a real company's statements open beside you.",
ex:"Pull the last two years of statements from any business (or your own) and write three questions the numbers raise but don't answer."},
{id:"acct-simple",title:"Accounting Made Simple",author:"Mike Piper",cat:"Finance & Accounting",diff:"Beginner",
why:"One hundred pages that demystify the whole double-entry machine — read it before the Accounting School and everything else clicks faster.",
teaches:"The accounting equation (assets = liabilities + equity), how debits and credits actually work, and how the income statement, balance sheet, and cash flow statement connect into one system.",
best:["Every transaction touches at least two accounts — that's the whole trick.","The three statements are one story told three ways.","GAAP exists to make companies comparable, not to confuse you."],
rel:["f5","f6","f8"],
assign:"Read cover to cover in one sitting or two — it's deliberately tiny.",
ex:"Record ten of your own personal transactions as journal entries (coffee, paycheck, rent) to feel debits and credits in your hands."},
{id:"valuation-mck",title:"Valuation",author:"McKinsey & Company (Koller, Goedhart, Wessels)",cat:"Finance & Accounting",diff:"Advanced",
why:"The professional standard for how companies are actually valued — the deep end of the pool once the Finance school's DCF lesson makes sense.",
teaches:"Value is driven by return on invested capital, growth, and free cash flow — everything else is commentary. Full DCF craft: forecasting, continuing value, cost of capital, and the traps in multiples.",
best:["Value = cash flows, discounted; accounting earnings are the shadow, not the object.","ROIC above cost of capital is where value is created; growth without it destroys value.","Multiples are shorthand for DCF assumptions — know which assumptions yours imply."],
rel:["e4","a8","m1"],
assign:"Work through Part One (foundations) carefully; treat the rest as a reference shelf.",
ex:"Build a five-line DCF for a $500k-revenue car wash: cash flow, growth, discount rate, terminal value. Change one assumption at a time and watch the value swing."},
{id:"ib-rosenbaum",title:"Investment Banking",author:"Joshua Rosenbaum & Joshua Pearl",cat:"Finance & Accounting",diff:"Advanced",
why:"The street's training manual for comps, precedent transactions, DCF, and LBO models — how the professionals across the table from you were taught.",
teaches:"Step-by-step mechanics of the four core valuation methodologies, plus how M&A and leveraged buyout processes actually run — from teaser to close.",
best:["Comparable companies and precedent transactions bracket value; DCF explains it.","An LBO is a valuation floor: what a financial buyer can pay and still hit returns.","Process discipline (data rooms, IOIs, LOIs) is half of deal-making."],
rel:["m1","a8","m8"],
assign:"Read the valuation chapters alongside the Acquisition school; skim the process chapters until you're in a live deal.",
ex:"Value the same imaginary pest control company three ways — revenue multiple, EBITDA multiple, and five-year DCF — and explain why the three numbers differ."},
{id:"intelligent-investor",title:"The Intelligent Investor",author:"Benjamin Graham",cat:"Money & Wealth",diff:"Intermediate",
why:"The foundational text of value investing — Buffett calls chapters 8 and 20 the best things ever written about investing.",
teaches:"Mr. Market is a manic business partner whose mood swings are your opportunity, not your instruction. Margin of safety — paying meaningfully less than value — is the central concept of sound investing.",
best:["Price is what you pay, value is what you get — they diverge constantly.","The investor's chief problem, and worst enemy, is himself.","Margin of safety turns unknowable futures into survivable ones."],
rel:["mw8","mw9","e2"],
assign:"Read chapters 8 and 20 first (twice), then the rest as interest pulls you.",
ex:"Write Mr. Market's diary for one month of a stock you follow: what mood was he in each week, and what did the business itself actually change?"},
{id:"competitive-strategy",title:"Competitive Strategy",author:"Michael E. Porter",cat:"Strategy",diff:"Advanced",
why:"The book that created modern strategy analysis — the Five Forces from the Executive track come from here.",
teaches:"Industry structure determines profitability: rivalry, new entrants, substitutes, buyer power, supplier power. Three generic strategies — cost leadership, differentiation, focus — and why being stuck in the middle fails.",
best:["Profits are decided by industry structure before your effort is counted.","Strategy means choosing what NOT to do.","Straddling two generic strategies usually delivers neither."],
rel:["e3","e2","p10"],
assign:"Read the Five Forces and generic strategies chapters closely; treat industry chapters as reference.",
ex:"Run a full Five Forces analysis on the pest control industry in your city. Which force most threatens margins, and what would blunt it?"},
{id:"7powers",title:"7 Powers",author:"Hamilton Helmer",cat:"Strategy",diff:"Advanced",
why:"The sharpest modern answer to 'what is a moat, really?' — seven specific structures that let profits persist against competition.",
teaches:"Scale economies, network economies, counter-positioning, switching costs, branding, cornered resources, and process power — each defined by its benefit and its barrier, plus when in a company's life each can be built.",
best:["Power = a benefit to you plus a barrier that stops competitors from copying it.","Strategy is the pursuit of power; operational excellence alone always gets competed away.","Different powers are available at different company stages — timing matters."],
rel:["e2","e8","w4"],
assign:"One power per day for a week; the book is compact and dense.",
ex:"For your business (or target acquisition), test all seven powers: which one could you genuinely build within three years, and what's the barrier?"},
{id:"good-strategy",title:"Good Strategy Bad Strategy",author:"Richard Rumelt",cat:"Strategy",diff:"Intermediate",
why:"The best filter ever written for detecting fake strategy — the fluff, buzzwords, and goal-lists that pass for plans in most companies.",
teaches:"Real strategy has a kernel: an honest diagnosis of the challenge, a guiding policy for dealing with it, and coherent actions that reinforce each other. Bad strategy is goals without diagnosis and slogans without choices.",
best:["A goal is not a strategy; 'grow 20%' is a wish.","Diagnosis first: name the actual obstacle before prescribing.","Good strategy concentrates force where it can produce decisive results."],
rel:["e3","x2","a13"],
assign:"Read part one fully; sample the case chapters as needed.",
ex:"Write a one-page kernel (diagnosis, guiding policy, three coherent actions) for growing a business you know — no buzzwords allowed."},
{id:"blue-ocean",title:"Blue Ocean Strategy",author:"W. Chan Kim & Renée Mauborgne",cat:"Strategy",diff:"Intermediate",
why:"A structured method for escaping bloody price competition by creating uncontested market space.",
teaches:"Value innovation: simultaneously raising buyer value and cutting cost by reconstructing industry factors. The strategy canvas and the eliminate-reduce-raise-create grid make differentiation systematic rather than lucky.",
best:["Compete where nobody is: make the competition irrelevant instead of beating it.","Chart your industry's factors and dare to eliminate ones everyone assumes.","Great offers raise value AND lower cost — it's not a trade-off."],
rel:["c11","e8","w2"],
assign:"Read the first half (tools); skim the implementation half.",
ex:"Draw a strategy canvas for local car washes: price, speed, membership, experience. Design a curve that eliminates one factor entirely and creates one nobody offers."},
{id:"outsiders",title:"The Outsiders",author:"William N. Thorndike",cat:"Acquisitions & Capital",diff:"Intermediate",
why:"Eight CEOs who crushed the market by treating capital allocation — not operations — as the CEO's real job. The Executive track's capital allocation lesson, in eight biographies.",
teaches:"Cash flow per share beats reported earnings; buybacks, acquisitions, and dividends are tools to be priced against each other; decentralized operations with centralized capital decisions is a repeatable formula.",
best:["The CEO's job is deploying capital at the highest return — everything else can be delegated.","Denominator management: shrinking shares outstanding compounds like magic.","Independent thinking beats institutional imperative every time."],
rel:["e5","m6","m5"],
assign:"One CEO chapter per sitting; take notes on each one's signature move.",
ex:"You run a holding company with $1M of free cash: rank paying down debt, buying a competitor, a dividend, and reinvesting — and defend your ranking in five sentences."},
{id:"lean-startup",title:"The Lean Startup",author:"Eric Ries",cat:"Entrepreneurship",diff:"Beginner",
why:"The standard playbook for launching under uncertainty — test cheaply before you build expensively.",
teaches:"Build-measure-learn loops, minimum viable products, validated learning, and the pivot: treat every startup as a series of experiments on strangers with money, not a construction project from a business plan.",
best:["An MVP's job is learning, not revenue or polish.","Vanity metrics soothe; actionable metrics decide.","A pivot is a structured strategy change grounded in what you learned — not flailing."],
rel:["e7","c8","e8"],
assign:"Read parts one and two carefully; part three matters once you have traction.",
ex:"Design a $100, one-week MVP test for a business idea you've had — define in advance the number that means 'proceed' and the number that means 'kill.'"},
{id:"zero-to-one",title:"Zero to One",author:"Peter Thiel",cat:"Entrepreneurship",diff:"Intermediate",
why:"The contrarian counterweight to lean thinking: real fortunes come from creating new things and escaping competition entirely.",
teaches:"Competition is for losers — aim for monopoly through proprietary technology, network effects, scale economies, and brand. Start by dominating a small market completely, then expand concentrically.",
best:["What valuable company is nobody building? — the founding question.","Monopoly (earned through value) is the goal; perfect competition means zero profit.","Small markets first: dominate 100% of something tiny before 1% of something huge."],
rel:["e8","e2","e6"],
assign:"One evening per chapter; argue with it in the margins — it's meant to provoke.",
ex:"Answer Thiel's interview question in writing: what important truth about business do very few people agree with you on?"},
{id:"crossing-chasm",title:"Crossing the Chasm",author:"Geoffrey A. Moore",cat:"Marketing & Sales",diff:"Intermediate",
why:"Explains why products that delight early adopters die before the mainstream — and the beachhead strategy that gets across.",
teaches:"The technology adoption curve has a chasm between visionaries and pragmatists who buy for different reasons. Cross it by dominating one niche completely (whole product, references, word of mouth) before expanding.",
best:["Early adopters buy change; the mainstream buys safety and references.","Pick a beachhead niche you can win 100% of — the D-Day strategy.","The whole product (support, integrations, services) is what pragmatists actually buy."],
rel:["e8","c3","c6"],
assign:"Read the first half for the theory; the second half when you're positioning a real product.",
ex:"Your new pest-control software has 20 enthusiast customers but no growth. Define the single beachhead segment you'd own first, and the whole product it requires."},
{id:"mom-test",title:"The Mom Test",author:"Rob Fitzpatrick",cat:"Entrepreneurship",diff:"Beginner",
why:"The essential companion to customer conversations: how to ask questions even your mom can't lie to you about.",
teaches:"People lie to be nice — so never pitch, never ask hypotheticals, and never mention your idea. Ask about their life, their past behavior, and what they've already paid or tried; compliments are a failure signal.",
best:["Talk about their life, not your idea.","Past behavior is evidence; future promises ('I'd totally buy that') are noise.","Bad meetings end in compliments; good ones end in commitments — time, intro, or money."],
rel:["c8","e7","p1"],
assign:"Two hours, one sitting — then immediately book three real conversations.",
ex:"Interview three potential customers about a problem you want to solve, using only past-behavior questions. Log every compliment as the warning it is."},
{id:"inspired",title:"Inspired",author:"Marty Cagan",cat:"Entrepreneurship",diff:"Intermediate",
why:"The definitive book on how great tech companies decide what to build — product management as practiced at the top tier.",
teaches:"Empowered product teams solve problems, not deliver features. Continuous discovery (prototypes tested on real users weekly) kills bad ideas cheaply; the four big risks are value, usability, feasibility, and viability.",
best:["Fall in love with the problem, not your solution.","Discovery and delivery run in parallel forever — you never stop testing.","Teams of missionaries beat teams of mercenaries."],
rel:["e8","c8","x3"],
assign:"Read parts on product teams and discovery closely; org-design parts when you're scaling.",
ex:"Take any feature idea and write its four-risk assessment: will they buy it, can they use it, can we build it, does it work for our business?"},
{id:"influence",title:"Influence",author:"Robert B. Cialdini",cat:"Marketing & Sales",diff:"Beginner",
why:"The scientific catalog of why people say yes — foundational for marketing, sales, negotiation, and defending yourself from all three.",
teaches:"Seven levers: reciprocity, commitment/consistency, social proof, authority, liking, scarcity, unity. Each is an automatic compliance trigger that works even when people know about it.",
best:["Reciprocity: give first, and the obligation does your selling.","Social proof is strongest under uncertainty — show people like them acting.","Scarcity works on losses: we want most what we're about to lose."],
rel:["c6","p1","c7"],
assign:"One principle per day for a week; collect a real-world example of each as you go.",
ex:"Redesign a door-to-door pitch using three principles deliberately (e.g., social proof: 'your neighbors at #12…'). Track the close-rate difference for a week."},
{id:"positioning",title:"Positioning",author:"Al Ries & Jack Trout",cat:"Marketing & Sales",diff:"Beginner",
why:"The battle is for a word in the prospect's mind — the oldest and still most-violated law of marketing.",
teaches:"Minds are limited and hate confusion: own one position, be first in a category (or invent a category you can be first in), and never stretch a brand across meanings. Repositioning attacks the leader's weakness.",
best:["Marketing is a battle of perceptions, not products.","If you can't be first, create a new category where you are.","Line extension dilutes: one brand, one meaning."],
rel:["c1","c6","c11"],
assign:"A weekend read; dated examples, timeless mechanics.",
ex:"Write the one word your business should own in customers' minds, then audit your website and trucks: does everything scream that word, or seven others?"},
{id:"sci-advertising",title:"Scientific Advertising",author:"Claude C. Hopkins",cat:"Marketing & Sales",diff:"Intermediate",
why:"Written in 1923 and still the foundation of every direct-response and performance marketer alive — advertising as testable salesmanship.",
teaches:"Advertising exists only to sell, and everything is measurable: coupons (today: links and codes) reveal exactly what works. Specific claims beat superlatives; free samples and risk reversal beat persuasion.",
best:["Advertising is salesmanship in print — judge it by cost per sale, nothing else.","Test everything against a control; opinion is not data.","Specifics ('7,384 washes') outsell generalities ('the best') every time."],
rel:["e9","c2","x4"],
assign:"It's short and free (public domain) — read twice, once now and once after your first ad campaign.",
ex:"Write two versions of one ad — a vague one and a specifics-and-offer one — run both with $50, and compare cost per lead."},
{id:"breakthrough-adv",title:"Breakthrough Advertising",author:"Eugene M. Schwartz",cat:"Marketing & Sales",diff:"Advanced",
why:"The deepest book ever written on copy — channeling existing market desire instead of trying to create it.",
teaches:"Demand can't be created, only focused. The five stages of market awareness (from most-aware to unaware) dictate the headline; the market's sophistication level dictates the claim. Copy strength comes from the state of the prospect, not the pen.",
best:["You don't create desire — you aim the desire that already exists.","Match the headline to the prospect's awareness stage; mismatch kills response.","As markets mature, claims must escalate or shift to mechanism and identity."],
rel:["e9","c6","c3"],
assign:"Study chapters on awareness and sophistication; this is a course, not a beach read.",
ex:"Write five headlines for the same pest-control offer — one for each awareness stage, from 'ants in your kitchen right now' to 'homeowners who've never thought about prevention.'"},
{id:"spin-selling",title:"SPIN Selling",author:"Neil Rackham",cat:"Marketing & Sales",diff:"Intermediate",
why:"The largest research study ever done on selling (35,000 sales calls) — and it demolished most sales folklore for bigger-ticket sales.",
teaches:"In larger sales, questions beat pitches: Situation, Problem, Implication, and Need-payoff questions walk the buyer to articulating the value themselves. Closing tricks that work on small sales actively hurt big ones.",
best:["The seller who makes the buyer say the benefits wins.","Implication questions turn small annoyances into expensive problems worth solving.","Advances (concrete next steps) — not continuations — measure whether a call succeeded."],
rel:["p1","c7","e10"],
assign:"Read the core model chapters; skim the research appendices.",
ex:"Script a SPIN question set for selling a commercial pest contract to a restaurant owner, and role-play it with the AI tutor until the implications bite."},
{id:"never-split",title:"Never Split the Difference",author:"Chris Voss",cat:"Marketing & Sales",diff:"Beginner",
why:"An FBI hostage negotiator's field manual — tactical empathy beats rational argument in every negotiation you'll ever have.",
teaches:"Labeling emotions, mirroring, calibrated 'how' questions, and the power of 'no': negotiation is emotional discovery, not splitting numbers. 'That's right' is the breakthrough; 'you're right' is a brush-off.",
best:["Label fears before facts: 'It seems like you're worried the crew won't show.'","Calibrated questions ('How am I supposed to do that?') make the other side solve your problem.","Anchor extreme, use odd numbers, and never fear silence."],
rel:["a11","m2","m3"],
assign:"One technique per chapter — practice each on a real (low-stakes) conversation the same week.",
ex:"Negotiate your next supplier renewal using labels + one calibrated question, and write down what changed versus your usual approach."},
{id:"100m-offers",title:"$100M Offers",author:"Alex Hormozi",cat:"Marketing & Sales",diff:"Beginner",
why:"The modern manual for making offers so good people feel stupid saying no — pricing and packaging as the growth lever.",
teaches:"The value equation: dream outcome × perceived likelihood, divided by time delay × effort. Stack bonuses, add guarantees, name the offer, and charge premium prices to fund premium delivery.",
best:["Charge more: price is the only lever that raises profit AND perceived value together.","Sell the vacation, not the flight — outcomes, not process.","Risk reversal (bold guarantees) moves more buyers than discounts ever will."],
rel:["c11","c6","w4"],
assign:"Fast read; do the offer-building exercises as you go, don't just nod.",
ex:"Rebuild your core service as a Grand Slam Offer: outcome-named package, three bonuses, one bold guarantee, and a price 30% higher than today's."},
{id:"100m-leads",title:"$100M Leads",author:"Alex Hormozi",cat:"Marketing & Sales",diff:"Intermediate",
why:"The sequel: once the offer works, this is the full playbook for getting strangers to see it — the four channels and how to scale each.",
teaches:"Warm outreach, content, cold outreach, and paid ads — run on the core four, then scale with lead magnets, affiliates, and referrals. Volume with tracking beats cleverness; the goal is engaged leads, not impressions.",
best:["A lead magnet solves a narrow problem free and reveals the paid problem.","Do 100 of anything (calls, posts, ads) before judging the channel.","Advertise until acquisition cost breaks even with gross profit — then spend more."],
rel:["c2","c3","c5"],
assign:"Read once fully, then re-read the chapter for whichever channel you're actively scaling.",
ex:"Build one lead magnet for a home-services business (e.g., 'Termite risk checklist for your zip code') and run the smallest possible paid test to it."},
{id:"scaling-up",title:"Scaling Up",author:"Verne Harnish",cat:"Operations",diff:"Intermediate",
why:"The operating system for growing past 10 employees: people, strategy, execution, cash — with the actual worksheets.",
teaches:"The One-Page Strategic Plan, meeting rhythms (daily huddle to annual planning), KPI dashboards, and cash conversion cycle math. Growth breaks companies that lack rhythm and clarity.",
best:["Routine sets you free: the meeting rhythm IS management.","Everyone should know the #1 priority this quarter — one, not seven.","Growth eats cash: know your cash conversion cycle to the day."],
rel:["a9","c9","p11"],
assign:"Read People and Execution first; implement one tool per month, not all at once.",
ex:"Run a two-week experiment: 10-minute daily huddle (yesterday's number, today's priority, stuck-points) with whoever you manage — even a crew of two."},
{id:"high-output",title:"High Output Management",author:"Andrew S. Grove",cat:"Leadership & People",diff:"Intermediate",
why:"Intel's legendary CEO wrote the manager's manual: your output = the output of your team plus everyone your influence touches.",
teaches:"Managerial leverage: meetings, one-on-ones, decisions, and training ranked by output per hour. Task-relevant maturity decides how closely to manage anyone. Production principles apply to all work.",
best:["A manager's output is her organization's output — nothing else counts.","One-on-ones are the highest-leverage hour: the subordinate's meeting, their agenda.","Delegate by task-relevant maturity, not by trust feelings."],
rel:["c10","a12","p11"],
assign:"Read slowly with a notebook — every chapter yields one practice to adopt.",
ex:"Institute weekly 30-minute one-on-ones with each direct report for a month; let them own the agenda, you own the questions."},
{id:"traction-eos",title:"Traction",author:"Gino Wickman",cat:"Operations",diff:"Beginner",
why:"The EOS system: the most widely adopted small-business operating system in America — vision, people, data, issues, process, traction.",
teaches:"Six components of a healthy business, run through simple tools: the Vision/Traction Organizer, Rocks (90-day priorities), scorecards, Level 10 meetings, and the accountability chart that ends 'who owns this?' forever.",
best:["Right people, right seats — the accountability chart precedes the org chart.","Rocks: 3-7 priorities per quarter; everything else waits.","Solve issues weekly forever (Identify, Discuss, Solve) instead of admiring them."],
rel:["c9","c10","p11"],
assign:"Read in a week; adopt the accountability chart and weekly meeting first.",
ex:"Draw the accountability chart for a business you know — every major function, exactly one owner. Mark every seat where the same overworked name appears twice."},
{id:"mwm-okr",title:"Measure What Matters",author:"John Doerr",cat:"Leadership & People",diff:"Intermediate",
why:"OKRs — the goal system behind Google's execution — explained by the investor who carried them from Intel.",
teaches:"Objectives (inspiring, qualitative) paired with Key Results (measurable, time-boxed) align a whole company transparently. Stretch goals, quarterly rhythm, and CFRs (conversations, feedback, recognition) replace annual reviews.",
best:["Ideas are easy; execution is everything — OKRs are execution scaffolding.","Key results are numbers or they're hopes.","Transparency aligns: everyone sees everyone's goals, including the CEO's."],
rel:["a6","a13","c10"],
assign:"Read the framework chapters; skim the case studies that don't match your size.",
ex:"Write one quarter of OKRs for a car wash: one objective, three measurable key results. Grade them honestly at quarter's end."},
{id:"toyota-way",title:"The Toyota Way",author:"Jeffrey K. Liker",cat:"Operations",diff:"Advanced",
why:"The fourteen principles behind the most studied production system on earth — continuous improvement as culture, not slogan.",
teaches:"Long-term philosophy over short-term profit, one-piece flow that exposes problems, pull systems, standardized work as the baseline for kaizen, genchi genbutsu (go and see), and respect for people as the engine of it all.",
best:["Problems surfacing is good news: flow is designed to expose them.","Standardize first — you can't improve a process that's different every time.","Go and see for yourself; reports lie, floors don't."],
rel:["c13","c9","w3"],
assign:"Read principles 1-8 closely (process); 9-14 (people/culture) as you grow a team.",
ex:"Spend one hour physically watching a process you own (a wash tunnel, a service route, your own morning). List ten wastes you've never noticed from your desk."},
{id:"buy-then-build",title:"Buy Then Build",author:"Walker Deibel",cat:"Acquisitions & Capital",diff:"Intermediate",
why:"The book that launched a thousand searchers: skip the startup death-valley by buying an existing profit engine and building on it.",
teaches:"Acquisition entrepreneurship end-to-end: why existing cash flow beats startup risk, defining your search (size, sector, geography), valuing on SDE/EBITDA, SBA leverage, and the first 90 days as the new owner.",
best:["Startups search for a business model; acquisitions buy one that's already proven.","Buy the boring: unsexy industries with recurring revenue are where the deals live.","You're buying the future you'll build, priced on the seller's past."],
rel:["m2","m11","m1"],
assign:"Read alongside the Acquisition school — it's the narrative version of those lessons.",
ex:"Write your acquisition thesis in five lines: industry, size range, geography, what you bring, and why sellers would choose you."},
{id:"hbr-buy-small",title:"HBR Guide to Buying a Small Business",author:"Richard S. Ruback & Royce Yudkoff",cat:"Acquisitions & Capital",diff:"Intermediate",
why:"The Harvard course on search funds and small acquisitions in book form — the disciplined, numbers-first counterpart to Buy Then Build.",
teaches:"Enduringly profitable small firms (recurring customers, stable margins) are the target; the full process from funded search through diligence, negotiation, financing structures, and the transition year.",
best:["Buy enduring profitability, not turnarounds, for your first deal.","The search is a full-time job with a funnel — treat it like sales.","Diligence confirms the story the numbers tell; if it doesn't, walk."],
rel:["m2","m3","m8"],
assign:"Read after Buy Then Build; use its checklists during a real search.",
ex:"Build a 20-company target list in one niche (e.g., pest control within 100 miles) with revenue estimates and owner ages — the raw material of a search."},
{id:"pe-gompers",title:"Private Equity",author:"Paul Gompers & Victoria Ivashina",cat:"Acquisitions & Capital",diff:"Advanced",
why:"The HBS casebook on how professional buyout firms actually evaluate, structure, and exit deals — the institutions your roll-up will someday sell to.",
teaches:"Fund structure and incentives (2-and-20, carry, LP/GP dynamics), deal screening, leverage models, value-creation plans, and exits — through real cases with real numbers.",
best:["PE returns come from three levers: leverage, multiple expansion, and operational improvement — know which your deal relies on.","Incentive structure explains fund behavior; read the carry before the pitch.","Every PE deal is underwritten to an exit — buyers think backward from the sale."],
rel:["m5","e5","m1"],
assign:"Work selected cases with a calculator, not a highlighter; this is a course text.",
ex:"Model a simple LBO of a $2M EBITDA pest platform at 5× with 60% debt: if EBITDA grows to $3M and the multiple holds, what's the equity return?"},
{id:"king-capital",title:"King of Capital",author:"David Carey & John E. Morris",cat:"Acquisitions & Capital",diff:"Intermediate",
why:"The history of Blackstone — how the buyout industry grew from upstart dealmakers to owners of everything, told through booms, busts, and personalities.",
teaches:"How leverage cycles work in practice: cheap debt inflates deals, crashes reset them, and survivors institutionalize. The evolution from corporate raiders to 'friendly' PE, and what LPs, banks, and sellers each want.",
best:["Debt markets, not genius, set the tempo of the deal world.","Reputation compounds: access to deals is the durable edge.","Diversification saved Blackstone repeatedly — single-strategy firms died in each bust."],
rel:["m5","m10","e5"],
assign:"Read as a story; keep a timeline of each boom-bust cycle and its cause.",
ex:"Write one page: how would a credit crunch tomorrow change the price and terms of the small business you'd like to buy?"},
{id:"hard-things",title:"The Hard Thing About Hard Things",author:"Ben Horowitz",cat:"Leadership & People",diff:"Intermediate",
why:"The truest book about the CEO job: layoffs, demotions, firing friends, and managing your own psychology when there's no playbook.",
teaches:"Wartime vs. peacetime leadership, why you must tell it straight, how to demote a loyal friend, when to sell, and the loneliness nobody warns founders about. Management as practiced at 3 a.m.",
best:["There is no formula for the hard things — courage plus honesty is the fallback.","Take care of the people, the products, and the profits — in that order.","The struggle is normal; every great CEO you admire lived it."],
rel:["a12","a13","m3"],
assign:"Read when things are good, so it's in you when they aren't.",
ex:"Draft the layoff speech you hope never to give for a 10-person company — honest cause, clean terms, dignity intact. You'll understand the book after writing it."},
{id:"no-rules",title:"No Rules Rules",author:"Reed Hastings & Erin Meyer",cat:"Leadership & People",diff:"Intermediate",
why:"Netflix's culture engine: talent density plus candor plus freedom — the highest-performance culture experiment ever documented.",
teaches:"Pay top of market and keep only keepers (the keeper test), radical candor with positive intent, then remove controls (vacation policy, expense approvals) because context beats control for creative work.",

/* ================= OPERATOR TOOLS (Phase 3) =================
   Generic calculator engine: inputs -> out(v) returns [label,value,strong?] rows.
   All results are estimates for education, not professional advice. */
function $fmt(n,dec){if(!isFinite(n))return "—";return "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:dec===undefined?0:dec,minimumFractionDigits:dec===undefined?0:dec})}
function pfmt(n,dec){if(!isFinite(n))return "—";return Number(n).toLocaleString("en-US",{maximumFractionDigits:dec===undefined?1:dec})+"%"}
function nfmt(n,dec){if(!isFinite(n))return "—";return Number(n).toLocaleString("en-US",{maximumFractionDigits:dec===undefined?1:dec})}
function pmt(principal,annualRate,years){const r=annualRate/100/12,n=years*12;if(r===0)return principal/n;return principal*r/(1-Math.pow(1+r,-n))}
function irrSolve(outlay,cf,years){let lo=0,hi=1;const npv=r=>{let s=-outlay;for(let t=1;t<=years;t++)s+=cf/Math.pow(1+r,t);return s};if(npv(0)<0)return NaN;for(let i=0;i<80;i++){const mid=(lo+hi)/2;npv(mid)>0?lo=mid:hi=mid}return lo*100}

/* ---- Financial statements & cash ---- */
{id:"pnl",name:"Quick P&L Builder",cat:"Statements & Cash",desc:"Turn raw numbers into a profit & loss statement with margins.",
inputs:[{k:"rev",label:"Monthly revenue ($)",def:50000},{k:"cogs",label:"Cost of goods/service delivery ($)",def:18000},{k:"labor",label:"Labor & payroll ($)",def:14000},{k:"opex",label:"Other operating expenses ($)",def:9000}],
out:v=>{const gp=v.rev-v.cogs,op=gp-v.labor-v.opex;return [["Gross profit",$fmt(gp)],["Gross margin",pfmt(v.rev?gp/v.rev*100:0)],["Operating profit (EBITDA proxy)",$fmt(op),1],["Operating margin",pfmt(v.rev?op/v.rev*100:0)],["Annualized profit",$fmt(op*12)]]},
formula:"Gross profit = Revenue − COGS · Operating profit = Gross profit − Labor − Opex"},
{id:"cashfc",name:"Cash Flow Forecast",cat:"Statements & Cash",desc:"Project your cash position and runway month by month.",
inputs:[{k:"cash",label:"Cash on hand ($)",def:25000},{k:"inflow",label:"Monthly cash in ($)",def:42000},{k:"outflow",label:"Monthly cash out ($)",def:47000},{k:"months",label:"Months to project",def:6}],
out:v=>{const net=v.inflow-v.outflow;const end=v.cash+net*v.months;const runway=net<0?v.cash/-net:Infinity;return [["Monthly net cash flow",$fmt(net),1],["Cash in "+v.months+" months",$fmt(end)],["Runway",net<0?nfmt(runway)+" months":"∞ (cash-positive)",1],["Weekly burn (if negative)",net<0?$fmt(-net*12/52):"—"]]},
formula:"Runway = Cash ÷ monthly net burn — the 13-week cash habit: track this weekly"},
{id:"breakeven",name:"Break-Even Calculator",cat:"Statements & Cash",desc:"Units and revenue needed before profit begins.",

out:v=>{const cm=v.price-v.varc;const units=cm>0?v.fixed/cm:NaN;return [["Contribution margin per unit",$fmt(cm,2)],["Contribution margin %",pfmt(v.price?cm/v.price*100:0)],["Break-even units / month",nfmt(units,1),1],["Break-even revenue / month",$fmt(units*v.price)],["Per working day (22)",nfmt(units/22,1)+" units"]]},

{id:"grossmargin",name:"Gross Margin Calculator",cat:"Statements & Cash",desc:"Margin, markup, and what a price change does.",

out:v=>{const retail=v.cars*v.ticket*30;const memb=v.members*v.mfee;const totalCars=v.cars*30+v.members*3;const varTotal=totalCars*v.varc;const profit=retail+memb-varTotal-v.fixed;return [["Retail revenue / month",$fmt(retail)],["Membership revenue / month",$fmt(memb),1],["Membership share of revenue",pfmt((retail+memb)?memb/(retail+memb)*100:0)],["Operating profit / month",$fmt(profit),1],["At a 10× multiple this site is worth",$fmt(profit*12*10)]]},
formula:"Members are the moat: predictable revenue smooths weather and funds the machine"},
{id:"pestroute",name:"Pest Control Route Economics",cat:"Operations",desc:"Recurring accounts → route revenue, churn drag, and route value.",
inputs:[{k:"accts",label:"Recurring accounts",def:450},{k:"fee",label:"Average monthly fee ($)",def:48},{k:"churn",label:"Annual churn (%)",def:15},{k:"margin",label:"Operating margin (%)",def:35}],
out:v=>{const rev=v.accts*v.fee*12;const lost=rev*v.churn/100;const profit=rev*v.margin/100;return [["Annual recurring revenue",$fmt(rev),1],["Lost to churn each year",$fmt(lost)],["Accounts to replace / year",nfmt(v.accts*v.churn/100,0)],["Operating profit",$fmt(profit),1],["Book value at 1.2× recurring",$fmt(rev*1.2)]]},
formula:"Recurring revenue × retention is the whole game — buyers pay for the book, not the trucks"},
/* ---- Personal money ---- */
{id:"budget",name:"50/30/20 Budget",cat:"Money & Wealth",desc:"The three-bucket budget from the Money school.",
inputs:[{k:"income",label:"Monthly take-home ($)",def:4800}],
out:v=>{return [["Needs (50%)",$fmt(v.income*.5),1],["Wants (30%)",$fmt(v.income*.3)],["Savings & debt payoff (20%)",$fmt(v.income*.2),1],["Saved per year at 20%",$fmt(v.income*.2*12)]]},
formula:"50% needs · 30% wants · 20% future you — adjust ratios up the savings curve as income grows"},
{id:"networth",name:"Net Worth Calculator",cat:"Money & Wealth",desc:"Your personal balance sheet in one number.",
inputs:[{k:"cash",label:"Cash & savings ($)",def:12000},{k:"invest",label:"Investments & retirement ($)",def:38000},{k:"home",label:"Home & property value ($)",def:0},{k:"other",label:"Vehicles & other assets ($)",def:15000},{k:"debt",label:"All debts ($)",def:22000}],
out:v=>{const assets=v.cash+v.invest+v.home+v.other;const nw=assets-v.debt;return [["Total assets",$fmt(assets)],["Total liabilities",$fmt(v.debt)],["Net worth",$fmt(nw),1],["Productive asset share",pfmt(assets?(v.invest)/assets*100:0)]]},
formula:"Net worth = assets − liabilities · track quarterly; watch composition shift toward productive assets"},
{id:"efund",name:"Emergency Fund Sizer",cat:"Money & Wealth",desc:"Your buffer target and the path to it.",
inputs:[{k:"essential",label:"Essential expenses / month ($)",def:3200},{k:"months",label:"Months of cover (3-6)",def:6},{k:"saved",label:"Already saved ($)",def:4000},{k:"monthly",label:"Monthly savings ($)",def:400}],
out:v=>{const target=v.essential*v.months;const gap=Math.max(target-v.saved,0);return [["Target fund",$fmt(target),1],["Gap remaining",$fmt(gap)],["Months to full at current pace",nfmt(v.monthly?gap/v.monthly:NaN,1),1],["First milestone ($1k + 1 month)",$fmt(1000+v.essential)]]},
formula:"Target = essential monthly spend × months of cover · variable income → aim for 6"},
{id:"debtpayoff",name:"Debt Payoff Calculator",cat:"Money & Wealth",desc:"Months to freedom and the interest you'll pay.",
inputs:[{k:"balance",label:"Balance ($)",def:8000},{k:"apr",label:"APR (%)",def:24},{k:"payment",label:"Monthly payment ($)",def:350}],
out:v=>{const r=v.apr/100/12;if(v.payment<=v.balance*r)return[["Verdict","Payment doesn't cover interest — balance grows forever",1]];const n=Math.log(v.payment/(v.payment-v.balance*r))/Math.log(1+r);const total=v.payment*n;return [["Months to debt-free",nfmt(n,1),1],["Total paid",$fmt(total)],["Interest paid",$fmt(total-v.balance),1],["Months saved with +$100/mo",nfmt(n-(Math.log((v.payment+100)/((v.payment+100)-v.balance*r))/Math.log(1+r)),1)]]},
formula:"Every extra dollar goes 100% at principal — killing a 24% card is a 24% guaranteed return"},
{id:"ccinterest",name:"Credit Card Minimum Trap",cat:"Money & Wealth",desc:"What minimum payments actually cost.",
inputs:[{k:"balance",label:"Balance ($)",def:5000},{k:"apr",label:"APR (%)",def:27},{k:"minpct",label:"Minimum payment (% of balance)",def:2.5}],
out:v=>{const r=v.apr/100/12;let b=v.balance,months=0,interest=0;while(b>1&&months<600){const pay=Math.max(b*v.minpct/100,25);const i=b*r;interest+=i;b=b+i-pay;months++}return [["Years paying minimums",nfmt(months/12,1),1],["Total interest paid",$fmt(interest),1],["You'd repay in total",$fmt(v.balance+interest)],["Multiple of what you borrowed",nfmt((v.balance+interest)/v.balance,2)+"×"]]},
formula:"Minimums are designed to maximize interest — the issuer's best customer pays forever"},
{id:"mortgage",name:"Mortgage Calculator",cat:"Money & Wealth",desc:"Payment, interest, and the 28% guardrail.",
inputs:[{k:"price",label:"Home price ($)",def:320000},{k:"down",label:"Down payment (%)",def:10},{k:"rate",label:"Rate (%)",def:6.8},{k:"years",label:"Term (years)",def:30},{k:"income",label:"Gross monthly income ($)",def:7000}],
out:v=>{const loan=v.price*(1-v.down/100);const m=pmt(loan,v.rate,v.years);const withTI=m*1.25;return [["Monthly P&I",$fmt(m,0),1],["Est. with taxes+insurance (~25% more)",$fmt(withTI,0)],["% of gross income",pfmt(v.income?withTI/v.income*100:NaN),1],["Guardrail",v.income&&withTI/v.income<=0.28?"Within the 28% rule":"Above 28% — buy less house than the bank approves"],["Lifetime interest",$fmt(m*12*v.years-loan)]]},
formula:"Keep total housing ≤ ~28% of gross income · the bank's approval is not a recommendation"},
{id:"autoloan",name:"Auto Loan Calculator",cat:"Money & Wealth",desc:"The real cost of the truck.",
inputs:[{k:"price",label:"Vehicle price ($)",def:38000},{k:"down",label:"Down payment ($)",def:4000},{k:"rate",label:"Rate (%)",def:7.5},{k:"years",label:"Term (years)",def:6}],
out:v=>{const loan=v.price-v.down;const m=pmt(loan,v.rate,v.years);const total=m*12*v.years+v.down;return [["Monthly payment",$fmt(m,0),1],["Total cost of vehicle",$fmt(total)],["Interest paid",$fmt(total-v.price),1],["That interest invested at 8%/30yr",$fmt((total-v.price)*Math.pow(1.08,30))]]},
formula:"Long terms hide high totals — judge the total cost, never the monthly payment"}

/* ================= CASE STUDIES (Phase 3) =================
   Original teaching cases inspired by public business history. */
const CASES=[
{id:"apple-brand",title:"The Premium Trap Escape",inspired:"Inspired by Apple's brand strategy",cat:"Marketing & Brand",
situation:"1997: a computer maker is 90 days from bankruptcy. It sells 40+ confusing product lines through big-box retailers, competes on specs against commodity PC makers with lower costs, and its brand — once beloved — now signals overpriced and dying.",
fin:[["Cash runway","~90 days"],["Product lines","40+ → ?"],["Gross margin","19% and falling"],["Competitor margins","Dell ~21% on half the price"]],
problem:"How do you compete against rivals who will always beat you on price and specs?",
constraints:["No cash for a price war","Retail partners control the customer experience","Engineering resources spread across dozens of products"],
options:[{t:"Cut prices to match Dell and fight for market share"},{t:"License the operating system to other manufacturers for royalty revenue"},{t:"Cut to 4 products, refuse to compete on price, and rebuild the brand around identity"},{t:"Sell the company to a larger tech firm while there's still something to sell"}],
suggested:2,
analysis:"The historical answer was option 3. The insight: when you cannot win the game, change the scoring. Fewer products concentrated engineering into excellence; refusing the spec war reframed the purchase as identity ('Think Different') rather than arithmetic; premium pricing funded premium products, which justified the premium — a loop. Price wars (option 1) are won by the lowest-cost producer, which it wasn't. Licensing (option 2) had already been tried and cannibalized the only differentiated asset.",
instructor:"Students usually pick the price cut — it feels responsive. Notice how the winning move looks like retreat: fewer products, fewer customers, higher prices. Strategy is sacrifice (Porter's lesson): the four-quadrant product grid killed 90% of the roadmap, and that concentration — not marketing spend — was the brand turnaround. Brand is the memory of many good decisions, compounding.",
lessons:["When you can't win on price, compete on a dimension rivals can't copy","Focus is a strategy: fewer, better products beat broad, mediocre lines","Premium brands are built by consistency between promise, product, and price"],
rel:["c1","e2","c11"]},
{id:"costco-model",title:"The Membership Machine",inspired:"Inspired by Costco's membership model",cat:"Business Models",
situation:"A warehouse retailer sells goods at razor-thin 11% gross margins — roughly a third of competitors' — caps markups by policy, pays workers well above retail average, and still produces excellent shareholder returns year after year.",
fin:[["Gross margin","~11-13% (vs ~25-30% peers)"],["Membership fee income","~2% of revenue"],["Share of operating profit from fees","~70%"],["Renewal rate","~90%+"]],
problem:"Where does the profit actually come from, and what must management protect at all costs?",
constraints:["Raising markups would boost short-term profit immediately","Wall Street pressures for margin expansion every quarter","Wage costs visibly above industry norms"],
options:[{t:"Raise product margins 3 points — customers would barely notice"},{t:"Protect rock-bottom prices; treat the membership fee as the profit engine and prices as marketing"},{t:"Cut labor costs to industry norms to widen margins"},{t:"Expand aggressively into e-commerce discounting to grow revenue"}],
suggested:1,
analysis:"Option 2 is the actual model. The genius: the fee, not the goods, is the profit — so prices can sit at levels competitors cannot follow without destroying their own P&L. Low prices drive renewals (the real annuity); high wages cut theft and turnover, protecting the low-cost engine. 'Barely noticeable' margin increases (option 1) would erode the price trust that makes the fee feel obviously worth paying — trading the annuity for a one-time bump.",
instructor:"The deep lesson is unit-of-profit thinking: ask 'what do we actually sell?' Costco sells membership; the warehouse is the benefit. Map this to home services: the pest control monthly plan is the membership; the treatments are the warehouse. Once you see which number is the annuity, you know which number you must never optimize away.",
lessons:["Identify your real profit unit — it's often not the thing on the shelf","Recurring revenue with high renewal beats fat one-time margins","Some costs (wages, prices) are investments in the moat, not expenses to cut"],
rel:["w4","p3","e2"]},
{id:"berkshire-capital",title:"The Capital Allocator",inspired:"Inspired by Berkshire Hathaway's capital allocation",cat:"Capital & Investing",
situation:"You control a holding company whose subsidiaries reliably throw off cash. This year $500M arrives. The textile subsidiary that started it all is aging and needs $200M of new equipment just to stay competitive in a brutally commoditized industry.",
fin:[["Free cash this year","$500M"],["Textile reinvestment 'needed'","$200M"],["Textile returns on capital","~4% and falling"],["Insurance float available","Growing, ~3% cost"],["Candidate acquisition (consumer brand)","~20% ROIC, asking 12× earnings"]],
problem:"Where does the $500M go?",
constraints:["The textile mill employs the original workforce — emotional and reputational weight","The consumer brand looks 'expensive' by book-value standards","Doing nothing feels irresponsible"],
options:[{t:"Modernize the mill — defend the legacy business"},{t:"Split evenly across all subsidiaries proportional to size"},{t:"Starve the low-return business and buy the high-return brand, even at a 'full' price"},{t:"Hold cash and wait for a market crash"}],
suggested:2,
analysis:"Option 3 is the Berkshire playbook. Capital allocation's iron law: money flows to the highest return on incremental capital, regardless of history or sentiment. $200M at 4% is value destruction dressed as loyalty — the mill eventually closed anyway, after decades of proof. A wonderful business at a fair price beats a fair business at a wonderful price because the ROIC compounds; the 'expensive' brand at 20% ROIC doubles invested capital every ~4 years while the mill needs 18.",
instructor:"Note the emotional gravity of option 1 — every operator feels it about their first business, first truck, first route. The equal-split (option 2) is how most companies actually allocate, which is why most conglomerates underperform: it's peanut-butter politics, not capital allocation. The CEO's job (per The Outsiders in the Library) is being a rational allocator when everyone else is sentimental.",
lessons:["Capital goes to the highest incremental return — history and sentiment get no vote","Quality at a fair price compounds; cheapness with low returns decays","Peanut-butter budgeting (spreading evenly) is the default failure mode of multi-unit companies"],
rel:["e5","m6","e4"]},
{id:"toyota-andon",title:"Stop the Line",inspired:"Inspired by the Toyota Production System",cat:"Operations",
situation:"You run a high-volume production operation. A new hire discovers a small defect mid-shift. Stopping the line costs thousands per minute and embarrasses his team lead. Management culture at your last company punished anyone who slowed output.",
fin:[["Line downtime cost","$8,000/minute"],["Defect escape cost (recall/warranty)","$400 per unit shipped"],["Units between discovery and shift end","~1,900"],["Rework cost if caught now","$6 per unit"]],
problem:"Do you empower a first-week employee to stop a multi-million-dollar line — and what happens culturally after he pulls the cord?",
constraints:["Quarterly output targets are already tight","Supervisors' bonuses tie to line uptime","The defect might be minor — or might not"],
options:[{t:"Only supervisors may stop the line; the new hire flags it and keeps working"},{t:"Anyone can stop the line, and management thanks whoever pulls the cord — publicly"},{t:"Log defects for the end-of-week quality review to avoid downtime"},{t:"Speed a quality inspector to that station while the line keeps running"}],
suggested:1,
analysis:"Option 2 is the andon cord — the most counterintuitive practice in manufacturing history. The math: 1,900 escaped units × $400 dwarfs minutes of downtime; catching defects at the source is always the cheapest point. But the deeper design is cultural: thanking the cord-puller makes problems visible, and visible problems get fixed permanently (root cause), while punished problems go underground and ship to customers. Options 1, 3, and 4 all optimize this shift at the cost of every future shift.",
instructor:"Have students compute both costs before revealing — the arithmetic converts more people than the philosophy. Then translate: in a pest company, the 'andon cord' is the tech who reports his own missed service; in a car wash, the attendant who stops the tunnel over a strange noise. If your people hide problems, you built the incentive that hides them. Bonuses tied to uptime (a local metric) versus quality (a system metric) is Goldratt's lesson wearing a Toyota uniform.",
lessons:["Catch defects at the source — it's the cheapest point in the entire system","Culture is what you thank and what you punish, not what you post on walls","Local metrics (uptime, output) quietly fight system metrics (quality, throughput)"],
rel:["c13","c9","p8"]},
{id:"mcd-realestate",title:"The Real Business Under the Burgers",inspired:"Inspired by McDonald's franchise system",cat:"Business Models",
situation:"1950s: a milkshake-machine salesman turned franchisor is barely profitable. Franchisees pay small royalties, quality varies wildly, and the company has no leverage to enforce standards. A CFO proposes something odd: stop focusing on burger royalties entirely.",
fin:[["Royalty rate","1.9% of sales — thin"],["Company profit","Near zero"],["Franchisee compliance","Weak — no enforcement lever"],["Proposal","Buy/lease the land and buildings, sublease to franchisees"]],
problem:"How does a franchisor with no capital and no leverage build a durable, enforceable, profitable system?",
constraints:["Almost no cash on hand — real estate requires debt","Franchisees resist any new costs","Competitors franchise faster with looser standards"],
options:[{t:"Raise the royalty rate to industry-high levels"},{t:"Become the landlord: control the real estate under every store and earn rent + royalties"},{t:"Sell company-owned stores only — forget franchising"},{t:"License the brand loosely and maximize unit count"}],
suggested:1,
analysis:"Option 2 — the Franchise Realty insight — built the empire. Rent gave predictable, margin-rich income that dwarfed royalties; property appreciation compounded silently; and the lease became the enforcement lever no contract could match: violate standards, lose your location. The company famously became a real estate business that sells burgers. Raising royalties (option 1) would have squeezed franchisees without adding control; loose licensing (option 4) is how competitors of the era destroyed their own brands.",
instructor:"The transferable question: what's the chokepoint asset in your industry — the thing that, controlled, makes everyone else's success flow through you? In car washes it's often literally the same answer (corner real estate on high-traffic arterials). Also note the risk honestly: the model loaded the company with property debt — control via assets costs balance sheet. Pair with the ground-lease lesson in the Car Wash track.",
lessons:["The visible product and the real economic engine are often different layers","Owning the chokepoint asset (location, route, contract) beats policing behavior","Enforcement built into structure outperforms enforcement written into contracts"],
rel:["m4","w8","w1"]},
{id:"carwash-acq",title:"The Underpriced Tunnel",inspired:"A local car wash acquisition",cat:"Acquisitions",
situation:"A 68-year-old owner is selling his express tunnel wash after 22 years. Asking $1.6M. Volume is steady but flat; he never installed a membership program ('gimmicks'); equipment is dated but maintained; two competitors opened within 4 miles last year, both membership-first brands.",
fin:[["Asking price","$1.6M"],["Revenue","$640k/yr, flat 3 years"],["EBITDA","$185k (29% margin)"],["Implied multiple","8.6× EBITDA"],["Comparable sales","6-8× for non-membership sites"],["Membership sites trade at","9-12×"]],
problem:"Is this deal attractive at the ask, and what's your play?",
constraints:["SBA loan pre-approval caps you at $1.4M purchase","New competitors are actively converting the market to memberships","Equipment refresh will need ~$150k within 3 years"],
options:[{t:"Pay the ask — good sites rarely list, and the location is strong"},{t:"Walk away — flat revenue plus new competition equals decline"},{t:"Offer ~$1.15M off the current numbers, and underwrite your own membership conversion as upside you don't pay for"},{t:"Offer the full ask contingent on seller financing 50% at low interest"}],
suggested:2,
analysis:"Option 3 is the operator's play. Rule one of buying: pay for the business as it runs today, not the business you plan to build — the membership upside is your work and your risk, so it's your return. At $1.15M (≈6.2×), the deal clears DSCR with room for the equipment refresh; at $1.6M it's priced as if the conversion already happened. The competitive threat actually helps the buyer: it justifies the discount to a data-resistant seller, and the site's retail flow is the raw material memberships are made from. Option 4 (full price, half seller-financed) still overpays — financing structure never fixes valuation.",
instructor:"Watch students confuse price and structure — creative terms on a bad price is still a bad deal. Second teaching point: the seller's 22-year 'no gimmicks' stance is the opportunity wearing a disguise; buy-then-build deals live exactly where a proven asset meets one obvious, un-executed improvement you know how to run. Run the SBA Acquisition Analyzer in Tools with both prices to feel the difference.",
lessons:["Pay for the present; keep the upside you'll build for yourself","Financing structure can't rescue a wrong price","The best small acquisitions pair a proven asset with one obvious unbuilt lever"],
rel:["w12","w4","m2"]},
{id:"pest-rollup",title:"The Roll-Up That Almost Rolled Over",inspired:"A pest control roll-up",cat:"Acquisitions",
situation:"You've acquired four small pest control companies in 18 months (about 2,800 accounts combined) using SBA and seller notes. Each still runs its own software, pricing, chemicals, and habits. Techs from acquired firms are quitting; churn on acquired books is running double your organic rate; and your fifth LOI is signed.",
fin:[["Combined recurring revenue","$1.9M"],["Debt service","$31k/month"],["Churn: organic book","11%/yr"],["Churn: acquired books","23%/yr"],["Integration status","Four systems, four price lists"],["LOI #5","$450k book, closing in 60 days"]],
problem:"Do you close deal five or stop and integrate — and what does the churn tell you?",
constraints:["Walking from the LOI costs the deposit and a broker relationship","Debt service leaves little slack if churn keeps climbing","Your ops manager is spending 100% of her time firefighting"],
options:[{t:"Close deal five — momentum and scale are the strategy"},{t:"Pause acquisitions 6-12 months; integrate onto one system, one price book, one culture; fix churn first"},{t:"Close deal five but hire an integration manager to work in parallel"},{t:"Sell the two worst-performing acquired books to reduce debt"}],
suggested:1,
analysis:"Option 2, and the churn number is the whole case: acquired customers at 23% churn are leaving because the thing they bought — their familiar tech, their old company's way — keeps changing chaotically. A roll-up's value is built in integration, not acquisition; buying is the easy, fun 10%. At double churn, deal five's book will leak out the bottom as fast as it's paid for at the top — you'd be buying water for a bucket you haven't patched. Option 3 sounds mature but keeps the leadership team's attention split during the highest-risk period; most failed roll-ups have exactly that biography.",
instructor:"The seduction here is momentum — brokers, sellers, and ego all push toward the next close. Make students price the churn: 23% vs 11% on $1.9M recurring is ~$228k/year of extra leakage, which is most of the debt service. The platform multiple (from the Pest Control track's exit lesson) is earned by integrated systems and retention cohorts, not by account count. Roll-ups die of indigestion, not starvation.",
lessons:["Acquisition is 10% of a roll-up; integration is where value is created or destroyed","Churn on acquired books is the report card of your integration","Pausing growth to fix the machine is often the highest-ROI 'deal' available"],
rel:["p10","p11","m5"]},
{id:"restaurant-turn",title:"Ninety Days to Save a Restaurant",inspired:"A failing restaurant turnaround",cat:"Turnarounds",
situation:"A family restaurant is losing $9k/month. The menu has 68 items; food waste is high; two of eleven staff do most of the work; the dining room is half-empty on weekdays but the kitchen is chaos on weekends. The owner has 5 months of cash left and is emotionally attached to dishes his late father created.",
fin:[["Monthly loss","−$9k"],["Cash remaining","~$45k"],["Menu items","68"],["Food cost","41% (healthy: 28-32%)"],["Weekend covers","Turning tables away"],["Weekday covers","~35% capacity"]],
problem:"Sequence a 90-day turnaround with $45k of runway. What goes first?",
constraints:["No capital for renovation or marketing blitzes","Family dishes are politically explosive to cut","Any staff cuts hit real people in a small town"],
options:[{t:"Launch aggressive weekday promotions to fill the empty dining room"},{t:"Cut the menu to ~20 items first — attack food cost, waste, and kitchen chaos before anything else"},{t:"Raise all prices 15% to cover the losses"},{t:"Close weekdays entirely and operate weekends only"}],
suggested:1,
analysis:"Option 2 is the classic first move because it attacks four problems with one decision: food cost (fewer ingredients, less waste, better purchasing), kitchen speed (weekend chaos), quality (practice concentrates), and — critically — it costs nothing. Marketing an unprofitable operation (option 1) scales losses; across-the-board price hikes (option 3) on a struggling restaurant risks the remaining traffic. The menu keeps the three best-selling family dishes — turnarounds need the owner functional, and total war over sentiment burns runway. Weekday closure (option 4) is a real lever but second: fix unit economics, then match hours to demand.",
instructor:"The meta-lesson is sequencing under a cash clock: cost and cash moves before growth moves, always — you must survive to benefit from marketing. The 68-item menu is small-business scope creep in its purest form; students should connect it to focus lessons everywhere in this university. And note the political design: keeping three family dishes isn't weakness, it's change management.",
lessons:["In a cash crisis: cost and cash levers first, growth levers second","Menu/product sprawl is a silent margin killer — focus is free money","Turnarounds are 50% arithmetic, 50% managing the humans through it"],
rel:["f10","c11","f4"]},
{id:"cash-crisis",title:"Profitable and Broke",inspired:"A cash flow crisis",cat:"Finance",
situation:"A commercial plumbing contractor lands its biggest year ever — $2.8M booked, P&L shows $210k profit. Yet the account is empty: payroll is Friday, $38k short. Big general contractors pay in 60-90 days; the company pays suppliers in 15 and payroll weekly. Growth is making it worse every month.",
fin:[["Booked revenue","$2.8M (record)"],["P&L profit","$210k"],["Accounts receivable","$395k (much at 60-90 days)"],["Cash","$11k"],["Payroll Friday","$49k"],["Supplier terms","Net 15 · Customer terms: Net 60-90"]],
problem:"Make payroll Friday, then fix the machine so this never recurs.",
constraints:["Factoring quotes are expensive (3-4%/month)","The biggest customer is also the slowest payer — and can't be antagonized carelessly","More growth means more cash consumed, not less"],
options:[{t:"Take the factoring deal on the $395k of receivables"},{t:"Emergency: call the two biggest late invoices offering 2% for payment this week; then fix structurally — deposits, progress billing, net-30, and a credit line sized to the gap"},{t:"Stop taking new jobs until receivables catch up"},{t:"Take a merchant cash advance today"}],
suggested:1,
analysis:"Option 2 pairs the emergency move with the cure. A 2% early-pay discount on $100k costs $2k — versus factoring's compounding 3-4% monthly or an MCA's effective 60-100% APR (option 4 is how contractors die). The structural fix attacks the real disease: the working capital cycle. Deposits and progress billing move cash collection into the job instead of after it; net-30 with late fees resets norms; the credit line bridges the remaining timing gap — arranged now, while the P&L looks great, not mid-crisis. Halting growth (option 3) treats the symptom by shrinking the patient.",
instructor:"This is the university's most important finance lesson in case form: profit is an opinion, cash is a fact. Have students compute the cash conversion cycle before and after: collecting at 75 days while paying at 15 means every revenue dollar must be financed for ~60 days — growth multiplies the gap. That's why 'we grew ourselves to death' is a real epitaph. Connect to the 13-week cash flow habit and the Cash Flow Forecast tool.",
lessons:["Profitable companies die of cash timing — the P&L won't warn you","Fix the cycle (deposits, progress billing, terms), not just the shortfall","Arrange credit before you need it; desperation financing compounds the crisis"],
rel:["f4","f7","a9"]},
{id:"founder-trapped",title:"The Owner Who Couldn't Leave",inspired:"A founder trapped inside his own business",cat:"Leadership & Systems",
situation:"A marketing agency owner bills $1.2M/yr with eight employees, but every client relationship, every proposal, every final review runs through him personally. He hasn't taken a full week off in six years. Two senior employees just quit — exit interviews cite 'no autonomy.' A buyer approached last month and, after one meeting, cut their indicative offer 40% — 'the business is you.'",
fin:[["Revenue","$1.2M/yr"],["Owner hours","70+/week"],["Owner-touched deliverables","100%"],["Indicative offer","Cut 40% after diligence meeting"],["Senior staff turnover","2 in 90 days"]],
problem:"The business has no value without its bottleneck — and the bottleneck is burning out. What's the 12-month plan?",
constraints:["Clients explicitly expect the owner on their account","Delegating will produce visible quality dips at first","Revenue can't crater during the transition — payroll is real"],
options:[{t:"Hire a COO to run operations while the owner keeps all client work"},{t:"Systematize and delegate in stages: document the owner's judgment as SOPs and rubrics, promote account leads, move the owner to review-only, then to exceptions-only — accepting a temporary quality dip"},{t:"Raise prices 30% to shrink the client list to what the owner can handle"},{t:"Take the discounted offer and exit now"}],
suggested:1,
analysis:"Option 2 is the E-Myth prescription, and the only one that builds transferable value. The trap's mechanics: the owner's standards live in his head, so autonomy is impossible, so good people leave, so more lands on him — a loop that tightens. Documenting judgment (review rubrics, quality checklists, decision rules) converts personal excellence into organizational capability; staged withdrawal (review-only → exceptions-only) manages the quality dip that scares owners into never starting. A COO (option 1) can't fix it — operations isn't the bottleneck, the owner's monopoly on judgment is. Price hikes (option 3) shrink the prison; they don't unlock it.",
instructor:"The 40% offer cut is the market pricing key-person risk in cold cash — use it as the case's emotional anchor. The subtle teaching: the two resignations and the discount are the same fact observed from inside and outside. Every operator student should answer honestly: if you vanished for 30 days, what breaks first? That answer is your real org chart.",
lessons:["A business that requires its owner is a job with employees — and buyers price it that way","Document judgment, not just tasks: rubrics and decision rules create real autonomy","Exit value is built years before exit, in systems that run without you"],
