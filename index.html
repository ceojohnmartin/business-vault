DATA.push({id:"acct",name:"Accounting School",tag:"The Language of Business",intro:"Accounting is how business keeps score, and operators who can't read the scoreboard get robbed — by markets, by partners, and by their own optimism. Two levels: the bookkeeping machine, then reading statements like an analyst. Education, not professional accounting advice.",levels:[
{id:"A1",name:"The Bookkeeping Machine",tagline:"Level 1",desc:"Double-entry, the books, and the monthly close — how numbers get made",modules:[
{name:"Foundations of the Ledger",lessons:[
{id:"ac1",t:"The Accounting Equation",q:"accounting equation assets liabilities equity explained",
learn:["Why assets always equal liabilities plus equity","What each side of the equation actually represents","How every transaction keeps the equation balanced"],
why:"Every financial statement, every journal entry, and every audit on earth rests on this one equation. Understand it and accounting becomes logic; skip it and accounting stays magic.",
p:["Assets = Liabilities + Equity. Everything a business owns (assets) was paid for by someone — either people you owe (liabilities) or the owners (equity). That's the whole equation: the left side lists what the company has, the right side lists who has claims on it. A $50,000 truck bought with a $40,000 loan and $10,000 cash-down shows up as a $50,000 asset balanced by a $40,000 liability and a $10,000 reduction of another asset (cash) — the equation never tips, because both sides describe the same reality from two angles: the stuff, and the claims on the stuff.",
"Every transaction, no matter how exotic, moves at least two of these buckets and leaves the equation balanced — that's why it's called double-entry, and it's the greatest error-detection system ever invented: if your books don't balance, something is recorded wrong, full stop. Watch equity closely: it's the residual — what's left for owners after all debts — and it grows two ways only: owners putting money in, or the business earning profit and keeping it (retained earnings). Revenue and expenses are just temporary sub-accounts of equity that get folded in at period end. Once you see that profit literally IS a change in equity, the income statement and balance sheet snap together into one machine."],
terms:[["Asset","Anything the business owns with future value — cash, receivables, equipment, inventory."],["Liability","A claim on assets by outsiders — loans, unpaid bills, credit balances."],["Equity","The owners' residual claim: assets minus liabilities."],["Double-entry","Every transaction touches at least two accounts, keeping the equation balanced."],["Retained earnings","Cumulative profit kept in the business rather than paid out — how earning grows equity."]],
ex:"A pest control startup begins with $20,000 owner cash (assets $20k = equity $20k). It borrows $30,000 for a truck (assets $50k = liabilities $30k + equity $20k), then earns $5,000 cash on its first contracts (assets $55k = liabilities $30k + equity $25k). Three snapshots, one unbreakable equation — and the owner can see at a glance that of the $55k of 'stuff,' only $25k is truly his.",
mistakes:["Thinking cash in the bank means profit — cash is an asset; profit is a change in equity","Confusing the owner's money and the business's money in one account","Believing a balanced ledger means correct books — balance catches errors of arithmetic, not errors of judgment"],
keys:["Assets = Liabilities + Equity: what you have versus who has claims on it","Every transaction moves two or more buckets and never breaks the balance","Profit is just equity growing from operations — statements are one connected machine","If the books don't balance, something is definitely wrong; if they do, they still might be"],
assign:"Write your own personal accounting equation today: list assets, list debts, compute your equity. Then record how yesterday's three biggest transactions each moved two buckets."},
{id:"ac2",t:"Debits & Credits Demystified",q:"debits and credits explained simply accounting",
learn:["What debit and credit actually mean (hint: not good and bad)","The DEALER rule for which accounts increase on which side","How to read any journal entry"],
why:"Debits and credits are the gears inside every accounting system — QuickBooks hides them, but every report you'll ever trust is built from them, and bookkeeper errors hide in them.",
p:["Forget 'debit bad, credit good' — debit means left column, credit means right column, nothing more. The genius is the convention for which accounts grow on which side: Dividends/Draws, Expenses, and Assets grow with debits; Liabilities, Equity, and Revenue grow with credits (the DEALER mnemonic). Why? So that every entry's debits equal its credits and the accounting equation self-balances. Buy $500 of chemicals with cash: debit Chemical Expense $500 (expense up), credit Cash $500 (asset down). Invoice a customer $1,200: debit Accounts Receivable $1,200 (asset up), credit Revenue $1,200 (revenue up). Two lines, always equal, always readable once you know the code.",
"Every transaction in history becomes a journal entry in this format, and journal entries post to the ledger — the master book with one page (account) per bucket. When your accountant asks 'what's in account 6210?' or the software shows a trial balance, this is the machinery underneath. Operators don't need to book entries daily, but you must be able to READ them, because this is where fraud and error live: an expense debited to an asset account inflates profit; revenue credited twice inflates growth; a mystery debit to 'Miscellaneous' is where questions go to die. The five-minute skill that pays forever: pick any transaction in your books and trace its two sides. If your bookkeeper can't show you both sides in ten seconds, you have a bookkeeping problem."],
terms:[["Debit / Credit","Left column / right column of an entry — direction depends on account type, not goodness."],["DEALER rule","Draws, Expenses, Assets grow by debit; Liabilities, Equity, Revenue grow by credit."],["Journal entry","The recorded transaction: date, accounts, equal debits and credits, memo."],["General ledger","The master record — every account's full history of entries."],["Trial balance","A listing proving total debits equal total credits across all accounts."]],
ex:"A car wash owner reviews her books and finds profit suspiciously high. Tracing entries, she spots it: $18,000 of tunnel repairs was debited to 'Equipment' (an asset) instead of 'Repairs & Maintenance' (an expense) — capitalized junk that inflated profit by $18,000 and would have overstated her taxes and her sale price diligence later. One DEALER-literate hour caught what two 'clean' P&Ls hid.",
mistakes:["Treating debits as bad and credits as good — banks' statements use THEIR perspective, which reverses yours","Letting 'Miscellaneous' accumulate unexplained entries","Never opening the general ledger because the dashboard 'looks fine'"],
keys:["Debit = left, credit = right; DEALER tells you which side grows each account","Every entry has equal debits and credits — that's the self-balancing trick","Reading entries is an owner's skill; booking them is a bookkeeper's job","Errors and fraud live at the entry level, invisible on summary reports"],
assign:"Open your accounting software (or bank statement) and hand-write the journal entries for five recent transactions — both sides, correct accounts."},
{id:"ac3",t:"The Chart of Accounts & Clean Books",q:"chart of accounts small business bookkeeping setup",
learn:["How the chart of accounts organizes every dollar","What a clean bookkeeping workflow looks like weekly and monthly","Why category discipline today prices your business tomorrow"],
why:"The chart of accounts is your business's filing system for money. A clean one makes every later lesson — margins, taxes, valuation, diligence — trivially easy; a messy one poisons them all.",
p:["The chart of accounts (COA) is the numbered list of every bucket money can land in, organized in the universal order: assets (1000s), liabilities (2000s), equity (3000s), revenue (4000s), cost of goods sold (5000s), expenses (6000s+). The art is granularity: too few accounts and you can't see anything ('Expenses: $34,000'); too many and nothing is comparable ('Fuel — Truck 3 — Tuesdays'). The operator's rule: create an account for anything you'll want to watch, price, or defend later — separate revenue lines per service (residential vs. commercial pest), separate COGS from overhead religiously (that's your gross margin), and keep owner-personal items OUT (the commingling that destroys both tax positions and sale credibility).",
"Clean books are a rhythm, not a heroic quarterly cleanup. Weekly: categorize transactions, send invoices, chase receivables. Monthly: reconcile every bank and card account to the penny (reconciliation is the honesty ceremony — books versus reality), review the P&L against last month and budget, and close the period so numbers stop moving. This rhythm is exactly what buyers and lenders mean by 'quality of books': in diligence, a business whose statements reconcile and whose categories are consistent for three years commands real multiples, while a shoebox operation gets discounted or retraded. Bookkeeping isn't compliance overhead — it's pre-building the evidence for every dollar of enterprise value you hope to claim."],
terms:[["Chart of accounts","The organized list of all account buckets — the money filing system."],["COGS vs. overhead","Costs that scale with each job/sale versus costs of existing — the gross margin line."],["Reconciliation","Matching book balances to bank statements exactly — the monthly honesty check."],["Commingling","Mixing personal and business money — the classic small-business books killer."],["Monthly close","Finalizing a period so its numbers are locked, reviewed, and comparable."]],
ex:"Two pest companies sell the same year. Company A has three years of reconciled books, revenue split by service line, and clean COGS — diligence takes three weeks and the multiple holds. Company B runs everything through one checking account with 40% of expenses in 'Other'; the buyer's accountant can't verify margins, the lender balks, and the price drops 25% 'for uncertainty.' Same trucks, same customers — different filing systems.",
mistakes:["Running personal spending through the business ('the truck is basically mine anyway')","Dumping 30%+ of expenses into Miscellaneous/Other","Skipping reconciliation because the software balance 'looks right'"],
keys:["COA granularity rule: one account per thing you'll want to watch, price, or defend","COGS separate from overhead — gross margin depends on it","Reconcile every account monthly; unreconciled books are opinions","Clean, consistent books ARE enterprise value — buyers pay for provable numbers"],
assign:"Audit your (or a sample) chart of accounts: flag every commingled personal expense, every 'Misc' balance over 5% of expenses, and split revenue into at least two meaningful lines."},
{id:"ac4",t:"Cash vs. Accrual: When a Dollar Counts",q:"cash vs accrual accounting explained difference",
learn:["The difference between recording when cash moves vs. when value moves","Which method fits which business — and what lenders expect","How accruals create the gap between profit and cash"],
why:"Whether you count a dollar when it's earned or when it lands changes your profit, your taxes, and your ability to see the truth. Most small-business confusion about 'profitable but broke' starts here.",
p:["Cash accounting records revenue when money arrives and expenses when money leaves — simple, intuitive, and how most tiny businesses (and your checkbook) work. Accrual accounting records revenue when it's EARNED (job done, invoice sent) and expenses when they're INCURRED (chemical used, wage owed), regardless of cash timing. Accrual is more work and more truthful: a commercial pest job completed in March and paid in May belongs to March's performance — cash books would show March as terrible and May as heroic, when really March earned it and May merely collected. Matching revenue with the expenses that produced it (the matching principle) is the entire point: it makes each month's profit mean something.",
"The differences compound: prepay a year of insurance and accrual spreads it over twelve months (an asset called prepaid expense, released monthly) while cash books take the hit at once; deliver services you haven't billed and accrual shows the receivable; collect annual memberships upfront (car wash operators, notice) and accrual honestly shows deferred revenue — a LIABILITY, because you owe twelve months of washes. That last one matters enormously in diligence: membership cash collected is not yet earned. Practical guidance: run accrual books for management truth (any serious lender, buyer, or the acquisition track's diligence lessons will demand them), even if your CPA files taxes on cash basis for timing advantages — the two can coexist, and knowing which view you're looking at is itself the skill."],
terms:[["Cash basis","Record when money moves — simple, but distorts timing of performance."],["Accrual basis","Record when value is earned/incurred — the truthful management view."],["Matching principle","Book expenses in the same period as the revenue they produced."],["Prepaid expense","Cash paid ahead (insurance, rent) held as an asset and released over time."],["Deferred revenue","Cash collected before the work is done — a liability, not earnings yet."]],
ex:"A car wash sells 400 annual memberships in January — $120,000 cash. Cash books scream record profit; the owner celebrates and overspends. Accrual books tell the truth: $10,000 earned in January, $110,000 of deferred revenue owed as washes all year. In August (slow cash month), cash books panic while accrual shows steady earning. The buyer who later examines this business will price it on the accrual truth — so should its owner.",
mistakes:["Celebrating collected-but-unearned cash as profit","Comparing months on cash books and drawing performance conclusions","Showing a lender or buyer cash-basis books and wondering why they discount everything"],
keys:["Cash basis tracks money; accrual tracks performance — you need the second to manage","Matching revenue with its expenses makes monthly profit meaningful","Upfront collections are liabilities (deferred revenue) until earned","Run accrual for management even if taxes file on cash — know which view you're reading"],
assign:"Take last month's numbers and adjust them to accrual: add work done but unbilled, subtract cash collected but unearned, spread any prepaid costs. How different is 'real' profit?"},
{id:"ac5",t:"Revenue, COGS & the Anatomy of Gross Margin",q:"gross margin cogs explained small business",
learn:["What truly belongs in COGS for a service business","How gross margin exposes pricing and efficiency problems","Why revenue recognition discipline protects you"],
why:"Gross margin is the first number a sophisticated reader checks, because it answers: does the core act of serving a customer make money? Everything below it is just overhead management.",
p:["Revenue is the top line — but only revenue actually earned (delivered, owed to you) counts; discounts, refunds, and free work net against it, and recognizing revenue early is the most common flavor of book-cooking in existence. Below revenue sits COGS: every cost that scales directly with delivering the service — technician wages and payroll burden for job hours, chemicals and materials, fuel for routes, equipment usage, subcontractors, merchant fees. NOT the office manager, not your salary, not rent, not marketing: those are operating expenses, the cost of existing rather than the cost of serving. The discipline matters because Revenue − COGS = gross profit, and gross margin (gross profit ÷ revenue) is the purest read on your unit economics: it's the lesson-one 'gap' measured account by account.",
"Gross margin diagnoses problems that totals hide. Margin drifting down two points a quarter means price erosion, wage creep, fuel costs, or sloppy routes — investigate before it compounds; margin healthy but net profit thin means overhead bloat instead. Know your industry's bands (service businesses often 50-65%; retail 25-50%; the operator tracks quote specifics) and track margin BY LINE: residential vs. commercial, wash volume vs. detailing, each product — because a blended 55% can hide one line at 70% subsidizing another at 30%, and that discovery (kill it, reprice it, or fix it) is often worth more than a year of new marketing. Every pricing lesson in this university lands here: the P&L's gross margin line is where pricing courage shows up as arithmetic.",],
terms:[["Revenue recognition","Counting revenue only when earned — the discipline early-booking violates."],["COGS (services)","Costs that scale with each job: direct labor + burden, materials, fuel, subs, merchant fees."],["Gross profit / margin","Revenue minus COGS; the % version is your unit-economics scoreboard."],["Contribution by line","Gross margin computed per service/product line, not blended."],["Margin drift","Slow erosion of gross margin — the early-warning siren worth alarms."]],
ex:"A $1.4M home-services company shows a comfortable blended 54% gross margin. Split by line: recurring service runs 68%; one-time jobs run 31% because they're quoted by a gut that hasn't met the fuel bill. Repricing one-times +18% loses a third of them — and raises total gross profit by $61,000 while freeing two techs' worth of hours for recurring growth. The blended number hid a business inside a business.",
mistakes:["Stuffing owner salary or rent into COGS (or tech wages into overhead) and reading fantasy margins","Tracking one blended margin across very different service lines","Booking revenue at invoice for work not yet delivered"],
keys:["COGS = costs that scale with serving; overhead = costs of existing — never blur them","Gross margin is the unit-economics scoreboard; watch its trend like a vital sign","Compute margin by line — blends hide subsidies","Recognize revenue when earned; early booking is self-deception with legal risk"],
assign:"Rebuild last month's P&L with strict COGS discipline, then compute gross margin for each of your top two revenue lines separately. Write one sentence on what the split reveals."},
{id:"ac6",t:"The Month-End Close & Books You Can Trust",q:"month end close process small business accounting checklist",
learn:["The exact checklist of a monthly close","Which accruals and adjustments make numbers truthful","How a close rhythm becomes management power"],
why:"Un-closed books drift and lie retroactively. The monthly close is the ceremony that turns raw entries into statements you can steer by — and it's the habit that separates real companies from big hobbies.",
p:["The close is a repeating checklist, and good operators run it by the 10th of the following month. Core sequence: (1) reconcile every bank, card, and loan account to statements; (2) collect the period's stragglers — unbilled work invoiced, late vendor bills entered; (3) book adjusting entries: depreciation on equipment, prepaid releases (that annual insurance), payroll earned but unpaid, deferred revenue earned this month; (4) review receivables and payables agings — who owes you, whom you owe, and what's going stale; (5) scan the P&L and balance sheet against last month and budget, investigating anything ±10% you can't explain in one sentence; (6) lock the period so history stops moving. Two hours a month once the rhythm exists — the highest-leverage two hours in small-business finance.",
"The adjusting entries are where accrual truth (lesson four) gets enforced: without them, profit is whatever your cash timing accidentally says. And the review step is where accounting becomes management: month-over-month gross margin by line (lesson five), overhead creep, receivables aging past 45 days (call them — the cash crisis case study lives in that aging report), deferred revenue burn-down. Businesses run without closes for years and 'do fine' — until the loan application, the sale process, or the partner dispute, when three years of drifting numbers must be reconstructed forensically at fifty times the cost. Closing monthly is cheap insurance and free clarity; treat the checklist like preflight."],
terms:[["Adjusting entries","Period-end entries (depreciation, accruals, releases) that align books with reality."],["Depreciation","Spreading an asset's cost over its useful life — the truck expenses itself monthly."],["AR/AP aging","Reports bucketing receivables/payables by how old they are — where cash problems surface first."],["Locking the period","Preventing changes to closed months so history stays trustworthy."],["Variance review","Explaining month-over-month and budget-vs-actual gaps before they explain you."]],
ex:"An operator starts closing monthly after years of 'checking the bank app.' First close finds: $9,400 of completed-but-never-invoiced commercial work, a customer 72 days past due on $6,100, and insurance being expensed twice. One checklist recovered more than $15,000 — and the aging report habit means no invoice ever ages past 45 days unnoticed again.",
mistakes:["Reconciling 'most' accounts and skipping the annoying loan and petty-cash ones","Letting prior closed months keep changing as stragglers arrive","Reviewing only the P&L and never the balance sheet or agings"],
keys:["Close by the 10th: reconcile, catch stragglers, adjust, review, lock","Adjusting entries enforce accrual truth — skip them and profit is cash-timing noise","The agings are the operational gold: stale receivables are tomorrow's cash crisis","Locked, explained, on-time books are management power and future deal value"],
assign:"Run a mini-close on last month: reconcile your main account, list any unbilled work, and produce an AR aging. Flag everything over 45 days and contact one of them today."}
]}
]},
{id:"A2",name:"Reading the Statements",tagline:"Level 2",desc:"Income statement, balance sheet, cash flow, and ratios — analyst-grade literacy",modules:[
{name:"Statement Mastery",lessons:[
{id:"ac7",t:"The Income Statement, Line by Line",q:"income statement analysis explained line by line",
learn:["Every standard P&L line and what it reveals","Margins at each level and what moves them","How to interrogate an income statement in five minutes"],
why:"The P&L is the performance story — but only readers who know each line's tricks can tell performance from packaging.",
p:["Top to bottom: Revenue (earned, net of discounts/refunds — check the recognition policy before admiring growth); COGS; Gross profit and margin (the unit-economics line from Level 1); Operating expenses, usefully split into selling/marketing, general & administrative, and R&D where relevant; Operating income (EBIT) — profit from actually running the business, before financing and tax choices; then interest, taxes, and any one-time items; finally Net income, the famous bottom line — and the most gameable number on the page. The professional habit is margins at every level (gross, operating, net) tracked across periods: levels vary by industry, but TRENDS are yours, and a rising gross with falling operating margin says 'winning customers, losing cost control' in one glance.",
"Interrogation checklist: (1) Is revenue growth real — units and price — or acquisition/accounting artifacts? (2) What's IN 'one-time' items — a restructuring charge every year is called payroll; (3) Owner adjustments in a small business — the seller's 'add-backs' from the acquisition lessons live here, some legitimate (their above-market salary), some fantasy (the 'optional' truck); (4) Operating leverage — as revenue grows, do expenses grow slower (margin expansion) or faster (a business that eats its own growth)? (5) The EBITDA bridge — EBITDA from the finance lessons is operating income plus depreciation/amortization: useful for comparing and valuing, dangerous when it becomes 'earnings before all the bad stuff.' Read a P&L this way and you're no longer being told a story — you're auditing one."],
terms:[["Operating income (EBIT)","Profit from operations before interest and taxes — the run-the-business line."],["SG&A","Selling, general & administrative — the overhead engine room."],["One-time items","Charges claimed as unusual; recurring 'one-times' are disguised operations."],["Operating leverage","Revenue growing faster than costs — margins expand as you scale."],["Add-backs","Adjustments to show 'true' owner earnings — each one deserves interrogation."]],
ex:"Two P&Ls show identical $200k net income. Company A: gross 62%, operating 24%, clean lines, three years of expanding margins. Company B: gross 38%, thin operations rescued by a $90k 'one-time' insurance recovery and $60k of aggressive add-backs. Same bottom line; a lender prices A's debt cheaper, a buyer pays A two more turns of EBITDA — because A's profit is a machine and B's is an event.",
mistakes:["Reading only the bottom line and skipping the margins that explain it","Accepting 'adjusted' numbers without auditing each adjustment","Comparing your margins to other industries' benchmarks"],
keys:["Margins at every level, tracked over time, tell the real story","Operating income shows the business; below it shows financing and packaging","Interrogate one-times and add-backs individually — that's where stories hide","Operating leverage (costs growing slower than revenue) is what scaling should look like"],
assign:"Take a real P&L (yours or a sample) and compute gross, operating, and net margins for three consecutive periods. Write one sentence explaining each trend — no sentence, no understanding."},
{id:"ac8",t:"The Balance Sheet: Reading Financial Position",q:"balance sheet analysis explained working capital",
learn:["How to read assets, liabilities, and equity as a health X-ray","Working capital and liquidity ratios that predict survival","The debt structure questions every owner must answer"],
why:"The P&L says how the year went; the balance sheet says whether the company can survive a bad quarter, fund growth, or afford its own success. Lenders read it first — so should you.",
p:["Structure: assets listed by liquidity (cash, receivables, inventory, then property/equipment), liabilities by due date (payables and current debt within a year, then long-term debt), equity last. The first professional glance is current assets versus current liabilities — working capital — the fuel gauge for the next twelve months: the current ratio (current assets ÷ current liabilities) below ~1 means the next year's bills exceed the next year's convertible resources; the quick ratio strips inventory for a harsher look. Next glance: composition. Receivables ballooning faster than revenue means collection trouble (the cash-crisis case in the Library); inventory swelling means cash entombed on shelves; and on the right side, the debt maturity wall — how much comes due, when, at what rates.",
"Then the quality questions. Are receivables real (aging report) or full of never-pay zombies awaiting write-off? Is equipment's book value (cost minus depreciation) anywhere near reality? Goodwill from an old acquisition is an accounting ghost, not a sellable asset. Debt-to-equity tells you who really owns the company's risk; owner loans to/from the business tell you about discipline. For operators, the balance sheet is also the growth governor: the Scaling Up lesson's cash conversion cycle lives here — every dollar of growth consumes working capital (more receivables, more inventory, more payroll ahead of collections), and companies that outgrow their balance sheets die succeeding. Read yours quarterly with the same three questions a lender asks: can it pay its bills, what's really under the asset labels, and what happens if revenue dips 20% for two quarters?"],
terms:[["Working capital","Current assets minus current liabilities — the next-12-months fuel gauge."],["Current / quick ratio","Liquidity tests: can near-term resources cover near-term obligations?"],["Book value","Asset cost minus accumulated depreciation — accounting's estimate, not a price."],["Debt-to-equity","Total debt versus owners' stake — who bears the risk."],["Cash conversion cycle","Days from paying for work until collecting for it — the growth governor."]],
ex:"A distributor triples revenue in two years and fails anyway: receivables at 70 days and inventory for 'growth' consumed every profit dollar plus a maxed credit line — current ratio 0.8 when a big customer paid late. The P&L showed a star; the balance sheet showed a company financing everyone else's business with cash it didn't have. Autopsy verdict: death by working capital.",
mistakes:["Never reading the balance sheet because 'the P&L looks great'","Treating book values as market values (especially equipment and goodwill)","Growing receivables and inventory faster than revenue without financing the gap"],
keys:["Working capital and the current ratio are the survival gauges","Composition beats totals: watch receivables and inventory versus revenue growth","Know your debt wall — amounts, dates, rates","Growth consumes balance sheet; fund it deliberately or die succeeding"],
assign:"Build your balance sheet (or open your software's). Compute current ratio, quick ratio, and days-of-receivables. Write down what happens to each if revenue jumps 50% next quarter."},
{id:"ac9",t:"The Cash Flow Statement: Following the Money",q:"cash flow statement explained operating investing financing",
learn:["The three sections and what each reveals","How profit and cash diverge — and how to reconcile them","The free cash flow number buyers actually price"],
why:"Profit is an opinion; this statement is the lie detector. Companies fail with beautiful P&Ls and empty accounts — the cash flow statement is where that fate announces itself early.",
p:["Three sections. Operating activities: cash from actually running the business — it starts at net income and adjusts for non-cash items (add back depreciation) and working-capital swings (receivables up = cash down; payables up = cash preserved). This section's relationship to net income is the honesty metric: operating cash consistently NEAR or ABOVE profit means earnings are real; profit persistently above operating cash means paper earnings — aggressive recognition, swelling receivables, or worse. Investing activities: cash into/out of long-term assets — equipment purchases (capex), acquisitions, asset sales. Financing activities: loans drawn and repaid, owner contributions and distributions. Three sections, one reconciliation: they sum exactly to the change in the bank balance.",
"The number professionals build from it: free cash flow — operating cash minus the capex needed to maintain the machine — the cash the business truly generates for its owners, and the basis of every valuation lesson (DCF discounts THIS, not net income). Patterns to read: healthy maturity is positive operating, negative investing (reinvesting), flexible financing; a startup shape is negative operating funded by financing (fine, if temporary); the death spiral is negative operating funded by ever-more debt while capex starves. Small-business translation: your version of this statement is the weekly cash discipline from the finance lessons — but learn to READ the formal one, because every acquisition target hands you a P&L first and hopes you never ask for this."],
terms:[["Operating cash flow","Cash generated by the business itself — the earnings-honesty line."],["Capex","Capital expenditures — cash into long-term assets like trucks and tunnels."],["Free cash flow","Operating cash minus maintenance capex — what owners can actually take or reinvest."],["Non-cash add-backs","Depreciation/amortization added back — expenses that consumed no cash this period."],["Cash burn / runway","Negative net cash flow and the months of survival it implies."]],
ex:"Diligence on a $2.1M-revenue landscaper: P&L shows $310k net income, three straight years. Cash flow statement shows operating cash of $95k, $60k, and $40k — declining while 'profit' held steady, the gap living in receivables from one giant customer who pays in 120 days and disputes every third invoice. The buyer reprices the deal on cash reality; the seller's broker calls it 'a timing thing.' Three years of timing is a customer-quality problem wearing makeup.",
mistakes:["Never producing this statement because the P&L 'covers it'","Ignoring the profit-versus-operating-cash gap year after year","Forgetting maintenance capex when computing what you can safely distribute"],
keys:["Operating cash near or above profit = real earnings; persistent gaps = paper earnings","Free cash flow (operating cash − maintenance capex) is the number buyers price","The three sections' pattern diagnoses the company's life stage and health","Always reconcile: sections must sum to the change in cash — no reconciliation, no trust"],
assign:"For last quarter, compute your operating cash flow by starting from profit and adjusting for receivable/payable changes and depreciation. Compare it to reported profit and explain the gap in two sentences."},
{id:"ac10",t:"Ratios, Red Flags & Financial Fraud",q:"financial ratios analysis red flags fraud small business",
learn:["The core ratio toolkit for judging any company","Internal controls that stop small-business theft","Red flags that make analysts (and buyers) walk away"],
why:"Ratios turn statements into comparisons; controls keep the statements true. This capstone makes you the reader books can't fool and the owner employees can't easily rob.",
p:["The working toolkit, grouped: Profitability — gross/operating/net margins and return on equity (net income ÷ equity: what the owners' money earns). Liquidity — current and quick ratios. Efficiency — receivable days (AR ÷ revenue × 365), inventory turns, revenue per employee. Leverage — debt-to-equity and, crown jewel from the deal lessons, DSCR. No ratio means anything alone: compare against your own trend (three-plus years), your industry's bands, and common sense. The killer combination is cross-statement checks: profit up while operating cash falls (ac9), revenue up while receivable days stretch, margins rising while inventory swells — each pairing has an innocent explanation and a guilty one, and the follow-up question is where truth lives.",
"Now protect your own numbers. Small-business fraud is depressingly standard: the trusted bookkeeper with total access, tiny thefts growing bold over years — median losses run six figures BECAUSE nobody was looking. Controls that cost nothing: separate duties (whoever records payments never signs checks or reconciles); owner receives the unopened bank statement and scans it monthly (ten minutes; the single highest-value control); dual approval over a threshold; surprise reviews of payroll (ghost employees) and vendor lists (fake vendors with real bank accounts); mandatory vacations (frauds need daily tending). Red flags in others' books — round numbers everywhere, revenue spikes each period-end, a controller who is 'the only one who understands the system,' statements that never produce backup — are the same flags in yours. The Business Vault's whole promise is command of the machine; this lesson is the lock on the door."],
terms:[["Return on equity","Net income ÷ equity — the yield on the owners' invested capital."],["Receivable days (DSO)","How long customers take to pay — AR ÷ revenue × 365."],["Segregation of duties","No single person records, moves, and reconciles money."],["Ghost employee / fake vendor","Classic payroll and AP fraud schemes surprise reviews catch."],["Cross-statement check","Testing whether P&L, balance sheet, and cash flow tell one consistent story."]],
ex:"An owner finally opens his own bank statements after eight years and finds a $340/month payment to a vendor nobody knows — running six years, $24,000 total, a fake company his bookkeeper registered. The tell was available the whole time: she never took vacation and 'preferred' to handle reconciliation personally. New controls take 30 minutes monthly. The lesson cost $24,000; the reader gets it free.",
mistakes:["Using ratios without trend or industry context and calling it analysis","Giving one trusted person end-to-end control of money because auditing feels distrustful","Ignoring the cross-statement gaps because each statement 'looks fine' alone"],
keys:["Ratios only mean something against trend, industry, and each other","Cross-statement inconsistencies are where hard questions belong","Segregate duties and read your own bank statement — the cheapest insurance in business","The flags you'd check in a target's books are the flags to remove from your own"],
assign:"Implement one control this week (unopened-statement review or vendor-list audit) and compute three ratios (gross margin, DSO, current ratio) for the last two periods. Note which moved the wrong way."}
]}
]}

DATA.push({id:"sales",name:"Sales School",tag:"Revenue Is a Skill",intro:"Nothing happens in business until something is sold. Two levels: the psychology and craft of the individual sale, then the systems that turn selling into a machine — pipelines, D2D and B2B playbooks, and managing a team of closers.",levels:[
{id:"S1",name:"The Craft of Selling",tagline:"Level 1",desc:"Buyer psychology, discovery, objections, and closing — the individual skill",modules:[
{name:"The Sale Itself",lessons:[
{id:"s1",t:"Why People Actually Buy",q:"psychology of selling why people buy emotions",
learn:["The emotional engine and logical justification behind every purchase","Pain, gain, and identity — the three buying motives","How trust forms (and evaporates) in the first minutes"],
why:"Every technique in this school sits on one truth: people buy with emotion and defend it with logic. Sell to the wrong layer and nothing you say lands.",
p:["Nobody buys pest control — they buy a home that doesn't shame them, a family that isn't bitten, an office that passes inspection. Every purchase serves one of three motives: escaping pain (the strongest — loss aversion means people work twice as hard to avoid losing as to gain), pursuing gain (growth, status, pleasure), or protecting identity ('I'm the kind of person/company that...'). Amateur sellers recite features ('quarterly perimeter treatment'); professionals sell the motive ('you'll never see one in the kitchen again — and if you do, we come back free'). The bridge is benefit language: feature → so what? → because → outcome the buyer already wants. Practice the translation until it's automatic: every fact about your offer must end in their world, not yours.",
"Under all of it runs trust, which forms in minutes from small signals: do you look like what you claim to be, do you listen more than you pitch, do you say anything a seller wouldn't say ('honestly, if it's just carpenter ants, the cheaper plan is enough')? That last move — costly honesty — is the fastest trust builder in existence because it proves you'll trade commission for truth. And its dark twin is the fastest destroyer: one caught exaggeration bankrupts everything after it. The old line is right: all things equal, people buy from people they like and trust; all things NOT equal, they still do. Level 1 of this school is learning to be worth trusting at a professional level — the techniques only work loaded on top of that."],
terms:[["Loss aversion","Losses hurt roughly twice as much as gains please — pain motives outsell gain motives."],["Feature vs. benefit","What a thing IS versus what it DOES for this buyer — sell the second."],["Buying motive","Pain, gain, or identity — the emotional job behind the purchase."],["Costly honesty","Advice against your own interest — the fastest trust builder in selling."],["Rapport","The 'people like us' signal — built by listening, mirroring, and genuine interest."]],
ex:"Two reps sell identical alarm systems door-to-door. Rep A leads with the tech: sensors, app, response times — 4% close rate. Rep B asks 'have you heard about the break-ins on the next street?' (pain), listens, then shows exactly one feature — the sign for the yard ('most burglars just skip marked houses') — 11% close rate. Same product; one sold equipment, the other sold not being the house that gets picked.",
mistakes:["Leading with features and hoping the buyer translates them into motives","Pitching gain to a pain buyer (or vice versa) — mismatch reads as not listening","Winning the demo and losing the trust with one small exaggeration"],
keys:["Emotion buys, logic justifies — aim at pain, gain, or identity","Translate every feature to a benefit in the buyer's world","Costly honesty builds trust faster than any script","One caught exaggeration destroys everything after it"],
assign:"Rewrite your three main selling points as benefit sentences ending in the customer's world. Then find one honest 'this might NOT be for you' statement you can start using."},
{id:"s2",t:"Prospecting & the Pipeline",q:"sales prospecting pipeline building explained",
learn:["Why pipeline volume — not talent — predicts most sales careers","The pipeline stages and honest math between them","Prospecting rhythms that survive busy weeks"],
why:"The best closer with an empty calendar earns nothing. Prospecting is the unglamorous 80% of selling, and pipeline math is the most honest mirror in the profession.",
p:["A pipeline is your deals arranged by stage: lead → contacted → qualified → presented → negotiating → closed. Each transition has a conversion rate, and multiplying them backward gives the only forecast that matters: if you close 25% of presentations, present to 40% of qualified leads, and qualify 30% of contacts, then $50k of new revenue at $2k average means 25 sales ← 100 presentations ← 250 qualified ← 833 contacts. That arithmetic — not mood, not hope — sets your daily activity target, and the number one cause of bad months is simple: three weeks ago you stopped prospecting because you were busy closing. The fix is rhythm: prospecting blocks (calls, doors, asks) scheduled like customer appointments and never cannibalized, plus the discipline of tracking activity (inputs you control) separately from results (outputs that lag).",
"Sources rank by warmth: referrals close at multiples of cold traffic (and are systematically under-asked-for — the follow-up lesson fixes that), then warm networks, inbound leads from marketing, and finally cold outreach — which still works when it's targeted, relevant, and voluminous (the $100M Leads rule from the Library: judge no channel before 100 real attempts). Qualify ruthlessly and early: a prospect needs the problem, the money, the authority to decide, and a reason to act now — chasing unqualified deals is how pipelines get fat and forecasts get fictional. Prune monthly: a deal that hasn't advanced in 30 days isn't 'in progress,' it's decoration, and the kindest thing you can do for your quota is replace it with a fresh contact."],
terms:[["Pipeline stages","Lead → contacted → qualified → presented → negotiating → closed."],["Conversion math","Stage-to-stage rates multiplied backward from your goal to daily activity."],["Activity vs. results","Inputs you control (contacts, presentations) versus outputs that lag them."],["Qualification","Problem + money + authority + urgency — all four or it's a hobby, not a deal."],["Pipeline decay","Stale deals inflating the forecast — prune anything static 30+ days."]],
ex:"Two pest control reps want 20 new accounts monthly. Rep A 'networks' when he feels inspired; some months 28, some months 6. Rep B knows her math — 20 sales needs 60 quotes needs 150 doors — so 8 doors a day happen before anything else, rain or shine. Her worst month beats his average, and her forecast is boring, which is exactly what forecasts should be.",
mistakes:["Stopping prospecting during busy closing weeks (this month's feast is next month's famine)","Counting unqualified wishes as pipeline","Judging a prospecting channel after five attempts"],
keys:["Pipeline math backward from goal = your non-negotiable daily activity","Referrals and warmth outperform cold — but volume still rules everything","Qualify on problem, money, authority, urgency — early and ruthlessly","Prune stale deals monthly; a static pipeline is a fictional forecast"],
assign:"Compute your own pipeline math: goal revenue ÷ average sale → closes needed → back through your (estimated) conversion rates → daily activity number. Schedule that activity as fixed calendar blocks this week."},
{id:"s3",t:"Discovery: Selling by Asking",q:"sales discovery questions SPIN selling explained",
learn:["Why the seller who asks controls the sale","The SPIN question ladder for bigger deals","Listening techniques that surface the real problem"],
why:"Amateurs pitch, professionals diagnose. The discovery conversation is where big sales are actually won — usually before any presentation begins.",
p:["The counterintuitive research finding (35,000 calls — the SPIN study in your Library): in significant sales, top performers pitch LESS and ask MORE. The buyer who articulates their own problem, in their own words, at their own size, has sold themselves — your pitch merely confirms. The SPIN ladder: Situation questions establish context ('how many locations?') — necessary but boring, minimize them by researching first; Problem questions surface pain ('where do the callbacks come from?'); Implication questions grow the pain to true size ('what does a failed health inspection cost you — the fine, or the headline?'); Need-payoff questions let the buyer state the value ('if the contract guaranteed inspection-pass, what would that be worth?'). Walk the ladder and the buyer builds your business case for you.",
"The skill under the questions is listening — actual listening, not reload-while-they-talk. Follow the thread ('you said mornings are chaos — tell me more about that'), tolerate silence (people fill it with truth), label what you hear (the Voss technique: 'sounds like the last company burned you'), and take notes visibly — it signals their words matter and builds your proposal's exact language. Discovery also disqualifies: sometimes the honest ladder reveals a problem too small to justify your price, and saying so ('honestly, at two callbacks a year, I'd keep what you have') costs one deal and builds the reputation that wins ten. End every discovery with a summary in their words and an agreed next step with a date — the 'advance' that separates progress from pleasant chats."],
terms:[["SPIN","Situation, Problem, Implication, Need-payoff — the question ladder for bigger sales."],["Implication question","'What does that problem cost you?' — grows pain to its true size."],["Need-payoff","The buyer states the value of solving it — self-persuasion beats pitching."],["Labeling","Naming the emotion or situation you hear — proves listening, deepens truth."],["Advance","A concrete, dated next step — the only proof a sales call succeeded."]],
ex:"Selling a commercial contract to a restaurant, a rep skips the pitch: 'Walk me through your last inspection.' (Situation.) 'Where do you see activity?' (Problem — dumpster corridor.) 'If an inspector saw that on a Friday night, what happens to the weekend?' (Implication — the owner goes quiet, then talks for four minutes about a competitor's shutdown.) 'If that door was guaranteed clean, what's that worth?' (Need-payoff.) The owner names a number 40% above the rep's planned quote. The proposal writes itself — in the buyer's words.",
mistakes:["Presenting solutions before the problem is sized (premature pitching)","Asking situation questions you could have researched — it reads as laziness","Ending calls with 'I'll follow up' instead of a dated advance"],
keys:["The buyer who states the problem and value has sold themselves","Climb SPIN: context → pain → cost of pain → value of relief","Listen with follow-ups, labels, and silence — notes visible","Every call ends in an advance (dated next step) or a disqualification"],
assign:"Write a full SPIN question set for your main offer — two questions per rung. Run it on your next real prospect (or the AI tutor role-play) and note where they started selling themselves."},
{id:"s4",t:"Presenting & Handling Objections",q:"handling sales objections techniques price objection",
learn:["Structuring a pitch as their story, not your catalog","The four-step objection framework","Why objections are buying signals in disguise"],
why:"Most 'presentation problems' are discovery problems, and most objections are requests for help justifying a yes. Handle both calmly and closing becomes almost administrative.",
p:["A professional presentation is discovery played back: their problem, at the size they named, solved specifically ('you said Friday inspections are the nightmare — here's the guarantee that kills that risk'), with proof (the neighbor's result, the review, the before/after) and one clear recommendation. Not three options and a shrug — one recommendation with a reason, plus a downgrade path if budget truly forces it. Presenting to groups, sell each person their own motive: the owner hears margin, the manager hears fewer callbacks, the front desk hears fewer angry calls. And keep it shorter than feels safe: every minute past 'enough' is a minute for doubts to rehydrate.",
"Objections then arrive — and they're good news: people don't argue with offers they've dismissed. The four steps: (1) Agree and soften — never fight ('totally fair question'); (2) Isolate — 'if we solved the price piece, is anything else in the way?' (this flushes the REAL objection; price is often camouflage for trust or authority); (3) Reframe against the motive — price objections die under cost-of-problem math from your implication questions ('the plan is $89/month; you said one bad inspection weekend costs $6,000'); stall objections ('let me think') die under gentle honesty ('usually when someone says that, something specific is bothering them — what is it?'); (4) Confirm and advance — 'does that settle it?' then move. Prepare the top five objections in writing — you already know what they are — and rehearse until your voice carries zero defensiveness, because tone, not logic, is what objection handling actually tests."],
terms:[["Playback presentation","Pitching their problem and words back with your solution attached."],["Isolate the objection","'If we solve X, is anything else in the way?' — smokes out the real one."],["Reframe","Repricing the objection against the cost of the problem they named."],["Camouflage objection","Price or 'think about it' masking trust, authority, or fear."],["Proof stack","Reviews, references, guarantees, before/afters — borrowed trust on demand."]],
ex:"'$89 a month is steep.' The rep doesn't flinch: 'Totally fair. If price felt right, anything else in the way?' — 'Well… does it actually work on roaches?' There it is: efficacy, not price. Ten minutes on the guarantee and two neighbor references later, the account signs AT full price. Had he discounted at the first mention of money, he'd have paid $20/month forever to solve the wrong objection.",
mistakes:["Discounting at the first price objection instead of isolating the real one","Presenting features skipped in discovery ('while I'm here, we also do…')","Arguing — winning the debate and losing the buyer"],
keys:["Present their story back: problem, size, specific solution, proof, ONE recommendation","Agree → isolate → reframe → advance: the four-step objection loop","Most objections are requests for justification, not rejection","Write and rehearse your top five — calm tone is the real technique"],
assign:"List your five most common objections and script the four-step response to each. Rehearse aloud until the agree-and-isolate feels natural, then use one this week."},
{id:"s5",t:"Closing Without Cringe",q:"closing techniques sales asking for the sale",
learn:["Why closing is a process checkpoint, not a magic phrase","Five clean closes and when each fits","Creating honest urgency without manipulation"],
why:"More sales are lost to never asking than to asking badly. If the previous lessons were done, closing is just helping a convinced person cross the finish line.",
p:["Reframe closing: it's not tricking a no into a yes — it's the natural checkpoint after motive, fit, and objections have been handled. Ask early and casually with trial closes ('how does this land so far?', 'which of the two plans feels more like you?') — these thermometer checks tell you whether to advance or return to discovery, and they make the final ask unsurprising. The clean closes: the direct ('shall we get you started?') — underrated, respectful, use it more; the alternative ('Tuesday or Thursday for the first service?') — assumes yes, offers control; the summary close (recap agreed benefits, then ask); the assumptive walk-through ('so first visit, we do the full perimeter…') — proceed until resistance; and the takeaway ('honestly, the smaller plan might be all you need') — paradoxically powerful because it proves you're not desperate. Match the close to the buyer's temperature; never stack three on a cold one.",
"Urgency: real deadlines move humans, so use true ones (the crew's in the neighborhood Thursday; the founding-member price ends with the month) and NEVER fake ones — fake scarcity discovered retroactively converts a customer into a critic. After the ask comes the hardest skill in the chapter: silence. The first person to speak after a closing question usually concedes; count seams in the ceiling if you must. On yes: stop selling immediately (post-agreement chatter reopens closed decisions), confirm logistics, and set the next touch. On no: get the real reason gracefully ('no problem — for my own learning, what was the deciding factor?'), because today's no with respect intact is next quarter's yes, and the answer is free coaching. Track your closes-asked per presentation for a month; most sellers are shocked how often they simply… never asked."],
terms:[["Trial close","Low-stakes temperature checks throughout — 'how does this land?'"],["Alternative close","Choice between two yeses — 'Tuesday or Thursday?'"],["Takeaway close","Reducing the offer or stepping back — desperation's opposite, oddly magnetic."],["False scarcity","Fake deadlines — short-term wins that manufacture long-term critics."],["Closing silence","After the ask, the first to speak concedes — hold it."]],
ex:"A car wash membership kiosk team A pitches beautifully and ends with '…so, any questions?' — 9% conversion. Team B pitches identically but ends with 'want me to set you up on the $25 unlimited so today's wash is basically free?' then waits, smiling, in silence — 24% conversion. The product, price, and script were identical. The only variable was asking, cleanly, and shutting up.",
mistakes:["Presenting forever and never actually asking","Talking past the yes and reopening the decision","Manufacturing fake urgency that surfaces later"],
keys:["Trial-close throughout; the final ask should surprise no one","Direct, alternative, summary, assumptive, takeaway — match to temperature","Real urgency only — fake scarcity creates critics","Ask, then silence: the first speaker concedes"],
assign:"Pick two closes that fit your style, script them word-for-word, and count this week: presentations given versus closes actually asked. Close the gap before improving anything else."}
]}
]},
{id:"S2",name:"Sales as a System",tagline:"Level 2",desc:"D2D, B2B, follow-up machines, metrics, and running a team",modules:[
{name:"Channels & Machines",lessons:[
{id:"s6",t:"Door-to-Door Mastery",q:"door to door sales tips techniques mastery",
learn:["The D2D funnel and its brutal, liberating math","The first eight seconds: pattern interrupts and posture","Territory, timing, and the mental game of doors"],
why:"D2D is the highest-rep, fastest-feedback sales training on earth — and the engine behind pest control, solar, and alarm empires. Master doors and every other channel feels easy.",
p:["Doors are pure funnel: knock enough, talk enough, pitch enough, close enough. A working rep might knock 80, converse with 30, pitch 12, close 2-3 — meaning 77 of 80 doors 'fail,' and that arithmetic is the liberation: rejection isn't feedback about you, it's the machine operating normally, and the only fatal error is stopping. The first eight seconds decide everything: homeowners answer with a no already loaded, so don't look or sound like their mental image of a salesman — relaxed posture, slight angle to the door (non-confrontational), lead with the neighborhood not the product ('hey — I'm the one doing the Hendersons' place across the street; while the crew's out here…'). That pattern interrupt (you're 'the neighborhood guy,' not 'a salesman') plus social proof by name is half of D2D in one sentence.",
"Territory craft: work turfs by density (the route-economics lesson — every close within walking distance compounds), track every door's disposition (not-home gets revisited at a different hour; a 'no' today is a 'not yet' with new info next season), and respect golden hours (17:00-19:30 weekdays; Saturday late morning). Timing beats talent. The mental game is the real curriculum: set activity goals you fully control (doors, conversations) rather than outcome goals that depend on strangers' moods; gamify streaks; debrief the day's best conversation and worst one — one lesson from each. And carry the champion's secret: the next door has never heard a pitch today. Every knock is a fresh 100%, and reps who internalize that outperform 'talented' mopers by double, forever."],
terms:[["Pattern interrupt","Breaking the expected salesman script in the first seconds — neighbor, not vendor."],["Turf density","Working closes into walkable clusters — the D2D version of route economics."],["Disposition tracking","Logging every door's outcome for systematic revisits."],["Golden hours","When decision-makers answer: weekday evenings, Saturday late morning."],["Activity goals","Targets you fully control (doors, conversations) — the sane rep's scoreboard."]],
ex:"Two summer reps, same product, same neighborhood. Rep A knocks when inspired, pitches identically to everyone, quits turfs after four nos. Rep B hits 80 doors on schedule, opens with the street's actual install ('just wired the blue house on the corner'), logs every disposition, and re-hits not-homes at 6 pm. Season totals: 41 accounts versus 137. Their managers called it talent; it was arithmetic plus eight seconds.",
mistakes:["Taking rejection personally and slowing down (the death spiral)","Pitching the product before establishing 'neighborhood' context","Ghosting turfs after a bad hour instead of returning at a better one"],
keys:["The funnel math IS the job: doors in, deals out, rejection is machinery","Win the first eight seconds: posture, neighborhood frame, social proof by name","Track dispositions and re-work turfs at different hours","Score yourself on activity you control; the next door is always a fresh 100%"],
assign:"Design your own eight-second opener using the neighbor frame and one piece of local social proof. Test it on 20 real doors (or role-play 20 reps with the AI tutor) and log dispositions."},
{id:"s7",t:"B2B Selling: Committees, Cycles & Contracts",q:"b2b sales process explained enterprise selling basics",
learn:["How B2B differs: multiple buyers, longer cycles, rational wrappers","Mapping the buying committee and finding your champion","Proposals, pilots, and procurement without tears"],
why:"Business buyers sign bigger, longer, stickier contracts — but the game changes: you're not convincing a person, you're helping a champion convince an organization.",
p:["B2B's three differences: multiple stakeholders (the user who feels the pain, the economic buyer who owns the budget, the technical/compliance gatekeeper, and often a procurement office whose job is squeezing you), longer cycles (weeks to months — sustained by the advances from your discovery lesson), and rational wrappers (companies buy on ROI cases… assembled by humans with careers to protect, so the emotional layer remains: nobody gets fired for the safe choice, which means your real competitor is usually 'do nothing'). Map the committee early: ask directly 'who else touches this decision?' and 'what's the process after you say yes?' — buyers respect process questions, and the answers ARE the sale's roadmap.",
"Your key asset is the champion: the insider who wants your solution and sells it in rooms you'll never enter. Arm them — one-page ROI summary in the company's numbers (their labor rates, their callback counts), objection answers for their boss, a pilot proposal that makes saying yes small. Pilots and land-and-expand beat big-bang closes: a 90-day trial on one location converts risk into evidence, and the expansion sells itself on internal data. Proposals: price in options (good/better/best — anchoring works on committees too), lead with their problem in their words (playback, from s4), and keep the legal surface small. With procurement, hold the line politely: concede on terms that cost you little (payment timing, review clauses) and defend price with the ROI math your champion already sold. B2B rewards the organized: your CRM notes, committee map, and dated next steps are the actual product of each week."],
terms:[["Economic buyer","The person whose budget signs — often not the person you talk to most."],["Champion","Your internal seller — arm them to win rooms you can't enter."],["Do-nothing competitor","Inertia and risk-aversion — usually the real rival, not another vendor."],["Land and expand","Small pilot → internal evidence → organization-wide contract."],["Good/better/best","Tiered proposals that anchor price and give committees a choice besides no."]],
ex:"A commercial pest company chases a 40-location restaurant group for months of pleasant lunches with a regional manager — who, it turns out, can't sign anything. Reset: they ask the process question, find the economic buyer (VP Ops), arm the regional manager as champion with a one-pager (callback costs per location in the group's own numbers), and propose a 3-location, 90-day pilot. Pilot data shows 70% fewer complaints; the VP signs all 40 locations on the champion's recommendation. Same relationship — pointed at the right person, with small yeses first.",
mistakes:["Spending months with friendly people who can't sign","Proposing the full rollout when a pilot would remove the risk objection","Letting procurement negotiate price before value was established with the buyer"],
keys:["Map the committee: user, economic buyer, gatekeepers, procurement","Find and arm a champion — they sell when you're not in the room","Pilots convert risk into internal evidence; land, then expand","Concede cheap terms, defend price with the ROI case"],
assign:"For one real or imagined B2B target, draw the committee map (names, roles, motives), identify your champion, and draft the one-page ROI summary you'd arm them with."},
{id:"s8",t:"Follow-Up, Referrals & the Boring Fortune",q:"sales follow up referrals system",
learn:["Why the fortune is in the follow-up (and the math that proves it)","Building a follow-up machine that runs without willpower","Turning happy customers into a referral engine"],
why:"Most sellers quit after one or two touches; most sales close after five or more. The gap between those numbers is where careers and companies quietly get rich.",
p:["The uncomfortable data: a large share of leads never get a second touch, while meaningful B2B and considered-purchase closes typically need five to twelve. Every 'no' has a subtype — no forever, no for now, no to this version, no because bad timing — and only the first is final. The machine: every lead gets a next action with a date, forever, until they buy, die, or unsubscribe; sequences mix channels (call, text, email, drop-by) and escalate value rather than repeat 'just checking in' (the emptiest phrase in sales — always bring something: a relevant result, a seasonal reason, a price-lock expiring, a neighbor's project). Automate the skeleton with your CRM's tasks and templates, personalize the top: the fortune isn't in blasting, it's in showing up the week their contract with your competitor annoys them — which only happens if you're still showing up.",
"Referrals are follow-up's compounding sibling — the highest-converting, lowest-cost channel in existence, and almost nobody asks systematically. The ask has a formula: right moment (peak happiness — the day the problem visibly died, the compliment, the five-star review), specific request ('who on your street deals with the same ants?' beats 'know anyone?'), and easy mechanics (you draft the text they forward; you offer the intro call). Reward both sides (a free month each) and report back ('your neighbor's all set — thank you'). Then close the loop into reviews: the same happy-moment ask feeds the Google profile that feeds inbound leads. Referral rate and review velocity are management numbers, not luck — put them on the scorecard next to revenue and watch the boring fortune accumulate."],
terms:[["Touch cadence","The scheduled sequence of follow-up contacts across channels."],["Value-add touch","Every contact brings a reason — result, season, deadline — never 'just checking in.'"],["No-subtypes","Forever / for now / this version / bad timing — only one is final."],["Peak-happiness ask","Requesting referrals at the moment of visible success."],["Referral mechanics","Specific ask + drafted message + two-sided reward + loop closed."]],
ex:"A carpet-cleaning owner audits his CRM: 340 quotes from the past year with zero follow-up after the first week. He builds a five-touch sequence (day 3 call, day 10 text with a before/after photo, day 30 seasonal offer, day 60 'neighbor discount', day 90 review ask) and works the old list. Forty-one jobs close from 'dead' leads — $38,000 — from people who mostly said 'perfect timing.' Nothing about the business changed except remembering to show up.",
mistakes:["Quitting at two touches because 'they'd call if interested'","Following up with 'just checking in' instead of new value","Asking for referrals vaguely, at random times, with no mechanics"],
keys:["Every lead has a dated next action until buy/die/unsubscribe","Five-plus value-bearing touches is where considered sales actually close","Ask for referrals at peak happiness, specifically, with drafted mechanics","Referral rate and review velocity are managed numbers — scoreboard them"],
assign:"Write your five-touch sequence (channel + value for each) and send touch one to ten stale leads today. Separately, make two peak-happiness referral asks this week using the formula."},
{id:"s9",t:"Sales Metrics & the CRM Truth Machine",q:"sales metrics kpis crm pipeline management",
learn:["The handful of numbers that run a sales operation","CRM discipline that makes forecasts real","Diagnosing a revenue problem to its exact stage"],
why:"You can't coach 'sell more.' You can coach 12 more doors a day, a 5-point close rate gap, or a stalled stage — but only if the numbers exist and don't lie.",
p:["The operating dashboard, per rep and team: activity (contacts/doors/calls — the input), conversion by stage (contact→appointment, appointment→quote, quote→close — the skill readout), average deal size, sales cycle length, and pipeline coverage (open qualified pipeline ÷ target — below ~3× means a thin month is already scheduled). Add channel CAC from the marketing lessons and revenue-per-rep and you can diagnose any revenue miss to its exact organ: activity down = effort or territory problem; early conversions down = targeting or opener problem; quote→close down = pricing, discovery, or closing problem; everything fine but revenue down = deal size or cycle stretch. 'Sell more' becomes a specific, coachable sentence — that's the entire point of measurement.",
"The CRM is where truth lives or dies, and it dies by three diseases: fields nobody fills (cure: track only what you'll act on — five fields honestly beaten beats thirty abandoned), stages that mean different things to different reps (cure: exit criteria in writing — 'qualified' means budget+authority+need+timeline confirmed, not 'seemed nice'), and happy-ears forecasting (cure: stage probabilities from YOUR historical data, not optimism — deals stuck 2× normal cycle length get auto-downgraded). Run the weekly pipeline review as a coaching ritual, not an interrogation: every deal gets a next action and a date; every stuck deal gets a diagnosis; every lost deal gets thirty honest seconds ('what would have won it?'). Reps maintain what managers actually use — the fastest way to a clean CRM is visibly running the business from it."],
terms:[["Pipeline coverage","Open qualified pipeline ÷ target — under ~3× forecasts a thin month."],["Stage exit criteria","Written definitions of what earns each pipeline stage — kills happy ears."],["Conversion by stage","The skill readout: where deals thin out is where coaching goes."],["Revenue per rep","Total revenue ÷ sellers — the productivity line comp plans must respect."],["Weekly pipeline review","The ritual: every deal, a next action and a date; every stall, a diagnosis."]],
ex:"A pest company misses target three straight months. Feels like 'the market.' The new dashboard says otherwise: doors and appointments normal, quotes normal — quote→close crashed from 31% to 18% in exactly the weeks a price increase shipped without objection-handling training. Two role-play sessions on the new price's value math and the close rate recovers in three weeks. 'The market' was one untrained sentence at one stage.",
mistakes:["Tracking thirty fields nobody maintains instead of five that get used","Letting each rep define 'qualified' privately","Forecasting from optimism instead of stage-weighted history"],
keys:["Activity, stage conversions, deal size, cycle, coverage — the whole dashboard","Diagnose misses to a stage; coach the stage, not the slogan","Exit criteria + your own historical probabilities = honest forecasts","The CRM stays clean when the business visibly runs from it"],
assign:"Build the five-number dashboard for yourself or your team for the last 60 days. Find the weakest stage conversion and write one specific coaching action for it."},
{id:"s10",t:"Building & Running a Sales Team",q:"how to build manage sales team compensation",
learn:["Hiring for drive and coachability over 'natural talent'","Comp plans that align rep wealth with company health","Rhythms and culture that keep closers closing"],
why:"One great rep is income; a system that reliably makes average people good and good people great is an asset — the difference between owning a job and owning a machine.",
p:["Hiring: past behavior beats interview charm (the Who scorecard method from your Library — define the outcomes: e.g., '20 new recurring accounts/month by month four'), and for sales specifically, audition rather than interview: role-play a pitch cold, coach them once, role-play again — the delta between attempts is coachability, the single best predictor you can observe. Onboard with a ride-along ladder (watch → assist → lead with observation → solo with review) and scripts as training wheels: word-for-word at first, framework later — champions internalize structure, then improvise. Expect and design for the funnel truth of hiring itself: not every hire makes it, so hire in pairs where possible (cohort energy, instant benchmark) and decide fast at 60-90 days on activity + coachability, not just results.",
"Compensation is strategy in math: base + commission balanced to the sale's cycle (heavy commission for short-cycle D2D; more base where cycles run long), paid on COLLECTED revenue (or clawed back on 90-day cancels — otherwise you're paying bonuses on churn, the classic summer-sales disease), with accelerators above target (the best should earn embarrassing amounts — capping commission is firing your top rep in slow motion) and spiffs for strategic behavior (recurring contracts over one-times, new territory, reviews collected). Management rhythm: daily standup (yesterday's numbers, today's plan, one obstacle), weekly one-on-ones on the dashboard's weakest stage, monthly role-play (the practice nobody wants and everybody needs), and a leaderboard that celebrates activity AND results — culture eats comp plans, and the culture you want is 'we do the boring inputs, we ring the bell for wins, and nobody eats alone.' Fire fast on integrity, coach hard on skill, and remember the manager's law: your job stopped being selling; it's building people who sell."],
terms:[["Audition hiring","Role-play → coach → role-play again; the delta is coachability."],["Ride-along ladder","Watch → assist → lead → solo: onboarding with feedback at every rung."],["Collected-revenue comp","Commissions paid when cash arrives (or clawed back on quick cancels)."],["Accelerators","Higher rates above target — never cap your best rep's upside."],["Spiff","A targeted bonus steering strategic behavior (recurring contracts, reviews)."]],
ex:"A pest owner builds his first real team: hires two reps at once by audition (one 'natural' interviewer flops the second role-play and isn't hired), pays 40% commission on collected recurring revenue with a 90-day clawback, runs daily standups and Friday role-plays. Year one: both reps out-produce the owner's best solo year, cancels stay under 8% because commissions cared about retention, and the owner sells… nothing. He built the machine instead. That's the promotion.",
mistakes:["Hiring the smooth interviewer over the coachable grinder","Paying commission on booked revenue and funding churn bonuses","Capping commissions — punishing exactly the person you most need"],
keys:["Audition for coachability; onboard on the ride-along ladder","Comp = strategy: collected revenue, clawbacks, accelerators, spiffs","Daily numbers, weekly coaching, monthly role-play — rhythm is management","Your output is no longer sales; it's salespeople"],
assign:"Draft a one-page comp plan for your (current or future) first rep: base, commission on collected, clawback terms, one accelerator, one spiff. Sanity-check it with the Commission Planner tool."}
]}
]}
