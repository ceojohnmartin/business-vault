DATA.push({id:"mkt",name:"Marketing School",tag:"Demand Is Manufactured",intro:"Sales converts the person in front of you; marketing decides who shows up, already half-convinced. Two levels: the foundations (customer, positioning, offer, message) and the growth machine (funnels, ads, content, retention, analytics). Every lesson applies to a lemonade stand and a rollup alike.",levels:[
{id:"K1",name:"Marketing Foundations",tagline:"Level 1",desc:"Customer, positioning, offer, message — the thinking that makes every channel work",modules:[
{name:"The Foundations",lessons:[
{id:"mk1",t:"What Marketing Actually Is",q:"what is marketing explained simply small business",
learn:["The real definition: getting the right message to the right people at the right moment","Why marketing multiplies sales instead of replacing it","The market → message → medium order that beginners get backwards"],
why:"Most small businesses don't fail from bad service — they fail invisible. Marketing is the difference between the best-kept secret in town and the default choice in town.",
p:["Simple version: marketing is everything you do to make the right people know you exist, want what you sell, and trust you enough to reach out — BEFORE any salesperson speaks. If sales is the conversation at the door, marketing decides how many doors open and how warm the person behind each one already is. It isn't logos, and it isn't 'getting your name out there' — a name floating in space earns nothing. It's a system with one job: manufacture demand you can measure. Every piece of it can be judged by a number (leads, cost per lead, customers, cost per customer), which means marketing is closer to accounting than to art. Businesses that treat it as art buy pretty things; businesses that treat it as arithmetic buy customers.",
"Deep version: every marketing decision is three questions asked in strict order. MARKET: who exactly has the problem, how badly, and what are they already doing about it? MESSAGE: what words make that person feel understood and see your offer as the obvious next step? MEDIUM: where do those people already look, so the message actually reaches them? Beginners invert the order — they pick a medium first ('we should be on TikTok'), then improvise a message, and never define the market at all. That's why their marketing 'doesn't work.' Run the order correctly and even a mediocre channel performs, because the right person is hearing the right words. This school's entire structure follows that order: customer and positioning first (market), offers and copy second (message), channels and funnels last (medium). Master the sequence and you can market anything; skip it and you'll blame the platforms forever."],
terms:[["Marketing","The system that makes the right people know, want, and trust you — measured in leads and customers, not applause."],["Market → message → medium","The strict order of marketing decisions: who, then what words, then which channel."],["Demand generation","Activity that creates want where attention already exists — the manufacturing of customers."],["Lead","A person who raised their hand — called, formed, messaged — and can now be sold to."],["Cost per lead (CPL)","Marketing spend ÷ leads produced; the first honest number in any campaign."]],
formulas:[["CPL = Spend ÷ Leads","Judge every channel by it — opinions lie, CPL doesn't."],["CAC = Spend ÷ New customers","What a customer costs to acquire; must sit far below lifetime value."]],
ex:"Two identical pizza shops open across the street from each other. Shop A spends $800/month 'getting the name out' — a billboard nobody can act on. Shop B spends $800 on: a launch offer mailed to the 2,000 nearest households, a Google profile with 40 reviews in month one, and a text club taking orders. A's owner says marketing doesn't work in this town. B does $31k/month by month six. Same product, same street — one bought visibility, the other built a demand system.",
exx:[["Small business","A mobile detailer stops posting random shine videos and instead runs the order: market = SUV moms at two school pickups; message = 'kid-proof your interior in 90 minutes, while you're at work'; medium = the two school Facebook groups. Books out three weeks."],
["Car wash","An express wash realizes its market isn't 'everyone with a car' — it's the 4,000 commuters passing daily at 5pm. Message: 'clean car in 3 minutes without leaving your seat.' Medium: the road itself — signage and a $10 first-month membership banner. Marketing budget: paint."],
["Pest control","Market: homeowners who just saw ONE roach (peak fear moment). Message: 'seen one? There are more — free same-week inspection.' Medium: Google search ads on 'roach in kitchen [city]' — reaching people at the exact minute of the problem."],
["Real estate","A small landlord marketing a rental defines market (nurses at the hospital 6 minutes away), message ('walk to your shift — 4 nurses live in this building already'), medium (the hospital's housing board). Vacancy fills in 5 days at full rent."],
["Acquisition","A buyer reads a target's books and finds zero marketing spend with steady revenue — all word of mouth. That's not a weakness, it's the upside thesis: proven service + first real demand system = growth the seller never priced in."]],
mistakes:["Choosing channels before defining the customer and message (medium-first marketing)","Measuring marketing in impressions and likes instead of leads and CAC","Copying a competitor's marketing without knowing if it even works for them"],
keys:["Marketing manufactures measurable demand — it's arithmetic wearing a creative costume","Always in order: market → message → medium; inverting it is why 'marketing doesn't work'","Judge everything by CPL and CAC against customer lifetime value","Sales converts demand; marketing decides how much demand exists to convert"],
assign:"For your business (or one you know): write one sentence for each — the exact market, the message that would make them feel understood, and the single medium where they already look. Then compute last month's true CPL if any money was spent.",
check:["I can define marketing in one sentence without the word 'brand'","I can state my market, message, and medium in that order","I know my current CPL and CAC (or know they're unmeasured)","I can explain why medium-first marketing fails"],
books:["100m-leads","sci-advertising"]},
{id:"mk2",t:"Know Your Customer Cold",q:"customer avatar research target market small business",
learn:["Building a customer avatar from evidence, not imagination","The jobs-to-be-done lens: what customers actually hire you for","Where to find the exact words customers use (and why their words beat yours)"],
why:"Every marketing decision downstream — offer, copy, channel, price — is a guess until you know precisely who you're talking to. Talk to everyone and you persuade no one.",
p:["Simple version: your customer is not 'anyone who needs pest control.' Your best customer is a specific human — a 38-year-old homeowner with kids, terrified of what she saw in the pantry, who Googles at 11pm and wants it handled without her husband saying 'I'll deal with it this weekend' for the fourth week. When you can see one person that clearly, everything gets easier: you know what to say (her fear, not your chemicals), where to say it (her late-night search, her school-mom group), and what to charge (peace of mind prices differently than squirt-some-spray). The avatar isn't a marketing exercise — it's the compression of everything you know about who actually pays you, why, and happily.",
"Deep version: build the avatar from evidence, not brainstorming. Three sources. (1) Your own data: pull your ten best customers (highest value, least hassle, most referrals) and find what they share — neighborhood, life stage, trigger event, how they found you. (2) Their words: read your reviews and your competitors' reviews (five-star AND one-star), the local Facebook group threads, the questions people ask before buying — and write down exact phrases, because copy written in the customer's own words outperforms copy written in yours (that's the whole Mom Test discipline pointed at marketing). (3) The job-to-be-done: customers don't buy a quarterly pest plan, they hire it to never think about bugs again; they don't buy a car wash membership, they hire it to feel like a person who has life handled. Identify the trigger event (just saw a roach; new baby; new car; just bought a house) because triggers are when buying happens — and marketing aimed at trigger moments massively outperforms marketing aimed at demographics. One page, one avatar, taped above your desk: name, situation, trigger, fear, desired outcome, exact words. Every lesson after this one assumes it exists."],
terms:[["Customer avatar","A one-page, evidence-based portrait of your best customer: situation, trigger, fear, outcome, words."],["Job-to-be-done","What the customer actually hires your product to accomplish in their life — rarely the product itself."],["Trigger event","The moment that flips someone from not-shopping to shopping — where the best marketing aims."],["Voice-of-customer research","Collecting the exact words customers use (reviews, threads, calls) to power your copy."],["Best-customer analysis","Working backward from your 10 most valuable customers to find who to attract more of."]],
ex:"A meal-prep startup markets to 'busy professionals 25-45' for a year — crickets. The founder finally interviews her 12 repeat buyers: 9 are new moms, 4-9 months postpartum, whose trigger was returning to work. New market, new message ('dinner handled during the hardest months'), new medium (two mom groups and a pediatrician's partnership). Same product; revenue triples in a quarter. She wasn't selling food — she was hired to remove one impossible task.",
exx:[["Small business","A house cleaner reads 50 competitor reviews and notices one phrase recurring in five-star reviews: 'I can finally have people over.' That's the job-to-be-done — not clean floors, unashamed hospitality. It becomes her headline and doubles her quote requests."],
["Car wash","Membership data shows the best members live within 2.8 miles and joined within a week of a rain-after-pollen event. Avatar: nearby commuter, trigger: visibly filthy car. The wash schedules its membership pushes to the pollen calendar."],
["Pest control","One-star competitor reviews all scream the same phrase: 'they never called back.' The avatar's real fear isn't bugs — it's being ignored during an emergency. 'Answered by a human in 3 rings, or your first month free' becomes the differentiator."],
["Real estate","A landlord's best tenants (longest stays, cleanest exits) were all relocating medical workers. Instead of listing 'to everyone,' she builds move-in-ready furnished units aimed at that avatar and cuts vacancy from 6 weeks to 6 days."],
["Acquisition","In diligence, a buyer runs best-customer analysis on the target's book: 70% of profit comes from 30% of accounts — all commercial kitchens. The 'residential pest company' is secretly a restaurant-compliance company; the growth plan (and the valuation) changes accordingly."]],
mistakes:["Defining the customer by demographics ('35-55 homeowners') instead of situation and trigger","Writing the avatar from imagination in a conference room instead of evidence and interviews","Serving the customers you WISH you had while ignoring who actually pays you"],
keys:["One vivid, evidence-based person beats a demographic range every time","Customers hire outcomes (the job-to-be-done), not services — market the job","Trigger events are when buying happens; aim marketing at moments, not just people","Their exact words are your best copy — collect them systematically"],
assign:"Build your one-page avatar from evidence: list your 10 best customers, find 3 things they share, read 20 reviews (yours or competitors') and copy down 5 exact customer phrases, and name the trigger event. Tape it up.",
check:["My avatar is one specific person with a name, trigger, and fear","I can quote 5 phrases real customers actually use","I know the job my product is hired to do","I know which trigger event my marketing should ambush"],
books:["mom-test","breakthrough-adv"]},
{id:"mk3",t:"Positioning: Own One Thing",q:"positioning differentiation small business marketing strategy",
learn:["Why the battle is for one word in the customer's mind","Finding a position competitors can't copy","The positioning statement that aligns every future marketing decision"],
why:"In a market where everyone says 'quality service, fair prices, family owned,' the business that stands for ONE specific thing wins by default — because it's the only one the mind can file.",
p:["Simple version: when someone in your town thinks 'pest control,' a name pops into their head. Positioning is the war for that reflex. Minds are crowded and lazy — they file one business per shelf: the cheap one, the fast one, the fancy one, the one with the guarantee. If you don't choose your shelf, the market files you under 'another one of those,' which is the shelf where price-shopping lives. Positioning means picking the one specific thing you will be known for — and having the discipline to say it everywhere, for years, while competitors keep changing slogans. It feels narrow. That's the point: narrow is memorable, and memorable gets the call.",
"Deep version: a defensible position sits at the intersection of three circles — what your avatar deeply wants (from mk2), what you can genuinely deliver better than anyone nearby, and what competitors AREN'T saying. That third circle is where the gold hides: audit every competitor's website and trucks, list every claim, and look for the valuable thing nobody claims. In most local markets, nobody owns 'answers the phone,' 'on time or it's free,' 'the membership one,' or 'the one that shows you photos of the fix' — positions worth their weight in trucks. Write it as a statement: 'For [avatar], we are the only [category] that [specific difference], which means [outcome they want].' Then enforce it: the position decides your headline, your guarantee, your photos, even what you DON'T offer (Positioning's law: line extension dilutes — the wash that also details, also does oil changes, also sells propane stands for nothing). Small companies beat big ones on positioning constantly, because big companies must speak to everyone and you don't. And notice the moat logic from 7 Powers: a position, held consistently for years, becomes switching-cost and brand power that a competitor's discount can't dent — the discount attacks your price, but they can't discount their way onto your shelf in the customer's head."],
terms:[["Positioning","The one specific thing your business owns in the customer's mind — chosen deliberately, held for years."],["Category shelf","The mental slot ('the fast one,' 'the guarantee one') a mind files each business under."],["Competitive claim audit","Listing every claim rivals make to find the valuable position nobody occupies."],["Positioning statement","'For [avatar], the only [category] that [difference], so [outcome]' — the sentence that aligns everything."],["Line extension trap","Adding offerings that blur the position — standing for everything means standing for nothing."]],
ex:"Domino's didn't claim best pizza — it owned '30 minutes or it's free' and built an empire on a delivery promise while rivals argued about sauce. Decades later, in every market, the same move is available: FedEx owned 'overnight,' Volvo owned 'safety,' and the local plumber who owns 'tonight, or the visit is free' takes the emergency calls that pay triple. The winners rarely claimed better — they claimed DIFFERENT, specifically, first.",
exx:[["Small business","Three lawn companies say 'reliable, affordable, insured.' The fourth says one thing: 'Your lawn mowed every Friday. Every Friday.' Same mowers. But 'the Friday one' is a shelf — and neighbors literally refer to it that way, which is positioning doing the selling."],
["Car wash","Every wash in town claims shine. One positions as 'the 3-minute wash' — signage shows a stopwatch, the tunnel is timed, staff wear it on shirts. Commuters don't compare prices with the $2-cheaper wash across town; that wash isn't on the fast shelf."],
["Pest control","A one-truck operator can't outspend the national brand, so he owns a promise the giant can't make: 'The owner answers every call. Personally.' The position IS the anti-corporate wedge — and every frustrated ex-customer of the giant knows exactly where to file him."],
["Real estate","A property manager positions as 'the landlord-report one': owners get a photo-documented monthly report, guaranteed. Nobody else says it. She charges 2 points more in fees, and owners with one bad ghosting experience switch on that single sentence."],
["Acquisition","A buyer evaluating two similar HVAC companies pays a full extra turn for the one whose trucks everyone recognizes as 'the same-day one' — because a held position is transferable demand, while 'we compete on quality' transfers nothing."]],
mistakes:["Claiming quality/service/family-owned — the three claims every competitor also makes","Changing your position every season instead of enforcing one for years","Extending into everything ('we also do…') until the position blurs into noise"],
keys:["Minds file one business per shelf — pick your shelf or get filed under 'price-shop these'","The winning position lives where avatar desire meets your strength meets competitors' silence","Write the positioning statement; let it discipline every headline, offer, and refusal","Positions compound for years — consistency is the strategy, boredom is the tax"],
assign:"Run the claim audit: list every claim from your 5 nearest competitors' websites. Find the valuable claim nobody makes, and write your positioning statement in the template. Bonus: rewrite your homepage headline (or truck door) to say it.",
check:["I can name the shelf each of my competitors occupies","My positioning statement is written and specific enough to exclude someone","My headline says my position, not 'quality service'","I can name one thing I'll REFUSE to offer to protect the position"],
books:["positioning","7powers","blue-ocean"]},
{id:"mk4",t:"Offers: The Deal That Sells Itself",q:"irresistible offer creation marketing value proposition",
learn:["The value equation that makes offers feel obvious","Risk reversal: guarantees that move the fearful middle","Packaging, naming, and price framing that multiply response"],
why:"The same service, packaged as a better deal, can triple response with zero extra ad spend. The offer is the highest-leverage sentence in all your marketing.",
p:["Simple version: an offer is the deal you put in front of the market — what they get, what it costs, what happens if it disappoints. Most businesses don't have an offer; they have a price list ('pest control: $89/quarter'). An offer stacks the deal until saying no feels like the risky choice: 'The Year-Round Shield: quarterly protection + free re-service between visits if you see ANYTHING + your first treatment free if we're ever late. $89/quarter.' Same service. The difference is the customer can now see the outcome, feel the safety, and remember the name. Amateurs improve their service hoping people notice; operators improve the OFFER so people act.",
"Deep version: the value equation (from $100M Offers in your Library) says perceived value = (dream outcome × likelihood it works) ÷ (time to result × effort required). Raise the top, shrink the bottom. Dream outcome: name what they actually want (mk2's job-to-be-done) — 'never think about bugs again,' not 'quarterly perimeter treatment.' Likelihood: proof (reviews, before/afters, local names) and the heavyweight — risk reversal: a bold, specific guarantee transfers the risk from buyer to seller, and because your service actually works, it costs little and converts the skeptical middle third of the market who'd otherwise 'think about it.' Time and effort: same-week slots, 3-minute booking, we-handle-everything language. Then package: bundle into named tiers (naming creates a thing that can be asked for and referred), anchor with a premium option (the $189 'Total Home Shield' makes $89 feel reasonable — the pricing psychology from your sales lessons), and add honest urgency (founding price for the first 50; season deadline). Every element must be true — an offer is a promise with math behind it, and the math is your gross margin lesson: build the guarantee's cost into the price, and the price into the value story. One warning from the field: never fix a weak offer with a discount. Discounts subtract price; offers add value — the first trains bargain hunters, the second builds a book of believers."],
terms:[["Offer","The complete deal — outcome, package, price, guarantee, name — not just a price."],["Value equation","(Dream outcome × likelihood) ÷ (time × effort) — the four levers of perceived value."],["Risk reversal","A specific guarantee moving risk from buyer to seller — converts the fearful middle."],["Price anchoring","A premium option that makes the target option feel obviously reasonable."],["Named package","An offer with a name — referable, memorable, and immune to line-item price shopping."]],
formulas:[["Guarantee cost = claims rate × cost per claim","Price the guarantee like an insurer; if your service is good, it's the cheapest converter you own."]],
ex:"Two gyms sell the same $49/month. Gym A's sign: 'Memberships $49.' Gym B's: 'The 6-Week Reset: full plan + 3 trainer sessions + all classes — finish the 6 weeks and hate it, we refund every dollar.' Also $49/month. B's front desk stays busy while A's owner concludes the neighborhood 'doesn't care about fitness.' The market didn't change; the deal did.",
exx:[["Small business","A tutor charging $60/hour repackages: 'The Report-Card Turnaround — 12 sessions + parent updates + a grade improvement or 4 free sessions.' Same hourly math, but parents aren't buying hours; they're buying the outcome with a safety net. Referrals ask for it by name."],
["Car wash","'$25/month unlimited' becomes 'The Always-Clean Club: unlimited washes + free towel service + rainy-day rewash — cancel anytime with two taps.' The rewash guarantee kills the #1 objection ('what if it rains?') for pennies, and cancel-anytime removes the fear of joining."],
["Pest control","The re-service guarantee ('see anything between visits, we return within 48 hours, free') is the entire offer — it converts fear of paying-and-still-seeing-bugs into safety, and its real cost is 3% of accounts using it twice a year."],
["Real estate","A landlord's listing becomes an offer: 'Move-in Monday: approved by Friday, keys Monday, first month half off with a 14-month lease.' The anchor (14 months) buys occupancy math that beats the discount, and the name makes it shareable."],
["Acquisition","A buyer's LOI is an offer built on the same equation: the seller's dream outcome (retirement, legacy, team protected) × likelihood (proof of funds, lender letter) ÷ time (60-day close) and effort (you handle diligence logistics). Buyers who package this win against higher bids — the sales school's aq5 lesson is mk4 wearing a suit."]],
mistakes:["Selling a price list instead of a packaged, named, guaranteed deal","Fixing weak response with discounts instead of adding value to the offer","Making guarantees vague ('satisfaction guaranteed') instead of specific and bold"],
keys:["Value = (outcome × likelihood) ÷ (time × effort) — engineer all four levers","A specific, bold guarantee is the cheapest conversion tool an honest business owns","Name the package; anchor with a premium tier; use only true urgency","Discounts subtract; offers add — never confuse them"],
assign:"Rebuild your core service as a named offer: outcome-based name, one bonus, one specific guarantee, one premium anchor tier. Write it as the exact sentence a customer would hear. Compute what the guarantee would actually cost you at a realistic claim rate.",
check:["My core service has a name a customer could ask for","My guarantee is specific enough to feel risky (and priced so it isn't)","I have a premium anchor above my target offer","I can state my offer in under 15 seconds"],
books:["100m-offers","influence"]},
{id:"mk5",t:"Copywriting: Words That Move Money",q:"copywriting basics headlines small business ads",
learn:["The hierarchy: headline, then proof, then everything else","Writing to one person in their own words at their awareness stage","Formulas that work (PAS, AIDA) and why specifics beat superlatives"],
why:"Every ad, page, letter, and truck door is copy. The same offer with better words can pull 2-10× more response — copy is the multiplier on everything else you build.",
p:["Simple version: copywriting is salesmanship in print — one person, talking to one person, about their problem. Not 'professional pest solutions for discerning homeowners' (nobody talks like that), but 'Seen one roach? There are more. We'll find them this week — guaranteed gone, or we come back free.' The rules that carry 80% of the result: write to ONE person (your mk2 avatar, in their words), lead with THEIR problem not your company, be specific (numbers, timeframes, names — '7,412 local homes protected' beats 'trusted by thousands'), and make the next step stupid-simple. And the headline is 80% of the copy's job: it's the ad for the ad — if it doesn't stop the right person, nothing underneath gets read.",
"Deep version: match the message to the reader's awareness stage (Breakthrough Advertising's ladder, simplified): someone with ants in the kitchen RIGHT NOW needs 'Ants? Same-day service' — problem-aware copy; someone who never thinks about pests needs education or a trigger — a much harder, more expensive sale. This is why Google search copy (high awareness) reads different from a mailer (low). Structure with PAS — Problem ('Roaches multiply 6× faster in summer'), Agitate ('by August, one sighting means a colony'), Solve (your offer from mk4) — or AIDA for longer pieces. Prove everything: one named local review outweighs three adjectives; before/after photos outweigh paragraphs. Kill the enemies of response: we-language ('we're proud to announce' — nobody cares), cleverness that obscures ('Mission: Impestible'), and vague claims ('best in town'). Then obey the golden rule from Scientific Advertising: TEST. Two headlines, same ad spend, count the calls — your opinion (and mine) loses to the count every time. Write plain, write specific, write to the fear or desire you found in mk2, ask for one action — and let the numbers promote the winner."],
terms:[["Copy","Any words meant to produce action — ads, pages, letters, truck doors, voicemails."],["Headline","The ad for the ad — 80% of the job is stopping the right reader."],["PAS","Problem, Agitate, Solve — the workhorse structure of direct-response copy."],["Awareness stage","How conscious the reader is of the problem/solution — dictates the message's angle."],["Call to action (CTA)","The single, specific next step — one ask, stupid-simple, per piece."]],
ex:"John Caples' most famous headline — 'They Laughed When I Sat Down at the Piano… But When I Started to Play!' — outsold every 'clever' alternative for decades because it's a story about the reader's dream (being underestimated, then admired), not the product. A century later, the same test repeats every day on Google ads: the specific, reader-first headline beats the branded, company-first one, almost without exception.",
exx:[["Small business","A junk removal company changes its homepage headline from 'Premier Hauling Solutions' to 'Garage full? Gone by Saturday.' Nothing else changes. Quote requests go up 61% — the new words are the customer's actual thought, verbatim."],
["Car wash","Tunnel sign test: 'Quality Wash $12' vs. 'Pollen's eating your paint — 3 minutes fixes it.' The second, run during pollen season (awareness timing), lifts weekday volume 23%. Specific problem + timeframe beats generic quality claim."],
["Pest control","Door hanger A: 'Smith Pest Control — Licensed & Insured.' Door hanger B: 'We just treated the Hendersons at #214. Summer ant season hits this street in 3 weeks — free inspection while our truck's here.' B pulls 9× the calls: neighbor's name, timeline, reason-why."],
["Real estate","Listing copy 'charming 2BR with updates' vs. 'Walk to Mercy Hospital in 6 minutes — 4 nurses already live here.' The second fills the vacancy in days because it's written to ONE avatar at high awareness, in their calculus."],
["Acquisition","A searcher's outreach letter drops 'I represent a well-capitalized buyer seeking opportunities' for 'I'm one person looking to buy and personally run one pest company in Tarrant County. If you've ever wondered who'd take care of your customers when you retire — I'd like to be on that list.' Response rate triples. Same offer; human words."]],
mistakes:["Leading with your company ('We are proud to…') instead of their problem","Being clever or vague where specific and plain would sell","Publishing one version forever instead of testing two headlines and counting"],
keys:["Headline first: it's 80% of the result — stop the right reader or nothing else matters","One person, their words, their awareness stage — PAS carries most jobs","Specifics and proof beat adjectives every time; one ask per piece","Test with money and count responses — opinion always loses to the count"],
assign:"Take your most-seen piece of copy (homepage headline, ad, or truck door). Write 5 alternative headlines: one problem-led, one offer-led, one proof-led, one neighbor/social-proof-led, one deadline-led. Run the best two against each other with real spend or placement, and count.",
check:["My main headline names the customer's problem or desired outcome, not my company","I can write PAS for my offer in 4 sentences","Every claim in my copy has a number, name, or proof attached","I have two versions of something running and a way to count the winner"],
books:["sci-advertising","breakthrough-adv","influence"]},
{id:"mk6",t:"The Local Marketing Engine",q:"google business profile local seo reviews small business marketing",
learn:["Why the Google Business Profile is the new storefront — and how to win it","Building a review machine that compounds weekly","Local SEO, service pages, and the neighborhood flywheel"],
why:"For local businesses, one asset outearns every other channel combined: showing up first — with the most stars — when a neighbor searches at the moment of need.",
p:["Simple version: when your avatar's trigger event hits (roach, filthy car, flooded sink), they grab their phone and search. What they see is the map pack — three local businesses with stars. That listing is your real storefront now, and it's rankable, improvable, and free. The engine has three gears: your Google Business Profile (complete every field, real photos weekly, correct categories, services listed, Q&A answered), your reviews (count, recency, keywords, and your replies — Google reads all four), and your website's local pages (one page per service per city, so 'ant control fort worth' has a page that answers it). None of this is glamorous. It compounds like interest, costs almost nothing, and most competitors do it badly forever — which is exactly the opportunity.",
"Deep version: run reviews as a SYSTEM, not a hope. The peak-happiness ask from your sales lessons, made mechanical: every completed job triggers a same-day text with a direct review link ('It was great having you — 20 seconds here helps our small crew more than you know: [link]'); techs mention it at the door; the weekly scorecard tracks review velocity (new reviews/week) like revenue — because it IS revenue, lagged. Reply to every review within 48 hours: warm and specific to five-stars (Google indexes your reply keywords too), calm and solution-first to bad ones (you're writing for the thousand future readers, not the one angry author). Layer the flywheel: service-area pages with real local proof (photos of jobs on named streets, neighborhood testimonials), consistent NAP (name/address/phone) across every directory, and the neighborhood density play — every job generates same-street marketing (door hangers on ten neighbors: 'we just treated #214'), which generates more same-street jobs, which raises your density economics from the route lessons AND your review count in that zip. That's the full loop: search visibility → job → review + neighbor marketing → more visibility. Six months of discipline here typically beats years of scattered ad spend — and unlike ads, it doesn't stop when you stop paying."],
terms:[["Map pack","The three local listings with stars atop local search results — the highest-value screen real estate in local business."],["Google Business Profile (GBP)","Your free, rankable storefront: categories, services, photos, Q&A, reviews, replies."],["Review velocity","New reviews per week — recency and rate matter as much as the total; scoreboard it."],["NAP consistency","Identical name/address/phone across the web — a trust signal search engines check."],["Service-area page","A website page targeting one service in one place ('termite control in Keller') that answers the exact search."]],
ex:"Two plumbers, same suburb, same skill. Plumber A has 31 reviews (newest: 14 months old) and a profile with two blurry photos. Plumber B systematized the ask two years ago: 480 reviews, 6 new per week, photo of every job, a reply on every review. B ranks first for every emergency search and charges 20% more — the market reads 480 recent stars as safety, and safety outprices discounts at 2am with water on the floor.",
exx:[["Small business","A mobile groomer adds one automation: post-appointment text with the review link. Review count goes 22 → 210 in a year; she stops paid ads entirely because the map pack now feeds the calendar."],
["Car wash","The wash prints a QR code on receipts — 'free vacuum token for showing us your review.' Velocity jumps to 15/week. Six months later it outranks the national chain one exit away, whose 2,000 reviews average four years old."],
["Pest control","Every treated home triggers the 10-door neighbor hanger with the street name on it. Density per zip rises, drive time falls (route economics), and the review page fills with 'everyone on our street uses them' — social proof that closes future doors before the knock."],
["Real estate","A property manager builds one page per neighborhood ('property management in Fairmount — 34 doors under care, photos') and asks every owner for a review at the annual statement (peak-happiness: the moment they see the year's returns). Inbound owner leads replace broker referrals within a year."],
["Acquisition","A buyer comparing two targets treats the review asset like a balance-sheet item: 400 recent reviews with owner replies is transferable demand infrastructure; 30 stale reviews means the demand lives in the retiring owner's handshake. Same revenue — very different risk, and the LOI prices it."]],
mistakes:["Treating reviews as luck instead of a same-day, every-job, tracked system","Ignoring the profile after setup — no photos, no posts, unanswered questions and reviews","Buying ads to paper over a 3.8-star, stale-review foundation (ads amplify what the stars say)"],
keys:["The map pack is the storefront: profile completeness + review velocity + local pages win it","Ask for the review at peak happiness, same day, with a direct link — and scoreboard velocity weekly","Reply to everything within 48 hours; you're writing for future readers","Run the neighborhood flywheel: job → review + neighbor marketing → density → more jobs"],
assign:"Audit your (or a chosen local business's) Google profile against this lesson: every field complete? Photos this month? Review velocity per week? Reply rate? Then write the exact post-job review-ask text message, word for word, and the trigger that sends it.",
check:["I know my review count, average, and velocity — and my top competitor's","Every completed job triggers a same-day review ask automatically","Every review gets a reply within 48 hours","I have (or have planned) one service-area page per core service"],
books:["100m-leads","traction-eos"]}
]}
]},{id:"K2",name:"The Growth Machine",tagline:"Level 2",desc:"Funnels, paid ads, content, retention, and the analytics that steer it all",modules:[
{name:"The Machine",lessons:[
{id:"mk7",t:"Funnels & the Customer Journey",q:"marketing funnel explained customer journey small business",
learn:["The five funnel stages and the honest math between them","Designing lead magnets and follow-up that move strangers toward the sale","Finding and fixing THE leak instead of pouring more into the top"],
why:"Random marketing produces random results. A funnel turns marketing into a machine with stages you can measure — and any machine you can measure, you can fix.",
p:["Simple version: almost nobody buys the first time they see you — a funnel is the deliberate path from stranger to customer. Five stages: they SEE you (ad, sign, search result), they SHOW INTEREST (click, call, form — now a lead), you FOLLOW UP (because most leads aren't ready today), they BUY, and then — the stage amateurs forget — they MULTIPLY (review, referral, repeat). Each stage has a conversion rate, and multiplying them backward from your revenue goal tells you exactly how much top-of-funnel you need: the same pipeline math your sales school taught, now applied to strangers instead of prospects. The funnel isn't jargon; it's just refusing to let interested people fall through the cracks between seeing you and buying.",
"Deep version: two design choices separate working funnels from leaky ones. First, the middle: most local businesses go straight from ad → 'call now,' which only harvests the 3% ready today and wastes everyone else. Insert a lower-commitment step — the lead magnet: something genuinely useful, free, and narrow ('Termite risk map for your zip,' 'The 5-minute car value checklist,' instant online quote calculators) that trades value for contact info. Now the 40% who are curious-but-not-ready enter your follow-up sequence (mk10) instead of vanishing. Second, the diagnosis discipline: funnels fail at ONE stage at a time, and the cure differs per stage — lots of views but no clicks is a message problem (mk5); clicks but no leads is an offer/landing problem (mk4); leads but no sales is a follow-up or sales problem (sales school); sales but no referrals is a delight problem (operations). Pouring more budget into the top of a middle-leaking funnel is the most expensive mistake in marketing — and the most common. Map your funnel on one page, write the honest number at each stage transition, circle the worst one, and fix only that. Then re-measure. That loop, repeated monthly, is the entire growth-machine discipline."],
terms:[["Funnel","The measured path from stranger to customer to advocate: see → interest → follow-up → buy → multiply."],["Lead magnet","A free, narrow, genuinely useful thing traded for contact info — the funnel's middle step."],["Stage conversion","The % moving between adjacent stages — where diagnosis happens."],["Top/middle/bottom of funnel","Attention / consideration / decision — different messages work at each depth."],["The leak","The single worst stage transition — always fix it before buying more top-of-funnel."]],
formulas:[["Backward math: Goal ÷ close rate ÷ lead rate = views needed","Work the funnel right-to-left from revenue to required attention."]],
ex:"A roofing company spends $6k/month on ads driving straight to 'Call for a free estimate.' 1,900 clicks, 38 calls, 11 jobs. They add one middle step — 'Free storm-damage photo check: text us 3 photos of your roof' — a lower-fear first move. Same spend: 1,900 clicks, 240 photo texts, 41 inspections, 19 jobs. Nothing about the ads changed. The funnel just stopped demanding marriage on the first date.",
exx:[["Small business","A piano teacher's funnel: flyer at two schools → free 'is my kid ready?' 10-minute assessment (lead magnet) → text follow-up with a spot deadline → first month package → recital invites that parents share (multiply). Every stage counted on a whiteboard."],
["Car wash","See: street signage. Interest: '$1 first wash' QR by the entrance. Follow-up: the app pushes '2 more washes and membership pays for itself.' Buy: membership. Multiply: 'give a friend a free month, get one.' Each stage has a number on the weekly scorecard."],
["Pest control","The leak diagnosis in action: 90 leads/month but only 18 quotes given — nobody answers the phone after 4pm. The fix isn't more ads; it's a $300/month answering service. Quotes double with zero new marketing spend — the classic middle-leak repair."],
["Real estate","A landlord's funnel for tenants: listing views → virtual tour (magnet, filters tire-kickers) → same-day application link → approved. Tracking shows tours convert 4× better than photo-only listings, so every unit gets a 3-minute video. Vacancy days halve."],
["Acquisition","Deal flow IS a funnel: 400 letters → 31 conversations → 9 real discussions → 2 LOIs → 1 close (your aq2 lesson). Buyers who track stage conversion know whether to fix the letter (message), the list (market), or the meeting (sales) — instead of just 'sending more letters.'"]],
mistakes:["Sending cold traffic straight to 'buy/call now' with no lower-commitment middle step","Adding budget to the top while the middle leaks (more water, same holes)","Not writing the numbers down — a funnel you don't measure is a doodle"],
keys:["Five stages: see → interest → follow-up → buy → multiply; each has a number","Lead magnets harvest the not-ready-today majority into follow-up","Diagnose the ONE worst leak; its stage determines which lesson fixes it","Backward math from the revenue goal sets your required top-of-funnel"],
assign:"Draw your funnel on one page with real numbers at every stage for last month (estimate honestly where untracked). Circle the worst conversion. Write which lesson fixes it (message/offer/follow-up/sales) and one action you'll take this week.",
check:["I can name my five stages and put a number on each","I have (or designed) a lead magnet for the not-ready-today majority","I know my single worst leak and its category","I can compute views-needed from my revenue goal backward"],
books:["100m-leads","crossing-chasm"]},
{id:"mk8",t:"Paid Advertising Without Burning Cash",q:"google ads facebook ads small business beginners budget",
learn:["Where paid fits: intent channels vs. interruption channels","The testing budget, the math that decides winners, and when to scale","The creative that works: hooks, proof, and offers from Level 1"],
why:"Ads are the only marketing you can turn up like a faucet — and the fastest way to lose $1,000/month if you buy them before the foundations. This lesson is the faucet manual.",
p:["Simple version: paid ads rent attention. Two fundamentally different kinds: INTENT ads (Google search) reach people already looking — 'ant control near me' — where your job is simply to be the obvious choice (position + offer + stars); INTERRUPTION ads (Facebook/Instagram/TikTok) reach people who weren't looking, where your job is to stop the scroll with the trigger moment and a strong offer. Local service businesses almost always start with intent — it converts at 5-10× the rate because the customer brought their own urgency. The iron rule before spending a dollar: ads AMPLIFY what exists. A weak offer, a 3.8-star profile, or an unanswered phone gets amplified too — most 'ads don't work' stories are foundation stories wearing an ad costume.",
"Deep version: run paid like an investor, not a gambler. TEST small: a defined budget ($500-1,000) across 2-3 ad variants against ONE offer, judged by cost per LEAD, never clicks or impressions (vanity metrics from your Lean Startup lesson). Know your allowable CAC before launching: if LTV is $800 gross profit and you want a 3:1 return, a customer may cost up to ~$265 — that number, not your comfort, decides whether $40 leads are cheap or catastrophic (a $40 lead closing at 25% = $160 CAC = green light). SCALE only what math promotes: kill losers fast (Hormozi's 100-attempts rule for judging, not 10), raise budget on winners gradually (doubling, not 10×-ing — algorithms and lead-handling both break at sharp scale). Structure basics that carry most of the result: search — exact service + city keywords, tight ad groups, your offer in the headline, location extensions, negative keywords weekly ('free,' 'jobs,' 'DIY'); social — the hook is 80% (the first 2 seconds names the avatar's trigger), real photos and owner-face video outperform stock endlessly, retarget site visitors first (warmest audience, cheapest wins). And the discipline nobody keeps: one change at a time, written down, so you know WHAT worked. Ads reward the operator's mindset — the count decides, the faucet obeys the math."],
terms:[["Intent vs. interruption","Search ads catch existing demand; social ads create it — different jobs, different math."],["Allowable CAC","The max you may pay per customer given LTV and target return — decided BEFORE spending."],["Retargeting","Ads shown to people who already visited/engaged — the warmest, cheapest audience."],["Negative keywords","Searches you refuse to pay for ('free,' 'jobs') — pruned weekly on search campaigns."],["Creative hook","The first 2 seconds/line of an ad — names the avatar's trigger or it's invisible."]],
formulas:[["Allowable CAC = LTV gross profit ÷ target ratio (e.g. 3)","Then: max CPL = allowable CAC × close rate. Launch knowing both."]],
ex:"Two HVAC companies each spend $3k/month. Company A boosts pretty brand posts — 400k impressions, 6 leads, owner concludes ads are a scam. Company B runs search ads on 'AC repair [city]' with the offer '$79 same-day diagnostic, applied to any repair' and retargets site visitors with a review carousel: 61 leads at $49, closing 40%. CAC $122 against an $900 average ticket. Same platforms, same budget — one bought impressions, the other bought customers at 7:1.",
exx:[["Small business","A dog groomer tests $300: two Facebook ads to a 3-mile radius. Hook A: salon interior. Hook B: 15-second before/after of a doodle with the owner talking. B wins 11:1 on cost per booking — real face, real transformation, real hook."],
["Car wash","Geofenced social ads within 4 miles: 'First month unlimited $10' with a 6-second pollen-covered-hood video. Allowable CAC is $30 against $300 annual membership value; ads deliver members at $19. The faucet opens wider each month the math holds."],
["Pest control","Search terms are seasonal intent gold: 'wasp nest removal' spikes in June — a campaign scheduled to the entomology calendar (your pest playbook's seasonality lesson) buys urgency at its cheapest. Negative keyword 'spray' filters the DIYers."],
["Real estate","A property manager runs $200/month of retargeting only — everyone who visited the 'owner services' page sees one testimonial video for 30 days. Six owners sign in a year: $400 per door acquired, against $2,400/year in fees per door."],
["Acquisition","Post-close, the new owner of a service company checks the ad account first: if the seller ran profitable search ads capped at $1k/month for years, doubling a proven faucet is the fastest revenue lever in the deal — growth the multiple never priced."]],
mistakes:["Buying ads before the offer, reviews, and phone-answering exist (amplifying weakness)","Judging by impressions/clicks instead of cost per lead and allowable CAC","Scaling winners 10× overnight (breaks the algorithm and your lead handling) or killing tests after 10 clicks"],
keys:["Intent first for local service; interruption needs a scroll-stopping hook and stronger offer","Compute allowable CAC and max CPL before the first dollar — the math decides, not comfort","Test small, one variable at a time; kill losers fast, scale winners gradually","Ads amplify what exists — foundations (offer, stars, answered phone) come first"],
assign:"Compute your allowable CAC and max CPL from your real LTV and close rate. Then design (don't launch yet) a $500 test: channel, audience, two ad variants (write the actual hooks), the offer, and the exact number that will mean 'scale' vs 'kill.'",
check:["I know my allowable CAC and max CPL by heart","I can explain intent vs. interruption and which my business starts with","My test plan changes one variable and has a pre-written kill number","My foundations (offer, reviews, phone) can survive amplification"],
books:["100m-leads","sci-advertising"]},
{id:"mk9",t:"Content & Organic: Owning Attention",q:"content marketing small business social media organic",
learn:["The authority engine: teach what you know, where your avatar already scrolls","Documentation beats creation: turning daily work into endless content","SEO basics and the compounding difference between rented and owned attention"],
why:"Ads stop the moment you stop paying. Content compounds: every useful post, video, and page keeps selling for years — it's how small operators become the known authority in their market.",
p:["Simple version: content marketing is answering your customers' questions in public. Every question you've ever been asked at a kitchen table or over a quote — 'is this termite damage?', 'why is my paint fading?', 'quarterly or monthly?' — is content: a 60-second video, a post, a page. You already know the material; that's the unfair advantage no agency has. The strategy that fits a busy operator is DOCUMENT, don't create: you don't need a studio — film the wasp nest removal (safely), the before/after, the 'here's what we found under this deck' — 30 seconds of real work with your voice over it beats produced fluff every time, because real is the one thing competitors can't fake. One channel, done consistently, beats five channels done occasionally: pick where your avatar actually scrolls (local Facebook for homeowners, Instagram/TikTok for visual transformations, YouTube for research-heavy purchases) and post 2-3× a week for a year before judging.",
"Deep version: content works three compounding jobs at once. AUTHORITY: the operator who's been visibly teaching for a year is the safe choice at buying time — content is trust, pre-built at scale (and it warms every other channel: your ads convert better, your quotes close better, because they've 'known' you for months). SEARCH: written answers to real questions ('how much does quarterly pest control cost in [city]' — answer honestly with ranges!) become pages that rank and feed the mk6 engine forever; honest pricing content especially converts, because nobody else will publish numbers. RETARGETING FUEL: everyone who watches 50% of a video becomes a warm audience for mk8's cheapest ads. The operating system: keep one running list of every customer question (your techs hear ten a day); batch-film answers monthly (ten videos in 90 minutes in the truck); post on the primary channel, repurpose everywhere (video → post → page); end each with a soft CTA ('link if you want us to look at yours'). And the mindset that makes it sustainable — content is a garden, not a slot machine: most posts do little, a few do enormous work, and the library as a whole becomes an asset on your balance sheet in all but name. The consolidator doing diligence someday will notice 40,000 local followers; more importantly, so does every neighbor deciding who to call tonight.",],
terms:[["Content marketing","Answering customer questions in public, consistently, where your avatar already scrolls."],["Document don't create","Turning real daily work into content instead of manufacturing studio material."],["Authority","Pre-built trust at scale — the compounding output of consistent teaching."],["Evergreen content","Answers that stay relevant for years and keep ranking, watching, converting."],["Repurposing","One piece → many formats: video → post → page → email, multiplying output per effort."]],
ex:"A pool builder in a small Virginia town starts answering the questions nobody would: real prices, fiberglass vs. concrete, what goes wrong. His blog ('River Pools') becomes the national authority mid-recession, generating millions in tracked sales — not because the writing was fancy, but because he answered what buyers actually typed at midnight while competitors kept prices secret. Every local trade can run the same play at neighborhood scale.",
exx:[["Small business","An electrician films 45-second 'what's wrong with this panel' clips at real jobs, faces blurred, twice a week. Fourteen months later: 22k local followers, and a third of new calls open with 'I watch your videos' — the sales conversation starts pre-trusted."],
["Car wash","The wash posts satisfying tunnel footage + '60-second detailing tips' + pollen-season PSAs. Its 'should you wash after rain? (yes — here's why)' reel does 400k views regionally and gets quoted back at the pay station for a year."],
["Pest control","A tech's 'what we found under this house' series (with permission, addresses hidden) becomes the market's must-follow. The 'how much does quarterly service actually cost here' page — with real ranges — ranks #1 and converts because no competitor will publish numbers."],
["Real estate","A small landlord writes one honest page: 'What $1,400/month actually rents in [city] — with photos.' Prospective tenants share it; it ranks; her vacancies fill from an audience that trusts her before the showing."],
["Acquisition","A searcher documents the search itself — 'week 31: what I learned reading 40 CIMs' — building an audience of brokers, lenders, and future sellers. His best off-market deal comes from a retiring owner who'd read him for a year. Content works B2B too: authority is authority."]],
mistakes:["Posting polished brand fluff instead of real work and real answers","Trying five channels at once and quitting all of them by month three","Refusing to answer pricing/hard questions publicly — the exact content that converts best"],
keys:["Answer real customer questions in public; document your actual work — real beats produced","One channel, 2-3×/week, judged after a year — consistency is the whole strategy","Content compounds three ways: authority, search, and warm audiences for ads","Honest answers competitors won't give (especially pricing) are the highest-converting content"],
assign:"Write down the 10 questions customers actually ask you (or the business you're studying). Film ONE 60-second answer on your phone today — real location, plain talk, soft CTA. Post it. That's the machine; the rest is repetition.",
check:["I keep a running list of real customer questions","I've published at least one documented-from-work piece","I know my ONE primary channel and my weekly cadence","I've answered a question publicly that competitors keep secret"],
books:["100m-leads","mom-test"]},
{id:"mk10",t:"Email, SMS & the Fortune in the List",q:"email marketing sms small business retention list",
learn:["Why owned audiences (email/SMS) beat rented ones — and how to build the list","Campaigns that make money: welcome, seasonal, winback, VIP","Deliverability, frequency, and the value-first rule that keeps you welcome"],
why:"Algorithms change, ad costs rise, platforms die — but your list is yours. For most local businesses the database of past customers is the highest-ROI marketing asset they own, and it's usually sitting untouched.",
p:["Simple version: every follower is rented; every email address and phone number is owned. The list — customers and warm leads with permission to contact them — is the only audience no algorithm can take away, and messaging it costs pennies. The everyday miracle nobody runs: most service businesses have hundreds or thousands of past customers who liked them, forgot about them, and would buy again if reminded at the right moment. A monthly value-first email plus a few well-timed SMS campaigns routinely produces more profit than the entire ad budget — because the hardest, most expensive step (earning trust) is already done. Build the list at every touchpoint: every job, every quote, every lead magnet (mk7), every counter interaction — with explicit permission, always.",
"Deep version: the campaigns that matter, in order of ROI. WELCOME (automated): the moment someone joins — deliver the magnet, tell the one-paragraph story of the business, make the first offer; highest open rates you'll ever see. SEASONAL/TRIGGER: matched to the calendar of your trade (pre-summer AC checks, pollen-season wash pushes, pre-winter pest exclusions) — you're not interrupting, you're arriving exactly on time. WINBACK: the sleeping goldmine — customers inactive 6-12+ months get the 'we noticed, here's a reason to return' sequence; expect your cheapest 'new' revenue of the year (your s8 lesson proved this with $38k from dead quotes). VIP/REFERRAL: your best customers get early access and give-a-month-get-a-month mechanics — the multiply stage of mk7, delivered by message. The craft rules: value-first ratio (2-3 useful messages per 1 pure offer — the moment you're only selling, you're spam); SMS is a scalpel (98% open rates, so reserve it for genuinely time-sensitive value: appointment reminders, 'crew on your street Thursday,' expiring seasonal slots — and honor STOP instantly); subject lines are mk5 headlines (specific, curiosity or utility, no ALL CAPS); measure by revenue per send, not opens. And the compliance floor: permission always, easy unsubscribe, real business identification — the law (CAN-SPAM/TCPA) and the relationship both demand it. Owned attention is a garden too — feed it value and it feeds you for a decade."],
terms:[["Owned audience","Contacts with permission — the asset no platform change can confiscate."],["Welcome sequence","Automated first messages after opt-in — the highest-open, highest-trust window."],["Winback campaign","Reactivating 6-12 month inactive customers — typically the cheapest revenue available."],["Value-first ratio","2-3 useful messages per offer message — the price of staying welcome."],["Revenue per send","The honest email/SMS metric — opens flatter, revenue counts."]],
ex:"A 900-member car wash exports its lapsed-member list — 1,140 people who cancelled over three years — and sends one SMS: 'We miss you. Your old rate's back for 48 hours: [link].' Cost: ~$40. Result: 118 reactivations = $35k of annual recurring revenue. The owner had spent $2k/month on ads to strangers while a goldmine slept in a spreadsheet.",
exx:[["Small business","A salon's automated 8-week 'time for a trim?' text with self-booking link lifts rebooking 30%. Not marketing genius — just remembering for the customer at the exact moment the mirror does."],
["Car wash","Weather-triggered SMS: pollen spike or post-storm mud → 'Free rewash day for members; $5 washes til 7pm for everyone else.' Sent to the list an hour after the trigger. Best volume days of the season, manufactured on demand."],
["Pest control","The seasonal calendar becomes an email series: March termite awareness (with real local damage photos), June wasp alerts, October rodent exclusion. Each lands the week the phone would start ringing anyway — the company just gets there first."],
["Real estate","A landlord keeps every past applicant on a list. Each new vacancy goes to the list 48 hours before public listing — 'you applied before, you're pre-approved to view first.' Units fill with zero listing spend, often same-week."],
["Acquisition","In diligence, an exportable customer database with emails/phones and contact permission is a priced asset — the buyer's day-90 winback campaign to the seller's lapsed list is frequently the fastest cash-return lever in the entire deal plan."]],
mistakes:["Building audiences only on rented platforms while collecting no emails/numbers","Only messaging when you want money (breaking the value-first ratio → spam folder)","Blasting SMS for non-urgent offers until STOP replies pile up (and TCPA risk with them)"],
keys:["Owned beats rented: collect contacts with permission at every touchpoint","Four money campaigns: welcome, seasonal/trigger, winback, VIP-referral","Value-first ratio keeps you welcome; SMS only for genuinely timely things","Measure revenue per send; the lapsed-customer list is usually your cheapest growth"],
assign:"Count your owned list honestly (customer emails + phones with permission). Then write ONE winback message — subject/first line, the offer, the deadline — for everyone inactive 6+ months, and send it (or schedule it) this week.",
check:["I know my list size and where every new contact gets captured","My welcome message exists and sends automatically","I've run (or scheduled) one winback campaign","My last 4 messages respect the value-first ratio"],
books:["100m-leads","iwt"]},
{id:"mk11",t:"Brand, Word of Mouth & the Referral Engine",q:"word of mouth referral marketing brand small business",
learn:["What brand really is for a small business — and how it compounds","Engineering word of mouth: remarkable moments, not hopeful ones","Referral systems with mechanics, rewards, and a scoreboard"],
why:"The cheapest customer is the one your customer brings you. Word of mouth feels like luck — the best operators run it as a system with a number on the weekly scorecard.",
p:["Simple version: brand, for a small business, isn't a logo — it's what people say when you're not in the room, multiplied by how many people are saying it. It's built from a thousand kept promises: the truck that's clean, the tech who wears shoe covers without being asked, the invoice that matches the quote, the position (mk3) said the same way for years. Word of mouth is that reputation in motion — and it doesn't spread from 'satisfying' (satisfied is silent; satisfied is the expected outcome). It spreads from REMARKABLE: the small, deliberate, repeatable moments worth mentioning at a barbecue. You can't buy word of mouth, but you can absolutely manufacture the moments that cause it — and then build the system that harvests it.",
"Deep version: three layers. (1) ENGINEER the remarkable: pick 2-3 signature moments and make them SOPs, not moods — the follow-up photo report after every pest treatment ('here's what we found, here's what we did'), the free towel-and-mint finish at the wash, the 'we noticed your gate latch was loose so we fixed it' line item at $0.00. Cheap, repeatable, story-shaped. (2) SYSTEMATIZE referrals — your s8 lesson industrialized: the peak-happiness ask built into the workflow (day of the visible win), specific ('who else on your street…'), two-sided rewards (a month free for both — reward the friend too or referrals feel like selling out a buddy), drafted messages they can forward in one tap, and the loop closed with a thank-you they'll remember. (3) SCOREBOARD it: referral rate (% of new customers from referrals) and referrals-per-hundred-customers go on the weekly dashboard next to revenue, because unmeasured word of mouth stays folklore. Calibrations from the field: a healthy service business runs 25-40% referral acquisition — below that, either the service isn't remarkable yet (fix operations first — no referral program rescues a 3.9-star experience) or the ask is missing (fix the system). Above ~60%, celebrate — then note the concentration risk a buyer would flag: word of mouth that lives in the OWNER'S relationships rather than the BUSINESS'S systems is the trapped-founder discount wearing a friendly face. Build the engine so the stories are about the company, not just about you."],
terms:[["Brand (small business)","What customers say when you're absent × how many say it — a thousand kept promises compounding."],["Remarkable moment","A deliberate, repeatable, story-shaped act that gets mentioned — engineered, not hoped for."],["Two-sided referral reward","Both referrer and friend benefit — removes the 'selling out a buddy' friction."],["Referral rate","% of new customers arriving by referral — scoreboarded weekly, target 25-40%+."],["Signature SOP","A wow-moment written into the standard workflow so it happens every time, every tech."]],
ex:"A carpet cleaner leaves every home with one deliberately remarkable act: he photographs the worst stain before/after, prints it on a card that says 'this one fought back,' and leaves it with two extra cards 'for anyone whose carpet is also losing.' Silly, cheap, utterly repeatable — and his referral rate runs 52% while competitors buy leads at $80. The cards cost eleven cents.",
exx:[["Small business","A handyman ends every job with a 5-minute free fix of something small he noticed ('tightened your wobbly rail — no charge'). It appears on every invoice at $0.00. That line item is the thing customers quote to neighbors, verbatim, for years."],
["Car wash","Members' kids get a 'tunnel captain' sticker and a horn-honk from the booth. Families film it; parents post it; the wash becomes 'the one my kid makes us go to.' Retention up, and the membership pitch now sells itself at playgrounds."],
["Pest control","The post-service photo report (found/did/next) is the signature SOP — customers forward it to spouses, and 'they send you pictures of everything' becomes the sentence that sells the neighborhood. Referral ask rides the same message: 'know anyone with uninvited guests?'"],
["Real estate","A landlord gives every tenant a $200 credit for referring a tenant who signs (and the new tenant gets $100 off move-in). Two-sided, drafted into a forwardable text. She hasn't paid for a listing in three years; her scoreboard says 71% of leases start as referrals."],
["Acquisition","Diligence question from the aq6 checklist, now with teeth: 'what % of new customers are referrals, and are the stories about the SYSTEM or the seller?' Referrals tied to a photo-report SOP transfer with the business; referrals tied to the owner's handshake walk out the door with him — price accordingly."]],
mistakes:["Waiting for word of mouth instead of engineering remarkable, repeatable moments","One-sided referral rewards (asking friends to 'sell out' friends for your benefit)","Never measuring referral rate — folklore instead of a scoreboard number"],
keys:["Brand = kept promises compounding; word of mouth = remarkable in motion — satisfied is silent","Engineer 2-3 signature moments as SOPs; cheap, repeatable, story-shaped","Referral system: peak-happiness ask + two-sided reward + drafted message + closed loop","Scoreboard referral rate (target 25-40%+) — and make the stories about the business, not just the owner"],
assign:"Design your signature moment: one cheap, repeatable, story-shaped act built into every job — write it as an SOP line. Then write your two-sided referral offer and the exact forwardable message. Compute last month's actual referral rate.",
check:["I have a signature moment written as an SOP, not a mood","My referral reward benefits both sides with a drafted, forwardable message","Referral rate is on my scoreboard with a target","My word of mouth would survive me going on vacation for a month"],
books:["influence","100m-offers","same-as-ever"]},
{id:"mk12",t:"Marketing Analytics: Steering by Numbers",q:"marketing analytics attribution tracking small business kpis",
learn:["The five-number marketing dashboard and what each decides","Attribution without a PhD: call tracking, 'how did you hear,' UTMs","The monthly steering ritual: double, fix, kill"],
why:"Half your marketing works and half doesn't — analytics is how you learn which half. Without it you're not steering, you're just spending and hoping.",
p:["Simple version: five numbers run marketing for almost any business, reviewed monthly: LEADS by source (how many, from where), CPL by source (what each channel's leads cost), CLOSE RATE by source (referral leads close at 60%, cold ad leads at 15% — sources differ wildly and this is where it shows), CAC by source (the number that decides budgets), and LTV:CAC (the health ratio — 3:1 or better keeps you honest, from your unit-economics lessons). Getting the data is unglamorous and 90% sufficient with three tools: ask EVERY lead 'how did you hear about us?' and write it down in the CRM (imperfect, priceless); use tracking numbers or codes per channel where volume justifies; tag links (UTMs) on anything digital. Perfect attribution doesn't exist — customers see your truck, then a review, then an ad, then call — but directional truth beats measured nothing, forever.",
"Deep version: the monthly steering ritual, 30 minutes with the five numbers on one page. For each source, three verdicts only: DOUBLE (CAC comfortably under allowable → feed it budget), FIX (leads flow but close poorly → the leak lives downstream in offer/follow-up/sales, route it to the right lesson), KILL (CPL or CAC hopeless after a fair test — 100 attempts, not 10 — → stop paying; sentiment is not a line item). Guard against the classic traps: last-click bias (search ads 'get credit' for customers your content and reviews actually convinced — why brand searches rising is a metric worth tracking), vanity metrics (impressions and followers pay no payroll — from the Lean Startup lesson: actionable beats vanity), and averaging across sources (a blended CAC of $150 can hide a $60 goldmine and a $400 leak — always segment). Two numbers to add as you mature: revenue per send for the list (mk10), review velocity (mk6) as the leading indicator it is. Then close the loop that makes this a SYSTEM: the dashboard's worst number becomes next month's single experiment (one variable, mk5/mk8 testing discipline), and the winner gets written into the playbook. That loop — measure, verdict, experiment, codify — run monthly for a year, is how a $6k/month marketing budget quietly starts outperforming competitors spending triple. The machine steers itself only when someone reads the instruments."],
terms:[["CAC by source","Acquisition cost per channel — the number that sets budgets; never trust the blended average."],["Attribution","Crediting the source of each customer — 'how did you hear,' tracking numbers, UTMs; directional beats perfect."],["Last-click bias","Overcrediting the final touchpoint (usually search) while the trust-builders go unmeasured."],["Vanity vs. actionable metrics","Impressions flatter; leads, CAC, and revenue decide."],["Double / Fix / Kill","The three monthly verdicts every marketing source must face."]],
formulas:[["LTV : CAC ≥ 3","The health ratio per source — below it, fix or kill; far above it, feed."],["CAC = source spend ÷ source customers","Compute per source, monthly, on one page."]],
ex:"An owner 'feels like' the ads work and the mailers don't. First real dashboard says otherwise: ads produce 60 cheap leads closing at 8% (CAC $410); the boring mailers produce 9 expensive leads closing at 55% (CAC $160). He'd been about to kill the winner and double the loser — a $2k/month mistake, prevented by thirty minutes of arithmetic and one 'how did you hear about us?' column in the CRM.",
exx:[["Small business","A cleaner adds one CRM field — lead source — and reviews it quarterly. Discovery: Nextdoor recommendations close at 71% with $0 spend. She reallocates two hours a week to being helpfully present there; CAC drops by half without any new budget."],
["Car wash","Membership signups get a 'first heard about us' picker at the kiosk. Verdict month: signage dominates (double: bigger sign, better offer on it), Instagram delivers 2 members (fix: new hook aimed at commuters), the radio spot delivers zero measurable (kill, despite the sales rep's lunch)."],
["Pest control","Tracking numbers on the door hangers vs. Google ads vs. GBP settle the argument: hangers CAC $38 (double — hire a summer hanger crew), ads $95 (keep), the paper coupon book $600 (kill). Route density math from the playbook confirms the hanger verdict twice over."],
["Real estate","A landlord tags every listing link (UTM per platform). Zillow fills units in 9 days, Craigslist in 31 with double the no-shows. She stops posting to three platforms and writes the playbook line: 'Zillow first, Facebook second, nothing else.'"],
["Acquisition","A buyer's day-30 instrument check on the acquired company: install call tracking, add the how-did-you-hear field, build the five-number page. Month-two discovery — 70% of revenue is referral/repeat with zero system behind it (mk11's warning) — reprioritizes the entire 100-day plan toward the referral engine before any ad spend."]],
mistakes:["Running marketing on feelings and remembering only the recent anecdote","Trusting blended averages that hide a goldmine and a leak in one number","Letting vanity metrics (impressions, followers) into budget decisions"],
keys:["Five numbers monthly, by source: leads, CPL, close rate, CAC, LTV:CAC","Attribution: ask every lead + tracking numbers + UTMs — directional beats perfect","Every source faces a verdict: double, fix, or kill — sentiment is not a line item","Close the loop: worst number → next month's single experiment → codify the winner"],
assign:"Build the one-page dashboard for last month, by source, with your real (or best-guess) numbers: leads, CPL, close rate, CAC. Issue a written verdict per source — double/fix/kill — and name next month's single experiment.",
check:["Every lead gets asked and logged: 'how did you hear about us?'","I can produce CAC by source, not just blended","Each source has a current verdict: double, fix, or kill","My worst number has a named experiment running against it"],
books:["sci-advertising","lean-startup","mwm-okr"]}
]}
]}
