    {k:"Action",t:"Book of the Day",s:dailyPick(BOOKS).title,run:()=>openBook(dailyPick(BOOKS).id)},
    {k:"Action",t:"Run a Simulation",s:SIMS.length+" scored scenarios",run:()=>openLibrary("sims")},
    {k:"Action",t:"Placement Test",s:placementInfo()?"Retake — currently "+RANK_NAMES[placementInfo().rank]:"Find your starting level",run:()=>openPlacement()},
    {k:"Page",t:"Business Dictionary",s:allTerms.length+" terms",run:()=>openLibrary("terms")},
    {k:"Page",t:"Operator Labs",s:LABS.length+" builds with rubrics",run:()=>openLibrary("labs")},
    {k:"Action",t:"Toggle Light / Dark",s:"Switch appearance",run:()=>toggleAppearance()},
    {k:"Action",t:"Theme Gallery",s:"16 premium themes",run:()=>openThemes()}
  ];
}
function palRender(q){
  q=(q||"").trim().toLowerCase();
  let items=[];
  const acts=palActions().filter(a=>!q||(a.t+" "+a.s).toLowerCase().includes(q));
  items=acts.map(a=>({type:"act",...a}));
  if(q.length>=2){
    const hits=allLessons.filter(l=>q.split(/\s+/).every(w=>lessonHay(l).includes(w))).slice(0,9);
    items=items.slice(0,3).concat(hits.map(l=>({type:"lesson",t:l.t,s:l.track.name+" · "+l.level.tagline+" · "+l.module.name,k:done.has(l.id)?"✓":"Lesson",run:()=>openLesson(l.id)})));
  }
  palItems=items;palSel=0;
  palList.innerHTML=items.length?items.map((it,i)=>
    '<button class="palItem'+(i===palSel?" sel":"")+'" onmouseenter="palHover('+i+')" onclick="palGo('+i+')">'+
    '<span class="pi-ic">'+(it.type==="lesson"?ICONS.biz:ICONS.spark)+'</span>'+
    '<span class="pi-t"><b>'+esc(it.t)+'</b><span>'+esc(it.s)+'</span></span>'+
    '<span class="pi-k">'+it.k+'</span></button>'
  ).join(""):'<div class="empty">No matches — try another word.</div>';
}
function palHover(i){palSel=i;[...palList.children].forEach((c,j)=>c.classList&&c.classList.toggle("sel",j===i))}
function palGo(i){
  const it=palItems[i];if(!it)return;
  closePalette();it.run();
}
function openPalette(){
  palEl.classList.add("open");palInput.value="";palRender("");
  setTimeout(()=>palInput.focus(),40);
}
function closePalette(){palEl.classList.remove("open");palInput.blur()}
palInput.addEventListener("input",e=>palRender(e.target.value));
palInput.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown"){e.preventDefault();palSel=Math.min(palSel+1,palItems.length-1);palHover(palSel);palList.children[palSel]?.scrollIntoView({block:"nearest"})}
  else if(e.key==="ArrowUp"){e.preventDefault();palSel=Math.max(palSel-1,0);palHover(palSel);palList.children[palSel]?.scrollIntoView({block:"nearest"})}
  else if(e.key==="Enter"){e.preventDefault();palGo(palSel)}
});
palEl.addEventListener("click",e=>{if(e.target===palEl)closePalette()});

/* ================= TOAST ================= */
let toastT=null;
function toast(m){
  const el=document.getElementById("toast");
  el.textContent=m;el.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2200);
}

/* ================= KEYBOARD ================= */
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){
    e.preventDefault();
    palEl.classList.contains("open")?closePalette():openPalette();
    return;
  }
  if(e.key==="Escape"){
    if(palEl.classList.contains("open"))closePalette();
    else if(quizEl.classList.contains("open"))closeQuiz();
    else if(flashEl.classList.contains("open"))closeFlash();
    else if(sheetEl.classList.contains("open"))closeLesson();
    else if(certEl.classList.contains("open"))closeCert();
    else if(simEl.classList.contains("open"))closeSim();
    else if(labEl.classList.contains("open"))closeLab();
    else if(bookEl.classList.contains("open"))closeBook();
    else if(toolEl.classList.contains("open"))closeTool();
    else if(caseEl.classList.contains("open"))closeCase();
    else if(document.getElementById("themes").classList.contains("open"))closeThemes();
    return;
  }
  const typing=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement?.tagName||"");
  if(typing||palEl.classList.contains("open"))return;
  if(flashEl.classList.contains("open")&&fl&&fl.i<fl.deck.length){
    if(e.key===" "){e.preventDefault();flFlip()}
    return;
  }
  if(quizEl.classList.contains("open"))return;
  if(sheetEl.classList.contains("open")&&currentId){
    const le=byId[currentId];
    if(e.key==="ArrowRight"&&le.idx<allLessons.length-1)openLesson(allLessons[le.idx+1].id);
    if(e.key==="ArrowLeft"&&le.idx>0)openLesson(allLessons[le.idx-1].id);
  }else if(e.key==="/"){e.preventDefault();openPalette()}
});

const VARMAP={bg:"--bg",surface:"--surface",surface2:"--surface-2",hover:"--hover",raise:"--raise",
  edge:"--edge",edge2:"--edge-2",text:"--text",steel:"--steel",steel2:"--steel-2",light:"--light",

const THEME_KEY="bvTheme_v1",FAV_KEY="bvThemeFavs_v1";
const LIGHTP_KEY="bvLightTheme_v1",DARKP_KEY="bvDarkTheme_v1";
let curTheme=localStorage.getItem(THEME_KEY)||"azure";
let favs=new Set(JSON.parse(localStorage.getItem(FAV_KEY)||"[]"));

function isDarkTheme(th){return th.tags.split(" ").includes("dark")}
function applyTheme(id,animate){
  const th=THEMES.find(t=>t.id===id)||THEMES[0];
  curTheme=th.id;localStorage.setItem(THEME_KEY,curTheme);
  localStorage.setItem(isDarkTheme(th)?DARKP_KEY:LIGHTP_KEY,th.id);
  const root=document.documentElement;
  if(animate){root.classList.add("theming");setTimeout(()=>root.classList.remove("theming"),500)}
  for(const k in VARMAP)if(th.t[k]!==undefined)root.style.setProperty(VARMAP[k],th.t[k]);
  const mc=document.querySelector('meta[name="theme-color"]');if(mc)mc.setAttribute("content",th.t.bg);
  updateAppearBtn(th);
  renderThemes();
}
function updateAppearBtn(th){
  const dark=isDarkTheme(th);
  const ic=document.getElementById("appearIcon"),lb=document.getElementById("appearLabel");
  if(ic)ic.innerHTML=dark?ICONS.sun:ICONS.moon;
  if(lb)lb.textContent=dark?"Light":"Dark";
}
function toggleAppearance(){
  const th=THEMES.find(t=>t.id===curTheme)||THEMES[0];
  const goDark=!isDarkTheme(th);
  const target=goDark?(localStorage.getItem(DARKP_KEY)||"masterclass"):(localStorage.getItem(LIGHTP_KEY)||"azure");
  applyTheme(target,true);
  toast(goDark?"Dark mode":"Light mode");
}
function toggleFav(e,id){
  e.stopPropagation();
  if(favs.has(id))favs.delete(id);else favs.add(id);
  localStorage.setItem(FAV_KEY,JSON.stringify([...favs]));
  renderThemes();
}
function themeCard(th){
  const t=th.t,on=th.id===curTheme,fav=favs.has(th.id);
  return '<div class="tcard'+(on?" on":"")+'" onclick="applyTheme(\''+th.id+'\',true)">'+
    '<div class="tprev" style="background:'+t.bg+'">'+
      '<div class="tp-bar" style="background:'+t.face+'"></div>'+
      '<div class="tp-card" style="background:'+t.surface+';border:1px solid '+t.edge+'">'+
        '<div class="tp-line" style="background:'+t.text+'"></div>'+
        '<div class="tp-line s" style="background:'+t.steel+'"></div>'+
        '<div class="tp-btn" style="background:'+t.face+'"></div>'+
      '</div></div>'+
    '<button class="tstar'+(fav?" on":"")+'" onclick="toggleFav(event,\''+th.id+'\')" aria-label="Favorite">'+
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="'+(fav?"currentColor":"none")+'" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8-6.1-3.5-6.1 3.5 1.4-6.8L2.2 9.1l6.9-.8z"/></svg></button>'+
    '<div class="tname" style="color:var(--text)">'+th.name+(on?' <svg class="tcheck" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':'')+'</div>'+
    '<div class="ttags">'+th.tags.split(" ").slice(0,3).join(" · ")+'</div></div>';
}
function renderThemes(){
  const q=(document.getElementById("themeSearch")?.value||"").trim().toLowerCase();
  let list=THEMES.filter(th=>!q||(th.name+" "+th.tags).toLowerCase().includes(q));
  list=[...list.filter(t=>favs.has(t.id)),...list.filter(t=>!favs.has(t.id))];
  document.getElementById("tgrid").innerHTML=list.map(themeCard).join("");
  document.getElementById("tcount").textContent=list.length+" themes";
}
function openThemes(){renderThemes();document.getElementById("themes").classList.add("open");document.body.style.overflow="hidden"}
function closeThemes(){document.getElementById("themes").classList.remove("open");document.body.style.overflow=""}
document.getElementById("themeSearch").addEventListener("input",renderThemes);

/* ================= BOOT ================= */
applyTheme(curTheme,false);
