DATA.push({id:"money",name:"Money & Wealth",tag:"Personal Finance School",intro:"Master your own money before you master a company's. Two levels — from your first real budget to a personal balance sheet built for buying businesses. Educational content, not individualized financial, tax, or investment advice: confirm big moves with a licensed professional.",levels:[
{id:"M1",name:"Money Foundations",tagline:"Level 1",desc:"Cash flow, budgeting, credit, debt, and taxes — full command of your personal P&L",modules:[
{name:"Cash Management",lessons:[
{id:"mw1",t:"Run Your Life Like a P&L",q:"personal finance basics income expenses cash flow beginner",
p:["Everything the Business A–Z track taught you about a company's income statement applies to you personally: you have revenue (paychecks, side income), cost of goods sold (the non-negotiables that keep you alive — housing, food, transport), operating expenses (everything else you choose to spend), and a bottom line (what's left each month). Most people never calculate their personal net income, which is why most people are shocked to discover they earn six figures over a few years and keep none of it. The single most powerful move in personal finance is treating yourself as a business: know your monthly revenue, know your monthly burn, and know your margin — the percentage of income you keep. A business with a 0% margin is failing no matter how big its revenue; so is a household.",
"Your personal margin is also your freedom metric. A 20% margin means every five years of work buys you one year of not needing to work. A 50% margin means every year of work buys a year of freedom — that's the arithmetic behind every early-retirement story you've ever heard, and it's also the arithmetic behind every future business owner's first acquisition: down payments come from margin. Start this week: pull your last three months of bank and card statements, sort every dollar into revenue, essentials, and choices, and compute your margin. Do it monthly forever, the way a CFO closes the books. What gets measured gets managed — the rest of this school is just ways to widen that margin and deploy it."],
terms:[["Personal margin","The percentage of your income you keep after all spending — your household's profit margin."],["Burn rate","Total monthly spending; how fast you consume cash."],["Fixed vs. variable expenses","Costs that stay constant (rent) versus costs that flex with choices (dining out)."],["Net income (personal)","Income minus all expenses for the month — your bottom line."],["Monthly close","A set ritual of reviewing income, spending, and margin at month-end, like a CFO."]],
ex:"Two nurses each earn $75,000. Nurse A never tracks anything and finishes each year with a bigger truck payment. Nurse B closes her books monthly, holds a 30% margin, and after four years has $90,000 — enough for an SBA down payment on a $350,000 pest control route. Same job, same pay. The margin, not the income, decided who became an owner.",
keys:["You are a business: income statement thinking applies to your household exactly.","Margin (what you keep) matters more than income (what you make).","Track three months of statements, then close your books monthly.","Every path to ownership starts with personal margin — down payments are saved, not wished for."]},
{id:"mw2",t:"Budgeting Systems That Actually Work",q:"how to budget beginners 50 30 20 zero based budgeting",
p:["A budget is not a punishment — it's a pre-decision. Instead of wondering where money went, you decide where it goes before the month starts. Three proven systems, pick one: The 50/30/20 rule (50% of take-home to needs, 30% to wants, 20% to saving and debt payoff) is the simplest and best for beginners — three buckets, no spreadsheets. Zero-based budgeting assigns every single dollar a job until income minus assignments equals zero; it's the most powerful and the most work, and it's how well-run companies budget too. Pay-yourself-first flips the order: automatic transfers move your savings percentage out the moment a paycheck lands, and you're free to spend the rest guiltlessly — the system that survives human nature best, because it requires zero ongoing discipline.",
"Whichever system you choose, automate the skeleton: savings auto-transfer on payday, bills on autopay, one 'spending' account for the flexible stuff. The budget then runs itself and you only manage the exceptions — which is exactly how good operators run companies (systems handle the routine; attention goes to the anomalies). Two traps to avoid: budgets that are so strict they snap (leave real money for fun or you'll abandon the whole system by March), and 'budgeting' apps you check obsessively while changing nothing. The point is not tracking. The point is that your margin from lesson one is decided in advance and defended by automation."],
terms:[["50/30/20 rule","Take-home split: 50% needs, 30% wants, 20% savings and extra debt payments."],["Zero-based budget","Every dollar of income is assigned a job until nothing is unallocated."],["Pay yourself first","Savings move automatically on payday before any spending happens."],["Sinking fund","Small monthly set-asides for known irregular costs — car repairs, holidays, insurance premiums."],["Autopay skeleton","The automated structure of transfers and bill payments that runs a budget without willpower."]],
ex:"A door-to-door sales rep with wildly variable commissions sets up pay-yourself-first: 25% of every deposit auto-sweeps to savings the day it lands, rent and utilities on autopay from a bills account, and the remainder is his to spend freely. In slow months he feels it in his spending account, never in his savings. After 18 months he has $31,000 saved without ever having 'budgeted' a single evening.",
keys:["A budget is pre-deciding where money goes, not tracking where it went.","Pick one system: 50/30/20 (simplest), zero-based (most control), pay-yourself-first (most durable).","Automate savings and bills so the budget runs without willpower.","Budgets that allow no fun get abandoned — build in room to live."]},
{id:"mw3",t:"Spending: Plugging the Silent Leaks",q:"how to stop overspending money psychology impulse buying",
p:["Companies audit expenses line by line because small leaks compound into big losses — a $40/month unused software seat is $480 a year, and ten of them is a salary. Your personal spending works identically. The big three leaks: subscriptions you forgot (audit twice a year — most households find $50-150/month of zombie charges), convenience premiums (delivery fees, marked-up food — fine deliberately, deadly as a default habit), and the upgrade treadmill (each raise triggering a nicer car, phone, apartment — covered fully in the lifestyle inflation lesson). None of these are moral failures; they're systems failures. You don't fix them with guilt, you fix them with friction: delete stored cards from shopping apps, unsubscribe from marketing emails, impose a 48-hour rule on any purchase over a set threshold.",
"Learn the difference between price and cost. A $200 pair of boots resoled for a decade costs $20 a year; $60 boots replaced annually cost $60 a year — the 'cheap' option is triple the cost. Businesses call this total cost of ownership, and it applies to everything you buy: appliances, vehicles, tools, even credit (a low monthly payment on a long loan is a high total cost — the car lesson every dealership hopes you never learn). And flip the lens for big wins: the average household's top three lines are housing, transportation, and food, usually 60-70% of all spending. A 10% win on housing beats a hundred skipped lattes. Negotiate rent at renewal, buy the reliable used car, cook five nights a week — optimize the boulders, not the pebbles."],
terms:[["Zombie subscription","A recurring charge for something you no longer use — found only by auditing statements."],["48-hour rule","A self-imposed cooling-off period before any non-essential purchase above a set amount."],["Total cost of ownership","What something costs over its whole life — price plus upkeep, financing, and replacement."],["Convenience premium","The extra you pay for speed and ease — fine chosen deliberately, expensive as a habit."],["Big three","Housing, transportation, and food — typically 60-70% of household spending and the highest-leverage savings targets."]],
ex:"A young couple hunting for $200 in monthly savings almost cancels everything fun in their budget. A statement audit instead finds $85 of forgotten subscriptions, and a 20-minute rent negotiation at renewal (armed with comparable listings) saves another $75. They keep the streaming service they actually love and hit the target without feeling poorer — the boulders paid for the pebbles.",
keys:["Small recurring leaks compound — audit subscriptions twice a year like an expense review.","Use friction (48-hour rule, no stored cards), not guilt, to control impulse spending.","Judge purchases by total cost of ownership, not sticker price or monthly payment.","Optimize the big three (housing, transport, food) before micro-managing lattes."]},
{id:"mw4",t:"Saving & the Emergency Fund",q:"emergency fund how much to save high yield savings account",
p:["Before investing a single dollar, build the buffer that keeps you from becoming a forced seller of your own life. An emergency fund is 3-6 months of essential expenses (not income — the essentials number from your P&L lesson) held somewhere boring, liquid, and separate: a high-yield savings account, not your checking (too tempting), not stocks (the emergency and the market crash will arrive together — 2020 taught everyone this). Employees with stable jobs can live at the 3-month end; commission earners, business owners, and single-income households belong at 6 or more, because their income and their emergencies are correlated. This fund's job is not growth. Its yield is measured in avoided catastrophes: the car repair that doesn't go on a 27% credit card, the job loss that doesn't force a panicked fire-sale of investments, the ability to walk away from a bad employer or a bad deal.",
"Build it in stages so it doesn't feel impossible: first $1,000 fast (sell something, one hard month), then one month of essentials, then automate the rest over a year. Park it in a high-yield account where it earns real interest, and give it rules: it spends only on true emergencies (unexpected, necessary, urgent — a sale on flights is zero for three), and every withdrawal triggers an automatic refill plan. Once it's full, stop — beyond six months of essentials, extra cash should move up the ladder into investments, because the fund's purpose is protection, and protection has a price cap. Business owners will recognize this whole lesson: it's working capital and the 13-week cash cushion, wearing personal clothes."],
terms:[["Emergency fund","3-6 months of essential expenses in liquid savings — your personal working capital buffer."],["High-yield savings account","FDIC-insured savings paying meaningful interest — the standard home for emergency cash."],["Liquidity","How fast an asset converts to spendable cash without losing value."],["Forced seller","Someone who must sell assets at a bad time because they lack cash — the fate the fund prevents."],["Correlated risk","When your income and your emergencies arrive together (job loss in a recession) — reason for a bigger buffer."]],
ex:"Two techs at the same pest control company face the same transmission failure, $2,800. Tech A puts it on a card at 27% and pays $3,700 over two years. Tech B pays cash from her fund and refills it in four months, interest-free. Next year the company cuts routes: Tech B job-hunts calmly for two months and lands a better route; Tech A, broke and desperate, takes the first offer at lower pay. The fund didn't earn interest — it earned options.",
keys:["3-6 months of essential expenses, liquid and separate, before serious investing.","Match the buffer to income risk: variable income and single earners need the bigger end.","Stage it: $1,000 → one month → full, automated — then cap it and invest the rest.","The fund's return is avoided catastrophe and preserved options, not yield."]}
]},
{name:"Credit, Debt & Taxes",lessons:[
{id:"mw5",t:"Credit Scores & Credit Cards",q:"credit score explained how to build credit responsibly",
p:["Your credit score is a lender's shorthand for one question: does this person pay what they owe, on time? FICO scores (300-850) weigh five factors: payment history (35% — one 30-day late mark can cost 100 points and lingers for years), utilization (30% — the share of your card limits currently borrowed; keep it under 30%, ideally under 10%), length of history (15% — never close your oldest card), new credit (10% — each application dings you a few points briefly), and mix (10%). The score matters far beyond cards: it prices your mortgage, your car loan, your insurance in many states, sometimes your apartment application — and when you eventually buy a business, lenders will pull the owner's personal credit before they read a single financial statement. A 750+ score is a business asset. Build it the boring way: one or two cards, small recurring charge, autopay in full, forever.",
"Credit cards themselves are power tools — genuinely useful in trained hands, maiming in untrained ones. The rules of trained hands: pay the statement balance in full every month without exception (carrying a balance at 22-29% APR is how banks turn your $1,000 of spending into their $1,300), treat the limit as irrelevant (your budget is the limit), and let rewards be a bonus, never a motive (nobody ever got rich on 2% back; plenty went broke chasing it). If you currently carry card debt, that's not a character flaw — it's a 25% guaranteed-loss investment you should attack with everything, which is the next lesson. And one myth to kill: you do not need to carry a balance to build credit. Paying in full builds the same score and costs zero interest."],
terms:[["FICO score","The dominant credit score (300-850), weighing payment history, utilization, age, new credit, and mix."],["Utilization","Balances divided by credit limits — keep under 30% (under 10% is better) for score health."],["Statement balance","What you owe at cycle close — pay this in full monthly to avoid all interest."],["APR","Annual percentage rate — the yearly cost of carrying a balance, typically 20-29% on cards."],["Autopay in full","The set-and-forget setting that makes late payments and interest structurally impossible."]],
ex:"Before an SBA lender will finance a route-business acquisition, they pull the buyer's personal credit. Buyer A has a 640 (two old late payments, 60% utilization): the deal gets extra scrutiny, a co-signer demand, and a worse rate. Buyer B has a 780 built on five years of autopay-in-full: the same deal sails through underwriting. The score was built years before the opportunity appeared — that's the point.",
keys:["Payment history and utilization drive ~65% of your score — autopay in full and keep utilization under 30%.","Your personal credit prices your future mortgage, car, and business loan — treat 750+ as an asset.","Never carry a balance for 'credit building' — paying in full builds the same score free.","Card debt is a 20-29% emergency: if you have it, killing it outranks almost every other money move."]},
{id:"mw6",t:"Debt: Good, Bad, and How to Kill It",q:"debt payoff avalanche vs snowball method explained",
p:["Debt is a tool that moves money through time — and like any tool, it's judged by what you build with it. Productive debt buys assets that pay you: the SBA loan on a cash-flowing business (the entire acquisition track runs on it), the reasonable mortgage on a home you'd rent for more, the equipment loan where the machine out-earns its payment. Destructive debt buys depreciating things or vanished experiences at high rates: credit card balances, payday loans, the 84-month truck loan. The dividing line is simple: does the thing you bought generate more than the interest costs? A 10% business loan on a 25% cash-on-cash acquisition is wealth-building. A 24% card rate on last year's vacation is wealth-burning. Learn to read your own debts with a lender's eye: list every balance, rate, and minimum — most people have never once seen their full debt picture on one page.",
"Killing bad debt has two proven algorithms. The avalanche: minimums on everything, every spare dollar at the highest rate first — mathematically optimal, saves the most interest. The snowball: every spare dollar at the smallest balance first — mathematically imperfect, psychologically superior, because each account you kill frees its minimum payment and hands you a win that keeps you in the fight (research on debt payoff consistently finds completion matters more than optimization). Pick avalanche if you're a spreadsheet person, snowball if you've started and quit before, and never carry high-rate debt while 'investing' — paying off a 24% card is a guaranteed 24% return, which no market reliably offers. Two accelerants: negotiate (card companies reduce rates for customers who ask, and hardship programs exist), and consolidate only with a real plan — moving debt to a lower rate while continuing to overspend just refills the original cards."],
terms:[["Productive vs. destructive debt","Debt that buys cash-flowing assets versus debt on depreciating purchases at high rates."],["Debt avalanche","Attack the highest interest rate first — minimizes total interest paid."],["Debt snowball","Attack the smallest balance first — maximizes momentum and completion rates."],["Debt-to-income ratio (DTI)","Monthly debt payments divided by gross monthly income — lenders' key affordability gauge."],["Consolidation","Combining debts into one lower-rate loan — useful only if the overspending that created them stops."]],
ex:"An operator carries $18,000 across four cards (19-27%) plus a $9,000 truck loan at 6%. Avalanche math says the 27% card first; she chooses snowball for momentum, kills a $1,100 balance in month one, and rolls its $45 minimum forward. Every card is gone in 22 months. The truck loan at 6% she deliberately keeps — the spare cash now out-earns it in her business. Reading each debt by its rate, not its emotional weight, is the skill.",
keys:["Judge debt by what it bought: does the asset out-earn the interest?","List every balance, rate, and minimum on one page — you can't fight what you can't see.","Avalanche saves the most interest; snowball finishes more often — pick the one you'll sustain.","Paying off a 24% card is a guaranteed 24% return; do it before investing (keep cheap productive debt)."]},
{id:"mw7",t:"Personal Taxes Without Fear",q:"how income tax brackets work deductions credits explained",
p:["Taxes are most people's single largest lifetime expense, and most people refuse to spend two hours understanding them. Start with the myth that costs the most: 'a raise can push me into a higher bracket and I'll take home less.' False — the US system is marginal, meaning each bracket's rate applies only to the dollars inside that bracket. Moving from the 22% to the 24% bracket taxes only the dollars above the line at 24%; every dollar below keeps its old rate. Next distinction: deductions reduce the income you're taxed on (a $1,000 deduction in the 22% bracket saves $220), while credits reduce the tax bill dollar-for-dollar (a $1,000 credit saves $1,000 — credits are worth more). Most households simply take the standard deduction; itemizing only wins when mortgage interest, state taxes, and charity exceed it. Know your effective rate — total tax divided by total income — which is always far below your bracket, and is the honest number for planning.",
"The legal levers worth knowing: pre-tax retirement contributions (401(k), traditional IRA) delete income from this year's taxable line — a dollar contributed in the 22% bracket costs you 78 cents of take-home; HSAs are triple-exempt (deductible in, growing untaxed, tax-free out for medical) — the most tax-advantaged account in the entire code; and for the self-employed and side-hustlers, legitimate business expenses reduce business income before tax ever touches it — mileage, equipment, home office — with the golden rule being real, documented, and defensible (the Business A–Z tax lesson's write-off discipline applies personally). Withholding is just prepayment: a big refund means you gave the government a free loan all year, a big bill means you'll owe penalties — aim for roughly even. This is education, not tax advice: brackets and rules shift yearly, and one hour with a CPA the year your income gets complicated (side business, big gains, first rental) pays for itself many times over."],
terms:[["Marginal tax bracket","The rate applied only to dollars inside that bracket — raises never reduce take-home pay."],["Effective tax rate","Total tax divided by total income — your true overall rate, well below your top bracket."],["Deduction vs. credit","Deductions shrink taxable income; credits shrink the tax bill dollar-for-dollar."],["Standard deduction","The flat amount everyone may subtract instead of itemizing — the default for most households."],["HSA (Health Savings Account)","Triple tax-advantaged account: deductible going in, tax-free growth, tax-free out for medical costs."]],
ex:"A pest tech earning $62,000 panics about a $4,000 raise 'pushing him into the next bracket.' His CPA shows the math: only the top slice is taxed at the higher rate; the raise nets him about $3,000 after all taxes. Then she moves $3,000 of it into his 401(k) and an HSA — his taxable income barely rises, his take-home stays almost identical, and $3,000 is now compounding for him instead of vanishing. Two hours of tax literacy, thousands in lifetime difference.",
keys:["Brackets are marginal — a raise never lowers your take-home; the myth costs people real money.","Credits beat deductions dollar-for-dollar; most people correctly take the standard deduction.","Pre-tax accounts (401(k), HSA) are the biggest legal levers for W-2 earners; documented business expenses for the self-employed.","Know your effective rate, aim withholding near even, and buy a CPA hour when life gets complicated — this lesson is education, not advice."]}
]}
]},
{id:"M2",name:"Wealth Building",tagline:"Level 2",desc:"Investing, compounding, protection, and the pivot from saver to owner",modules:[
{name:"Investing & Compounding",lessons:[
{id:"mw8",t:"Investing Foundations: Risk, Return & Time",q:"investing for beginners risk return diversification explained",
p:["Investing is buying assets — things that pay you or grow while you sleep. Saving protects money; investing multiplies it; confusing the two directions is the classic error (savings in the market get crushed at the worst time; investments in a savings account get eaten by inflation, which quietly takes 2-3% of purchasing power every year — the guaranteed loss of doing nothing). Every investment is priced by one eternal trade: risk versus return. Treasury bonds pay little because they almost cannot fail; small-cap stocks pay more over decades because they can and do crater along the way. Anyone promising high returns with no risk is describing a fraud — that sentence, fully believed, immunizes you against every scheme you will ever be pitched. Your true edge as an ordinary investor isn't stock-picking genius; it's time horizon. Money needed within five years doesn't belong in stocks. Money untouched for twenty years barely notices crashes — every major index decline in history has been recovered and exceeded, but only for those who stayed.",
"Diversification is the one free lunch in finance: owning many assets that don't fail together removes the risk of any single disaster without reducing expected return. One stock can go to zero; a fund holding five thousand cannot, short of the end of commerce itself. The behavioral half matters more than the math: the market's long-run ~10% average annual return (about 7% after inflation) was earned only by investors who didn't sell in the crashes — and the average investor famously underperforms the very funds they hold, because they buy euphoric tops and sell panicked bottoms. Automate contributions monthly (dollar-cost averaging makes volatility your friend — the same dollars buy more shares when prices fall), ignore financial television, and treat your future business acquisition as part of the same portfolio thinking: index funds are the passive engine, and the operator skills from this university are your highest-return asset class of all."],
terms:[["Asset","Something that pays you or appreciates — stocks, bonds, real estate, businesses."],["Risk-return trade-off","Higher expected returns always carry higher volatility or failure risk — no exceptions, only frauds."],["Diversification","Spreading money across assets that don't fail together — the only free lunch in investing."],["Time horizon","When you'll need the money — the single biggest factor in what you should own."],["Dollar-cost averaging","Investing a fixed amount on a schedule, automatically buying more shares when prices are low."]],
ex:"In March 2020 two coworkers each held $50,000 in index funds as markets fell 34% in five weeks. One sold everything 'until things calm down' and re-entered a year later — locking in the loss and missing the rebound; he ended down about $15,000. The other kept her automatic $500 monthly buys running through the bottom; those crash-priced shares became the best purchases of her life. Same fund, same crash — temperament was the strategy.",
keys:["Savings protect, investments multiply — and inflation guarantees a slow loss on idle cash.","Risk and return are inseparable; 'high return, no risk' always means fraud.","Diversify broadly and match investments to time horizon: nothing needed within ~5 years belongs in stocks.","Behavior beats brilliance: automate monthly buys and never sell into a panic."]},
{id:"mw9",t:"Compound Interest & Index Funds",q:"compound interest index funds explained wealth building",
p:["Compounding is growth on top of growth, and its power hides in its back half. $500 a month at 8% is roughly $75,000 after ten years — but $745,000 after thirty, and about $1.7 million after forty. The last decade adds more than the first three combined, which is why the two levers that matter most are start date and staying in — not brilliance, not timing. Every year of delay in your twenties costs six figures at the end; the rule of 72 (72 divided by the return rate ≈ years to double) makes the mechanics visceral: at 8%, money doubles every nine years, so a dollar invested at 25 doubles roughly four times by 61 — sixteenfold — while the same dollar invested at 43 doubles twice. Compounding also runs in reverse: the 24% credit card compounds against you harder than any index compounds for you, which is why Level 1's debt lessons came first.",
"The vehicle that lets ordinary people actually capture market compounding is the index fund: one purchase that buys a sliver of every company in a market (the S&P 500, or the entire world), at near-zero cost, with no manager to pay or trust. The evidence is brutal and boringly consistent: over 15-year periods, roughly 90% of professional, highly paid active fund managers fail to beat the plain index — and you cannot know in advance which ten percent will. Fees compound exactly like returns, in reverse: a 1% annual fee sounds trivial and quietly consumes about a quarter of your final wealth over 40 years versus a 0.05% index fund. So the strategy that beats almost everyone is embarrassingly simple: automate monthly buys of a broad, low-cost index fund, reinvest the dividends, raise the amount with every raise, and let the decades do the work your emotions would ruin. Boring is the feature. (Educational, not investment advice — your allocations are your own.)",],
terms:[["Compound growth","Returns earned on prior returns — exponential, with the gains loaded at the end."],["Rule of 72","72 ÷ annual return ≈ years for money to double (8% → ~9 years)."],["Index fund","A fund that passively owns an entire market at minimal cost instead of picking stocks."],["Expense ratio","A fund's annual fee — 1% quietly consumes ~25% of final wealth over 40 years vs. ~0.05%."],["Dividend reinvestment","Automatically using payouts to buy more shares — the compounding flywheel's fuel."]],
ex:"Twins inherit $10,000 at 22. One invests it in a total-market index fund and adds nothing more; at 8% it's roughly $290,000 by 67. The other waits 'until things settle down' and invests the same $10,000 at 40 — reaching about $80,000. Identical money, identical fund, identical retirement date. The eighteen-year head start — four extra doublings — was worth more than $200,000. Start date is the strategy.",
keys:["Compounding back-loads its gains — start date and staying in beat brilliance and timing.","Rule of 72: at 8%, money doubles every ~9 years; every doubling you delay is paid at the end.","~90% of paid professionals lose to the plain index over 15 years; fees compound against you like returns compound for you.","Automate broad low-cost index buys, reinvest dividends, increase with raises — boring wins."]},
{id:"mw10",t:"Retirement Accounts & Tax-Advantaged Investing",q:"401k IRA Roth explained beginners retirement accounts",
p:["Retirement accounts aren't investments — they're tax wrappers around your investments, and choosing wrappers well is worth six figures over a career. The traditional 401(k)/IRA deal: contribute pre-tax now (saving your marginal rate), pay income tax when you withdraw in retirement — a bet that your tax rate will be lower later. The Roth deal is the mirror: pay tax now, and every dollar of decades of growth comes out completely tax-free — a bet your rate is lower today, which is usually true early in your career. The order of operations almost everyone should follow: first, contribute enough to your 401(k) to capture the full employer match (a 50-100% instant, guaranteed return — refusing it is declining free salary); second, kill high-interest debt; third, max an HSA if eligible (the triple-tax-free unicorn from the tax lesson — deductible in, tax-free growth, tax-free out for medical, and after 65 it behaves like a traditional IRA); fourth, Roth IRA; fifth, back to the 401(k) toward its max; and only then taxable brokerage accounts.",
"Inside the wrappers, everything from the index fund lesson applies — broad, low-cost funds; many 401(k)s offer target-date funds that handle diversification and gradually de-risk as retirement nears, a perfectly good one-decision default. Mind the details that bite: 401(k) matches often vest over years (leaving early can forfeit them), early withdrawals generally cost a 10% penalty plus taxes (retirement money is one-way glass until 59½, with narrow exceptions), and when you change jobs, roll the old 401(k) into an IRA or the new plan — millions of orphaned accounts leak fees in forgotten plans. For future business buyers, funded retirement accounts serve a quieter role too: lenders read them as evidence of discipline and as a personal safety net that makes your loan less risky. Contribution limits and rules change yearly and phase out at higher incomes — confirm current numbers, and treat this as education, not individualized advice."],
terms:[["Tax wrapper","An account type (401(k), IRA, Roth, HSA) that changes how investments inside it are taxed."],["Employer match","Free salary paid into your 401(k) when you contribute — a guaranteed 50-100% instant return."],["Roth vs. traditional","Pay tax now and withdraw free (Roth) vs. deduct now and pay tax later (traditional)."],["Target-date fund","A one-decision fund that diversifies and automatically de-risks as its target year approaches."],["Vesting","The schedule by which employer contributions become permanently yours."]],
ex:"A 26-year-old car wash assistant manager earning $52,000 follows the order of operations: 5% into the 401(k) captures the full match ($1,300 of free money yearly), then a Roth IRA takes $300/month. At 8%, the Roth alone — taxed once at her current low rate — is on track to hold roughly $700,000 tax-free at 65. Her coworker 'can't afford' the 401(k) contribution and forfeits the match: he declines $1,300 of salary every year for thirty years, roughly $160,000 of compounded free money.",
keys:["Accounts are tax wrappers, not investments — the wrapper choice is worth six figures.","Never skip the employer match: it's a guaranteed 50-100% return and part of your pay.","Order of operations: match → kill high-interest debt → HSA → Roth IRA → max 401(k) → taxable.","Rules, limits, and phase-outs change yearly — verify current numbers; education, not advice."]}
]},
{name:"Protection & Assets",lessons:[
{id:"mw11",t:"Insurance: Buying Certainty",q:"what insurance do I actually need term life explained",
p:["Insurance is the business of selling certainty: you pay a small known cost to delete a catastrophic unknown one. The operator's rule for what to insure is simple — insure the losses you cannot absorb, self-insure the ones you can. A totaled $8,000 car with $30,000 in savings is an annoyance; a liability judgment, a house fire, or the death of a family breadwinner is a life-ending balance sheet event. So the essential stack: health insurance (medical bills remain a leading cause of American bankruptcy — never go uncovered), auto liability well above state minimums (the mandated minimums won't survive one serious accident), homeowners or renters (renters insurance costs roughly $15-25/month and most renters wrongly skip it), term life if anyone depends on your income (10-12× income, 20-30 year term), and disability — the most under-bought policy in America, despite your earning power being your single largest asset and a disabling injury being far likelier during working years than death.",
"Now the other half: what not to buy. Whole life and universal life bundle expensive insurance with a mediocre investment and pay the salesperson enormous commissions — 'buy term and invest the difference' wins the math for nearly everyone (business uses like key-person coverage and estate planning are the exceptions, and they arrive much later in your wealth). Skip extended warranties on cheap electronics, insurance on rental cars your credit card already covers, and any policy protecting a loss you could pay from your emergency fund. Then work the deductible lever: raising deductibles to the maximum your fund can absorb cuts premiums meaningfully — you're self-insuring the small stuff, which is exactly what your Level 1 buffer is for. Finally, once your net worth grows past the low six figures, a $1-2M umbrella policy costs a few hundred dollars a year and shields everything you're building from one bad moment. Review the whole stack annually and at every life event; coverage that fit at 25 rarely fits at 35."],
terms:[["Self-insure","Deliberately absorbing small risks yourself because your emergency fund can pay them."],["Term life insurance","Pure death-benefit coverage for a set period — cheap certainty for dependents, no investment bundled."],["Disability insurance","Replaces income if you can't work — protects your largest asset, your earning power."],["Deductible lever","Raising deductibles to what your fund absorbs, cutting premiums by self-insuring small losses."],["Umbrella policy","Cheap extra liability coverage ($1-2M) above auto/home limits protecting your whole net worth."]],
ex:"A 34-year-old pest control owner with a spouse, two kids, and a growing business buys a $1M 25-year term policy for about $40/month and long-term disability at 2% of income — then declines the whole-life pitch that cost eight times more for a fifth of the coverage. Two years later a rotator cuff injury takes him off ladders for seven months; disability checks cover the household while his ops manager runs routes. The 'boring' policies kept the business, the house, and the plan intact.",
keys:["Insure only what would wreck you: health, serious liability, income (life + disability), home.","Buy term life and invest the difference — bundled insurance-investments serve the salesperson.","Raise deductibles to your emergency fund's level; skip warranties and small-loss policies.","Add a cheap umbrella policy as net worth grows; re-shop the stack at every life event."]},
{id:"mw12",t:"Real Estate & Your Home",q:"rent vs buy house hacking real estate wealth beginners",
p:["Housing is where most households build their first real equity — and where most also overspend catastrophically, so this lesson cuts both ways. Rent versus buy is math, not morality: renting is not 'throwing money away' (it buys shelter plus flexibility, with zero exposure to roofs, taxes, and 6% selling costs), and owning is a leveraged, illiquid, concentrated asset with high transaction costs that typically only beats renting if you stay 5+ years. Run the real comparison: total ownership cost (mortgage interest, taxes, insurance, maintenance at ~1-2% of home value yearly, opportunity cost of the down payment) against rent for an equivalent home. When you do buy, the classic guardrails: total housing below ~28% of gross income, 30-year fixed rate (predictability is worth more than the rate discount of adjustable loans), and buy less house than the bank approves — lenders approve payments that leave no margin, and your margin is the whole wealth plan from lesson one.",
"Owning where you live is forced saving; owning where others live is a business — the landlord's income statement: rent minus mortgage, taxes, insurance, maintenance, vacancy, and management equals cash flow, and the returns stack four ways (cash flow, principal paydown by the tenant, appreciation, and tax advantages like depreciation). The lowest-risk on-ramp is house hacking: buy a duplex-to-fourplex with an owner-occupied low-down-payment loan (FHA-style, ~3.5% down), live in one unit, and let the neighbors' rent pay most or all of your mortgage — you learn landlording with training wheels while someone else buys your equity. The same deal-discipline as the acquisition track applies: run the numbers on paper before you fall in love, screen tenants like hires, keep reserves for the roof and the vacancy, and remember the 1% rough screen (monthly rent near 1% of purchase price merits a closer look — rarer in hot markets, a filter not a law). Real estate rewards patience and math; it punishes house-rich, cash-poor romantics. Deeper deal analysis lives in the Real Estate school when it opens — this is the personal-wealth foundation."],
terms:[["Rent vs. buy math","Comparing full ownership cost (interest, taxes, upkeep, opportunity cost) to equivalent rent — not a morality tale."],["House hacking","Living in one unit of a small multifamily bought with a low-down owner-occupied loan while rents cover the mortgage."],["Cash flow (rental)","Rent minus all expenses including vacancy, maintenance, and management — the landlord's bottom line."],["Principal paydown","The slice of each mortgage payment that becomes your equity — paid by tenants in a rental."],["1% screen","Rough filter: monthly rent ≈ 1% of purchase price suggests a deal worth deeper analysis."]],
ex:"A 27-year-old car wash shift lead buys a $310,000 duplex with 3.5% down instead of a $280,000 single-family. She lives in one unit; the other rents for $1,450 against a $1,950 all-in payment. Effectively paying $500 to live where rent would cost $1,300, she banks the difference for three years, then moves out, rents both units, and repeats. At 30 she owns two doors, cash flow, and a landlord's education — her single-family friends own a payment.",
keys:["Renting buys flexibility; owning wins with 5+ year horizons — run total cost, not slogans.","Buy less house than approved: under ~28% of gross, 30-year fixed, margin preserved.","Rentals pay four ways (cash flow, paydown, appreciation, tax) — but only when bought with math, not emotion.","House hacking is the lowest-risk entry: your tenants fund your first equity while you learn."]}
]},
{name:"Wealth Habits",lessons:[
{id:"mw13",t:"Lifestyle Inflation: The Silent Wealth Killer",q:"lifestyle inflation explained millionaire next door habits",
p:["Here is the pattern that keeps high earners poor: every raise triggers an upgrade — car, apartment, wardrobe, restaurants — so spending rises in lockstep with income and the margin never widens. It's why the data behind The Millionaire Next Door still shocks people: most actual millionaires drive used cars and live in modest neighborhoods, while many six-figure professionals in luxury zip codes are one missed paycheck from crisis. Wealth is the gap between income and spending, compounded over time — income alone predicts almost nothing. Lifestyle inflation is doubly vicious because it compounds in reverse: each upgrade becomes the new baseline your happiness adapts to within months (hedonic adaptation), so you carry permanently higher costs with zero permanent joy — and needing more to live means needing more to retire, more to feel safe, more before you can risk starting or buying a business.",
"You don't beat it with monkish deprivation — you beat it with a rule made in advance: split every raise. When income jumps, direct 50% (or more) of the increase to automatic savings and investments before you ever feel it in checking, and genuinely enjoy the rest guilt-free. Your lifestyle still improves — slower than your income — and the margin widens with every step of your career, which is the entire wealth game in one sentence. Guard the peak years hardest: commission windfalls, bonuses, and boom seasons feel permanent and never are (ask any D2D closer after summer, or any car wash owner after a drought year) — set a baseline lifestyle you can hold in the lean months and bank the spikes. And audit your status purchases honestly: the truck, the watch, the neighborhood — bought for you, or for an audience that isn't paying your bills? The wealthy-looking and the wealthy are usually different people. Choose which one you're becoming."],
terms:[["Lifestyle inflation","Spending that rises automatically with income, keeping the wealth-building margin flat forever."],["Hedonic adaptation","The psychological reset that makes every upgrade feel normal within months — permanent cost, temporary joy."],["Split-the-raise rule","Pre-committing 50%+ of every income increase to automatic investing before it reaches checking."],["Baseline lifestyle","The spending level you hold through variable income — funded by lean months, not peaks."],["Stealth wealth","High net worth with modest consumption — the statistically dominant millionaire profile."]],
ex:"Two D2D sales reps each clear $140,000 in a monster summer. Rep A leases a $1,100/month truck, upgrades apartments, and by February is borrowing against next summer. Rep B holds his $4,000/month baseline, banks the spike, and finishes the year with $60,000 invested. Three summers later Rep B buys a small pest route with cash flow that pays him in January; Rep A needs another hot summer just to stay even. Same income — opposite trajectories.",
keys:["Wealth = the income-spending gap compounded; income alone predicts nothing.","Upgrades become invisible baselines within months — permanent cost, temporary happiness.","Split every raise in advance: half to automatic investing, half to a better life.","Variable earners: set a lean-month baseline and bank every spike — peaks always feel permanent and never are."]},
{id:"mw14",t:"Your Personal Balance Sheet & the Owner Pivot",q:"net worth tracking personal balance sheet financial independence",
p:["Level 1 gave you a personal income statement; this capstone gives you the balance sheet — and with it, the full CFO view of your own life. List assets (cash, investments, retirement accounts, home equity, business equity) minus liabilities (cards, loans, mortgage): net worth. Track it quarterly, and watch its composition, not just its size: early on it's mostly cash and a car; as the school's lessons compound it shifts toward productive assets — index funds, equity, eventually a business. That composition shift is the scoreboard of everything you've learned here. Pair it with your freedom number: annual essential spending × 25 (the practical inverse of a ~4% sustainable withdrawal rate) tells you roughly what invested wealth makes work optional. Notice the lever most people miss: the number is built on spending, not income — every $100/month of permanent lifestyle trimmed doesn't just save money, it cuts $30,000 off the wealth you need. Lesson thirteen and this one are the same lesson wearing different clothes.",
"Now the pivot this whole university has been building toward: savers reach the freedom number in thirty-five years; owners can compress the timeline, because businesses are assets you can buy with other people's money and improve with your own skill. The $200,000 route business bought with $30,000 down that cash-flows $60,000 a year is a return no index fund offers — because it pays you for the operator knowledge the other tracks taught, not just for your capital. That's not a reason to skip the boring foundation; it's the reason the foundation matters: the emergency fund keeps a rough quarter from killing the deal, the 750 credit score gets the SBA loan approved, the personal margin funded the down payment, the insurance stack protects the downside, and the index funds diversify you away from your own company's risk. Your personal balance sheet is the launchpad; the acquisition track is the rocket. Update the net worth sheet quarterly, keep widening the margin, and when the numbers on your personal statements look like a lender's dream — start reading the Acquisition lessons like an operator, because you'll be ready to become one."],
terms:[["Net worth","Assets minus liabilities — the single number tracking your whole financial life."],["Asset composition","What your net worth is made of — the shift from cash toward productive assets is the real scoreboard."],["Freedom number","Annual essential spending × 25 — roughly the invested wealth at which work becomes optional."],["4% guideline","The sustainable-withdrawal rule of thumb behind the ×25 math (a planning tool, not a guarantee)."],["Owner pivot","Deploying personal financial strength (margin, credit, reserves) to acquire cash-flowing businesses."]],
ex:"After four years of this school's habits, an operations manager's balance sheet reads: $18,000 emergency fund, $64,000 index funds, $41,000 retirement, 765 credit score, zero card debt — net worth $123,000 and climbing $2,400 monthly. A lender sees a dream borrower; she sees a launchpad. She puts $35,000 down on a $380,000 pest control company via SBA loan. Its $85,000 cash flow triples her savings rate — the personal foundation didn't delay her ownership dream; it's what made the bank say yes.",
keys:["Net worth = assets − liabilities; track quarterly and watch composition shift toward productive assets.","Freedom number ≈ essential spending × 25 — cutting permanent spending shrinks the target itself.","Personal financial strength is acquisition readiness: margin, credit, reserves, and protection make lenders say yes.","Savers reach freedom in decades; owners compress it — this school funds the foundation, the Acquisition track lights the rocket."]}
]}
]}
]});

{id:"personal-mba",title:"The Personal MBA",author:"Josh Kaufman",cat:"Foundations",diff:"Beginner",

rel:["f1","f2","x2"],

ex:"Take a business you know (your employer, a local car wash) and write one paragraph on how it handles each of the five systems. Which is weakest?"},
{id:"emyth",title:"The E-Myth Revisited",author:"Michael E. Gerber",cat:"Operations",diff:"Beginner",
why:"Explains the single most common small-business death: a skilled technician who buys a job instead of building a system. Required before you ever hire.",

best:["Entrepreneur, manager, technician — all three live in you and want different things.","If your business needs you every hour, you own a job, not a company.","Document every process as if you'd franchise it tomorrow."],
rel:["c9","p11","w7"],

{id:"the-goal",title:"The Goal",author:"Eliyahu M. Goldratt",cat:"Operations",diff:"Intermediate",
