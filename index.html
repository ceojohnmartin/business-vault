<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BVU">
<meta name="theme-color" content="#eef3fb">
<meta name="description" content="Business Vault University — master business from zero to operator.">
<title>Business Vault University</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3fb;--surface:#ffffff;--surface-2:#f7faff;--hover:#e9f0fb;--raise:#f0f5fc;
    --edge:#dde7f5;--edge-2:#c6d6ee;
    --text:#0f1b2d;--steel:#7e8aa0;--steel-2:#48566e;--light:#22324a;
    --blue:#2f6fed;--blue-2:#1d4fd0;--blue-3:#86abf4;
    --blue-soft:rgba(47,111,237,.10);--blue-glow:rgba(47,111,237,.32);
    --blue-line:linear-gradient(90deg,#3b82f6,#1d4fd0);
    --blue-face:linear-gradient(135deg,#5b9bf5,#2f6fed 55%,#1d4fd0);
    --green:#16a34a;--green-soft:rgba(22,163,74,.12);
    --red:#e2564f;--amber:#f59e0b;
    --shadow:rgba(30,58,120,.12);
    --card-sh:0 1px 2px rgba(30,58,120,.05),0 10px 26px -16px rgba(30,58,120,.22);
    --oswald:'Oswald',system-ui,sans-serif;
    --inter:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --font-d:var(--oswald);
    --on-accent:#ffffff;
    --body-grad:radial-gradient(900px 500px at 90% -12%,rgba(47,111,237,.08),transparent 60%),radial-gradient(700px 420px at -6% -4%,rgba(91,155,245,.06),transparent 55%),linear-gradient(180deg,#f5f9ff,#e9f1fb);
    --glass:rgba(255,255,255,.85);
    --seg-bg:rgba(233,240,251,.9);
    --brand-face:linear-gradient(150deg,#e8f1ff,#cfe1fb);
    --video-bg:#0f1b2d;
    --hero-glow:rgba(47,111,237,.12);
    --r-lg:18px;--r-card:14px;--r-btn:11px;
    --sb-w:264px;
  }
  html.theming, html.theming *{transition:background .35s ease,background-color .35s ease,color .35s ease,border-color .35s ease,box-shadow .35s ease!important}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--inter);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    background:var(--body-grad);
    background-attachment:fixed;min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .mono{font-family:var(--mono)}
  kbd{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:5px;background:var(--hover);border:1px solid var(--edge-2);color:var(--steel-2)}

  /* ================= APP SHELL ================= */
  .shell{display:flex;min-height:100vh}
  .main{flex:1;min-width:0}

  /* ---- sidebar (desktop) ---- */
  .sidebar{
    display:none;position:fixed;top:0;bottom:0;left:0;width:var(--sb-w);z-index:70;
    flex-direction:column;background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
    border-right:1px solid var(--edge);padding:20px 14px 16px;overflow-y:auto;
  }
  .sb-brand{display:flex;align-items:center;gap:11px;padding:2px 8px 16px}
  .sb-brand .brandname{font-size:13.5px}
  .sb-search{
    display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;margin-bottom:14px;
    border-radius:var(--r-btn);background:var(--surface);border:1px solid var(--edge);color:var(--steel);
    font-size:13px;font-weight:500;box-shadow:var(--card-sh);transition:border-color .15s;
  }
  .sb-search kbd{margin-left:auto}
  @media(hover:hover){.sb-search:hover{border-color:var(--blue-3);color:var(--steel-2)}}
  .sb-sec{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--steel);font-weight:700;padding:14px 10px 7px}
  .sb-item{
    display:flex;align-items:center;gap:11px;width:100%;padding:10px 11px;border-radius:10px;
    font-size:13.5px;font-weight:600;color:var(--steel-2);text-align:left;
    transition:background .14s,color .14s;position:relative;
  }
  .sb-item svg{flex-shrink:0;opacity:.85}
  .sb-item .n{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--steel);font-weight:500}
  @media(hover:hover){.sb-item:hover{background:var(--hover);color:var(--text)}}
  .sb-item.active{background:var(--blue-soft);color:var(--blue-2)}
  .sb-item.active::before{content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--blue-line)}
  .sb-foot{margin-top:auto;padding-top:16px;display:flex;flex-direction:column;gap:8px}
  .sb-chips{display:flex;gap:8px}
  .sb-chips>*{flex:1;justify-content:center}
  .sb-btnrow{display:flex;gap:8px}
  .sb-tool{
    flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 10px;border-radius:10px;
    background:var(--surface);border:1px solid var(--edge);color:var(--steel-2);font-size:12px;font-weight:600;
    transition:border-color .15s,color .15s;
  }
  @media(hover:hover){.sb-tool:hover{border-color:var(--blue-3);color:var(--blue-2)}}

  /* ---- brand ---- */
  .brandmark{
    width:36px;height:36px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;overflow:hidden;
    background:var(--brand-face);border:1px solid var(--blue-3);color:var(--blue-2);
    box-shadow:0 0 14px rgba(47,111,237,.18),inset 0 1px 0 rgba(255,255,255,.6);
  }
  .brandmark img{width:100%;height:100%;object-fit:cover;display:block}
  .brandname{font-family:var(--font-d);font-weight:700;font-size:15px;letter-spacing:.16em;color:var(--text)}
  .brandname small{display:block;font-family:var(--mono);font-size:7.5px;letter-spacing:.34em;color:var(--steel);font-weight:500;margin-top:1px}

  /* ---- top bar ---- */
  .top{
    position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;
    padding:calc(12px + env(safe-area-inset-top)) 18px 12px;
    background:var(--glass);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);
    border-bottom:1px solid var(--edge);
  }
  .top .brandwrap{display:flex;align-items:center;gap:10px}
  .pageTitle{display:none;font-family:var(--font-d);font-weight:600;font-size:17px;letter-spacing:.04em}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .streak{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:9px;background:var(--surface);border:1px solid var(--edge);font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--amber)}
  .masteryChip{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:9px;background:var(--blue-soft);border:1px solid var(--blue-3);font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--blue-2)}
  .iconBtn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--edge);color:var(--steel-2);flex-shrink:0;transition:border-color .15s,color .15s}
  .iconBtn:active{transform:scale(.93)}
  @media(hover:hover){.iconBtn:hover{border-color:var(--blue-3);color:var(--blue-2)}}

  /* ================= VIEWS ================= */
  .view{max-width:760px;margin:0 auto;padding:18px 16px calc(96px + env(safe-area-inset-bottom));display:none;flex-direction:column;gap:14px;animation:fadeUp .4s ease}
  .view.active{display:flex}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ================= COMMON ================= */
  .panel{background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-lg);padding:18px;box-shadow:var(--card-sh)}
  .chipBadge{
    display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:100px;
    background:var(--blue-soft);border:1px solid var(--blue-3);color:var(--blue-2);
    font-size:12.5px;font-weight:600;width:fit-content;
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--r-btn);
    background:var(--blue-face);color:var(--on-accent);font-weight:700;font-size:14px;border:1px solid var(--blue-2);
    box-shadow:0 8px 22px -10px var(--blue-glow),inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .12s ease,filter .12s ease;white-space:nowrap;text-decoration:none;
  }
  .btn:active{transform:translateY(1px);filter:brightness(.97)}
  @media(hover:hover){.btn:hover{filter:brightness(1.07);transform:translateY(-1px)}}
  .btn.green{background:linear-gradient(135deg,#4ade80,#16a34a 55%,#15803d);border-color:#15803d;box-shadow:0 8px 22px -10px rgba(22,163,74,.4),inset 0 1px 0 rgba(255,255,255,.3)}
  .btn.ghost{background:var(--surface);color:var(--blue-2);border:1px solid var(--edge-2);box-shadow:var(--card-sh)}
  .btn.full{width:100%;padding:15px;font-size:15px}
  .btn.danger{background:var(--surface);color:var(--red);border:1px solid var(--edge-2);box-shadow:var(--card-sh)}
  .sectionHead{display:flex;align-items:center;gap:9px;margin:6px 2px -4px}
  .sectionHead i{width:4px;height:17px;border-radius:3px;background:var(--blue-line);flex-shrink:0}
  .sectionHead h3{font-family:var(--font-d);font-weight:600;font-size:16px;letter-spacing:.05em}
  .sectionHead .mono{margin-left:auto;font-size:11px;color:var(--steel);font-weight:500}
  .ring-track{fill:none;stroke:var(--hover);stroke-width:5}
  .ring-fill{fill:none;stroke:url(#blueGrad);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)}
  .empty{text-align:center;color:var(--steel);font-size:13px;padding:30px 16px}
  .footerNote{text-align:center;font-family:var(--mono);color:var(--steel);font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:14px 0 4px}
  .backlink{display:inline-flex;align-items:center;gap:7px;color:var(--blue-2);font-size:13px;font-weight:700;padding:2px 2px;width:fit-content}

  /* ================= DASHBOARD ================= */
  .greet{padding:4px 4px 0}
  .greet small{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--steel);font-weight:700;margin-bottom:5px}
  .greet h1{font-family:var(--font-d);font-weight:700;font-size:clamp(24px,6vw,32px);line-height:1.1;letter-spacing:.01em}
  .heroDash{
    position:relative;overflow:hidden;display:flex;align-items:center;gap:18px;
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-lg);padding:22px 20px;box-shadow:var(--card-sh);
  }
  .heroDash::after{content:"";position:absolute;right:-70px;top:-70px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle,var(--hero-glow),transparent 65%);pointer-events:none}
  .heroDash .hd-body{flex:1;min-width:0;position:relative;z-index:1}
  .heroDash .hd-kicker{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue-2);font-weight:700}
  .heroDash h2{font-family:var(--font-d);font-weight:700;font-size:clamp(20px,5vw,26px);line-height:1.18;margin:8px 0 4px}
  .heroDash .hd-crumb{font-size:12.5px;color:var(--steel);margin-bottom:15px}
  .heroDash .hd-cta{display:flex;gap:10px;flex-wrap:wrap}
  .heroDash .hd-ring{position:relative;flex-shrink:0;width:92px;height:92px;z-index:1}
  .heroDash .hd-ring svg{transform:rotate(-90deg)}
  .heroDash .hd-ring b{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:17px;font-weight:700;color:var(--blue-2)}
  .heroDash .hd-ring span{position:absolute;left:0;right:0;bottom:-19px;text-align:center;font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--steel);font-weight:700}
  @media(max-width:520px){.heroDash .hd-ring{display:none}}
  .statGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:560px){.statGrid{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:14px 8px;text-align:center;box-shadow:var(--card-sh)}
  .stat b{display:block;font-family:var(--mono);font-size:26px;font-weight:700;line-height:1.1;color:var(--text)}
  .stat b.c-blue{color:var(--blue)}.stat b.c-green{color:var(--green)}.stat b.c-red{color:var(--red)}.stat b.c-amber{color:var(--amber)}
  .stat span{display:block;font-size:11.5px;color:var(--steel);margin-top:4px;font-weight:500}
  .duoGrid{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:680px){.duoGrid{grid-template-columns:1fr 1fr}}
  .mini{
    display:flex;flex-direction:column;gap:9px;text-align:left;
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:15px 16px;box-shadow:var(--card-sh);
    transition:transform .25s cubic-bezier(.22,1,.36,1),border-color .2s;color:var(--text);
  }
  .mini:active{transform:scale(.985)}
  @media(hover:hover){.mini:hover{border-color:var(--blue-3);transform:translateY(-1px)}}
  .mini .m-k{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--blue-2)}
  .mini b{font-size:14.5px;font-weight:600;line-height:1.35}
  .mini span{font-size:11.5px;color:var(--steel)}
  .snap{display:flex;flex-direction:column;gap:12px}
  .snap-row{display:flex;align-items:center;gap:11px}
  .snap-label{flex:0 0 108px;font-size:12.5px;color:var(--steel-2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .snap-bar{flex:1;height:8px;border-radius:5px;background:var(--hover);overflow:hidden}
  .snap-fill{height:100%;background:var(--blue-line);border-radius:5px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .snap-n{flex:0 0 52px;text-align:right;font-family:var(--mono);font-size:11.5px;color:var(--text);font-weight:700}

  /* ================= COURSES ================= */
  .course{
    display:flex;align-items:center;gap:15px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-lg);padding:18px 17px;box-shadow:var(--card-sh);
    transition:transform .25s cubic-bezier(.22,1,.36,1),border-color .2s,box-shadow .2s;color:var(--text);
  }
  .course:active{transform:scale(.985)}
  @media(hover:hover){.course:hover{border-color:var(--blue-3);transform:translateY(-2px);box-shadow:0 6px 18px -6px var(--shadow),0 14px 34px -18px var(--shadow)}}
  .course .c-icon{
    width:52px;height:52px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;
    background:var(--blue-soft);color:var(--blue-2);border:1px solid var(--blue-3);
  }
  .course .c-t{flex:1;min-width:0}
  .course .c-t b{display:block;font-family:var(--font-d);font-weight:600;font-size:17px;letter-spacing:.02em}
  .course .c-t span{display:block;font-size:12px;color:var(--steel);margin:3px 0 9px;line-height:1.45}
  .course .c-bar{height:7px;border-radius:4px;background:var(--hover);overflow:hidden;max-width:280px}
  .course .c-bar i{display:block;height:100%;background:var(--blue-line);border-radius:4px}
  .course .c-ring{position:relative;width:52px;height:52px;flex-shrink:0}
  .course .c-ring svg{transform:rotate(-90deg)}
  .course .c-ring b{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blue-2)}
  .soon{border-style:dashed;opacity:.8}
  .soon .c-icon{background:var(--hover);color:var(--steel);border-color:var(--edge-2)}

  /* ================= TRACK / SKILL PATH ================= */
  .segWrap{position:sticky;top:calc(61px + env(safe-area-inset-top));z-index:20;padding:2px 0}
  .seg-group{
    display:flex;gap:4px;padding:4px;border-radius:var(--r-card);overflow-x:auto;scrollbar-width:none;
    background:var(--seg-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--edge);
  }
  .seg-group::-webkit-scrollbar{display:none}
  .seg{flex:1 0 auto;padding:9px 14px;border-radius:9px;font-size:12.5px;color:var(--steel-2);font-weight:600;white-space:nowrap;transition:color .16s ease,background .18s cubic-bezier(.22,1,.36,1),box-shadow .18s ease;text-align:center}
  .seg.on{background:var(--surface);color:var(--blue-2);box-shadow:0 2px 8px -2px var(--shadow),inset 0 0 0 1px var(--edge)}
  .seg .mono{font-size:10px;margin-left:5px;opacity:.75}
  .levelMeta{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:14px 16px;box-shadow:var(--card-sh)}
  .levelMeta .lm-ring{position:relative;width:48px;height:48px;flex-shrink:0}
  .levelMeta .lm-ring svg{transform:rotate(-90deg)}
  .levelMeta .lm-ring b{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--blue-2)}
  .levelMeta .lm-t b{display:block;font-family:var(--font-d);font-weight:600;font-size:16.5px;letter-spacing:.02em}
  .levelMeta .lm-t span{display:block;font-size:12px;color:var(--steel);margin-top:2px}
  .moduleName{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);font-weight:700;margin:10px 4px -6px}
  .moduleName::after{content:"";flex:1;height:1px;background:var(--edge)}
  .cards{display:flex;flex-direction:column;gap:9px}
  .card{
    display:flex;align-items:center;gap:13px;text-align:left;width:100%;
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:14px 15px;
    box-shadow:var(--card-sh);color:var(--text);
    transition:transform .25s cubic-bezier(.22,1,.36,1),border-color .2s,box-shadow .2s;
  }
  a.card{text-decoration:none}
  .card:active{transform:scale(.983)}
  @media(hover:hover){.card:hover{border-color:var(--blue-3);transform:translateY(-1px);box-shadow:0 4px 14px -4px var(--shadow),0 10px 26px -16px var(--shadow)}}
  .card .num{
    width:34px;height:34px;flex-shrink:0;border-radius:10px;display:grid;place-items:center;
    background:var(--blue-soft);color:var(--blue-2);font-family:var(--mono);font-size:12.5px;font-weight:700;
  }
  .card.done .num{background:var(--green-soft);color:var(--green)}
  .card .ct{flex:1;min-width:0}
  .card .ct b{display:block;font-size:14.5px;font-weight:600;line-height:1.35;letter-spacing:-.005em}
  .card .ct span{display:block;font-size:11.5px;color:var(--steel);margin-top:2.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.done .ct b{color:var(--steel-2)}
  .card .mins{flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--steel);font-weight:500}
  .check{
    width:25px;height:25px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--edge-2);
    display:grid;place-items:center;transition:all .25s;background:var(--surface);
  }
  .check svg{opacity:0;transform:scale(.4);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
  .card.done .check{background:var(--green);border-color:var(--green);box-shadow:0 3px 10px -3px rgba(22,163,74,.5)}
  .card.done .check svg{opacity:1;transform:scale(1)}

  /* ================= SEARCH ================= */
  .searchBox{position:relative}
  .searchBox svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--steel);pointer-events:none}
  .searchBox input{
    width:100%;padding:15px 16px 15px 45px;font-size:16px;border-radius:var(--r-card);border:1px solid var(--edge);
    background:var(--surface);color:var(--text);outline:none;box-shadow:var(--card-sh);
    transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
  }
  .searchBox input::placeholder{color:var(--steel)}
  .searchBox input:focus{border-color:var(--blue-3);box-shadow:0 0 0 3px var(--blue-soft),var(--card-sh)}
  .rhead{font-family:var(--mono);font-size:12px;color:var(--steel);padding:2px 4px}

  /* ================= PROGRESS / BADGES ================= */
  .bigRing{position:relative;width:132px;height:132px;margin:0 auto}
  .bigRing svg{transform:rotate(-90deg)}
  .bigRing b{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:26px;font-weight:700;color:var(--blue-2)}
  .badges{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(min-width:680px){.badges{grid-template-columns:repeat(3,1fr)}}
  .badge{
    display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:16px 10px;box-shadow:var(--card-sh);
  }
  .badge .b-ic{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:21px;background:var(--blue-soft);border:1px solid var(--blue-3)}
  .badge b{font-size:12.5px;font-weight:700}
  .badge span{font-size:10.5px;color:var(--steel);line-height:1.4}
  .badge.locked{opacity:.45;filter:grayscale(1)}
  .badge.locked .b-ic{background:var(--hover);border-color:var(--edge-2)}
  .actRow{display:flex;gap:10px;flex-wrap:wrap}
  .actRow .btn{flex:1;min-width:150px}

  /* ================= BOTTOM TAB BAR ================= */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;justify-content:space-around;align-items:center;
    background:var(--glass);border-top:1px solid var(--edge);
    padding:7px 6px calc(9px + env(safe-area-inset-bottom));
    backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);
    box-shadow:0 -6px 20px -14px var(--shadow);
  }
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--steel);font-size:10px;font-weight:600;padding:4px 6px;border-radius:10px;flex:1;transition:color .14s,transform .14s;max-width:88px}
  .tab.active{color:var(--blue-2)}
  .tab.active svg{filter:drop-shadow(0 3px 6px var(--blue-glow))}
  .tab:active{transform:scale(.94)}

  /* ================= COMMAND PALETTE ================= */
  #palette{position:fixed;inset:0;z-index:150;display:none;background:rgba(8,14,26,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  #palette.open{display:block}
  .pal{
    width:min(640px,92vw);margin:max(10vh,60px) auto 0;background:var(--surface);border:1px solid var(--edge);
    border-radius:16px;box-shadow:0 30px 80px -20px rgba(0,0,0,.45);overflow:hidden;animation:palIn .18s ease;
  }
  @keyframes palIn{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:none}}
  .palTop{display:flex;align-items:center;gap:11px;padding:15px 17px;border-bottom:1px solid var(--edge)}
  .palTop svg{color:var(--steel);flex-shrink:0}
  .palTop input{flex:1;border:none;outline:none;background:none;font-size:16px;color:var(--text)}
  .palTop input::placeholder{color:var(--steel)}
  .palList{max-height:min(46vh,420px);overflow-y:auto;padding:7px}
  .palItem{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 12px;border-radius:10px;
    color:var(--text);font-size:13.5px;font-weight:500;
  }
  .palItem .pi-ic{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;background:var(--blue-soft);color:var(--blue-2)}
  .palItem .pi-t{flex:1;min-width:0}
  .palItem .pi-t b{display:block;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .palItem .pi-t span{display:block;font-size:11px;color:var(--steel);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .palItem.sel{background:var(--blue-soft)}
  .palItem .pi-k{font-family:var(--mono);font-size:9.5px;color:var(--steel);letter-spacing:.08em;text-transform:uppercase}
  .palHint{display:flex;gap:14px;padding:9px 17px;border-top:1px solid var(--edge);font-family:var(--mono);font-size:10px;color:var(--steel)}

  /* ================= LESSON READER ================= */
  #sheet{
    position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;
    transform:translateY(100%);transition:transform .42s cubic-bezier(.22,1,.36,1);visibility:hidden;
    background-image:radial-gradient(800px 400px at 90% -10%,var(--hero-glow),transparent 60%);
  }
  #sheet.open{transform:translateY(0);visibility:visible}
  .sheetBar{
    position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--edge);
  }
  .backBtn{display:flex;align-items:center;gap:6px;color:var(--blue-2);font-size:14.5px;font-weight:700;padding:6px 8px;border-radius:9px}
  .backBtn:active{background:var(--blue-soft)}
  .sheetBar .crumb{flex:1;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sheetBar .barBtns{display:flex;gap:7px}
  #readBar{position:sticky;top:calc(59px + env(safe-area-inset-top));z-index:9;height:3px;background:transparent}
  #readBar i{display:block;height:100%;width:0%;background:var(--blue-line);border-radius:0 2px 2px 0;transition:width .1s linear}
  .sheetInner{max-width:720px;margin:0 auto;padding:24px 18px calc(60px + env(safe-area-inset-bottom))}
  .lessonChip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;background:var(--blue-soft);border:1px solid var(--blue-3);color:var(--blue-2);font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .sheetInner h2{font-family:var(--font-d);font-weight:700;font-size:clamp(24px,6vw,34px);line-height:1.14;letter-spacing:.005em;margin:12px 0 10px}
  .lessonMeta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  .metaChip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;background:var(--surface);border:1px solid var(--edge);font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--steel-2)}
  .videoBox{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--edge);background:var(--surface);box-shadow:var(--card-sh)}
  .videoBox .frame{position:relative;padding-top:56.25%;background:var(--video-bg)}
  .videoBox iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .ytBtn{display:flex;align-items:center;gap:15px;padding:19px;text-decoration:none;color:var(--text)}
  .ytBtn .play{
    width:52px;height:52px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;color:var(--on-accent);
    background:var(--blue-face);box-shadow:0 8px 22px -8px var(--blue-glow);transition:transform .25s;
  }
  .ytBtn:active .play{transform:scale(.92)}
  .ytBtn b{display:block;font-size:15px;font-weight:700;margin-bottom:2px}
  .ytBtn span{font-size:12.5px;color:var(--steel-2);line-height:1.45;display:block}
  .vcap{display:flex;align-items:center;gap:7px;padding:11px 14px;border-top:1px solid var(--edge);font-size:12px;color:var(--steel-2);background:var(--surface)}
  .vcap b{color:var(--text);font-weight:600}
  .moreVids{display:block;text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--steel);text-decoration:none;padding:12px 0 0}
  .moreVids u{color:var(--blue-2);font-weight:600}
  .lbody{margin-top:8px}
  .lsec{display:flex;align-items:center;gap:9px;margin:28px 0 13px}
  .lsec i{width:4px;height:15px;border-radius:3px;background:var(--blue-line);flex-shrink:0}
  .lsec h4{font-family:var(--font-d);font-weight:600;font-size:14px;letter-spacing:.09em;text-transform:uppercase}
  .lbody p{font-size:16px;line-height:1.8;color:var(--light);margin-bottom:16px}
  .terms{display:grid;grid-template-columns:1fr;gap:9px}
  @media(min-width:640px){.terms{grid-template-columns:1fr 1fr}}
  .term{background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:12px 15px;box-shadow:var(--card-sh)}
  .term b{color:var(--blue-2);font-size:13.5px;font-weight:700}
  .term span{display:block;font-size:13px;color:var(--steel-2);line-height:1.55;margin-top:3px}
  .example{background:linear-gradient(100deg,var(--blue-soft),transparent 70%),var(--surface);border:1px solid var(--blue-3);border-left:4px solid var(--blue);border-radius:var(--r-card);padding:15px 17px;font-size:14px;line-height:1.7;color:var(--light);box-shadow:var(--card-sh)}
  .takeaways{list-style:none;display:flex;flex-direction:column;gap:9px}
  .takeaways li{display:flex;gap:12px;font-size:14px;line-height:1.6;color:var(--light);background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-card);padding:13px 15px;box-shadow:var(--card-sh)}
  .takeaways li i{
    font-style:normal;flex-shrink:0;width:23px;height:23px;border-radius:50%;margin-top:1px;
    background:var(--blue-soft);color:var(--blue-2);font-family:var(--mono);font-size:11px;font-weight:700;
    display:grid;place-items:center;
  }
  .completeBtn{margin-top:28px}
  .pnRow{display:flex;gap:10px;margin-top:12px}
  .pnRow .btn{flex:1;padding:13px 10px;font-size:13px}
  .pnRow .btn:disabled{opacity:.4;pointer-events:none}
  /* focus mode: pure reading */
  #sheet.zen .videoBox,#sheet.zen .moreVids,#sheet.zen .tutorCard{display:none}
  #sheet.zen .sheetInner{max-width:640px}
  #sheet.zen .lbody p{font-size:17.5px;line-height:1.9}
  .zenBtn.on{color:var(--blue-2);border-color:var(--blue-3);background:var(--blue-soft)}

  /* ================= QUIZ & FLASHCARDS ================= */
  #quiz,#flash{position:fixed;inset:0;z-index:130;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .42s cubic-bezier(.22,1,.36,1);visibility:hidden}
  #quiz.open,#flash.open{transform:translateY(0);visibility:visible}
  .qInner{max-width:640px;margin:0 auto;padding:24px 18px calc(60px + env(safe-area-inset-bottom))}
  .qProg{display:flex;gap:5px;margin-bottom:18px}
  .qProg i{flex:1;height:4px;border-radius:2px;background:var(--hover)}
  .qProg i.on{background:var(--blue-line)}
  .qProg i.ok{background:var(--green)}
  .qProg i.bad{background:var(--red)}
  .qCard{background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-lg);padding:20px;box-shadow:var(--card-sh);margin-bottom:14px}
  .qKick{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue-2);font-weight:700;margin-bottom:9px}
  .qCard h3{font-size:17px;line-height:1.5;font-weight:600}
  .qOpt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--edge);border-radius:var(--r-card);padding:14px 15px;margin-bottom:9px;font-size:14px;line-height:1.5;box-shadow:var(--card-sh);transition:border-color .15s;color:var(--text)}
  .qOpt .qL{width:26px;height:26px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;background:var(--blue-soft);color:var(--blue-2);font-family:var(--mono);font-size:11px;font-weight:700}
  .qOpt.ok{border-color:var(--green);background:var(--green-soft)}
  .qOpt.bad{border-color:var(--red);background:rgba(226,86,79,.08)}
  .qOpt:disabled{cursor:default}
  @media(hover:hover){.qOpt:not(:disabled):hover{border-color:var(--blue-3)}}
  .qEnd{text-align:center;padding:10px 0;display:flex;flex-direction:column;gap:14px;align-items:center}
  .fCard{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-lg);padding:26px 20px;box-shadow:var(--card-sh);cursor:pointer;margin-bottom:14px}
  .fCard .f-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);font-weight:700}
  .fCard b{font-family:var(--font-d);font-size:24px;font-weight:700;line-height:1.25}
  .fCard p{font-size:15px;line-height:1.7;color:var(--light)}
  .fBtns{display:flex;gap:10px}
  .fBtns .btn{flex:1}
  .fHint{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--steel);letter-spacing:.1em;margin-bottom:12px}

  /* ================= LIBRARY SHEETS ================= */
  #book,#tool,#case{position:fixed;inset:0;z-index:96;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .42s cubic-bezier(.22,1,.36,1);visibility:hidden;background-image:radial-gradient(800px 400px at 90% -10%,var(--hero-glow),transparent 60%)}
  #book.open,#tool.open,#case.open{transform:translateY(0);visibility:visible}
  .finRow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--edge);font-size:13.5px}
  .finRow:last-child{border-bottom:none}
  .finRow span{color:var(--steel-2)}
  .finRow b{font-family:var(--mono);font-size:13.5px;text-align:right}
  .finRow.strong b{color:var(--blue-2);font-size:15px}
  .inpRow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 0}
  .inpRow label{font-size:13px;color:var(--steel-2);flex:1}
  .inpRow input{
    width:130px;padding:9px 11px;font-size:14px;font-family:var(--mono);text-align:right;
    border:1px solid var(--edge);border-radius:9px;background:var(--surface-2);color:var(--text);outline:none;-webkit-appearance:none;
  }
  .inpRow input:focus{border-color:var(--blue-3);box-shadow:0 0 0 3px var(--blue-soft)}
  .qOpt.pick{border-color:var(--blue);background:var(--blue-soft)}

  /* ================= SIMULATIONS & CERTIFICATES ================= */
  #sim,#lab{position:fixed;inset:0;z-index:97;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .42s cubic-bezier(.22,1,.36,1);visibility:hidden;background-image:radial-gradient(800px 400px at 90% -10%,var(--hero-glow),transparent 60%)}
  #lab.open{transform:translateY(0);visibility:visible}
  #cert{position:fixed;inset:0;z-index:140;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .42s cubic-bezier(.22,1,.36,1);visibility:hidden}
  #sim.open,#cert.open{transform:translateY(0);visibility:visible}
  #certCanvas{width:100%;height:auto;border-radius:12px;box-shadow:0 20px 50px -20px rgba(0,0,0,.45);display:block}
  .certWrap{max-width:820px;margin:0 auto;padding:20px 16px calc(50px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:16px}

  /* ================= AI TUTOR SUITE ================= */
  .aiGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:9px}
  @media(min-width:640px){.aiGrid{grid-template-columns:repeat(3,1fr)}}
  .aiChip{
    display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 8px;border-radius:10px;
    background:var(--surface);border:1px solid var(--edge);color:var(--blue-2);font-size:11.5px;font-weight:600;
    text-decoration:none;box-shadow:var(--card-sh);transition:border-color .15s,transform .15s;line-height:1.3;
  }
  .aiChip:active{transform:scale(.96)}
  @media(hover:hover){.aiChip:hover{border-color:var(--blue-3);transform:translateY(-1px)}}

  /* ================= READER EXTRAS ================= */
  .actGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
  .actGrid .card{padding:13px 12px}
  .noteBox{width:100%;min-height:110px;resize:vertical;border:1px solid var(--edge);border-radius:var(--r-card);background:var(--surface);color:var(--text);padding:14px 15px;font-size:14px;line-height:1.6;outline:none;box-shadow:var(--card-sh);font-family:var(--inter)}
  .noteBox:focus{border-color:var(--blue-3);box-shadow:0 0 0 3px var(--blue-soft),var(--card-sh)}
  .noteHint{font-family:var(--mono);font-size:10px;color:var(--steel);margin-top:6px;letter-spacing:.08em}
  .bmBtn.on{color:var(--amber);border-color:var(--amber);background:rgba(245,158,11,.12)}
  .scoreTag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--green)}

  /* ================= TOAST ================= */
  #toast{
    position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(16px);z-index:200;
    background:var(--text);color:var(--bg);font-size:13px;font-weight:600;padding:11px 20px;border-radius:100px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
    max-width:88vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(min-width:1080px){#toast{bottom:36px}}

  /* ================= THEME GALLERY ================= */
  #themes{position:fixed;inset:0;z-index:120;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .42s cubic-bezier(.22,1,.36,1);visibility:hidden}
  #themes.open{transform:translateY(0);visibility:visible}
  .tInner{max-width:760px;margin:0 auto;padding:18px 16px calc(50px + env(safe-area-inset-bottom))}
  .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
  @media(min-width:640px){.tgrid{grid-template-columns:repeat(3,1fr)}}
  .tcard{position:relative;text-align:left;background:var(--surface);border:1.5px solid var(--edge);border-radius:var(--r-card);padding:9px;box-shadow:var(--card-sh);transition:transform .2s,border-color .2s;cursor:pointer}
  .tcard:active{transform:scale(.97)}
  .tcard.on{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft),var(--card-sh)}
  .tprev{height:86px;border-radius:calc(var(--r-card) - 4px);padding:9px;display:flex;flex-direction:column;gap:6px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
  .tprev .tp-bar{height:8px;border-radius:4px;width:62%}
  .tprev .tp-card{flex:1;border-radius:7px;padding:6px 8px;display:flex;flex-direction:column;gap:5px;justify-content:center}
  .tprev .tp-line{height:5px;border-radius:3px;width:80%;opacity:.55}
  .tprev .tp-line.s{width:52%;opacity:.3}
  .tprev .tp-btn{height:14px;border-radius:7px;width:46%}
  .tname{font-size:12.5px;font-weight:700;margin:9px 2px 1px;display:flex;align-items:center;gap:5px}
  .ttags{font-size:10px;color:var(--steel);margin:0 2px}
  .tstar{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.85);color:#b9b9c2;border:1px solid rgba(0,0,0,.08)}
  .tstar.on{color:#f59e0b}
  .tcheck{color:var(--blue-2)}
  /* ---- desktop layout switch (last: must win over base rules) ---- */
  @media(min-width:1080px){
    .sidebar{display:flex}
    .main{margin-left:var(--sb-w)}
    .tabbar{display:none}
    .top .brandwrap{display:none}
    .pageTitle{display:block}
    .top .themeTop{display:none}
    .view{padding:26px 34px 60px;max-width:920px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
/* ================= CURRICULUM DATA ================= */
const DATA=[
{id:"biz",name:"Business A–Z",tag:"The Master Curriculum",intro:"Six levels. Foundations to full Polymath. Complete every level and you will understand business better than most MBA graduates — how money is made, managed, multiplied, and ultimately how companies are bought and sold.",levels:[
{id:"L1",name:"Foundations",tagline:"Level 1",desc:"What business actually is and how money moves",modules:[
{name:"Business Fundamentals",lessons:[
{id:"f1",t:"What a Business Actually Is",v:"CBYhVcO4WgI",q:"how to start a startup lecture 1 Sam Altman Y Combinator",
p:["Strip away the jargon and a business is one thing: a repeatable system that solves a problem for people who will pay more for the solution than it costs you to deliver it. That gap between what customers pay and what it costs you is where every fortune in history comes from. A lemonade stand, a car wash, and Apple all run on the exact same physics — only the scale changes.",
"The most important mental shift for a beginner: a business is not a job you own. A job trades your hours for money. A business is a machine that combines other people's time, equipment, and systems to produce value whether or not you personally show up. Your goal as you move through this curriculum is to learn how to build, measure, and improve that machine."],
terms:[["Value proposition","The specific reason a customer chooses you — the problem you solve and why you solve it better than the alternatives."],["Customer","The person or company that pays you. No paying customer, no business — everything else is a hobby."],["Market","The total group of people with the problem you solve and money to spend on it."],["System","A documented, repeatable way of doing something so results don't depend on any one person."]],
ex:"Maria hates washing her car but loves a clean car. A car wash charges her $20 for something that costs it roughly $4 in water, chemicals, and labor per car. Maria happily pays because 20 minutes of her time is worth more than $20 to her. Both sides win — that voluntary exchange, repeated thousands of times, is the entire game.",
keys:["A business = solve a real problem, for real people, at a price above your cost, repeatably.","Profit is the reward for creating value, not for working hard. Effort that creates no value earns nothing.","A business is a machine that should eventually run without you — a job you own is not a business.","Everything you'll learn in this vault improves one of three things: making the machine sell more, cost less, or run without you."]},
{id:"f2",t:"Business Models — The 10 Ways Companies Make Money",v:"bNpx7gpSqbY",q:"business models explained types of business models",
p:["A business model is simply the answer to: who pays you, for what, how often, and how the money exceeds the costs. Most companies on earth use one of about ten models: selling products (retail/e-commerce), selling services (plumbing, law), subscriptions (Netflix, unlimited wash clubs), marketplaces (Airbnb takes a cut), franchising (sell the playbook), licensing (rent your intellectual property), advertising (sell attention), SaaS (rent software), manufacturing (make and wholesale), and brokerage (connect buyer and seller for a fee).",
"The model you choose matters more than how hard you work, because models differ wildly in quality. Recurring-revenue models (subscriptions, service agreements) are worth 2–4× more than one-time-sale models at the same revenue, because next month's income is already spoken for. This is exactly why car wash memberships and pest control service agreements — your two specialty tracks — are such prized business models: they turn one-time buyers into monthly annuities."],
terms:[["Business model","The structure of who pays you, for what, how often, and at what margin."],["Recurring revenue","Income that repeats automatically (memberships, contracts) without re-selling the customer."],["One-time revenue","Income you must go win again every single time — the treadmill model."],["Margin profile","How much of each dollar of revenue survives as profit under a given model."]],
ex:"Two pest control companies each collect $500,000 a year. Company A does one-off treatments; every January its revenue resets to zero. Company B sells quarterly service agreements; it starts January with $460,000 already under contract. A buyer will pay dramatically more for Company B — often nearly double — for the 'same' revenue.",
keys:["Choose the model before you choose the hustle — the model sets your ceiling.","Recurring revenue is the most valuable revenue in existence; convert one-time buyers into members and contracts whenever possible.","The same customer problem can often be served by several models; the best operators pick the one with repeat payment built in.","Timing, model, and market matter more than raw effort — Bill Gross's research found timing was the #1 predictor of startup success."]},
{id:"f3",t:"Revenue vs. Profit — The Difference That Ruins Beginners",q:"revenue vs profit explained for beginners",
p:["Revenue is every dollar that comes in the door. Profit is what's left after every cost is paid. Beginners brag about revenue; operators obsess over profit. A business doing $2 million in revenue with $50,000 of profit is a worse machine than one doing $600,000 in revenue with $150,000 of profit — and understanding why is the beginning of financial literacy.",
"There are actually three profits, and you must know all three. Gross profit is revenue minus the direct costs of delivering the product (chemicals, labor on the job, materials). Operating profit subtracts overhead — rent, admin salaries, marketing, insurance. Net profit subtracts everything, including interest and taxes. Each layer tells you something different: gross profit tells you if the core service is priced right; operating profit tells you if the company is run well; net profit tells you what you actually keep."],
terms:[["Revenue (top line)","Total money collected from customers before any costs."],["Gross profit","Revenue minus direct costs of delivery (COGS). The health of your core offer."],["Operating profit","Gross profit minus overhead. The health of your management."],["Net profit (bottom line)","What remains after all expenses, interest, and taxes. What you keep."],["Margin","Profit expressed as a percentage of revenue, so businesses of different sizes can be compared."]],
ex:"A mobile detailer charges $200 per job (revenue). Supplies and helper labor cost $80, so gross profit is $120 (60% gross margin). His share of van payment, insurance, and ads is $70 per job, leaving $50 operating profit. After taxes he keeps about $38. If he only ever looked at the $200, he'd think he was rich; the machine actually produces $38.",
keys:["Revenue is vanity, profit is sanity, cash is reality — evaluate every business on all three.","Learn the three layers: gross, operating, net. Each diagnoses a different disease.","A high-revenue, low-margin business is fragile: one bad month erases the whole year.","Never price by gut. Price so that gross margin survives overhead with room to spare."]},
{id:"f4",t:"How Money Flows Through a Business",q:"cash flow cycle how money flows through a business explained",
p:["Every dollar takes a journey: it enters as revenue, passes through direct costs, gets taxed, and either exits as owner profit or gets reinvested. Draw it as a pipeline: Marketing creates attention → attention becomes leads → leads become sales (revenue) → revenue pays cost of goods → gross profit pays overhead → operating profit pays debt and taxes → net profit is split between the owner's pocket and reinvestment back into the machine. Master operators know exactly where dollars leak at every joint of that pipeline.",
"The second critical concept is timing. Money rarely arrives when the work happens. You may buy chemicals in March, do the job in April, and get paid in June. This gap — the cash conversion cycle — is why profitable companies still go bankrupt: they earn profit on paper but run out of actual cash to pay Friday's payroll. Businesses that collect up front (memberships, prepaid contracts) enjoy negative cash cycles: customers fund the operation before costs are due. That is a superpower."],
terms:[["Cash conversion cycle","Days between paying for costs and collecting from customers. Shorter (or negative) is better."],["Working capital","The cash cushion needed to fund operations between paying costs and getting paid."],["Reinvestment","Profit deliberately put back into the machine (equipment, marketing, people) to grow it."],["Owner's draw / distribution","Profit taken out of the business for the owner personally."]],
ex:"A pest control route collects payment the day of service by card on file. Chemical bills are due 30 days later. The company is literally paid before it pays — customers finance the growth. Contrast a commercial landscaper who works in April and gets paid in July, and must borrow to make payroll in between.",
keys:["Trace the pipeline: marketing → leads → sales → gross profit → overhead → net profit → pocket or reinvest.","Profit and cash are different animals; timing kills more businesses than losses do.","Get paid faster and pay slower (ethically) — collecting up front is a structural advantage.","Every leak in the pipeline compounds; fixing a 5% leak at three joints nearly triples what reaches the bottom."]}
]},
{name:"Financial Statements",lessons:[
{id:"f5",t:"Reading a P&L (Income Statement)",q:"how to read an income statement P&L for beginners",
p:["The Profit & Loss statement (income statement) answers one question: over a period of time, did the machine make money? It reads top to bottom like the pipeline you just learned: Revenue at top, then Cost of Goods Sold (COGS), giving Gross Profit. Then Operating Expenses (rent, payroll, marketing, insurance — often called SG&A), giving Operating Income. Then interest and taxes, giving Net Income at the very bottom. That's it — every P&L on earth, from a taco truck to Amazon, follows this skeleton.",
"The power move is reading it in percentages, not dollars — this is called common-sizing. Divide every line by revenue. If COGS is 42% of revenue this year but was 36% last year, something is leaking: prices too low, waste, theft, or supplier increases. Comparing percentage trends month over month is how operators catch problems while they're still cheap to fix. Always read three periods side by side; a single P&L is a photo, three are a movie."],
terms:[["COGS (Cost of Goods Sold)","Costs that scale directly with each sale — materials, direct labor, merchant fees."],["SG&A / Operating expenses","Overhead that exists whether you sell or not: rent, admin, insurance, marketing."],["Common-sizing","Expressing each line as a % of revenue so periods and companies can be compared."],["Net income","The bottom line — accounting profit for the period."]],
ex:"A car wash P&L: Revenue $110,000 for the month. COGS (chemicals, water, hourly labor) $38,500 = 35%. Gross profit $71,500. Operating expenses (manager, insurance, utilities, marketing, rent) $44,000 = 40%. Operating income $27,500 = 25% operating margin. The owner sees labor crept from 22% to 27% of revenue in two months — investigation finds overstaffed Tuesdays. One schedule change recovers $2,700/month.",
keys:["The P&L is a period movie: Revenue − COGS = Gross Profit; − Overhead = Operating Income; − interest & taxes = Net Income.","Always read in percentages of revenue and compare at least three periods.","Watch trends, not snapshots — a creeping percentage is a leak announcing itself early.","A P&L shows profitability, not cash. A company can show profit and still miss payroll (that's the cash flow statement's job)."]},
{id:"f6",t:"The Balance Sheet — What You Own vs. Owe",q:"balance sheet explained simply for beginners accounting",
p:["If the P&L is a movie of a period, the balance sheet is a photograph of a single moment: everything the business owns (assets), everything it owes (liabilities), and the difference, which belongs to the owners (equity). The famous equation — Assets = Liabilities + Equity — is always true by definition, because every asset was funded either by borrowing (liability) or by owners' money and retained profits (equity).",
"Read it in layers. Current assets (cash, receivables, inventory) can become cash within a year; current liabilities (bills, credit cards, payroll due) must be paid within a year. Comparing the two tells you if the business can survive the next 12 months — that's liquidity. Long-term assets (equipment, buildings, vehicles) and long-term debt tell you how the machine was financed. Equity growing year over year means the business is compounding wealth; shrinking equity means it's quietly eating itself even if the P&L looks fine."],
terms:[["Asset","Anything of value the business owns or controls: cash, equipment, inventory, money owed to you."],["Liability","Anything the business owes: loans, unpaid bills, taxes due, customer deposits not yet earned."],["Equity","Assets minus liabilities — the owners' true stake. Also called book value or net worth."],["Liquidity","How easily the business can cover near-term obligations with near-term assets."],["Accounts receivable / payable","Money customers owe you (AR) and money you owe suppliers (AP)."]],
ex:"A pest control company owns $60,000 in trucks, $15,000 in equipment, $25,000 cash, and is owed $10,000 by commercial clients: assets $110,000. It owes $45,000 on truck loans and $8,000 in bills: liabilities $53,000. Equity = $57,000. That $57,000 — not the revenue number — is what the owner actually has built.",
keys:["Assets = Liabilities + Equity, always. Every asset is funded by debt or by owners.","Current assets vs. current liabilities reveals whether the next 12 months are safe.","Rising equity over time is the truest scoreboard of wealth-building in a business.","Revenue can grow while equity shrinks — always check both statements together."]},
{id:"f7",t:"The Cash Flow Statement — Where Cash Actually Went",q:"cash flow statement explained simply beginners",
p:["The cash flow statement reconciles a paradox: the P&L says you made $80,000, but your bank account grew $12,000. Where did $68,000 go? This statement answers precisely that, in three buckets. Operating activities: cash generated by the actual business (profit adjusted for timing — customers who haven't paid, bills you haven't paid, inventory bought). Investing activities: cash spent on or received from long-term assets (buying a truck, selling equipment). Financing activities: cash from loans and investors, minus loan payments and owner distributions.",
"For a small business, the single most important line is operating cash flow. If it's consistently positive and close to net income, the business converts profit into real money — healthy. If profit is positive but operating cash flow is negative, profits are trapped in unpaid invoices or inventory, and growth will require constant borrowing. Sophisticated buyers of businesses look here first, because the P&L can be dressed up but cash is very hard to fake."],
terms:[["Operating cash flow","Cash the core business produced this period — the truest health metric."],["Capex (capital expenditure)","Cash spent on long-lived assets like tunnels, trucks, and machines."],["Financing activities","Loans received, loan principal paid, owner money in, distributions out."],["Free cash flow","Operating cash flow minus capex — cash truly available to owners."]],
ex:"A wash shows $200,000 net income. Cash flow statement: operating +$230,000 (memberships collected up front), investing −$180,000 (new vacuum stations), financing −$60,000 (SBA loan payments and a distribution). Bank account change: −$10,000. Nothing is wrong — the owner chose to reinvest — but only this statement makes that visible.",
keys:["Three buckets: operating (the business), investing (the assets), financing (the funding).","Operating cash flow is the health metric; profit without cash conversion is a warning.","Free cash flow = operating cash flow − capex; it's what the machine truly pays its owner.","Cash is the hardest number to fake — buyers and bankers always start here."]},
{id:"f8",t:"Bookkeeping Basics — Keeping Score Correctly",v:"yYX4bvQSqbo",q:"bookkeeping basics for small business beginners",
p:["Bookkeeping is the discipline of recording every transaction so your three statements are actually true. The system used worldwide is double-entry: every transaction touches at least two accounts. Buy $500 of chemicals with cash? Chemicals expense goes up $500, cash goes down $500. Take a $40,000 truck loan? Assets (truck) up $40,000, liabilities (loan) up $40,000. Because both sides always move together, the books stay in balance and errors expose themselves.",
"Practically, a modern owner needs five habits: (1) a dedicated business bank account and card — never commingle personal and business money; (2) accounting software (QuickBooks, Xero, or Wave) connected to the bank feed; (3) a weekly 30-minute ritual categorizing transactions; (4) monthly reconciliation — confirming the software matches the bank statement to the penny; (5) saving receipts digitally for anything over $75. Do these five things and tax season becomes a formality instead of a crisis, and your statements become trustworthy enough to actually manage from."],
terms:[["Double-entry","Every transaction recorded in two places (a debit and a credit) so books always balance."],["Chart of accounts","The organized list of categories every dollar gets filed into."],["Reconciliation","Matching your books against the bank statement to catch errors monthly."],["Commingling","Mixing personal and business money — destroys clean books and legal protection."],["Accrual vs. cash basis","Recording income when earned vs. when received; accrual shows truth, cash shows the bank."]],
ex:"Two identical landscaping companies get audited. Owner A commingled accounts and kept receipts in a shoebox; the audit takes months, costs $15,000 in accounting fees, and disallowed deductions cost $9,000. Owner B spent 30 minutes weekly in QuickBooks; her audit closes in two weeks with zero adjustments. Same revenue — wildly different outcomes.",
keys:["Separate accounts on day one; commingling poisons your books and can pierce your liability protection.","Double-entry means every dollar has a source and a destination — always two sides.","Weekly categorizing + monthly reconciliation = statements you can actually trust and manage from.","Clean books aren't for the IRS — they're the instrument panel you fly the business with."]}
]},
{name:"Structure & Numbers",lessons:[
{id:"f9",t:"Business Entities — LLC, S-Corp, C-Corp",q:"LLC vs S corp vs C corp explained which entity",
p:["A business entity is the legal container your business lives in, and it determines two huge things: who can be sued (liability) and how profits are taxed. Sole proprietorship is the default if you do nothing — simple, but you and the business are legally the same person, so a lawsuit can take your house. An LLC (Limited Liability Company) creates a wall between business debts/lawsuits and your personal assets, while profits still 'pass through' to your personal tax return. It's the standard starting point for most small businesses.",
"The S-Corp is not really an entity — it's a tax election an LLC or corporation can make. Its superpower: you pay yourself a reasonable salary (subject to payroll taxes) and take remaining profit as distributions, which avoid the 15.3% self-employment tax. Once profits exceed roughly $50–80K, this typically saves thousands per year. The C-Corp is a fully separate taxpayer — it pays its own corporate tax, and dividends are taxed again at your level ('double taxation'). It's the wrong default for small operators but right for venture-backed startups or certain holding structures. Rule of thumb: start LLC, elect S-Corp when profitable, touch C-Corp only with a strategist's advice."],
terms:[["Limited liability","Legal separation so business problems can't (normally) take personal assets."],["Pass-through taxation","Business profit flows onto the owner's personal return; the entity itself pays no income tax."],["S-Corp election","IRS status letting owners split income into salary + distributions to reduce self-employment tax."],["Double taxation","C-Corp profit taxed at the corporate level and again when paid out as dividends."],["Piercing the corporate veil","When courts ignore your entity (usually due to commingling) and reach personal assets."]],
ex:"A pest control owner nets $120,000 as a sole proprietor and pays ~$18,360 in self-employment tax on top of income tax. She forms an LLC, elects S-Corp, pays herself a $60,000 salary and takes $60,000 in distributions — saving roughly $9,000 a year in payroll taxes, every year, for the cost of a payroll service.",
keys:["Entities control two levers: lawsuit protection and tax treatment.","LLC is the standard start: liability wall + simple pass-through taxes.","Elect S-Corp when profit clears ~$50–80K to cut self-employment tax; pay yourself a defensible salary.","Respect the entity — separate bank accounts and records — or a court can ignore it entirely."]},
{id:"f10",t:"Essential Business Math",q:"business math basics margin markup break even explained",
p:["Six calculations run the entire business world, and none require more than a phone calculator. (1) Margin: profit ÷ revenue. (2) Markup: profit ÷ cost — a $10 item sold for $15 has 50% markup but 33% margin; confusing these bankrupts retailers. (3) Break-even: fixed costs ÷ gross margin per unit = units needed before profit begins. (4) ROI: gain ÷ amount invested — the universal ranking tool for any decision. (5) Percentage change: (new − old) ÷ old. (6) The Rule of 72: divide 72 by a growth rate to get years to double — 72 ÷ 12% growth = 6 years to double.",
"The deeper skill is unitizing: reducing every business question to per-unit numbers. Not 'we spent $3,000 on ads' but 'we paid $42 per customer acquired, and each customer brings $380 of gross profit.' Once everything is per-unit, decisions become arithmetic instead of anxiety. This habit — thinking in per-car, per-stop, per-customer, per-month units — is the single trait that most separates real operators from hopeful owners, and it is the foundation Level 3 builds on."],
terms:[["Margin vs. markup","Margin is profit ÷ price; markup is profit ÷ cost. Same dollars, different denominators."],["Fixed vs. variable cost","Fixed exists regardless of volume (rent); variable scales with each sale (chemicals)."],["Break-even point","The volume at which contribution covers fixed costs and profit begins."],["ROI (return on investment)","Gain from a decision ÷ its cost — lets you rank any two uses of money."],["Rule of 72","72 ÷ growth rate ≈ years to double. Instant compounding intuition."]],
ex:"A wash has $45,000/month fixed costs. Average ticket $14, variable cost $4 — contribution $10 per car. Break-even: 4,500 cars a month, or 150 per day. Suddenly the owner knows exactly what a rainy Tuesday costs and precisely how many members it takes to sleep at night.",
keys:["Master six tools: margin, markup, break-even, ROI, % change, Rule of 72.","Never confuse margin (÷ price) with markup (÷ cost).","Break-even turns fear into a number: exactly how much volume equals safety.","Unitize everything — per-car, per-stop, per-customer. Per-unit thinking is the operator's superpower."]}
]}
]},
{id:"L2",name:"Core Skills",tagline:"Level 2",desc:"Marketing, sales, operations, people, money and law",modules:[
{name:"Marketing",lessons:[
{id:"c1",t:"Branding — Owning a Place in the Mind",v:"keCwRdbwNQY",q:"branding basics small business Steve Jobs marketing",
p:["A brand is not a logo. A brand is the automatic feeling and expectation people have when your name comes up — it's the answer to 'what is this company about and can I trust it?' stored in the customer's memory. Great brands compress a promise into an instant: Volvo means safety, FedEx means overnight, your car wash could mean 'always spotless in 5 minutes.' Branding is the deliberate work of choosing that one promise and repeating it with total consistency until the market memorizes it.",
"For a local business, brand is built in unglamorous places: the cleanliness of your trucks, whether techs show up in the window promised, how your phone gets answered, the consistency of your colors and signage, and how you handle the one job that went wrong. Consistency beats creativity — a decent promise kept 1,000 times in a row builds more brand than a brilliant campaign behind sloppy service. Decide what one thing you will be famous for locally, then make every touchpoint scream it."],
terms:[["Brand promise","The single expectation you commit to meeting every time."],["Positioning","The specific slot you occupy in the customer's mind relative to competitors."],["Brand equity","The measurable price premium and preference your reputation earns."],["Touchpoint","Any moment a customer contacts your business — every one deposits or withdraws trust."]],
ex:"Two pest control companies charge $45/month. One has hand-washed wrapped trucks, uniformed techs who text before arrival, and a 24-hour re-service guarantee. The other is 'some guy in a pickup.' The first books 3× the referrals and can raise prices 15% with almost no churn — that gap is brand equity, and it was built operationally, not with ads.",
keys:["A brand is a promise kept consistently, stored in the customer's memory — not a logo.","Pick ONE thing to be famous for locally and align every touchpoint to it.","Consistency compounds: identical trucks, uniforms, scripts, and follow-through beat clever ads.","Strong brands earn the two most valuable powers in business: price premiums and free referrals."]},
{id:"c2",t:"Digital Advertising — Buying Customers Profitably",q:"Google ads Facebook ads for local business beginners",
p:["Digital ads are vending machines for customers: insert money, receive attention, convert attention into booked jobs. The two machines that matter for local business are Google (people actively searching 'pest control near me' — high intent, you pay to be present at the moment of need) and Meta/Facebook-Instagram (people not searching, but targetable by location and demographics — you pay to create demand with an offer they can't ignore). Start with Google search ads because intent does the selling for you.",
"The entire discipline reduces to one comparison: what it costs to acquire a customer (CAC) versus what that customer is worth (LTV). If clicks cost $8, one in five clicks calls, and one in two calls books, a customer costs $80. If your average customer generates $600 in gross profit over their life, you'd buy those all day. Track the full chain — impressions → clicks → leads → booked jobs — because the leak is usually not the ad: it's the landing page, or the phone going unanswered. The best ad money you ever spend is often answering the phone in two rings."],
terms:[["CPC (cost per click)","What you pay each time someone clicks the ad."],["Conversion rate","The % of visitors/leads that take the next step (call, book, buy)."],["CAC (customer acquisition cost)","Total marketing spend ÷ new customers gained. Your true price of growth."],["Retargeting","Showing ads specifically to people who already visited but didn't buy — cheapest conversions available."],["Landing page","The dedicated page an ad sends traffic to, built for one action only."]],
ex:"A car wash spends $2,000/month on Google ads for 'car wash near me,' generating 400 clicks. 60 people join the $25/month unlimited club: CAC = $33. Members stay 14 months on average = $350 revenue at ~70% gross margin = $245 gross profit each. Every $33 invested returns $245 — the owner's only question becomes how much more inventory of attention he can buy.",
keys:["Google captures existing demand (search intent); Meta creates demand (offers + targeting). Start with Google.","The only verdict that matters: CAC vs. lifetime gross profit. Know both cold.","Track the whole chain — ad → click → lead → booked job. The leak is usually after the click.","Answer the phone. A $2,000 ad budget dies quietly in an unanswered voicemail box."]},
{id:"c3",t:"Funnels — The Path From Stranger to Customer",q:"marketing funnel explained for local business",
p:["A funnel is the deliberate sequence of steps a stranger travels to become a customer: they become aware of you (ad, sign, referral), develop interest (visit your site, read reviews), evaluate (compare prices, check availability), take action (book/buy), and — the stage amateurs forget — return and refer. It's called a funnel because numbers shrink at each stage: 1,000 see the ad, 100 click, 30 call, 15 book. Sketching your funnel with real numbers instantly reveals where you're losing people.",
"The professional move is to measure each stage's conversion rate, then fix the worst one first — because funnel stages multiply. If you double the ad budget, you double output. But if you also lift call-answer rate from 60% to 90%, and closing from 50% to 65%, output nearly triples with no extra spend. Small percentage gains at multiple stages compound violently. Every business you will ever own has a funnel whether you designed it or not; the only question is whether you can see it."],
terms:[["Funnel stage","One step in the journey: aware → interested → evaluating → buying → returning."],["Conversion rate","% surviving from one stage to the next."],["Lead magnet","Something valuable offered free (first month $1, free inspection) to pull people into the funnel."],["Follow-up sequence","Automated texts/emails that recover people who stalled mid-funnel — where the hidden money lives."]],
ex:"A pest control funnel: 2,000 see the ad → 120 click → 40 request quotes → 18 answered fast enough → 9 close. The owner's instinct is 'buy more ads.' The data says the giant leak is speed-to-lead: 22 quote requests never got a timely call. An auto-text-back system recovers 12 of them, adding 5–6 sales monthly for $50 of software.",
keys:["Map your funnel with real numbers — awareness to referral. You can't fix what you can't see.","Stages multiply: small improvements at several stages beat a big improvement at one.","Fix the leakiest stage first; it's almost never 'not enough ads.'","Speed-to-lead is king: responding in 5 minutes vs. 5 hours can 10× contact rates."]},
{id:"c4",t:"Content Marketing — Earning Trust at Scale",q:"content marketing for small business how to start",
p:["Content marketing is answering your customers' questions publicly — videos, posts, photos, guides — so that by the time they need you, they already know and trust you. Ads rent attention; content builds an asset that keeps working for years. A pest control company that posts 'What termite damage actually looks like in Texas homes' is doing sales work at midnight, at scale, for free, forever. The trust that content builds also makes every ad dollar convert better.",
"The winning strategy for a local operator is simple and unglamorous: document, don't create. Film real jobs (before/after washes, a tech explaining what he found under a house), answer the 20 questions customers actually ask, and post consistently in the places your customers scroll — Google Business Profile, Facebook, Instagram, Nextdoor, YouTube. One honest job-site video per week outperforms a slick agency campaign because authenticity is the scarcest commodity in advertising. Volume and consistency beat production value every time at the local level."],
terms:[["Content asset","A piece of media that keeps attracting customers long after it's made."],["Document don't create","Filming real work you're already doing instead of inventing content."],["Evergreen content","Answers that stay relevant for years ('how much does exterior wash damage paint?')."],["Social proof","Reviews, before/afters, testimonials — evidence others trusted you and won."]],
ex:"A car wash posts a 30-second phone video weekly: satisfying foam shots, a manager explaining spot-free rinse, member shoutouts. After a year, 5,000 locals follow it. Launching a new membership tier, they get 200 signups in a week with zero ad spend — the audience was a pre-built asset that ads can't buy.",
keys:["Content is an owned asset that compounds; ads are rented attention that stops when you stop paying.","Document real work — job sites, before/afters, honest answers. Authenticity converts.","Answer the exact questions customers already ask; that's your content calendar.","Consistency for 12 months beats brilliance for 3 weeks. Post weekly, forever."]},
{id:"c5",t:"Local SEO — Winning the Map Pack",q:"local SEO Google Business Profile optimization guide",
p:["When someone searches 'car wash near me,' Google shows three local businesses on a map before anything else — the Map Pack. Ranking there is the highest-ROI marketing available to a local business, because that click costs nothing and carries maximal intent. Google decides those three spots using three factors: relevance (does your profile clearly say what you do?), distance (proximity to the searcher), and prominence (reviews, review velocity, photos, mentions across the web).",
"You can't move your building, so you fight on the other two. Claim and completely fill your Google Business Profile: exact categories, services, hours, photos weekly, posts monthly. Then run a relentless review engine — ask every happy customer same-day, by text, with a direct link; respond to every review, good and bad. Volume, recency, and reply-rate all count. Finally, ensure your name/address/phone are identical everywhere online, and build a simple website with one page per service and per city you serve. Done consistently, this outranks bigger competitors who ignore it — and the leads are free, forever."],
terms:[["Map Pack","The three map results shown above normal listings for local searches — the money real estate."],["Google Business Profile (GBP)","Your free Google listing; the single most important local marketing asset."],["NAP consistency","Name, Address, Phone identical across every directory — mismatches erode trust with Google."],["Review velocity","The steady rate of new reviews; 8/month every month beats 100 once."]],
ex:"Two pest control companies sit two miles apart. Company A: 47 reviews, last one 5 months old. Company B texts a review link after every job: 460 reviews averaging 12 new per month, each with an owner reply. B owns the Map Pack for 30+ high-intent searches and receives ~90 free calls a month. A pays $4,000/month in ads to buy back what B gets free.",
keys:["The Map Pack is the highest-intent, zero-cost-per-click real estate in local business.","Your Google Business Profile is a weekly discipline, not a set-and-forget listing.","Reviews are the currency: automate same-day requests, keep velocity steady, reply to all.","One service-per-page, one city-per-page website structure feeds the map rankings."]}
]},
{name:"Sales & Service",lessons:[
{id:"c6",t:"Sales Psychology — Why People Actually Buy",q:"sales psychology fundamentals why people buy",
p:["People buy for emotional reasons and justify with logic afterward. Nobody buys pest control — they buy a home where their kids don't get bitten. Nobody buys a wash membership — they buy the feeling of a clean car without guilt about the cost. The professional's job is to find the real motivation (pain, fear, pride, convenience, status) through questions, then present the offer as the bridge from their current pain to their desired state. Prescription before diagnosis is malpractice in medicine and in sales.",
"Six psychological forces do most of the work, catalogued by Robert Cialdini: reciprocity (give value first — free inspection), social proof ('most homeowners on your street choose quarterly'), authority (licensed, certified, 400 reviews), scarcity (honest scarcity only — 'two install slots left this week'), consistency (small yeses lead to big yeses), and liking (people buy from people who listen). None of this is manipulation when the product genuinely helps — it's removing friction between a person and a solution they already want. Manipulation closes one sale; trust closes a decade of them."],
terms:[["Pain point","The specific frustration driving the purchase — the thing they'd pay to make disappear."],["Emotional driver","The feeling being purchased: safety, pride, relief, status, time."],["Social proof","Evidence that people like them already chose you."],["Objection","A stated reason not to buy — usually a request for more certainty, not a 'no'."],["Discovery","The questioning phase where you diagnose before prescribing."]],
ex:"A door-to-door pest rep stops pitching chemicals and starts asking: 'Seen any scorpions this summer? Kids or pets play in the yard?' The homeowner mentions her toddler was stung last month. The rep's entire close becomes one sentence: 'Our quarterly barrier means that never happens again.' Close rate doubles — same product, different diagnosis.",
keys:["Emotion buys, logic justifies. Sell the after-state, not the ingredients.","Diagnose with questions before prescribing an offer — discovery is where sales are won.","Ethically deploy the six forces: reciprocity, social proof, authority, scarcity, consistency, liking.","Objections are requests for certainty. Welcome them; the silent prospect is the lost one."]},
{id:"c7",t:"Closing — Asking for the Business",q:"how to close sales techniques that work",
p:["Closing is not a magic phrase at the end — it's the natural conclusion of a well-run conversation. Most sales die not from 'no' but from the seller never clearly asking. The fundamentals: assume the sale in your language ('Most folks pick Wednesday or Friday — which works better?'), make the next step tiny and concrete, and then be quiet. The person who talks after the question loses. Silence feels brutal for three seconds and pays for years.",
"Learn three workhorse closes. The alternative close: offer two yeses ('quarterly or bi-monthly?') instead of yes/no. The summary close: replay their own words — 'So the ants in the kitchen, the scorpion issue, and you wanted it handled before your party on the 20th — here's exactly what we'll do.' The takeaway close: honestly remove pressure — 'This might not be for you if the car sits in a garage all week.' Handle objections with feel-felt-found: acknowledge, relate, resolve. And know your numbers: if you close 30% and a competitor closes 45%, they can pay 50% more per lead and still beat you. Closing skill is a permanent discount on all marketing you'll ever buy."],
terms:[["Assumptive language","Speaking as if the decision is made, offering choices about details, not 'whether'."],["Alternative close","Two acceptable options replacing yes/no ('Tuesday or Thursday?')."],["Feel-felt-found","Objection frame: 'I understand how you feel, others felt the same, they found…'"],["Close rate","Sales ÷ presentations. The multiplier on every marketing dollar."]],
ex:"Two reps run the same 20 doors with the same pitch. Rep A ends with 'So… any interest?' — 1 sale. Rep B ends with 'I've got your neighbors on Thursdays anyway — morning or afternoon better for the first treatment?' then goes silent — 4 sales. The product never changed; the ask did.",
keys:["Most sales are lost by never clearly asking. Ask, then be silent.","Offer two yeses (alternative close) instead of yes/no.","Summarize their own words back before the ask — people don't argue with themselves.","Close rate multiplies every marketing dollar; a 10-point lift is a raise you give yourself forever."]},
{id:"c8",t:"Customer Service & Retention — The Profit Multiplier",v:"MT4Ig2uqjTc",q:"customer retention strategies small business",
p:["Acquiring a customer costs 5–10× more than keeping one, which makes retention the highest-margin activity in any company. A 5% improvement in retention can raise profits 25–95%, because retained customers buy more, cost nothing to re-acquire, tolerate price increases, and recruit friends for free. Yet most owners spend 90% of their energy hunting new customers while their bucket leaks. The masters obsess over the leak first.",
