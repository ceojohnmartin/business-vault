const SIMS=[
{id:"sim-buy",title:"Buy Your First Business",cat:"Acquisition",time:"~10 min",
intro:"You have $80,000 saved, a 760 credit score, and the Acquisition School under your belt. Eleven months of searching just produced a real opportunity: a 22-year-old residential pest control company. Every choice you make moves the deal — and your future.",
steps:[
{text:"The broker's CIM claims $240k SDE on $610k revenue, asking $780k. Your 60-minute screen finds $55k of questionable add-backs ('one-time' truck repairs three years running, a brother-in-law on payroll who runs all scheduling). Your first move?",
choices:[
{t:"Offer the full $780k quickly before another buyer appears",s:0,fb:"You just paid for fiction. Recast SDE is ~$185k, so $780k is 4.2× — a platform multiple for an owner-operated job. Deal fever won this round."},
{t:"Recast SDE yourself (~$185k), and let YOUR number drive the price conversation",s:2,fb:"Right. You price on provable, recast earnings — $185k at a fair 3× suggests ~$555k. You attach your add-back analysis so the broker argues with arithmetic, not with you."},
{t:"Walk away — inflated add-backs mean a dishonest seller",s:1,fb:"Understandable but hasty. Nearly every CIM has optimistic add-backs; that's negotiation, not fraud. You almost killed a good business over normal broker packaging."}]},
{text:"The seller, 64 and recently widowed, gets emotional at your $560k offer: 'This company is my life's work.' The broker hints another buyer is circling at $700k. What now?",
choices:[
{t:"Raise to $700k — you can't lose the deal now",s:0,fb:"The phantom 'other buyer' is the oldest play in brokerage. You bid against a ghost, and your DSCR at $700k is 1.05 — the bank will balk and your salary vanishes."},
{t:"Hold your number but bridge with structure: $560k as $480k cash + $50k seller note + $30k earnout if retention holds 85%",s:2,fb:"Structure over stubbornness. The sticker reads closer to what pride needs, the note keeps him invested in transition, and the earnout prices his optimism in his own currency."},
{t:"Tell the broker to call when the other buyer falls through",s:1,fb:"Bold, and sometimes right — but with a motivated, grieving seller, disappearing wastes the relationship equity you built. A structured bridge would have closed this."}]},
{text:"Diligence, week 4: bank deposits match the P&L (good), but the customer list shows 31% of 'active recurring' accounts haven't been serviced in 14+ months, and the senior tech holds the state license.",
choices:[
{t:"Close anyway — you've spent $12k on diligence and four months of your life",s:0,fb:"Sunk-cost surrender. You just bought a book that's a third phantom, and the license walks out with a tech you haven't secured. This is how diligence money gets wasted: by ignoring what it finds."},
{t:"Reprice with receipts: cut the offer to reflect real recurring revenue, and add a license-transition condition plus a stay bonus for the senior tech",s:2,fb:"Textbook. Retrading on documented findings is professional. The seller fumes for a week, checks with his own CPA, and accepts $505k with the tech signed to a 12-month stay agreement."},
{t:"Demand the seller personally guarantee all 31% of stale accounts renew",s:1,fb:"Creative but unworkable — he can't control customers he stopped serving. The seller rejects it as designed-to-fail; you nearly lost a fixable deal to a clever-sounding term."}]},
{text:"Financing: your bank ('we do SBA sometimes') has sat on the file for 5 weeks. A Preferred SBA Lender quotes Prime+2.5 with a 55-day close but wants a lien on your house. Decide.",
choices:[
{t:"Stay loyal to your bank — they know you",s:0,fb:"Committees don't know anyone. Week 9, they decline over 'industry concentration.' The seller's patience is gone and the deal nearly dies while you start over."},
{t:"Move to the PLP lender, negotiate what's negotiable, and accept the personal guarantee with eyes open",s:2,fb:"The guarantee is standard for SBA acquisition debt — that's why every DSCR lesson mattered. You close in 51 days at 1.4× coverage after your salary. Leverage with teeth, used deliberately."},
{t:"Abandon debt and offer the seller 100% seller financing instead",s:1,fb:"Worth asking — but at this size the seller needs cash for retirement, not a decade of your IOUs. He declines, and you've burned two weeks. The stack (cash + SBA + note) existed for a reason."}]},
{text:"Closing day passed. Day 3 of ownership: a crew chief asks if you're 'changing everything,' two customers call asking if the company sold, and your notebook already has nine brilliant improvement ideas.",
choices:[
{t:"Announce your modernization plan — new name, new routes, new software — while energy is high",s:0,fb:"You just triggered the roll-up case study in miniature: the senior tech updates his resume, churn doubles by month three. The business you bought was trust, and you spent it in a week."},
{t:"Freeze changes for 90 days, ride every route, run joint visits to top customers with the seller, and bank ideas in the LATER notebook",s:1,fb:"Nearly perfect — stability is the whole job right now. One addition would make it complete: saying it out loud. Uncommunicated stability still leaves people guessing."},
{t:"Same as freezing changes — but announce the 90-day pledge explicitly to staff (in person) and customers (a continuity letter)",s:2,fb:"The full playbook: stability, DECLARED. 'Nothing changes for 90 days — same techs, same schedule, same phone number' converts your patience into their calm. Churn holds at 4%; the machine is yours."}]}],
lessons:["Price on recast, provable earnings — structure bridges gaps, it never fixes overpaying","Diligence findings are for acting on, not filing away; retrade with receipts or walk","Shop preferred lenders early; the guarantee is the price of leverage — underwrite yourself honestly","The first 90 days you're buying the real asset: trust. Stabilize loudly, improve later"]},

{id:"sim-cash",title:"Fix the Cash Crisis",cat:"Finance",time:"~8 min",
intro:"You own a commercial cleaning company: $1.6M revenue, $140k 'profit' on paper — and $9,200 in the bank with Friday's $41k payroll five days away. Receivables: $212k, much of it 60+ days old. Welcome to the difference between profit and cash.",
steps:[
{text:"Five days to payroll, $31,800 short. First move?",
choices:[
{t:"Take the merchant cash advance ad promising 'funding in 24 hours'",s:0,fb:"The MCA wires $35k and quietly costs 70%+ APR with daily withdrawals that strangle the very cash flow you're trying to fix. This is how cleaning companies die — payroll was saved once, the business was mortgaged forever."},
{t:"Call your three largest overdue accounts today and offer 2% off for payment by Thursday",s:2,fb:"The cheapest money in existence: $2,300 of discount unlocks $118k of YOUR OWN cash. Two of three pay — payroll clears with room to spare. Now fix the machine that made this normal."},
{t:"Delay payroll a week and explain it honestly to the crew",s:1,fb:"Honest, but payroll delay is the loudest possible alarm bell — two supervisors start job hunting that afternoon, and word reaches a big client. You saved the week and damaged the year."}]},
{text:"Payroll cleared. The autopsy: you invoice on the 30th, clients pay in 60-75 days, but wages go out weekly and supplies net-15. Every new contract makes it worse. The structural fix?",
choices:[
{t:"Stop taking new contracts until receivables catch up",s:1,fb:"It halts the bleeding by shrinking the business — treating growth as the disease when the payment-terms gap is. Competitors gladly absorb your pipeline while you convalesce."},
{t:"Redesign the cycle: deposits on new contracts, progress billing on big jobs, net-30 with late fees, invoice the DAY work completes",s:2,fb:"You attacked the actual disease. New contracts now fund themselves; the collection gap shrinks from ~70 days to ~35. Growth flips from cash-consuming to cash-neutral."},
{t:"Raise prices 10% to cover the financing cost of slow payers",s:0,fb:"You've now made yourself the most expensive AND still the most cash-starved cleaner in town. Price fixes margin problems; this is a timing problem. The crisis returns in 90 days, bigger."}]},
{text:"Your biggest client (28% of revenue) pays in 75 days, disputes invoices routinely — and just requested a rate DECREASE at renewal. Handle it.",
choices:[
{t:"Accept the decrease — losing 28% of revenue would be catastrophic",s:0,fb:"You just agreed to finance your worst payer at a loss. Concentration plus slow-pay plus price pressure is a hostage situation, and you handed over more rope."},
{t:"Counter with the full picture: keep rates, move to net-30 with autopay, or a 4% increase on current terms — while quietly accelerating your pipeline to dilute them below 15%",s:2,fb:"Negotiate AND diversify. They grumble into net-45 autopay (huge win), and two quarters of sales work later they're 16% of revenue. Their leverage — and your fragility — both shrink."},
{t:"Fire the client to make a point about payment discipline",s:1,fb:"Emotionally magnificent, financially reckless at 28% concentration. Diversify FIRST, then renegotiate or exit from strength. You did it backwards and spent a year rebuilding."}]},
{text:"Cash is stabilizing. Now build the early-warning system so this never sneaks up again.",
choices:[
{t:"Check the bank balance every morning — that's what nearly dying teaches",s:1,fb:"Better than nothing, but a balance is a snapshot, not a forecast. It tells you you're falling after you've left the roof."},
{t:"Run a 13-week rolling cash flow forecast, reviewed every Monday, with receivables aging worked weekly",s:2,fb:"The operator's instrument panel. Week-ahead visibility means the next crunch appears eight weeks out as a curve on a spreadsheet — solvable with calls, not surgery — and stale invoices get chased at 35 days, not 75."},
{t:"Keep a $50k credit line untouched as the safety net",s:1,fb:"The line is wise (arrange it NOW, while statements look decent) — but a net without a forecast just changes what you hit when you fall. Pair it with the 13-week discipline."}]},
{text:"A year later: cash cushion equals six weeks of expenses, DSO is 34 days, and a competitor — profitable on paper, empty in the bank — offers you their client book cheap 'because payroll is Friday.' Full circle. You…",
choices:[
{t:"Decline — their mess isn't your problem",s:1,fb:"Safe, defensible… and a missed asymmetry. Their clients were fine; their TIMING was broken — the exact disease you now know how to cure."},
{t:"Buy the book at a distressed price, on terms, and onboard those clients into YOUR billing cycle",s:2,fb:"The full circle: cash discipline isn't just survival, it's acquisition capacity. Their crisis prices the deal; your working-capital machine makes it instantly healthy. This is why the cushion exists."},
{t:"Lend them $40k at interest to be helpful",s:0,fb:"You became an unsecured lender to a business that can't manage cash, at consumer-loan pricing, with a friendship attached. There are worse investments, but not many."}]}],
lessons:["Profit is opinion, cash is fact — you can starve while 'earning'","Fix the working-capital cycle (deposits, terms, instant invoicing), not just the shortfall","The 13-week forecast turns crises into curves you see eight weeks away","Cash discipline compounds into opportunity: the liquid buyer prices everyone else's emergencies"]},

{id:"sim-team",title:"Build the Sales Team",cat:"Sales",time:"~8 min",
intro:"Your pest control company runs on your personal selling: you close 20 accounts a month and everything else nights and weekends. It's time to build a team that sells without you. Every hire, comp plan, and coaching call shapes the machine.",
steps:[
{text:"Two final candidates for your first rep: A) magnetic interviewer, 'natural born closer,' vague about past numbers. B) modest interviewer who asks good questions; in the role-play audition he's mediocre — until you coach him once, and his second attempt jumps dramatically.",
choices:[
{t:"Hire A — sales is charisma, and he sold YOU in the interview",s:0,fb:"He interviewed brilliantly because interviewing IS his skill. Four weeks in: heavy talk, thin pipeline, allergic to coaching. The audition data was there; the charm overrode it."},
{t:"Hire B — the delta between his two role-plays is coachability, the best predictor you observed",s:2,fb:"Correct read. Slow first month, then compounding: he does the boring inputs, absorbs every correction, and by month four out-sells your best solo month. You hired the learning rate."},
{t:"Hire both and let them compete",s:1,fb:"Cohort hiring is genuinely smart when planned — but you budgeted for one, so now training, territory, and your attention are split. B thrives anyway; A quits in week six, taking your onboarding hours with him."}]},
{text:"Comp plan time. Your service has heavy first-year churn risk, and revenue collects monthly. Design the plan.",
choices:[
{t:"High commission on signed contracts, paid at signing — maximum motivation",s:0,fb:"Summer-sales disease: reps get paid on ink, so ink is what you get — over-promised customers who cancel by month three. You funded bonuses on churn."},
{t:"Modest base + commission on COLLECTED revenue with a 90-day clawback, accelerators above target, a spiff for annual prepay",s:2,fb:"Comp is strategy in math. Reps now care about the RIGHT customers, the accelerator keeps your best hungry, and the prepay spiff feeds working capital. Cancels stay under 8%."},
{t:"Pure salary to keep everyone comfortable and cooperative",s:1,fb:"Comfortable, cooperative… and calm. Too calm. Activity drifts down 30% by month two because the scoreboard doesn't pay. Salary suits long-cycle B2B; your door game needs skin."}]},
{text:"Month 3: your rep's close rate is fine, but he's at 60% of target. The dashboard says doors knocked per day quietly fell from 65 to 38. Coach it.",
choices:[
{t:"'You're at 60% of target — I need more from you.' Motivation matters",s:0,fb:"You coached the outcome, which he can't directly control, instead of the input, which he can. He nods, feels vaguely ashamed, and changes nothing — because 'more' isn't an instruction."},
{t:"Show him the numbers: close rate healthy, doors down 40% — then set an activity floor together and gamify the streak",s:2,fb:"Diagnose the stage, coach the stage. Turns out he'd been 'optimizing' by pre-judging houses. Doors return to 60+, and target follows within three weeks. Inputs are coachable; outcomes are just arithmetic."},
{t:"Put him on a formal performance improvement plan to create urgency",s:1,fb:"A PIP for a coachable input problem is using a courtroom where a whiteboard would do. It creates fear, not doors — and your best-listening rep starts wondering if loyalty flows one way."}]},
{text:"You're at three reps and drowning: still selling personally, managing ad hoc, no rhythm. The team needs a system. Install…",
choices:[
{t:"A daily 10-minute standup (yesterday's numbers, today's plan, one obstacle), weekly 1-on-1s on each rep's weakest stage, Friday role-play",s:2,fb:"Rhythm IS management. The standup kills surprises, the 1-on-1s aim coaching at the exact broken stage, and role-play — the practice everyone dreads — becomes the culture's edge. You sell less; the machine sells more."},
{t:"A big annual bonus for the top rep — competition will self-organize the team",s:0,fb:"One winner, two demoralized reps, zero shared learning — your two juniors stop asking the senior for tips because helping costs him money. Culture eats comp plans, and this comp plan ate the culture."},
{t:"Weekly hour-long pipeline review meetings with the full team",s:1,fb:"Better than chaos, but one weekly hour is where feedback goes to arrive late. Daily pulse + individual coaching beats a weekly committee — reps improve between meetings, not during them."}]},
{text:"Month 9: the machine works — 55 accounts/month, you personally sell almost nothing. Your best rep asks to become sales manager of the team you'll need in the next city. Your call?",
choices:[
{t:"Promote him immediately — best seller, obvious choice",s:1,fb:"The classic gamble: you MIGHT get a great manager; you DEFINITELY lose your best seller. Without testing management skills first, you flipped a coin with two of your most valuable positions."},
{t:"Create a bridge: he keeps selling at 70%, takes one junior to develop, runs Friday role-play — audition the manager before appointing one",s:2,fb:"Auditions predicted your best hire; they predict managers too. Three months later the junior he mentors hits target early — evidence, not hope. He earns the title, and the seat was never empty."},
{t:"Decline — great sellers should sell, forever",s:0,fb:"You just told your most ambitious person his ceiling. He nods politely, and eight weeks later a competitor gives him the title you wouldn't. Growth paths are retention tools."}]}],
lessons:["Hire the learning rate: audition + coach + re-audition beats interview charm","Pay on collected revenue with clawbacks — reps optimize exactly what you pay for","Coach inputs by stage (the dashboard tells you which); outcomes are downstream","Management rhythm (daily pulse, weekly 1-on-1, deliberate practice) is the product you build next"]},

{id:"sim-recession",title:"Survive the Recession",cat:"Strategy",time:"~8 min",
intro:"You own a car wash doing $75k/month with a $28k membership base. The economy just cracked: consumer spending is falling, two competitors have started discounting, and your lender sent a 'portfolio review' letter. The next four quarters decide everything.",
steps:[
{text:"Month one of the downturn: retail volume is off 18%. Your first instinct?",
choices:[
{t:"Match the competitors' 40%-off blitz before you lose everyone",s:0,fb:"You just repriced your brand at the bottom of the market's mood. Members quietly do the math — why pay $25/month when washes are $6? — and the discount you offered retail starts cannibalizing your annuity."},
{t:"Hold price; pivot all marketing to membership conversion — 'lock in unlimited, recession-proof your clean car'",s:2,fb:"Recessions are when memberships SELL: certainty is the product. Retail dips but the member base grows 11% in a quarter, and revenue stabilizes on the annuity while discounters bleed."},
{t:"Cut all marketing spend immediately to preserve cash",s:1,fb:"Cash discipline is right; going dark is not. Share shifts during downturns more than any other time — the operators still visible in month six inherit the discounters' burned-out customers."}]},
{text:"The lender's portfolio review lands: they want updated financials and a meeting. Your DSCR has slipped from 1.6 to 1.25.",
choices:[
{t:"Delay the meeting — never volunteer bad numbers",s:0,fb:"Silence reads as distress. The bank moves you to the watch list, and your next equipment request meets a wall. Lenders punish surprises far harder than bad quarters."},
{t:"Walk in early with a 13-week cash forecast, your membership-growth data, and a request: temporary interest-only for two quarters IF needed",s:2,fb:"You showed up like an operator: instruments, plan, and an ask framed before you need it. They grant the standby flexibility (you never use it) and your file gets a handwritten 'strong management' note."},
{t:"Start moving deposits to a new bank quietly in case they call the loan",s:1,fb:"Diversifying banking isn't wrong — but doing it instead of communicating turns a routine review adversarial when they notice. Do both, in the opposite order."}]},
{text:"Costs: you need $9k/month out of the budget. The candidates: (a) two of nine attendants, (b) your $3.2k/month ad spend, (c) deferring tunnel maintenance, (d) renegotiating chemical, insurance, and lease costs.",
choices:[
{t:"Defer maintenance — the tunnel runs fine and machines don't complain",s:0,fb:"The invisible cut with the loudest eventual bill: month five, the conveyor fails on a Saturday, costing $22k in repairs and lost peak revenue. Deferred maintenance is a payday loan from your own equipment."},
{t:"Attack contracts first: rebid insurance, consolidate chemical purchasing, ask the landlord for two quarters of relief in exchange for a lease extension",s:2,fb:"$6,800/month found with zero damage to capability — vendors price loyalty in downturns, and the landlord prefers a longer lease to a vacant corner. Cut fat before muscle, always."},
{t:"Lay off the two attendants — labor is the biggest line",s:1,fb:"Sometimes necessary, but you cut muscle while contract fat remained. Lines lengthen at peak, reviews mention it, and rehiring in the recovery costs more than the savings."}]},
{text:"Month seven: the weakest competitor — the deepest discounter — is visibly dying. Their landlord calls you: 'Would you take over the site?'",
choices:[
{t:"Absolutely not — expanding in a recession is how businesses die",s:1,fb:"Caution is defensible, but you evaluated a category instead of a deal. The site had 30% more traffic than yours and the landlord was offering terms he'd never repeat in a good economy."},
{t:"Evaluate it like an operator: traffic counts, takeover terms, conversion cost — and take it ONLY because your cushion and membership math clear it with room",s:2,fb:"Recessions transfer assets from the fragile to the prepared — at recession prices. Six months free rent, equipment at auction value, and your membership engine pointed at a better corner. The downturn just became your growth story."},
{t:"Take it immediately — their loss is automatically your gain",s:0,fb:"You skipped the underwriting because the price felt like a gift. The site needed $180k of equipment you didn't budget, and 'cheap' consumed the exact cushion keeping site one safe."}]},
{text:"The recovery arrives. Your discipline held: memberships grew, the second site is converting, competitors are gone or diminished. The lesson you institutionalize?",
choices:[
{t:"Return to normal — the storm passed, drop the wartime habits",s:0,fb:"The 13-week forecast gets abandoned, the cushion gets spent on a truck upgrade, and the next shock — there is always a next shock — finds you exactly as surprised as the last one found your competitors."},
{t:"Keep the crisis instruments permanently: the forecast, the cushion target, the annual contract rebids, the membership-first engine",s:2,fb:"Wartime discipline, peacetime compounding. The habits that saved you in the trough are precisely the ones that make the boom years enormously profitable. Antifragility is a routine, not a mood."},
{t:"Celebrate by expanding to three more sites while momentum is hot",s:1,fb:"Growth is earned — but three simultaneous sites on boom-year confidence is how the NEXT recession gets its transfer of assets. One integrated site at a time; the discipline that bought site two still applies."}]}],
lessons:["In downturns, sell certainty (memberships/contracts) — never follow discounters to the bottom","Bring lenders instruments and plans BEFORE they ask; surprises are the real default","Cut contract fat before capability muscle; deferred maintenance is borrowed money","Recessions transfer assets to the prepared — keep the cushion and forecast forever"]},

{id:"sim-price",title:"Price the Product",cat:"Marketing",time:"~7 min",
intro:"You're launching a quarterly home pest-protection plan in a market where competitors charge $89-119 per quarter. Your true cost to deliver is $41 per visit. Pricing is the most powerful profit lever you own — pull it deliberately.",
steps:[
{text:"Set the launch price for your standard quarterly plan.",
choices:[
{t:"$79 — undercut everyone and win on volume",s:0,fb:"You anchored the market's cheapest position with the market's thinnest margin: $38/visit gross before fuel spikes or callbacks. Volume came — of the most price-sensitive, fastest-churning customers in town."},
{t:"$109 with a sharper offer: guarantee ('see a pest between visits, we return free'), named plan, easy autopay",s:2,fb:"Priced into the premium band and JUSTIFIED it with risk reversal. Margin is $68/visit — funding better techs and real marketing — and the guarantee costs little because your service actually works."},
{t:"$99 — safely match the middle of the market",s:1,fb:"The middle is where pricing goes to be ignored: no signal, no story, no margin edge. Survivable, forgettable — and you'll compete on everything except the one lever you didn't use."}]},
{text:"Three months in: close rate on quotes is 61%. Most operators celebrate. What does the number tell YOU?",
choices:[
{t:"Celebrate — 61% means the offer is dialed in",s:1,fb:"It means the market is saying yes too easily. Above ~50-55% on outbound quotes, the classic diagnosis is underpricing — you're leaving the difference on every kitchen table you visit."},
{t:"Test: raise price 10% for the next 60 days and watch close rate and total gross profit",s:2,fb:"The operator's move: price is a hypothesis, so run the experiment. Close rate dips 61→54%… and gross profit per hundred quotes rises 9%. Fewer, better customers at higher margin — the math most owners never dare to check."},
{t:"Lower price 10% to push close rate even higher",s:0,fb:"You optimized the vanity metric. Close rate hits 70%, margin collapses, and your densest routes now serve the customers most likely to cancel over a $5 competitor coupon."}]},
{text:"A national chain enters your zip codes at $69/quarter with heavy ads. Your renewal season starts next month.",
choices:[
{t:"Match $69 for all renewals before the cancellations start",s:0,fb:"You panicked before your customers did. Renewals were never really about price — same tech, named guarantee, local reviews — and you just cut 36% of revenue to answer a threat most customers hadn't noticed."},
{t:"Hold price; arm renewals with the value story (your tech's name, response times, the guarantee's record) and add an annual-prepay option at 8% off",s:2,fb:"Retention ran 91%. The chain's $69 bought them the churn-prone bottom of the market; the prepay option pulled cash forward and locked your best households for a year."},
{t:"Add a stripped-down $75 'basic' tier to compete without touching the main plan",s:1,fb:"Defensible flanker logic — but rushed. Basic tier cannibalized 15% of standard-plan customers who'd have happily renewed, and techs now juggle two service specs on the same street."}]},
{text:"Commercial opportunity: a 12-restaurant group requests a bid. Your residential pricing math says $210/month per location. The buyer says budget is 'around $150.'",
choices:[
{t:"Bid $150 — twelve locations is worth the haircut",s:0,fb:"Commercial service (documentation, inspection-readiness, liability, priority callbacks) costs MORE to deliver than residential, not less. You won the contract and bought yourself a $60/location monthly loss with a 12× multiplier."},
{t:"Bid $205 with the compliance story (inspection logs, audit trail, 4-hour response SLA) — and offer $190 IF they sign all twelve for 24 months",s:2,fb:"You priced the risk you're absorbing and traded the discount for commitment, not desperation. They signed at $190×24 months — volume discounts are earned with term and scale, never with hope."},
{t:"Decline — commercial isn't worth the hassle",s:1,fb:"Walking from bad terms is strength; walking from the whole category is a reflex. A structured counter would have won a two-year anchor client at healthy margin — this was a negotiation, not a trap."}]},
{text:"Year-end review: which pricing discipline do you make permanent?",
choices:[
{t:"Annual across-the-board increases matched to your cost inflation, communicated with the value story, grandfathering nobody",s:2,fb:"Pricing power is a muscle: small, annual, well-communicated increases (with the guarantee and service record doing the talking) compound like interest. Churn from a 4-6% increase on well-served customers: under 3%."},
{t:"Freeze prices for loyalty — your best customers deserve it",s:1,fb:"Generous, and quietly corrosive: costs inflate 4% yearly, so a frozen price is a silent annual pay cut that surfaces years later as one giant, relationship-breaking correction."},
{t:"Whatever competitors do, stay $10 under it",s:0,fb:"You just outsourced your P&L to the least rational discounter in the county. Their pricing mistakes are now automatically your pricing mistakes, minus ten dollars."}]}],
lessons:["Price to value with risk reversal — cost-plus and me-too pricing waste the strongest lever","A too-high close rate is a pricing signal, not a trophy; test increases with real math","Never match panic discounts — defend renewals with the value story and term-based offers","Raise prices a little every year with the story attached; frozen prices are deferred crises"]},

{id:"sim-manager",title:"Fire or Keep the Manager",cat:"Leadership",time:"~7 min",
intro:"Dave has run operations at your pest company for four years — loyal, hardworking, there since the beginning. But the company has tripled, and lately: two good techs quit citing him, scheduling errors are up, and he resists every new system. Your call, step by step.",
steps:[
{text:"The pattern is undeniable. Your first move?",
choices:[
{t:"Fire him this week — the exits and errors speak for themselves",s:0,fb:"Speed without diagnosis. You never learned whether this was skill, will, or role-shape — and the crew watched four years of loyalty end in a Tuesday meeting. Fear, not standards, is the lesson they took."},
{t:"Run the honest diagnosis first: is the problem skill (trainable), will (motivational), or the role outgrowing the person? Gather specifics before any conversation",s:2,fb:"Leadership 101: diagnose before treating. The file you build shows a pattern — Dave excels at field ops and drowns in the people-and-systems half the role grew into. That's a role-shape problem, and it changes everything about the fix."},
{t:"Say nothing but quietly route new-system decisions around him",s:1,fb:"The passive workaround: kinder-feeling, crueler in effect. Dave notices his shrinking kingdom within weeks, morale sinks into ambiguity, and you've taught the org that problems get orbited, not addressed."}]},
{text:"Time for the conversation. Frame it.",
choices:[
{t:"Radical candor: care personally, challenge directly — the specifics, the impact, and 'I want to figure out the right seat with you'",s:2,fb:"He's defensive for ten minutes, then quiet, then honest: he's been drowning and hiding it. The conversation you dreaded for months took forty minutes and produced the first real data you've had — his own account."},
{t:"Soften everything: mention 'a few hiccups' and ask him to 'keep an eye on things'",s:0,fb:"Ruinous empathy, textbook case: he leaves the meeting believing things are basically fine. You spent your one clean shot at clarity on making yourself comfortable."},
{t:"Put it all in a formal written warning first — documentation protects the company",s:1,fb:"Documentation matters (and comes next), but leading with paper before ever having the honest conversation converts a fixable human problem into an adversarial legal process. Talk, then write."}]},
{text:"Dave's own account plus your file confirm it: brilliant at field operations and tech quality, overwhelmed by hiring, scheduling systems, and people development. Choose the path.",
choices:[
{t:"Restructure honestly: Dave becomes Field Quality Manager (training, standards, hardest jobs — his genius zone); you hire an ops manager for systems and people. Same respect, right seat",s:2,fb:"Right people, right seats. Dave — visibly relieved once the title sting fades — becomes the best QA lead you could hire. The new ops manager fixes scheduling in six weeks. Two problems, one honest redesign."},
{t:"Keep him in the full role with a 90-day improvement plan covering everything",s:1,fb:"You just gave a drowning man a deadline to grow gills. PIPs work for will problems; this is a capability-shape problem — day 90 arrives with the same gaps plus three months of accumulated damage."},
{t:"Terminate with severance — the role needs someone who can do all of it",s:1,fb:"Legitimate when no honest seat exists — but one did, and you paid to lose four years of irreplaceable field knowledge, then watched him take it to a competitor. The crew noticed loyalty's exchange rate, too."}]},
{text:"Dave accepts the new seat, but asks — reasonably — how the change gets announced. The crew is watching. You…",
choices:[
{t:"Announce it as a demotion honestly — the team deserves the unvarnished truth",s:0,fb:"Honesty without dignity is just cruelty with a halo. Public framing as a demotion humiliates the man who said yes to the redesign — and teaches everyone else never to accept a seat change."},
{t:"Frame it accurately AND with dignity: the company grew into two jobs, Dave chose the one he's best at, a new role is being hired for the other — announced by you and Dave together",s:2,fb:"True, dignified, and co-announced: the org hears 'we redesign roles honestly here' instead of 'watch your back.' Two techs separately tell you it made them trust the company more."},
{t:"Don't announce anything — let people figure it out from the org chart",s:1,fb:"The vacuum fills with rumor inside a week: 'Dave got demoted, who's next?' Unmanaged narratives always find the darkest version of events."}]},
{text:"Six months on: the structure works. The durable lesson you build into the company?",
choices:[
{t:"Loyalty means never restructuring anyone's role again",s:0,fb:"You've re-created the original disease as policy: seats frozen to people, growth constrained by yesterday's org chart. The NEXT Dave situation is now guaranteed — and undiscussable."},
{t:"Quarterly seat reviews: does each role still fit its person as we grow? Plus the standing rule — feedback goes to the person, early, before patterns calcify",s:2,fb:"You institutionalized the cure: roles evolve openly, hard conversations happen at month one instead of year four, and 'right seat' becomes vocabulary instead of crisis. The Dave story becomes the culture's founding parable."},
{t:"Hire only overqualified people so roles never outgrow anyone",s:1,fb:"Appealing arithmetic, unworkable reality: you can't staff a pest company entirely with future COOs, and overqualified people in static seats leave even faster than overwhelmed ones."}]}],
lessons:["Diagnose before deciding: skill, will, or role-shape — each has a different cure","Care personally, challenge directly — softened feedback is a decision to keep the problem","Right person, wrong seat is fixable; announce redesigns with truth AND dignity","Institutionalize early feedback and seat reviews so the crisis version never recurs"]},

{id:"sim-expand",title:"The Second Location",cat:"Operations",time:"~8 min",
intro:"Your car wash prints money: $82k/month revenue, 1,150 members, a manager-run crew. The itch has arrived — a second site. Expansion is where operators become platforms… or learn expensive geography lessons.",
steps:[
{text:"Are you actually ready? The honest test is…",
choices:[
{t:"Cash: you have $300k available, so yes",s:1,fb:"Capital is necessary and wildly insufficient — money buys the site, not the systems. The graveyard of second locations is full of well-funded copies of businesses that secretly ran on their owner's presence."},
{t:"The absence test: site one runs a full month — numbers, staffing, problems — without you setting foot in it",s:2,fb:"The only test that matters. Your first attempt fails revealingly (two 'quick questions' a day, one crisis visit); you spend eight weeks documenting SOPs and upgrading your manager's authority, THEN pass it. Now you're duplicating a system, not a person."},
{t:"Demand: cars are turning away at peak on Saturdays",s:1,fb:"Real signal — of capacity, not capability. Peak overflow might justify site two… or just longer hours and a faster tunnel at site one for a tenth of the cost. Demand tells you the market's ready; it says nothing about you."}]},
{text:"Two candidate sites: A) 22 minutes away, 34k daily traffic count, premium corner, big rent. B) 75 minutes away in a cheaper market, half the rent, broker calls it 'an untapped goldmine.'",
choices:[
{t:"Site B — lower rent means lower risk",s:0,fb:"Cheap rent bought expensive geography: 75 minutes means your ops muscle, shared staff, and brand halo all stay home. You now own two single sites instead of one two-site system — the leapfrog mistake from your own curriculum."},
{t:"Site A — contiguous expansion: shared labor pool, manager oversight in one loop, marketing overlap, members who already drive past it",s:2,fb:"Density is the strategy. Cross-scheduling staff saves a full headcount, your ops manager covers both in a day, and 240 existing members live closer to site two than site one. The premium rent buys compounding, not just corners."},
{t:"Neither — build in the same neighborhood as site one to dominate it completely",s:1,fb:"Density taken past the point of returns: site one's trade area can't feed two tunnels, so you'd mostly split your own volume. Contiguous means adjacent markets, not cannibalized ones."}]},
{text:"Staffing the new site's leadership. Your options:",
choices:[
{t:"Promote your site-one assistant manager — six months before opening, training under your manager, on a branch P&L with profit share",s:2,fb:"The bench WAS the constraint (your curriculum said so) and you built it in advance. By opening day she's run site one solo for stretches, knows the playbook cold, and owns her numbers like an owner — because the comp plan makes her one."},
{t:"Hire an experienced manager from a big chain — proven at scale",s:1,fb:"Outside talent can work, but he arrives fluent in a different company's system and needs the six months of enculturation you didn't schedule. Meanwhile your loyal assistant reads the message about ceilings here."},
{t:"Run both sites yourself for the first year to guarantee standards",s:0,fb:"You just un-passed the absence test and doubled your prison. Six months of split-shift ownership later: quality wobbling at BOTH sites and a manager pipeline that never developed because you were busy being two people."}]},
{text:"Opening playbook for site two:",
choices:[
{t:"Copy site one exactly — same tiers, same prices, same SOPs, same scorecard — and pre-sell founding memberships to your existing base for their 'other side of town'",s:2,fb:"A branch is a franchise you own: standardization is the entire economic point. The founding-member pre-sale converts 380 members' trust into day-one recurring revenue — site two opens at 60% of breakeven before its first retail car."},
{t:"Let the new manager customize the concept for the new neighborhood",s:0,fb:"You franchised the one thing franchises never franchise: the standard. Two price books, two service specs, and every future decision now needs two answers. The multi-branch case study called this — same tiers, same scorecard, always."},
{t:"Soft-open quietly and let quality build word of mouth",s:1,fb:"Humble, and slow: a membership business's launch physics reward a bang (pre-sales, grand opening, founder pricing) because the annuity compounds from day one. Quiet openings spot the discounters a six-month head start."}]},
{text:"Site two hits month six at 85% of plan. A broker calls: a struggling wash in the next county over is available 'cheap.' Your move?",
choices:[
{t:"Strike — momentum is a strategy and the platform playbook is working",s:0,fb:"Site two isn't integrated (85% of plan, manager four months into the job) and 'next county' fails your own contiguity rule. This is exactly the moment roll-ups die of indigestion — the discipline that got you here just left the room."},
{t:"Pass for now with a rule: no site three until site two runs at plan for two consecutive quarters without weekly firefighting — then evaluate the market, not just the deal",s:2,fb:"Platforms are built by sequencing, and you just proved you have one: systems, bench, density logic, AND the restraint to let integration finish. When site three comes — on your timeline — it opens with a manager trained at site two. That's the flywheel."},
{t:"Buy it but run it hands-off as a passive investment",s:1,fb:"'Passive' and 'struggling turnaround two counties away' cannot coexist. It limps for a year consuming exactly the attention you swore it wouldn't, teaching the lesson at premium tuition."}]}],
lessons:["Expand when the BUSINESS passes the absence test — capital and demand aren't readiness","Contiguous density compounds (staff, oversight, brand, members); leapfrogging fragments you","Build the manager bench before the site; branch P&L + profit share makes owners","Standardize ruthlessly, pre-sell the annuity, and let integration finish before the next deal"]}
];

{id:"sim-zero",title:"Start a Business from Zero",cat:"Entrepreneurship",time:"~8 min",
intro:"You have $5,000, a full-time job, and the itch. No product, no customers, no experience — just the lessons in this university. Build something real without torching your savings.",
steps:[
{text:"Where do you start?",
choices:[
{t:"Quit the job — burn the boats, full commitment",s:0,fb:"You just put a 3-month fuse on an idea you haven't tested. Rent doesn't care about commitment. The boats you burned were your runway."},
{t:"Keep the job; spend 2 weeks interviewing 15 potential customers about their problems (Mom Test rules — past behavior, no pitching)",s:2,fb:"Evidence before investment. Three of fifteen describe the same expensive, recurring annoyance — and two say what they've already paid trying to fix it. That's a market speaking."},
{t:"Spend the $5,000 on a logo, LLC, website, and business cards",s:1,fb:"You bought the costume before the play. None of it creates a customer — and an LLC for a business with zero revenue is paperwork protecting nothing yet."}]},
{text:"Interviews point to a real problem: busy homeowners' gutters and exterior maintenance. Design the first test.",
choices:[
{t:"Build a $4,000 website with online booking before 'launching properly'",s:0,fb:"Four months and $4k for what a text message could test. Perfection before contact with customers is procrastination wearing a business suit."},
{t:"An MVP weekend: $150 of flyers in two neighborhoods with one clear offer and your phone number — decide in advance what result means 'continue'",s:2,fb:"Nine calls, five jobs booked, $640 collected in one weekend. The market just voted with money — the only ballot that counts. Your pre-set threshold (3 jobs) was cleared."},
{t:"Post in local Facebook groups asking if people would 'hypothetically be interested'",s:1,fb:"Forty-one likes, nine 'totally would!' comments, zero commitments. Compliments are the fool's gold of validation — you measured politeness, not demand."}]},
{text:"Five paying customers, weekends full. Price check: you charged $120/job gut-feel; each takes 3 hours plus materials ($25). What now?",
choices:[
{t:"Keep prices low to build a customer base first",s:1,fb:"The 'raise it later' trap: later never comes without a fight, and you're anchoring the neighborhood at unsustainable math. ~$30/hour before taxes and equipment isn't a business yet."},
{t:"Do the unit math: at $185 with a season-package option, you clear a real margin — raise it for all NEW customers and test",s:2,fb:"New customers don't know the old price. Close rate dips barely (11→9 of 20 quotes) while revenue per job jumps 54%. The flyer test proved demand; this test proved margin."},
{t:"Add more service types to increase each ticket",s:1,fb:"Scope creep before the core is priced right. Now you're mediocre at four things instead of profitable at one — the 68-item menu problem, lawn-sized."}]},
{text:"Demand exceeds your weekends. The fork: stay solo-premium, or build capacity?",
choices:[
{t:"Hire a full-time employee — go big immediately",s:1,fb:"A full-timer needs ~$4k/month of wages against your ~$5k/month of weekend revenue. You hired a payroll crisis. Capacity should trail demand by one gear, not lead it by three."},
{t:"Subcontract overflow to a vetted solo operator at 70/30, keep quality control via a written checklist (your first SOP)",s:2,fb:"Variable capacity, zero fixed cost, and your first taste of the E-Myth transition: the checklist IS the business now. Two months later the sub wants more work — that's your future first hire, pre-auditioned."},
{t:"Just raise prices again to shrink demand to your capacity",s:1,fb:"Legitimate lever, but you used it to avoid building the machine. Solo-premium is a fine lifestyle business — just know you chose a ceiling, not a company."}]},
{text:"Month six: $9k/month revenue, one sub, weekends maxed, job intact. The decision everyone asks about: when do you quit?",
choices:[
{t:"Now — six months of proof is plenty",s:1,fb:"Close. But your monthly take-home from the business is still under your salary, and you skipped a step: the numbers rule. Emotion is voting where arithmetic should."},
{t:"When the business clears a written threshold: 3 consecutive months of business profit ≥ 75% of salary + 6 months personal runway banked — then resign with a plan",s:2,fb:"The operator's exit from employment: pre-committed math instead of a mood. You cross the line in month eleven — and because it was a threshold, not a leap, you never look back in panic."},
{t:"Never — run it as a side business forever",s:0,fb:"At maxed weekends with growing demand, refusing the decision IS a decision: the business plateaus, the sub drifts to steadier work, and the window that was open in month six quietly closes."}]}],
lessons:["Validate with customer money, not compliments — set pass/fail thresholds before every test","Price from unit math, not fear; new customers never knew the old price","Add capacity one gear behind demand (subs before hires); the SOP is the real product","Quit the job on a written financial threshold, not a feeling"]},

{id:"sim-decline",title:"Fix Declining Sales",cat:"Sales",time:"~7 min",
intro:"Your home-services company's revenue has slid 3 straight months: $86k → $81k → $74k. The team blames 'the economy.' Your job: diagnose like an operator before treating like a gambler.",
steps:[
{text:"First move?",
choices:[
{t:"Launch a 25%-off promotion immediately to jolt revenue",s:0,fb:"Treatment before diagnosis. If the problem is lead flow, the discount does nothing but cut margin on the customers you'd have gotten anyway — and it anchors your price down for the recovery."},
{t:"Pull the funnel apart: leads, quote rate, close rate, average ticket, churn — month by month for six months",s:2,fb:"The dashboard tells the story feelings can't: leads flat, quotes flat, close rate flat… churn UP from 2.1% to 4.8% monthly. This isn't a sales problem — it's a leaky bucket."},
{t:"Hold a team meeting demanding everyone 'step it up'",s:1,fb:"Motivation aimed at a mystery. The team nods, works scared for two weeks, and nothing changes — because nobody, including you, knows WHICH number needs stepping up."}]},
{text:"Churn doubled starting exactly three months ago. What happened three months ago? Dig.",
choices:[
{t:"Survey lost customers with one honest question: 'What made you leave?'",s:2,fb:"Eleven of 20 responses name the same thing: your best senior tech left, and his replacement rushes jobs. Two name a competitor's door-knockers. Now the problem has a face, a date, and a fix."},
{t:"Assume it's the new competitor's discounting and match their price",s:1,fb:"You cut price for everyone to fight a cause affecting some — and lost customers' actual complaint (service quality) stays unfixed. Expensive guess, wrong target."},
{t:"Fire the newest tech — churn started around when he was hired",s:0,fb:"Correlation cosplaying as diagnosis. The new tech serves 40 customers; churn hit all 700. You just lost a decent tech, gained a wrongful-dismissal risk, and the number didn't move."}]},
{text:"Root cause confirmed: quality dropped after the senior tech left; the replacement was never properly trained. Fix the bucket.",
choices:[
{t:"Retrain against a written service SOP with ride-alongs, add a post-job quality text ('Rate today's visit 1-5'), and call every 1-2 star immediately",s:2,fb:"The leak seals in six weeks: churn 4.8% → 2.4%. The rating system now catches quality drift in days, not quarters — the andon cord, home-services edition."},
{t:"Offer every remaining customer a discount to stay",s:0,fb:"You're now paying customers to tolerate bad service. Churn slows a hair; margin bleeds everywhere; and the moment the discount ends, the unfixed problem resumes."},
{t:"Start a win-back campaign for the customers who left",s:1,fb:"Right tool, wrong order: you're inviting people back into a leaky bucket. Fix quality first — THEN the win-back letter has something true to say."}]},
{text:"Churn is fixed but you're 120 customers down. Rebuild volume — with margin intact.",
choices:[
{t:"Now run the win-back: personal call to lost customers — 'we heard you, here's what changed' + one no-strings free service",s:2,fb:"38 of 120 return — at full price, because what changed was real. Cheapest acquisition in business: people who already knew you. The referral engine restarts with them."},
{t:"Double the ad budget to replace lost customers with new ones",s:1,fb:"It works — at 5× the cost of win-backs and with strangers who churn at new-customer rates. You bought volume when you could've reclaimed loyalty."},
{t:"NOW run that 25%-off promotion to accelerate everything",s:0,fb:"The discount finally launches — into a fixed bucket, thankfully — but it attracts the coupon-chasers, teaches the market to wait for sales, and marks the quarter's margin down for a volume spike that fades."}]},

{t:"Run both against the test: is the cash flow predictable enough to service debt? At $110k EBITDA vs ~$29k/year of payments, DSCR is ~3.8 — take the loan",s:2,fb:"The operator's rule: predictable cash flow → debt; unpredictable bets → equity. Your recurring revenue makes this a debt story, and every point of growth now belongs entirely to you."},

{text:"You lean debt. The bank's term sheet arrives: 9.5%, 7 years, a blanket lien on all business assets, your personal guarantee, and a covenant: DSCR must stay above 1.5.",
choices:[

{t:"Negotiate what's negotiable (rate vs. a deposit relationship, covenant at 1.25, carve-out of one truck title), and stress-test the payment against a 20% revenue drop before signing",s:2,fb:"Rate drops to 8.9% with your deposits moving over, covenant lands at 1.25, and the stress test says survivable-but-tight — so you also open a small standby line. Signed with eyes open."},

{text:"Eight months in: growth is ahead of plan — and a second opportunity appears. A retiring competitor offers his 300-account book for $210k. Your loan capacity is thin. Fund the acquisition how?",

/* ================= USER STORE (v1) =================
   One versioned store for everything beyond lesson completion.
   Slots reserved for future phases: books, tools, cases, sims, assignments. */
const STORE_KEY="bvStore_v1";
const STORE_DEFAULT={v:1,notes:{},bookmarks:[],quiz:{},flash:{},books:{},tools:{},cases:{},sims:{},assignments:{},exams:{},labs:{}};
let store=STORE_DEFAULT;
try{store=Object.assign({},STORE_DEFAULT,JSON.parse(localStorage.getItem(STORE_KEY)||"{}"))}catch(e){store=STORE_DEFAULT}

/* content registries (BOOKS/TOOLS/CASES/SIMS) are defined in the content
   sections above; user state for them lives in store.books/tools/cases/sims */

/* streak */
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
let days=JSON.parse(localStorage.getItem(DAYS_KEY)||"[]");
if(!days.includes(todayStr())){days.push(todayStr());days=days.slice(-400);localStorage.setItem(DAYS_KEY,JSON.stringify(days))}
function streak(){
  const set=new Set(days);let n=0;const d=new Date();
  for(;;){const s=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(set.has(s)){n++;d.setDate(d.getDate()-1)}else break}
  return n;
}

/* ================= CURRICULUM ORGANIZATION =================
   Core schools run beginner → advanced as a numbered path;
   industry playbooks (car wash, pest control) live in their own tab. */
const TRACK_ORDER=["biz","money","acct","sales","mkt","acq","wash","pest"];
DATA.sort((a,b)=>TRACK_ORDER.indexOf(a.id)-TRACK_ORDER.indexOf(b.id));
const PLAYBOOK_IDS=new Set(["wash","pest"]);
DATA.forEach(t=>t.playbook=PLAYBOOK_IDS.has(t.id));
const TRACK_RANGE={biz:"Beginner → Mastery",money:"Beginner → Intermediate",acct:"Beginner → Intermediate",sales:"Beginner → Advanced",mkt:"Beginner → Advanced",acq:"Advanced → Operator",wash:"Operator",pest:"Operator"};

/* flatten */
const allLessons=[];
DATA.forEach(tr=>tr.levels.forEach(lv=>lv.modules.forEach(mo=>mo.lessons.forEach(le=>{
  allLessons.push({...le,track:tr,level:lv,module:mo});
}))));
const byId={};allLessons.forEach((l,i)=>{l.idx=i;byId[l.id]=l});
const coreLessons=allLessons.filter(l=>!l.track.playbook);
/* global glossary: every key term across the university */
const allTerms=[];
allLessons.forEach(l=>(l.terms||[]).forEach((t,i)=>allTerms.push({id:l.id+"::"+i,t:t[0],d:t[1],le:l})));

/* lesson meta */
function lessonMins(le){
  const w=((le.p||[]).join(" ")+" "+(le.ex||"")+" "+(le.keys||[]).join(" ")).split(/\s+/).length;
  return Math.max(4,Math.round(w/170)+2);
}
const DIFF=["Beginner","Intermediate","Advanced","Operator","Executive","Mastery"];
const TRACK_DIFF={money:["Beginner","Intermediate"],acct:["Beginner","Intermediate"],sales:["Beginner","Advanced"],mkt:["Beginner","Advanced"],acq:["Advanced","Operator"]};
function difficulty(le){
  const i=le.track.levels.findIndex(l=>l.id===le.level.id);
  if(le.track.id==="biz")return DIFF[Math.min(Math.max(i,0),5)];
  const m=TRACK_DIFF[le.track.id];
  if(m)return m[Math.min(Math.max(i,0),m.length-1)];
  return "Operator";
}

/* ================= MASTERY ENGINE =================
   Mastery blends completion with proven knowledge:
   lesson with a quiz attempt: 60% completion + 40% best quiz score;
   lesson never quizzed: completion only. */
function masteryOf(lessons){
  if(!lessons.length)return 0;
  let sum=0;
  lessons.forEach(l=>{
    const c=done.has(l.id)?1:0;
    const q=store.quiz[l.id];
    sum+=q?0.6*c+0.4*(q.best/100):c;
  });
  return sum/lessons.length;
}
function quizAvg(){
  const qs=Object.values(store.quiz);
  return qs.length?Math.round(qs.reduce((a,q)=>a+q.best,0)/qs.length):null;
}
function weakLessons(){
  return allLessons.filter(l=>{const q=store.quiz[l.id];return q&&q.best<70});
}
/* ================= BVU MASTERY SCORE =================
   One number from seven signals: completion, quizzes, exams,
   flashcard retention, assignments, simulations, cases+labs. */
function bvuBreakdown(){
  const completion=done.size/allLessons.length;
  const qKeys=Object.keys(store.quiz);
  const quizAvgV=qKeys.length?qKeys.reduce((a,k)=>a+store.quiz[k].best,0)/qKeys.length/100:0;
  const quiz=quizAvgV*Math.min(qKeys.length/allLessons.length*2,1);
  const totalExams=DATA.reduce((a,t)=>a+t.levels.length+1,0);
  const exams=Object.values(store.exams).filter(x=>x.passed).length/totalExams;
  const flash=allTerms.length?flashMastered()/allTerms.length:0;
  const assigns=Math.min(Object.keys(store.assignments).length/40,1);
  const sims=SIMS.length?SIMS.reduce((a,s)=>a+((store.sims[s.id]||{}).best||0),0)/100/SIMS.length:0;
  const casesLabs=(CASES.filter(c=>(store.cases[c.id]||{}).done).length+LABS.filter(l=>(store.labs[l.id]||{}).done).length)/(CASES.length+LABS.length);
  return [
    ["Lesson completion",completion,30],["Quiz mastery",quiz,20],["Exams passed",exams,15],
    ["Flashcard retention",flash,10],["Assignments",assigns,10],["Simulations",sims,7.5],["Cases & labs",casesLabs,7.5]
  ];
}
function bvuScore(){
  return Math.round(bvuBreakdown().reduce((a,r)=>a+r[1]*r[2],0));
}
function bvuRank(){
  const s=bvuScore();
  const byScore=s>=90?5:s>=75?4:s>=55?3:s>=30?2:s>=10?1:0;
  const p=placementInfo();
  return RANK_NAMES[Math.max(byScore,p?Math.min(p.rank,byScore+1):0)];
}

/* ================= HELPERS ================= */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function hashStr(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19}return h>>>0}
function seededRng(seed){let a=seed>>>0;return function(){a=Math.imul(a^a>>>15,a|1);a^=a+Math.imul(a^a>>>7,a|61);return((a^a>>>14)>>>0)/4294967296}}
function shuffled(arr,rand){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function ringSVG(size,r,pct,w){
  const c=2*Math.PI*r,off=c*(1-Math.min(Math.max(pct,0),1)),sw=w||5;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<circle class="ring-track" cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" style="stroke-width:'+sw+'"/>'+
    '<circle class="ring-fill" cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" style="stroke-width:'+sw+'" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>';
}
function cardHTML(le,num,crumb,onclick){
  const isDone=done.has(le.id);
  const q=store.quiz[le.id];
  return '<button class="card'+(isDone?" done":"")+'" onclick="'+(onclick||("openLesson('"+le.id+"')"))+'">'+
    '<span class="num">'+num+'</span>'+
    '<span class="ct"><b>'+esc(le.t)+'</b><span>'+crumb+'</span></span>'+
    (q?'<span class="mins '+(q.best>=70?'scoreTag':'')+'" style="'+(q.best<70?'color:var(--red)':'')+'">'+q.best+'%</span>':'<span class="mins">'+lessonMins(le)+'m</span>')+
    '<span class="check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span></button>';
}
function trackStats(tr){
  const ls=tr.levels.flatMap(l=>l.modules.flatMap(m=>m.lessons));
  const d=ls.filter(l=>done.has(l.id)).length;
  return {done:d,total:ls.length,pct:ls.length?d/ls.length:0};
}
function nextIncomplete(){return coreLessons.find(l=>!done.has(l.id))||allLessons.find(l=>!done.has(l.id))||allLessons[0]}
function resumeLesson(){
  if(lastLesson&&byId[lastLesson]&&!done.has(lastLesson))return byId[lastLesson];
  return nextIncomplete();
}
function dailyLesson(){
  const seed=parseInt(todayStr().replace(/-/g,""),10);
  return coreLessons[seed%coreLessons.length];
}

function setView(id){
  activeView=id;
  const tabFor={home:"home",courses:"courses",playbooks:"courses",library:"library",search:"search",progress:"progress"};
  DATA.forEach(tr=>tabFor[tr.id]="courses");
  VIEWS.forEach(v=>document.getElementById("view-"+v).classList.toggle("active",v===id));
  TABS.forEach(n=>document.getElementById("tab-"+n.id).classList.toggle("active",tabFor[id]===n.id));
  ["home","courses","search","progress",...DATA.map(t=>t.id)].forEach(v=>{
    const el=document.getElementById("sb-"+v);if(el)el.classList.toggle("active",v===id);
  });
  ["libbooks","libtools","libcases","libsims","liblabs","libterms"].forEach((v,i)=>{
    const el=document.getElementById("sb-"+v);
    if(el)el.classList.toggle("active",id==="library"&&libSel===["books","tools","cases","sims","labs","terms"][i]);
  });
  document.getElementById("pageTitle").textContent=TITLES[id]||"";
  window.scrollTo({top:0});
  if(id==="search")setTimeout(()=>{const i=document.getElementById("searchInput");if(i&&!i.value&&window.innerWidth<1080)i.focus()},250);
}

function courseCard(tr,step){
  const s=trackStats(tr);
  const m=masteryOf(allLessons.filter(l=>l.track.id===tr.id));
  const meta=(step?"Step "+step+" · ":"")+TRACK_RANGE[tr.id]+" · "+(tr.levels.length>1?tr.levels.length+" levels · ":"")+s.total+" lessons";
  return '<button class="course" onclick="setView(\''+tr.id+'\')">'+
    '<span class="c-icon">'+ICONS[tr.id]+'</span>'+
    '<span class="c-t"><b>'+tr.name+'</b><span>'+meta+'</span>'+
    '<span class="c-bar"><i style="width:'+(s.pct*100).toFixed(1)+'%"></i></span></span>'+
    '<span class="c-ring">'+ringSVG(52,22,m,4.5)+'<b>'+Math.round(m*100)+'%</b></span></button>';
}

function renderSearchShell(){
  document.getElementById("view-search").innerHTML=
    '<div class="sectionHead"><i></i><h3>SEARCH THE VAULT</h3></div>'+
    '<div class="searchBox"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>'+
    '<input id="searchInput" type="search" placeholder="EBITDA, funnels, route density, DCF…" autocomplete="off"></div>'+
    '<div class="rhead" id="rhead">Search '+allLessons.length+' lessons, '+BOOKS.length+' books, '+TOOLS.length+' tools, '+CASES.length+' cases, '+allTerms.length+' terms, and your notes.</div>'+
    '<div id="rcards"></div>';
  const idle="Search "+allLessons.length+" lessons, "+BOOKS.length+" books, "+TOOLS.length+" tools, "+CASES.length+" cases, "+allTerms.length+" terms, and your notes.";
  document.getElementById("searchInput").addEventListener("input",e=>{
    const q=e.target.value.trim().toLowerCase();
    const rc=document.getElementById("rcards"),rh=document.getElementById("rhead");
    if(q.length<2){rc.innerHTML="";rh.textContent=idle;return}
    const words=q.split(/\s+/);
    const match=s=>words.every(w=>s.toLowerCase().includes(w));
    const hits=allLessons.filter(l=>match(lessonHay(l)));
    const bHits=BOOKS.filter(b=>match(b.title+" "+b.author+" "+b.cat+" "+b.why+" "+b.teaches+" "+((store.books[b.id]||{}).notes||"")));
    const tHits=TOOLS.filter(t=>match(t.name+" "+t.cat+" "+t.desc+" "+t.formula));
    const cHits=CASES.filter(c=>match(c.title+" "+c.inspired+" "+c.cat+" "+c.situation+" "+c.problem));
    const total=hits.length+bHits.length+tHits.length+cHits.length;
    rh.textContent=total?total+" result"+(total>1?"s":"")+" found":"No matches — try a broader term.";
    let h="";
    if(hits.length)h+='<div class="moduleName">Lessons</div><div class="cards">'+hits.slice(0,25).map((l,i)=>cardHTML(l,i+1,l.track.name+" · "+l.level.tagline+" · "+l.module.name)).join("")+'</div>';
    if(bHits.length)h+='<div class="moduleName">Books</div><div class="cards">'+bHits.slice(0,10).map((b,i)=>bookRow(b,i)).join("")+'</div>';
    if(tHits.length)h+='<div class="moduleName">Tools</div><div class="cards">'+tHits.slice(0,10).map(t=>toolRow(t)).join("")+'</div>';
    if(cHits.length)h+='<div class="moduleName">Case Studies</div><div class="cards">'+cHits.slice(0,10).map((c,i)=>caseRow(c,i)).join("")+'</div>';
    rc.innerHTML=h;
  });
}

function runTool(){
  const t=TOOLS.find(x=>x.id===curTool);if(!t)return;
  const v=toolVals(t);
  const rows=t.out(v);
  document.getElementById("toolOut").innerHTML=rows.map(r=>
    '<div class="finRow'+(r[2]?" strong":"")+'"><span>'+esc(r[0])+'</span><b>'+esc(String(r[1]))+'</b></div>').join("");
  const p="Explain these "+t.name+" results in plain English for a beginner business owner, and tell me what to do about them. Inputs: "+t.inputs.map(i=>i.label+" = "+v[i.k]).join(", ")+". Results: "+rows.map(r=>r[0]+" = "+r[1]).join(", ")+".";
  const link=document.getElementById("explainLink");
  if(link)link.href="https://claude.ai/new?q="+encodeURIComponent(p);
}
function saveCalc(){
  const t=TOOLS.find(x=>x.id===curTool);if(!t)return;
  const v=toolVals(t);

/* ---- Certificates ---- */
const certEl=document.getElementById("cert");
function certStatus(tr){
  const ls=tr.levels.flatMap(l=>l.modules.flatMap(m=>m.lessons));
  const lessonsOK=ls.every(l=>done.has(l.id));
  const examsOK=tr.levels.every(lv=>{const e=store.exams[tr.id+":"+lv.id];return e&&e.passed});
  const fin=store.exams[tr.id+":FINAL"];
  const finalOK=!!(fin&&fin.passed);
  const parts=[];
  if(!lessonsOK)parts.push(ls.filter(l=>!done.has(l.id)).length+" lessons left");
  if(!examsOK)parts.push(tr.levels.filter(lv=>{const e=store.exams[tr.id+":"+lv.id];return !(e&&e.passed)}).length+" level exams");
  if(!finalOK)parts.push("final exam");
  return {lessonsOK,examsOK,finalOK,eligible:lessonsOK&&examsOK&&finalOK,missing:parts.join(" · ")};
}
function gradName(){
  let n=localStorage.getItem("bvName_v1");
  if(!n){
    n=prompt("Name to print on your certificates:","");

}

function drawCert(cv,name,body,heading){

/* ================= QUIZ ENGINE =================
   Custom lesson.quiz [{q,opts[],ci}] is used when present (Phase 4+);
   otherwise a quiz is generated from the lesson's key terms. */
function buildQuiz(le){
  if(le.quiz&&le.quiz.length)return le.quiz.map(q=>({q:q.q,opts:q.opts.slice(),ci:q.ci,tier:"Custom",lid:le.id}));
  const terms=le.terms||[];
  if(terms.length<2)return null;
  const rand=seededRng(hashStr(le.id+todayStr()));
  const qs=[];
  const pool=allTerms.filter(t=>t.le.id!==le.id);
  const order=shuffled(terms.map((t,i)=>i),rand);
  const mkTermQ=(ti,dir)=>{
    const term=terms[ti];
    let distract=shuffled(terms.filter((t,i)=>i!==ti),rand).slice(0,3);
    while(distract.length<3&&pool.length){
      const p=pool[Math.floor(rand()*pool.length)];
      if(!distract.some(d=>d[0]===p.t)&&p.t!==term[0])distract.push([p.t,p.d]);
    }
    const opts=shuffled([term,...distract],rand);
    return dir?
      {q:"Which term matches this definition?",prompt:term[1],opts:opts.map(o=>o[0]),ci:opts.indexOf(term),tier:"Recall",term:term[0],def:term[1],lid:le.id}:
      {q:'What best describes “'+term[0]+'”?',opts:opts.map(o=>o[1]),ci:opts.indexOf(term),tier:"Concept",term:term[0],def:term[1],lid:le.id};
  };
  const nT=Math.min(4,terms.length);
  for(let k=0;k<nT;k++)qs.push(mkTermQ(order[k],k%2===0));
  /* application: which is a real takeaway of THIS lesson? */
  if(le.keys&&le.keys.length){
    const key=le.keys[Math.floor(rand()*le.keys.length)];
    const others=shuffled(allLessons.filter(l=>l.id!==le.id&&l.keys&&l.keys.length),rand).slice(0,3).map(l=>l.keys[0]);
    if(others.length===3){
      const opts=shuffled([key,...others],rand);
      qs.push({q:"Which of these is a key lesson from “"+le.t+"”?",opts,ci:opts.indexOf(key),tier:"Application",def:key,lid:le.id});
    }
  }
  /* scenario: spot the mistake among best practices */
  if(le.mistakes&&le.mistakes.length&&le.keys&&le.keys.length>=3){
    const mk=le.mistakes[Math.floor(rand()*le.mistakes.length)];
    const opts=shuffled([mk,...shuffled(le.keys.slice(),rand).slice(0,3)],rand);
    qs.push({q:"One of these is a common MISTAKE from this lesson — the rest are best practices. Spot the mistake.",opts,ci:opts.indexOf(mk),tier:"Scenario",def:mk,lid:le.id});
  }
  return qs;
}

function qzPick(j){
  const q=qz.qs[qz.i];
  const ok=j===q.ci;
  if(!q.re){qz.marks[qz.i]=ok;if(ok)qz.right++;else qz.wrong.push(q)}
  else qz.marks[qz.i]=ok;
  for(let k=0;k<q.opts.length;k++){
    const el=document.getElementById("qopt"+k);
    el.disabled=true;
    if(k===q.ci)el.classList.add("ok");
    else if(k===j)el.classList.add("bad");
  }
  if(ok){
    setTimeout(()=>{qz.i++;qz.i<qz.qs.length?renderQuizQ():renderQuizEnd()},550);
    return;
  }
  /* re-queue this question once, at the end */
  if(!q.re&&!qz.review)qz.qs.push(Object.assign({},q,{re:true}));
  const le=q.lid?byId[q.lid]:null;

      (q.def?'<span style="display:block;margin-bottom:7px"><b>The idea:</b> '+esc(q.def)+'</span>':''))+

/* ================= FLASHCARDS: SPACED REPETITION =================
   Boxes 0-4 with review intervals: today, +1d, +3d, +7d, +30d.
   "Got it" moves a card up and schedules it out; "Again" resets to today. */
const flashEl=document.getElementById("flash");
const FLASH_INT=[0,1,3,7,30];
function isoPlus(days){const d=new Date();d.setDate(d.getDate()+days);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function flashEntry(cid){
  let v=store.flash[cid];
  if(typeof v==="number")v={b:Math.min(v,4),d:todayStr()}; /* migrate old box-only data */
  return v||null;
}
function flashBox(cid){const e=flashEntry(cid);return e?e.b:0}
function flashDue(){
  const t=todayStr();
  return allTerms.filter(x=>{const e=flashEntry(x.id);return !e||e.d<=t});
}
function flashMastered(){return allTerms.filter(t=>flashBox(t.id)>=4).length}
let fl=null;
function openFlash(mode,lessonId){
  let deck;
  if(mode==="lesson"&&lessonId){
    deck=allTerms.filter(t=>t.le.id===lessonId);
    if(!deck.length){toast("No key terms in this lesson");return}
  }else{
    const due=flashDue();
    if(!due.length){toast("All "+allTerms.length+" terms mastered 🎉");return}
    const rand=seededRng(hashStr("deck"+todayStr()));
    deck=shuffled(due.sort((a,b)=>flashBox(a.id)-flashBox(b.id)).slice(0,60),rand).slice(0,20);
  }
  fl={deck,i:0,flip:false,got:0,again:0,mode,lessonId};
  document.getElementById("flashCrumb").textContent=mode==="lesson"?"Lesson Flashcards":"Flashcard Review";
  flashEl.classList.add("open");syncScrollLock();

function renderFlash(){
  if(fl.i>=fl.deck.length){renderFlashEnd();return}
  const c=fl.deck[fl.i];

  const sched=["new","reviews tomorrow","reviews in 3 days","reviews in 7 days","reviews in 30 days"];
  let h='<div class="qProg">'+fl.deck.map((x,j)=>'<i class="'+(j<fl.i?"ok":j===fl.i?"on":"")+'"></i>').join("")+'</div>';

     (fl.flip?
       '<span class="f-tag">'+esc(c.le.t)+'</span><p>'+esc(c.d)+'</p>':
       '<span class="f-tag">'+(box>=4?"Mastered":"Got it → "+sched[Math.min(box+1,4)])+' · Card '+(fl.i+1)+' of '+fl.deck.length+'</span><b>'+esc(c.t)+'</b>')+
     '</div>';
  h+='<div class="fHint">'+(fl.flip?"How did you do?":"Tap the card to reveal the definition")+'</div>';
  if(fl.flip){
    h+='<div class="fBtns">'+
       '<button class="btn danger" onclick="flMark(false)">Again</button>'+
       '<button class="btn green" onclick="flMark(true)">Got It</button></div>';
  }else{
    h+='<div class="fBtns"><button class="btn ghost full" onclick="flFlip()">Reveal</button></div>';
  }
  document.getElementById("flashInner").innerHTML=h;
}
function flFlip(){fl.flip=!fl.flip;renderFlash()}
function flMark(got){
  const c=fl.deck[fl.i];

    const b=Math.min(flashBox(c.id)+1,4);

function badgeDefs(){
  const bests=Object.values(store.quiz).map(q=>q.best);
  const list=[
    {ic:"🎯",n:"First Steps",d:"Complete your first lesson",e:done.size>=1},
    {ic:"📚",n:"Committed",d:"Complete 10 lessons",e:done.size>=10},
    {ic:"🎓",n:"Scholar",d:"Complete 25 lessons",e:done.size>=25},
    {ic:"🏆",n:"Dean's List",d:"Complete 50 lessons",e:done.size>=50},
    {ic:"🧠",n:"Quiz Taker",d:"Pass your first quiz (70%+)",e:bests.some(b=>b>=70)},
    {ic:"🏅",n:"Quiz Ace",d:"Score 100% on 5 quizzes",e:bests.filter(b=>b===100).length>=5},
    {ic:"🃏",n:"Card Shark",d:"Master 50 flashcards",e:flashMastered()>=50},
    {ic:"📖",n:"Bookworm",d:"Finish 5 books from the Library",e:BOOKS.filter(b=>(store.books[b.id]||{}).status==="finished").length>=5},
    {ic:"🎓",n:"Examined",d:"Pass 3 level exams",e:Object.values(store.exams).filter(x=>x.passed).length>=3},
    {ic:"📝",n:"Doer",d:"Complete 5 lesson assignments",e:Object.keys(store.assignments).length>=5},
    {ic:"🧭",n:"Placed",d:"Take the placement test",e:!!placementInfo()},
    {ic:"🔬",n:"Lab Rat",d:"Complete 3 Operator Labs",e:LABS.filter(l=>!l.cap&&(store.labs[l.id]||{}).done).length>=3},
    {ic:"🏗️",n:"Capstone Builder",d:"Complete your first capstone project",e:LABS.some(l=>l.cap&&(store.labs[l.id]||{}).done)},
    {ic:"🕹️",n:"Simulator",d:"Complete 3 simulations",e:Object.keys(store.sims).length>=3},
    {ic:"♟️",n:"Decision Master",d:"Score 90%+ on every simulation",e:SIMS.length>0&&SIMS.every(s=>(store.sims[s.id]||{}).best>=90)},
    {ic:"📜",n:"Certified",d:"Earn your first school certificate",e:DATA.some(t=>certStatus(t).eligible)},
    {ic:"🏛️",n:"Graduate",d:"Earn every school certificate — the full diploma",e:DATA.every(t=>certStatus(t).eligible)},
    {ic:"🧮",n:"Toolsmith",d:"Save 3 calculations in Operator Tools",e:Object.values(store.tools).reduce((a,t)=>a+((t.saved||[]).length),0)>=3},
    {ic:"⚖️",n:"Case Cracker",d:"Complete 3 case studies",e:CASES.filter(c=>(store.cases[c.id]||{}).done).length>=3}
  ];
  DATA[0].levels.forEach(lv=>{
    const ls=lv.modules.flatMap(m=>m.lessons);
    list.push({ic:"🎖️",n:lv.name+" Complete",d:"Finish all of "+lv.tagline,e:ls.every(l=>done.has(l.id))});
  });
  DATA.slice(1).forEach(tr=>{
    const s=trackStats(tr);
    list.push({ic:tr.id==="wash"?"💦":"🛡️",n:tr.name+" Operator",d:"Finish the "+tr.name+" track",e:s.done>=s.total});
  });
  const st=streak();
  list.push({ic:"🔥",n:"On Fire",d:"3-day study streak",e:st>=3});
  list.push({ic:"⚡",n:"Unstoppable",d:"7-day study streak",e:st>=7});
  list.push({ic:"💎",n:"Iron Discipline",d:"30-day study streak",e:st>=30});
  list.push({ic:"👑",n:"Summa Cum Laude",d:"Complete the entire vault",e:done.size>=allLessons.length});
  return list;
}

function exportProgress(){
  const data={exported:new Date().toISOString(),completedLessons:[...done],days:days,store:store,theme:localStorage.getItem("bvTheme_v1")||"azure"};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="business-vault-progress.json";
  document.body.appendChild(a);a.click();a.remove();
  toast("Progress exported");
}
function exportNotes(){
  let out="MY BUSINESS VAULT UNIVERSITY NOTES\nExported "+new Date().toLocaleDateString()+"\n\n";
  let any=false;
  Object.entries(store.notes).forEach(([id,n])=>{const le=byId[id];if(le&&n){any=true;out+="═ LESSON: "+le.t+" ("+le.track.name+")\n"+n+"\n\n"}});
  BOOKS.forEach(b=>{const n=(store.books[b.id]||{}).notes;if(n){any=true;out+="═ BOOK: "+b.title+"\n"+n+"\n\n"}});
  CASES.forEach(c=>{const n=(store.cases[c.id]||{}).notes;if(n){any=true;out+="═ CASE: "+c.title+"\n"+n+"\n\n"}});
  if(!any){toast("No notes yet — write some in any lesson");return}
  const blob=new Blob([out],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="bvu-notes.txt";
  document.body.appendChild(a);a.click();a.remove();
  toast("Notes exported");
}
function resetProgress(){
  if(!confirm("Reset all lessons, quiz scores, flashcards, notes and bookmarks? Your theme and streak are kept. This cannot be undone."))return;
  done=new Set();saveProgress();lastLesson="";localStorage.removeItem(LAST_KEY);
  store=JSON.parse(JSON.stringify(STORE_DEFAULT));saveStore();
  renderAll();toast("Progress reset");
}

function tutorURL(le){
  const p="Act as my personal business professor from the world's best business school. Today's lesson from my Business Vault curriculum is \""+le.t+"\" ("+le.module.name+", "+le.level.name+"). Key terms: "+(le.terms||[]).map(t=>t[0]).join(", ")+". Please: 1) quiz me with 5 questions one at a time, waiting for my answers; 2) explain anything I miss in plain English with real-world examples; 3) then run a short realistic role-play where I apply this lesson (a negotiation, sales call, investor meeting, or operating decision - whatever fits the topic best); 4) end with one practice assignment for my own business.";
  return "https://claude.ai/new?q="+encodeURIComponent(p);
}

      '<button class="btn ghost" '+(prev?'onclick="openLesson(\''+prev.id+'\')"':'disabled')+'>← Previous</button>'+
      '<button class="btn ghost" '+(next?'onclick="openLesson(\''+next.id+'\')"':'disabled')+'>Next Lesson →</button>'+
    '</div></div>';
  const nb=document.getElementById("noteBox");
  let noteT=null;
  nb.addEventListener("input",()=>{
    clearTimeout(noteT);
    noteT=setTimeout(()=>{
      const v=nb.value.trim();
      if(v)store.notes[id]=v;else delete store.notes[id];
      saveStore();
    },400);
  });
  sheet.scrollTop=0;
  updateReadBar();
  sheet.classList.add("open");
  syncScrollLock();
}
function closeLesson(){
  document.getElementById("sheet").classList.remove("open");
  syncScrollLock();
  renderAll();
}
function toggleComplete(){
  if(done.has(currentId))done.delete(currentId);else done.add(currentId);
  saveProgress();
  const isDone=done.has(currentId);
  const btn=document.getElementById("completeBtn");
  btn.classList.toggle("green",isDone);
  btn.textContent=isDone?"✓ Completed — Tap to Undo":"Mark Complete";
  if(isDone)toast(done.size>=allLessons.length?"🎓 Curriculum complete!":"Lesson complete — "+done.size+" of "+allLessons.length);
  renderAll();
}
function toggleAssignment(){
  if(store.assignments[currentId])delete store.assignments[currentId];
  else store.assignments[currentId]={done:true,ts:todayStr()};
  saveStore();
  const btn=document.getElementById("assignBtn");
  const on=!!store.assignments[currentId];
  btn.classList.toggle("green",on);btn.classList.toggle("ghost",!on);
  btn.textContent=on?"✓ Assignment Done — Tap to Undo":"Mark Assignment Done";
  if(on)toast("Assignment complete — that's where the learning sticks");
  renderProgress();
}
function toggleBookmark(){
  const i=store.bookmarks.indexOf(currentId);
  if(i>=0){store.bookmarks.splice(i,1);toast("Bookmark removed")}
  else{store.bookmarks.unshift(currentId);toast("Bookmarked")}
  saveStore();
  document.getElementById("bmBtn").classList.toggle("on",store.bookmarks.includes(currentId));
  renderAll();
}

const palEl=document.getElementById("palette"),palInput=document.getElementById("palInput"),palList=document.getElementById("palList");
function palActions(){
  return [
    {k:"Page",t:"Home",s:"Dashboard",run:()=>setView("home")},
    {k:"Page",t:"Courses",s:"All schools",run:()=>setView("courses")},

    {k:"Page",t:"Business Library",s:BOOKS.length+" books with study notes",run:()=>openLibrary("books")},
    {k:"Page",t:"Operator Tools",s:TOOLS.length+" calculators",run:()=>openLibrary("tools")},
    {k:"Page",t:"Case Studies",s:CASES.length+" decision cases",run:()=>openLibrary("cases")},
